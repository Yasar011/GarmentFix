<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brandix QMS — Worker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyA-aIRjMPFkK0hQKWY8-rpcA_5TfMhbRM4",
    authDomain: "qc--brandex.firebaseapp.com",
    databaseURL: "https://qc--brandex-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qc--brandex",
    storageBucket: "qc--brandex.firebasestorage.app",
    messagingSenderId: "109990871136",
    appId: "1:109990871136:web:c0dfa5f0ba78bed77c8305"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(e => console.error("Anon Auth Error:", e));
  window._db = db;
  window._ref = ref; window._set = set; window._get = get;
  window._push = push; window._onValue = onValue; window._child = child;
  window._dbReady = true;

  // DB login - check username/password in users table
  window.dbLogin = async function(username, password) {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) throw new Error('No users in system');
    const users = snap.val();
    for (const [key, u] of Object.entries(users)) {
      if ((u.username === username || u.email === username) && u.password === password) {
        return { fbKey: key, ...u };
      }
    }
    throw new Error('Invalid username or password');
  };

  window.loadWorkerData = function() {
    onValue(ref(db, 'modules'), s => {
      window.WS.modules = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : [];
    });
    onValue(ref(db, 'styles'), s => {
      window.WS.styles = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : [];
    });
    onValue(ref(db, 'operations'), s => {
      window.WS.operations = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : [];
    });
    onValue(ref(db, 'inspections'), s => {
      if (s.exists()) {
        const today = new Date().toISOString().split('T')[0];
        const all = Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v}));
        window.WS.myInspections = all.filter(i =>
          i.submittedBy === window.WS.user?.username &&
          (i.date === today || (i.createdAt||'').startsWith(today))
        );
      } else { window.WS.myInspections = []; }
      if (window.WS.step === 'dashboard') window.renderW();
    });
    if (window.WS.user?.fbKey) {
      onValue(ref(db, `users/${window.WS.user.fbKey}`), s => {
        if(s.exists()){
          const u = s.val();
          window.WS.user = { fbKey: window.WS.user.fbKey, ...u };
          if(!u.activeModule && window.WS.step === 'waiting') {
            window.WS.scannedModule = null;
            window.WS.step = 'scan';
            window.renderW();
            toast('Approved!');
          } else if (u.activeModule && window.WS.step === 'scan') {
            try { window.WS.scannedModule = JSON.parse(u.activeModule); } catch(e){}
            window.WS.step = u.changeRequest ? 'waiting' : 'form';
            window.renderW();
          } else if (u.changeRequest && window.WS.step === 'form') {
            window.WS.step = 'waiting';
            window.renderW();
          }
        }
      });
    }
  };

  window.fbAdd = async function(path, data) {
    const r = push(ref(db, path));
    await set(r, { ...data, createdAt: new Date().toISOString() });
    return r.key;
  };

  window.fbAddAlert = async function(data) {
    const r = push(ref(db, 'alerts'));
    await set(r, { ...data, createdAt: new Date().toISOString() });
  };

  setTimeout(() => { if(window.WS.step==='loading'){window.WS.step='login';window.renderW();} }, 2000);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--bg4:#22262f;--border:#2a2e38;--border2:#363c48;--text:#e8eaf0;--text2:#9097a8;--text3:#5c6478;--accent:#00d4a8;--accent2:#0099d4;--red:#e05555;--yellow:#d4a800;--green:#00d4a8;--blue:#4488ff;--purple:#9966ff;--radius:12px;--font:'IBM Plex Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;font-size:16px;line-height:1.5;-webkit-tap-highlight-color:transparent}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);font-size:16px}
.page{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.logo-sm{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:12px}
.body{flex:1;padding:16px;overflow-y:auto}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:var(--radius);font-size:16px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.15)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-big{width:100%;padding:16px;border-radius:var(--radius);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:rgba(0,212,168,.15);color:var(--green)}
.badge-red{background:rgba(224,85,85,.15);color:var(--red)}
.badge-yellow{background:rgba(212,168,0,.15);color:var(--yellow)}
.badge-blue{background:rgba(68,136,255,.15);color:var(--blue)}
.scan-area{background:var(--bg2);border:2px dashed var(--border);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#qr-reader{width:100%;max-width:400px;border-radius:12px;overflow:hidden}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase}
.sub-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.verify-box{background:var(--bg2);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.success-box{background:rgba(0,212,168,.08);border:1px solid rgba(0,212,168,.3);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.module-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.module-btn{padding:16px;background:var(--bg3);border:2px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s}
.module-btn:active{border-color:var(--accent);background:rgba(0,212,168,.05)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:12px;font-size:14px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:90vw}
.toast-success{background:rgba(0,212,168,.95);color:#000}
.toast-error{background:rgba(224,85,85,.95);color:#fff}
.err-msg{color:var(--red);font-size:13px;margin-bottom:12px;padding:12px;background:rgba(224,85,85,.08);border-radius:8px;border:1px solid rgba(224,85,85,.2);display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(0,212,168,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.fade-in{animation:fadeIn .3s ease}
.btn-logout{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:13px}
@media(max-width:400px){.stats-row{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFECTS=['Skip Stitch','Open Seam','Broken Stitch','Puckering','Raw Edge','Oil Stain','Shade Variation','Uneven Stitch','Needle Mark','Incorrect SPI','Loose Thread','Missing Button','Seam Pucker','Run-Off','Pleat','Uncut Thread','Stain','Wrong Measurement'];
const DEFAULT_OPS=['Waist Join','Sleeve Attach','Side Seam','Collar Attach','Hemming','Pocket Attach','Label Attach','Zip Insert','Button Attach','Cuff Join','Yoke Join','Back Panel Join','Front Panel Join','Tacking','Bartack','Topstitch','Overlock','Flatlock'];

window.WS = { step:'loading', user:null, loading:false, scannedModule:null, modules:[], styles:[], operations:[], myInspections:[], lastSub:null };
let qrScanner = null;

function toast(m,t='success'){document.querySelectorAll('.toast').forEach(e=>e.remove());const d=document.createElement('div');d.className=`toast toast-${t}`;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

// ============ RENDER ============
window.renderW = function() {
  const app = document.getElementById('app');
  const s = WS;
  if (s.step==='loading'){app.innerHTML=`<div class="login-page"><div style="text-align:center"><div class="spinner" style="width:36px;height:36px;margin:0 auto 16px"></div><div style="color:var(--text2)">Connecting...</div></div></div>`;return;}
  if (s.step==='login'||!s.user){app.innerHTML=renderLogin();bindLogin();return;}
  app.innerHTML=`<div class="page">${renderHeader()}<div class="body fade-in">${
    s.step==='scan'?renderScan():
    s.step==='verify'?renderVerify():
    s.step==='form'?renderForm():
    s.step==='success'?renderSuccess():
    s.step==='dashboard'?renderDash():
    s.step==='waiting'?renderWaiting():''
  }</div></div>`;
  bindAll();
  if(s.step==='scan')initQR();
};

function renderHeader(){
  return`<div class="header"><div class="header-left"><div class="logo-sm">BX</div><div><div style="font-size:14px;font-weight:600">${WS.user?.name||'Worker'}</div><div style="font-size:10px;color:var(--text2)">${WS.scannedModule?WS.scannedModule.name:'QC Inspector'}</div></div></div><div style="display:flex;gap:8px">${WS.step!=='scan'&&WS.step!=='dashboard'?`<button class="btn-logout" onclick="WS.step='dashboard';renderW()">📊</button>`:''} ${WS.step==='dashboard'?`<button class="btn-logout" onclick="goInsp()">📷 Scan</button>`:''}<button class="btn-logout" onclick="WS.user=null;WS.step='login';WS.scannedModule=null;renderW()">Logout</button></div></div>`;
}

// ============ LOGIN (Database-based) ============
function renderLogin(){
  return`<div class="login-page"><div class="login-card fade-in"><div style="display:flex;align-items:center;gap:12px;margin-bottom:28px"><div class="logo-sm" style="width:44px;height:44px;font-size:16px;border-radius:12px">BX</div><div><div style="font-size:18px;font-weight:700">Brandix QMS</div><div style="font-size:12px;color:var(--text2)">Worker Inspector</div></div></div><div class="err-msg" id="w-err"></div><div class="form-group"><label class="form-label">Username</label><input class="form-input" id="w-user" placeholder="Your username" autocomplete="username"></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" id="w-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div><button class="btn-big btn-primary" id="w-login-btn">${WS.loading?'<span class="spinner"></span> Signing in...':'Sign In'}</button><div style="margin-top:16px;text-align:center;font-size:11px;color:var(--text3)">Login with credentials given by your admin</div></div></div>`;
}

function bindLogin(){
  const btn=document.getElementById('w-login-btn');if(!btn)return;
  const go=async()=>{
    const u=document.getElementById('w-user')?.value.trim();
    const p=document.getElementById('w-pass')?.value;
    const err=document.getElementById('w-err');
    if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
    err.style.display='none';
    WS.loading=true;renderW();
    try{
      const user=await window.dbLogin(u,p);
      WS.user=user;WS.step='scan';WS.loading=false;
      renderW();
      window.loadWorkerData();
      toast('Welcome, '+user.name);
    }catch(e){
      WS.loading=false;renderW();
      const el=document.getElementById('w-err');
      if(el){el.style.display='block';el.textContent=e.message||'Login failed';}
    }
  };
  btn.onclick=go;
  document.getElementById('w-user')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
  document.getElementById('w-pass')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
}

// ============ QR SCAN ============
function renderScan(){
  const mods=WS.modules;
  return`<div style="text-align:center;margin-bottom:16px"><div style="font-size:20px;font-weight:600">Scan Module QR Code</div><div style="font-size:13px;color:var(--text2)">Point camera at the module QR code</div></div><div class="scan-area"><div id="qr-reader"></div></div><div style="text-align:center;margin-bottom:16px;color:var(--text3);font-size:13px">— OR select manually —</div>${mods.length===0?'<div style="text-align:center;color:var(--text3);padding:20px">No modules. Ask admin to add them.</div>':`<div class="module-select-grid">${mods.map(m=>`<div class="module-btn" onclick="pickModule('${m.fbKey}')"><div style="font-size:15px;font-weight:600">${m.name||m.moduleId}</div><div style="font-size:11px;color:var(--text3)">${m.styleName||'No style'}</div></div>`).join('')}</div>`}<div style="margin-top:20px;text-align:center"><button class="btn-logout" onclick="WS.step='dashboard';renderW()">📊 My Dashboard</button></div>`;
}

function initQR(){
  const el=document.getElementById('qr-reader');if(!el)return;
  try{
    if(qrScanner){try{qrScanner.clear();}catch(e){}}
    qrScanner=new Html5Qrcode('qr-reader');
    qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},(text)=>{
      qrScanner.stop().then(()=>handleQR(text));
    },()=>{}).catch(()=>{el.innerHTML='<div style="padding:20px;color:var(--text3)">📷 Camera not available. Select manually.</div>';});
  }catch(e){}
}

function handleQR(text){
  let data;try{data=JSON.parse(text);}catch(e){data={moduleId:text,name:text};}
  const mod=WS.modules.find(m=>m.moduleId===data.moduleId||m.name===data.name||m.fbKey===data.fbKey||m.name===text);
  WS.scannedModule=mod||{name:data.name||text,moduleId:data.moduleId||text,styleName:data.styleName||'',buyer:data.buyer||''};
  WS.step='verify';renderW();toast('Module: '+WS.scannedModule.name);
}

window.pickModule=function(k){
  const mod=WS.modules.find(m=>m.fbKey===k);
  if(mod){if(qrScanner)try{qrScanner.stop();}catch(e){}WS.scannedModule=mod;WS.step='verify';renderW();}
};
window.goScan=function(){WS.scannedModule=null;WS.step='scan';renderW();};
window.goInsp=function(){
  if(WS.user?.changeRequest) WS.step='waiting';
  else if(WS.user?.activeModule) {
    try { WS.scannedModule = JSON.parse(WS.user.activeModule); } catch(e){}
    WS.step='form';
  } else WS.step='scan';
  renderW();
};
window.requestChange=async function(){
  if(!WS.user?.fbKey)return;
  await window._update(window._ref(window._db, 'users/'+WS.user.fbKey), { changeRequest: true });
};

// ============ VERIFY STYLE ============
function renderVerify(){
  const m=WS.scannedModule;
  return`<div class="verify-box fade-in"><div style="font-size:36px;margin-bottom:8px">🏭</div><div style="font-size:24px;font-weight:700;color:var(--accent)">${m?.name||''}</div><div style="font-size:13px;color:var(--text2);margin-bottom:16px">${m?.buyer?'Buyer: '+m.buyer+' • ':''}${m?.styleName?'Style: '+m.styleName:''}</div><div style="font-size:14px;font-weight:500">Enter Style Number to verify</div></div><div class="err-msg" id="v-err"></div><div class="form-group"><label class="form-label">Style Number / Name</label><input class="form-input" id="v-style" placeholder="e.g. STY-1000 or Polo Shirt"></div><button class="btn-big btn-primary" id="v-btn">✓ Verify & Start</button><button class="btn-big btn-ghost" style="margin-top:10px" onclick="goScan()">← Back</button>`;
}

function bindVerify(){
  const btn=document.getElementById('v-btn');if(!btn)return;
  btn.onclick=async ()=>{
    const inp=document.getElementById('v-style')?.value.trim().toLowerCase();
    const err=document.getElementById('v-err');
    if(!inp){err.style.display='block';err.textContent='Enter style number';return;}
    const m=WS.scannedModule;
    const ok=(m?.styleName||'').toLowerCase().includes(inp)||(m?.styleId||'').toLowerCase().includes(inp)||inp.includes((m?.styleName||'').toLowerCase())||inp.includes((m?.styleId||'').toLowerCase())||WS.styles.some(s=>(s.styleId||'').toLowerCase().includes(inp)||(s.name||'').toLowerCase().includes(inp));
    if(ok||!m?.styleName){
      await window._update(window._ref(window._db, 'users/'+WS.user.fbKey), { activeModule: JSON.stringify(m), changeRequest: false });
      WS.step='form';renderW();toast('Verified ✓');
    }
    else{err.style.display='block';err.textContent=`Style mismatch. Expected: ${m?.styleName||m?.styleId||'unknown'}`;}
  };
  document.getElementById('v-style')?.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
}

// ============ INSPECTION FORM ============
function renderForm(){
  const m=WS.scannedModule;
  const ops=WS.operations.length?WS.operations.map(o=>o.name):DEFAULT_OPS;
  return`<div class="card" style="background:rgba(0,212,168,.05);border-color:rgba(0,212,168,.2)"><div style="display:flex;justify-content:space-between"><div><div style="font-size:16px;font-weight:600">${m?.name||''}</div><div style="font-size:12px;color:var(--text2)">${m?.styleName||''} ${m?.buyer?'• '+m.buyer:''}</div></div><span class="badge badge-green">✓ Verified</span></div></div><div class="card"><div style="font-size:13px;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:500">Inspection Entry</div><form id="wf" onsubmit="return false"><input type="hidden" name="module" value="${m?.name||m?.moduleId||''}"><input type="hidden" name="style" value="${m?.styleName||m?.styleId||''}"><div class="form-row"><div class="form-group"><label class="form-label">Shift *</label><select class="form-input" name="shift" required><option value="A" ${new Date().getHours()<14?'selected':''}>A</option><option value="B" ${new Date().getHours()>=14?'selected':''}>B</option></select></div><div class="form-group"><label class="form-label">Session / Section *</label><select class="form-input" name="session" required><option>1</option><option>2</option><option>Both</option></select></div></div><div class="form-group"><label class="form-label">Operator ID *</label><input class="form-input" name="operatorId" placeholder="e.g. OP-10838" required></div><div class="form-group"><label class="form-label">Operation *</label><select class="form-input" name="operation" required><option value="">— Select —</option>${ops.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Checked Qty *</label><input class="form-input" name="checkedQty" type="number" min="1" placeholder="0" required oninput="calcDHU()"></div><div class="form-group"><label class="form-label">Defect Qty</label><input class="form-input" name="defectQty" type="number" min="0" value="0" oninput="calcDHU()"></div></div><div id="dhu-box" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;text-align:center"><div style="font-size:12px;color:var(--text2)">DHU</div><div id="dhu-val" style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace"></div></div><div class="form-group"><label class="form-label">Defect Type</label><select class="form-input" name="defectType"><option value="">— No Defect —</option>${DEFECTS.map(d=>`<option value="${d}">${d}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Comments</label><textarea class="form-input" name="comments" rows="2" placeholder="Notes..."></textarea></div><button class="btn-big btn-primary" type="button" id="sub-btn">✓ Submit</button></form></div><button class="btn-big btn-ghost" style="margin-top:4px" onclick="requestChange()">🔒 Request Module Change</button>`;
}

window.calcDHU=function(){const f=document.getElementById('wf');if(!f)return;const c=parseInt(f.checkedQty?.value)||0,d=parseInt(f.defectQty?.value)||0;const el=document.getElementById('dhu-box'),v=document.getElementById('dhu-val');if(c>0){const dhu=((d/c)*100).toFixed(1);el.style.display='block';v.textContent=dhu+'%';v.style.color=dhu>5?'var(--red)':dhu>3?'var(--yellow)':'var(--green)';}else{el.style.display='none';}};

function bindSubmit(){
  const btn=document.getElementById('sub-btn');if(!btn)return;
  btn.onclick=async()=>{
    const f=document.getElementById('wf');if(!f)return;
    const fd=new FormData(f);const data=Object.fromEntries(fd.entries());
    if(!data.operatorId){toast('Enter Operator ID','error');return;}
    if(!data.operation){toast('Select Operation','error');return;}
    if(!data.checkedQty||parseInt(data.checkedQty)<1){toast('Enter Checked Qty','error');return;}
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Submitting...';
    try{
      const id='INS-'+Date.now();
      await window.fbAdd('inspections',{id,type:'inline',date:new Date().toISOString().split('T')[0],time:new Date().toTimeString().slice(0,5),...data,submittedBy:WS.user?.username||WS.user?.name,inspector:WS.user?.name});
      const c=parseInt(data.checkedQty)||0,d=parseInt(data.defectQty)||0;
      if(c>0&&(d/c)*100>5){
        await window.fbAddAlert({title:`High DHU ${((d/c)*100).toFixed(1)}% — ${data.module}`,message:`${data.defectType||'Defects'} on ${data.operation} by ${data.operatorId}`,level:(d/c)*100>8?'critical':'high',module:data.module,read:false,createdBy:'worker-auto'});
      }
      WS.lastSub={id,...data};WS.step='success';renderW();toast('Submitted ✓');
    }catch(e){toast('Failed: '+e.message,'error');btn.disabled=false;btn.innerHTML='✓ Submit';}
  };
}

// ============ SUCCESS ============
function renderSuccess(){
  const s=WS.lastSub;const c=parseInt(s?.checkedQty)||0,d=parseInt(s?.defectQty)||0;const dhu=c?((d/c)*100).toFixed(1):'0';
  return`<div class="success-box fade-in"><div style="font-size:48px;margin-bottom:8px">✅</div><div style="font-size:18px;font-weight:600;color:var(--green)">Submitted!</div><div style="font-size:13px;color:var(--text2);margin-bottom:12px">ID: ${s?.id||''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center"><div><div style="font-size:11px;color:var(--text3)">OPERATOR</div><div style="font-weight:500">${s?.operatorId||''}</div></div><div><div style="font-size:11px;color:var(--text3)">OPERATION</div><div style="font-weight:500">${s?.operation||''}</div></div><div><div style="font-size:11px;color:var(--text3)">CHECKED</div><div style="font-weight:600;font-size:18px">${c}</div></div><div><div style="font-size:11px;color:var(--text3)">DEFECTS</div><div style="font-weight:600;font-size:18px;color:${d>0?'var(--red)':'var(--green)'}">${d}</div></div></div><div style="margin-top:12px;font-size:14px;color:${dhu>5?'var(--red)':dhu>3?'var(--yellow)':'var(--green)'};font-weight:600">DHU: ${dhu}%</div></div><button class="btn-big btn-primary" onclick="WS.step='form';renderW()">➕ Next Inspection</button><button class="btn-big btn-ghost" style="margin-top:10px" onclick="requestChange()">🔒 Request Module Change</button><button class="btn-big btn-ghost" style="margin-top:10px" onclick="WS.step='dashboard';renderW()">📊 Dashboard</button>`;
}

// ============ DASHBOARD ============
function renderDash(){
  const ins=WS.myInspections;
  const tc=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0),td=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=tc?((td/tc)*100).toFixed(1):'0.0';
  return`<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:600">Today's Summary</div><div style="font-size:12px;color:var(--text3)">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short',year:'numeric'})}</div></div><div class="stats-row"><div class="stat-card"><div class="stat-val" style="color:var(--accent)">${ins.length}</div><div class="stat-label">Inspections</div></div><div class="stat-card"><div class="stat-val" style="color:var(--red)">${td}</div><div class="stat-label">Defects</div></div><div class="stat-card"><div class="stat-val" style="color:${dhu>5?'var(--red)':dhu>3?'var(--yellow)':'var(--green)'}">${dhu}%</div><div class="stat-label">DHU</div></div></div><button class="btn-big btn-primary" onclick="goInsp()" style="margin-bottom:16px">📷 Start Inspection</button><div style="font-size:13px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;font-weight:500">Recent</div>${ins.length===0?'<div style="text-align:center;padding:32px;color:var(--text3)">No inspections today</div>':ins.slice().reverse().map(i=>`<div class="sub-item"><div><div style="font-size:14px;font-weight:500">${i.operatorId||''} • ${i.operation||''}</div><div style="font-size:11px;color:var(--text3)">${i.module||''} • ${i.time||''}</div></div><div style="font-size:18px;font-weight:600;color:${(parseInt(i.defectQty)||0)>0?'var(--red)':'var(--green)'}";font-family:'IBM Plex Mono',monospace">${i.defectQty||0}</div></div>`).join('')}`;
}

// ============ WAITING SCREEN ============
function renderWaiting(){
  return `<div class="verify-box fade-in" style="border-color:var(--yellow)"><div class="spinner" style="border-top-color:var(--yellow);margin-bottom:16px"></div><div style="font-size:20px;font-weight:700;color:var(--yellow)">Waiting for Approval</div><div style="font-size:13px;color:var(--text2);margin-bottom:16px">You have requested to change your module. A supervisor must approve this on the admin dashboard.</div><button class="btn-big btn-ghost" onclick="WS.step='dashboard';renderW()">📊 My Dashboard</button></div>`;
}

function bindAll(){bindVerify();bindSubmit();}
renderW();
</script>
</body>
</html>
