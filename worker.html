<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarmentFix - Worker Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ClipboardList, Wrench, Clock, CheckSquare, ScanLine, X, 
            LogOut, User, Lock, Activity, TrendingUp, AlertTriangle, PlayCircle,
            AlertOctagon, ArrowRight, CheckCircle, History, RefreshCw
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, update, remove, push } from "firebase/database";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = { databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- UI COMPONENTS ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>{children}</div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", fullWidth = false }) => {
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-sm",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-50 text-red-600 hover:bg-red-100",
                warning: "bg-orange-500 text-white hover:bg-orange-600",
                success: "bg-emerald-600 text-white hover:bg-emerald-700"
            };
            return (
                <button onClick={onClick} className={`px-4 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${variants[variant]} ${fullWidth ? 'w-full' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ status }) => {
            const styles = {
                "Critical": "bg-red-600 text-white animate-pulse",
                "Normal": "bg-slate-100 text-slate-600 border",
                "Low": "bg-blue-50 text-blue-600 border"
            };
            return <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${styles[status] || styles.Normal}`}>{status}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                    <Card className="w-full max-w-md p-0 overflow-hidden animate-in zoom-in-95 duration-200">
                        <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold">{title}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </Card>
                </div>
            );
        };

        // --- QR SCANNER COMPONENT ---
        const QRScanner = ({ onScan, onClose, title = "Scan QR Code" }) => {
            useEffect(() => {
                const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                scanner.render((decodedText) => {
                    scanner.clear().then(() => onScan(decodedText));
                }, () => {});
                return () => { try { scanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const WorkerApp = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [machines, setMachines] = useState({});
            const [tickets, setTickets] = useState([]);
            const [logs, setLogs] = useState([]);
            
            // Login State
            const [creds, setCreds] = useState({ username: "", password: "" });
            const [loginError, setLoginError] = useState("");

            // Task State
            const [activeTask, setActiveTask] = useState(null);
            const [showScanner, setShowScanner] = useState(false);
            const [scanTargetTask, setScanTargetTask] = useState(null);

            // Modals & Actions
            const [showSignOff, setShowSignOff] = useState(false);
            const [signOffData, setSignOffData] = useState({ remarks: "", operatorId: "" });
            
            const [showEscalate, setShowEscalate] = useState(false);
            const [showReroute, setShowReroute] = useState(false);
            const [rerouteTicket, setRerouteTicket] = useState(null);
            const [rerouteDept, setRerouteDept] = useState("Quality");

            // REPLACE FLOW STATE (Mechanical Only)
            const [replaceFlow, setReplaceFlow] = useState({ active: false, step: 1 });

            // Sound Alert Tracking
            const [lastTaskCount, setLastTaskCount] = useState(0);

            // Safely check assignment ignoring spaces/case
            const isMyTask = (assignedVal) => {
                if (!assignedVal || !currentUser) return false;
                const val = String(assignedVal).trim().toLowerCase();
                return val === String(currentUser.id).toLowerCase() || 
                       val === String(currentUser.name).trim().toLowerCase() || 
                       val === String(currentUser.username).trim().toLowerCase();
            };

            // Safely check if unassigned or AI failed to assign
            const isUnassignedTask = (assignedVal) => {
                if (!assignedVal) return true;
                const val = String(assignedVal).trim().toLowerCase();
                return val === "" || val === "null" || val.includes("none") || val.includes("no ") || val.includes("unable") || val.includes("unassigned");
            };

            // Fetch Initial Data (Users, Machines, Logs)
            useEffect(() => {
                onValue(ref(db, 'users'), (snap) => setUsers(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'machines'), (snap) => setMachines(snap.val() || {}));
                onValue(ref(db, 'logs'), (snap) => setLogs(snap.val() ? Object.values(snap.val()) : []));
            }, []);

            // --- UPDATED: Fetch Department-Specific Tickets DIRECTLY from Machines ---
            useEffect(() => {
                if (currentUser && currentUser.department) {
                    // Convert machines object to array and map properties for backwards compatibility
                    const machineList = Object.entries(machines).map(([id, val]) => ({ 
                        id, 
                        ...val, 
                        machineId: val.name || id, 
                        issueDescription: val.issue 
                    }));
                    
                    // Filter for this user's department and actionable statuses
                    const deptTickets = machineList.filter(m => 
                        m.department?.toLowerCase() === currentUser.department.toLowerCase() && 
                        ['Pending', 'In Progress', 'Escalated'].includes(m.status)
                    );
                    
                    setTickets(deptTickets);
                    
                    // Check if active task is in progress
                    const active = deptTickets.find(t => t.status === 'In Progress' && isMyTask(t.assignedTo));
                    setActiveTask(active || null);
                }
            }, [machines, currentUser]);

            // SOUND ALERT LOGIC
            useEffect(() => {
                if (!currentUser) return;
                
                const myTasksCount = tickets.filter(t => isMyTask(t.assignedTo) && t.status === 'Pending').length;
                const unassignedCount = tickets.filter(t => isUnassignedTask(t.assignedTo) && t.status === 'Pending').length;
                const currentCount = myTasksCount + unassignedCount;

                // If task count increases, play chime
                if (currentCount > lastTaskCount && lastTaskCount !== 0) {
                    try {
                        Tone.start();
                        const synth = new Tone.Synth().toDestination();
                        const now = Tone.now();
                        synth.triggerAttackRelease("C5", "8n", now);
                        synth.triggerAttackRelease("E5", "8n", now + 0.2);
                        synth.triggerAttackRelease("G5", "4n", now + 0.4);
                    } catch (e) {
                        console.log("Audio play blocked by browser policy");
                    }
                }
                setLastTaskCount(currentCount);
            }, [tickets, currentUser, lastTaskCount]);


            const formatDuration = (ms) => {
                if(!ms || ms < 0) return "0m";
                const minutes = Math.floor(ms / 60000);
                const hours = Math.floor(minutes / 60);
                if (hours > 0) return `${hours}h ${minutes % 60}m`;
                return `${minutes}m`;
            };

            const isSenior = currentUser?.mechanicType === 'Sr Mechanic' || currentUser?.mechanicType === 'Mechanical Admin' || currentUser?.role === 'admin';
            
            // TASK CATEGORIES
            const priorityOrder = { "Critical": 0, "Normal": 1, "Low": 2 };
            const myTasks = tickets.filter(t => isMyTask(t.assignedTo) && t.status === 'Pending').sort((a,b) => (priorityOrder[a.priority]||1) - (priorityOrder[b.priority]||1));
            const unassignedTasks = tickets.filter(t => isUnassignedTask(t.assignedTo) && t.status === 'Pending').sort((a,b) => (priorityOrder[a.priority]||1) - (priorityOrder[b.priority]||1));
            const escalatedTasks = tickets.filter(t => t.status === 'Escalated');

            const handleLogin = (e) => {
                e.preventDefault();
                const user = users.find(u => u.username === creds.username && u.password === creds.password);
                if (user) {
                    setCurrentUser(user);
                    setLoginError("");
                    // Activate Tone.js on user interaction
                    Tone.start();
                } else {
                    setLoginError("Invalid credentials.");
                }
            };

            // --- UPDATED ACTIONS FOR DIRECT MACHINE DB ---
            const handleClaimTask = (ticketId) => {
                update(ref(db, `machines/${ticketId}`), {
                    assignedTo: currentUser.id, // Assigning explicitly by ID
                    assignedAt: new Date().toISOString()
                });
            };

            const triggerScanner = (ticket) => {
                setScanTargetTask(ticket);
                setShowScanner(true);
            };

            const handleScanStart = (decodedText) => {
                // Ensure QR matches ID or Machine Name
                if (decodedText === scanTargetTask.id || decodedText === scanTargetTask.machineId) {
                    update(ref(db, `machines/${scanTargetTask.id}`), {
                        status: 'In Progress',
                        startedAt: new Date().toISOString()
                    });
                    setShowScanner(false);
                    setScanTargetTask(null);
                } else {
                    alert(`Wrong Machine! You scanned ${decodedText}, but expected ${scanTargetTask.machineId}`);
                    setShowScanner(false);
                }
            };

            const handleSignOff = () => {
                if(!signOffData.operatorId) return alert("Operator ID is required to close the job.");
                
                const now = new Date();
                const startedAt = new Date(activeTask.startedAt || new Date());
                const assignedAt = activeTask.assignedAt ? new Date(activeTask.assignedAt) : new Date(activeTask.reportedAt || new Date());
                const reportedAt = new Date(activeTask.reportedAt || new Date());

                const responseMs = startedAt - assignedAt;
                const repairMs = now - startedAt;
                const downtimeMs = now - reportedAt;

                push(ref(db, 'logs'), {
                    machineId: activeTask.id, // Storing ID for Analytics mapping
                    action: 'Fixed',
                    department: currentUser.department,
                    userId: currentUser.id,
                    userName: currentUser.name,
                    operatorSignOff: signOffData.operatorId,
                    details: signOffData.remarks,
                    timestamp: now.toISOString(),
                    repairTime: formatDuration(repairMs),
                    metrics: { responseMs, repairMs, downtimeMs }
                });

                // Clear the issue from the machine and set to running
                update(ref(db, `machines/${activeTask.id}`), { 
                    status: 'Running', 
                    assignedTo: null, 
                    issue: null,
                    department: null,
                    priority: null,
                    aiDiagnostic: null
                });

                setShowSignOff(false);
                setSignOffData({ operatorId: "", remarks: "" });
            };

            const handleEscalate = () => {
                update(ref(db, `machines/${activeTask.id}`), {
                    status: 'Escalated',
                    assignedTo: null,
                    escalatedBy: currentUser.name,
                    escalationNote: signOffData.remarks || "Requires senior assistance."
                });
                setShowEscalate(false);
                setSignOffData({ operatorId: "", remarks: "" });
            };

            const handleReroute = () => {
                update(ref(db, `machines/${rerouteTicket.id}`), {
                    department: rerouteDept,
                    status: 'Pending',
                    assignedTo: null,
                    escalatedBy: null,
                    escalationNote: null
                });
                setShowReroute(false);
                setRerouteTicket(null);
            };

            // REPLACE MACHINE LOGIC
            const handleReplaceScan = (decodedText) => {
                if (replaceFlow.step === 1) {
                    if (decodedText === activeTask.id || decodedText === activeTask.machineId) {
                        setReplaceFlow({ active: true, step: 2 });
                    } else {
                        alert("Please scan the correct BROKEN machine first.");
                    }
                } else if (replaceFlow.step === 2) {
                    const spare = Object.values(machines).find(m => m.id === decodedText || m.name === decodedText);
                    if (!spare) return alert("Spare machine not found in database!");
                    if (spare.id === activeTask.id) return alert("You scanned the broken machine again! Scan the SPARE machine.");

                    const oldMachine = machines[activeTask.id] || activeTask;

                    // Log the swap
                    push(ref(db, 'logs'), {
                        machineId: activeTask.id,
                        action: 'Replaced',
                        details: `Swapped out. Replaced by ${spare.name}`,
                        userId: currentUser.id,
                        userName: currentUser.name,
                        timestamp: new Date().toISOString()
                    });

                    // Update Old Machine (Offline)
                    update(ref(db, `machines/${activeTask.id}`), {
                        status: 'Offline', 
                        assignedTo: null, 
                        issue: 'Requires Workshop Repair (Swapped out)', 
                        priority: 'Normal',
                        department: null
                    });

                    // Update Spare Machine (Running)
                    update(ref(db, `machines/${spare.id}`), {
                        status: 'Running', 
                        lineId: oldMachine.lineId || null
                    });

                    setActiveTask(null);
                    setReplaceFlow({ active: false, step: 1 });
                    alert("Machine successfully replaced! Line is back running.");
                }
            };

            // --- RENDER ---
            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
                        <Card className="w-full max-w-sm p-8 bg-white border-t-8 border-blue-500 shadow-2xl">
                            <div className="text-center mb-6">
                                <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><User className="w-8 h-8 text-blue-600" /></div>
                                <h1 className="text-2xl font-bold text-slate-800">Worker Portal</h1>
                                <p className="text-slate-500 text-sm">Please log in to view your tasks.</p>
                            </div>
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm font-bold border border-red-200 text-center">{loginError}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Username / ID</label>
                                    <input className="w-full p-3 border border-slate-300 bg-slate-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                    <input type="password" className="w-full p-3 border border-slate-300 bg-slate-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                                </div>
                                <Button fullWidth className="mt-2 text-lg py-3"><Lock className="w-5 h-5"/> Secure Login</Button>
                            </form>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col pb-20 md:pb-0 font-sans">
                    
                    {/* SCANNERS AND MODALS */}
                    {showScanner && <QRScanner onScan={handleScanStart} onClose={() => setShowScanner(false)} title="Scan Machine to Start Repair" />}
                    
                    {replaceFlow.active && (
                        <QRScanner 
                            onScan={handleReplaceScan} 
                            onClose={() => setReplaceFlow({ active: false, step: 1 })} 
                            title={replaceFlow.step === 1 ? "1. Scan BROKEN Machine" : "2. Scan SPARE Machine"} 
                        />
                    )}
                    
                    <Modal isOpen={showSignOff} onClose={() => setShowSignOff(false)} title="Complete Job & Sign-off">
                        <div className="space-y-4">
                            <div className="bg-emerald-50 text-emerald-800 p-3 rounded-lg border border-emerald-200 text-sm font-medium">
                                Confirm repairs for <span className="font-bold">{activeTask?.machineId}</span>.
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Repair Notes (What did you do?)</label>
                                <textarea className="w-full p-3 border rounded-lg h-24" placeholder="e.g. Changed looper, adjusted timing..." value={signOffData.remarks} onChange={e => setSignOffData({...signOffData, remarks: e.target.value})}></textarea>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Operator Verification ID</label>
                                <input className="w-full p-3 border rounded-lg bg-yellow-50 focus:ring-yellow-400" placeholder="e.g. OP-1234" value={signOffData.operatorId} onChange={e => setSignOffData({...signOffData, operatorId: e.target.value})} />
                                <p className="text-[10px] text-slate-400 mt-1">Operator must enter ID to verify machine is running smoothly.</p>
                            </div>
                            <Button fullWidth variant="success" onClick={handleSignOff}><CheckCircle className="w-5 h-5"/> Verify & Close Ticket</Button>
                        </div>
                    </Modal>

                    <Modal isOpen={showEscalate} onClose={() => setShowEscalate(false)} title="Escalate Ticket">
                        <div className="space-y-4">
                            <p className="text-sm text-slate-600">If you cannot fix this issue, or it belongs to another department, escalate it to a Senior.</p>
                            <textarea className="w-full p-3 border rounded-lg h-24" placeholder="Reason for escalation..." value={signOffData.remarks} onChange={e => setSignOffData({...signOffData, remarks: e.target.value})}></textarea>
                            <Button fullWidth variant="danger" onClick={handleEscalate}><AlertOctagon className="w-5 h-5"/> Confirm Escalation</Button>
                        </div>
                    </Modal>

                    <Modal isOpen={showReroute} onClose={() => setShowReroute(false)} title="Re-route Ticket (Senior Only)">
                        <div className="space-y-4">
                            <p className="text-sm text-slate-600">Re-route <strong>{rerouteTicket?.machineId}</strong> to the correct department queue.</p>
                            <select className="w-full p-3 border rounded-lg" value={rerouteDept} onChange={e => setRerouteDept(e.target.value)}>
                                <option value="Mechanical">Mechanical Dept</option>
                                <option value="Quality">Quality / Measurement Dept</option>
                                <option value="Technical">Technical / Method Dept</option>
                                <option value="IE">Industrial Engineering (IE)</option>
                                <option value="Material">Raw Materials (RM) / Stores</option>
                            </select>
                            <Button fullWidth onClick={handleReroute}><ArrowRight className="w-5 h-5"/> Send to {rerouteDept}</Button>
                        </div>
                    </Modal>

                    {/* HEADER */}
                    <header className="bg-slate-900 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-md">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2"><ClipboardList className="text-blue-400"/> Worker Portal</h1>
                            <div className="text-xs text-slate-400 font-medium tracking-wide flex items-center gap-2 mt-1">
                                <span>{currentUser.name}</span>
                                <span className="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] uppercase font-bold">{currentUser.department}</span>
                            </div>
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-slate-800 rounded-full hover:bg-slate-700 text-slate-300 hover:text-white transition-colors"><LogOut className="w-5 h-5"/></button>
                    </header>

                    {/* MAIN VIEW */}
                    <div className="p-4 md:p-8 max-w-4xl mx-auto w-full space-y-8">
                        
                        {/* ACTIVE TASK (TIMER RUNNING) */}
                        {activeTask && (
                            <div className="animate-in slide-in-from-top-4 duration-300">
                                <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2 uppercase tracking-wide text-sm"><PlayCircle className="w-4 h-4 text-emerald-500"/> Currently Working On</h3>
                                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-2 border-emerald-500">
                                    <div className="bg-emerald-50 p-4 border-b border-emerald-100 flex justify-between items-start">
                                        <div>
                                            <h2 className="text-2xl font-bold text-emerald-900">{activeTask.machineId}</h2>
                                            <div className="text-sm font-mono text-emerald-700 bg-emerald-100 inline-block px-2 py-1 rounded mt-1">{activeTask.ticketId || '#TKT-LIVE'}</div>
                                        </div>
                                        <div className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 animate-pulse shadow-sm border border-emerald-300">
                                            <Clock className="w-4 h-4"/> IN PROGRESS
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        <div className="mb-6">
                                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Reported Issue</h4>
                                            <p className="text-lg text-slate-800 font-medium bg-slate-50 p-4 rounded-xl border border-slate-200">{activeTask.issueDescription}</p>
                                            
                                            {activeTask.aiDiagnostic && (
                                                <div className="mt-3 p-4 bg-indigo-50 border border-indigo-100 rounded-xl">
                                                    <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-1 flex items-center gap-1"><Activity className="w-3 h-3"/> AI Diagnostic Suggestion</h4>
                                                    <p className="text-sm text-indigo-900 font-medium italic">"{activeTask.aiDiagnostic}"</p>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="border-t pt-6">
                                            <Button fullWidth size="lg" variant="success" onClick={() => setShowSignOff(true)}>
                                                <CheckSquare className="w-5 h-5"/> Complete Job & Sign-off
                                            </Button>
                                            
                                            <Button fullWidth size="lg" className="mt-3 bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 hover:text-red-700" onClick={() => setShowEscalate(true)}>
                                                <AlertOctagon className="w-5 h-5"/> Escalate to Senior
                                            </Button>

                                            {/* ONLY Mechanical Department can Swap Machines */}
                                            {currentUser?.department?.toLowerCase() === 'mechanical' && (
                                                <Button fullWidth size="lg" className="mt-3 bg-slate-800 text-white hover:bg-slate-700 shadow-md" onClick={() => setReplaceFlow({ active: true, step: 1 })}>
                                                    <RefreshCw className="w-5 h-5"/> Replace / Swap Machine
                                                </Button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ASSIGNED TO ME (Pending Start) */}
                        {!activeTask && (
                            <div>
                                <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2 uppercase tracking-wide text-sm"><User className="w-4 h-4 text-blue-500"/> Assigned To You</h3>
                                <div className="space-y-4">
                                    {myTasks.length === 0 ? (
                                        <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-8 text-center text-slate-400">
                                            <CheckCircle className="w-8 h-8 mx-auto mb-2 opacity-50"/>
                                            <p className="font-medium">No assigned tasks. Grab one from the open pool below.</p>
                                        </div>
                                    ) : myTasks.map(task => (
                                        <Card key={task.id} className="p-5 border-l-4 border-l-blue-500 flex flex-col md:flex-row md:items-center justify-between gap-4 group hover:shadow-md transition-all">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-1">
                                                    <h3 className="font-bold text-lg text-slate-800">{task.machineId}</h3>
                                                    {task.priority && <Badge status={task.priority} />}
                                                </div>
                                                <p className="text-sm text-slate-600 mb-2">{task.issueDescription}</p>
                                                {task.aiDiagnostic && <p className="text-xs text-indigo-600 font-medium italic border-l-2 border-indigo-300 pl-2">AI: {task.aiDiagnostic}</p>}
                                            </div>
                                            <Button onClick={() => triggerScanner(task)} className="bg-slate-900 text-white w-full md:w-auto shadow-md">
                                                <ScanLine className="w-4 h-4"/> Scan to Start
                                            </Button>
                                        </Card>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ESCALATED TICKETS (For Seniors Only) */}
                        {isSenior && escalatedTasks.length > 0 && (
                            <div>
                                <h3 className="font-bold text-red-700 mb-3 flex items-center gap-2 uppercase tracking-wide text-sm"><AlertTriangle className="w-4 h-4"/> Escalated by Juniors</h3>
                                <div className="space-y-3">
                                    {escalatedTasks.map(task => (
                                        <Card key={task.id} className="p-4 bg-red-50 border border-red-200 shadow-sm flex flex-col md:flex-row justify-between gap-4">
                                            <div>
                                                <div className="font-bold text-red-900 text-lg mb-1">{task.machineId}</div>
                                                <div className="text-sm text-red-800 font-medium">{task.issueDescription}</div>
                                                <div className="mt-2 text-xs bg-white p-2 rounded border border-red-100 text-red-600">
                                                    <span className="font-bold uppercase tracking-wide">Escalated by {task.escalatedBy}:</span> {task.escalationNote}
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-2 shrink-0">
                                                <Button size="sm" variant="success" onClick={() => handleClaimTask(task.id)}>Take Over Task</Button>
                                                <Button size="sm" variant="secondary" onClick={() => { setRerouteTicket(task); setShowReroute(true); }}>Re-route to other Dept</Button>
                                            </div>
                                        </Card>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* OPEN POOL (Unassigned Tasks) */}
                        {!activeTask && (
                            <div>
                                <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2 uppercase tracking-wide text-sm"><Activity className="w-4 h-4 text-slate-400"/> Open {currentUser.department} Tickets</h3>
                                <div className="space-y-3">
                                    {unassignedTasks.length === 0 ? (
                                        <div className="p-6 text-center text-slate-400 italic">Queue is empty.</div>
                                    ) : unassignedTasks.map(task => (
                                        <Card key={task.id} className="p-4 flex justify-between items-center gap-4 hover:border-slate-300 transition-colors">
                                            <div>
                                                <div className="font-bold text-slate-800 mb-1">{task.machineId} <Badge status={task.priority}/></div>
                                                <div className="text-sm text-slate-600">{task.issueDescription}</div>
                                            </div>
                                            <Button variant="outline" onClick={() => handleClaimTask(task.id)} className="shrink-0 font-bold hover:bg-blue-50 hover:text-blue-700 hover:border-blue-200">
                                                Claim Task
                                            </Button>
                                        </Card>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* MY RECENT HISTORY */}
                        <div className="pt-8 border-t border-slate-200">
                            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-wide text-sm"><History className="w-4 h-4 text-slate-400"/> My Recent Fixes</h3>
                            <div className="space-y-3">
                                {logs.filter(l => l.userId === currentUser.id && l.action === 'Fixed').slice().reverse().slice(0, 5).map((log, i) => (
                                    <div key={i} className="bg-white p-3 rounded-lg border border-slate-200 text-sm flex justify-between items-center opacity-80 hover:opacity-100 transition-opacity shadow-sm">
                                        <div>
                                            <span className="font-bold text-slate-700 mr-2">{log.machineId}</span>
                                            <span className="text-xs text-slate-400">{new Date(log.timestamp).toLocaleString()}</span>
                                        </div>
                                        <div className="text-xs font-mono font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">
                                            Repair: {log.repairTime || "N/A"}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<WorkerApp />);
    </script>
</body>
</html>
