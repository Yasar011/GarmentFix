<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APMS - Technical Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sticky-col {
            position: sticky;
            left: 0;
            background-color: #f8fafc;
            z-index: 10;
            border-right: 2px solid #e2e8f0;
        }

        @media print {
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print\:bg-white { background: white !important; }
            .print\:border-none { border: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Users, Wrench, AlertTriangle, History, Zap, CheckCircle,
            Clock, PlusCircle, Trash2, Factory, LogOut, Activity, BarChart2,
            Lock, LogIn, User, Edit, ScanLine, Camera, CheckSquare, X, ClipboardList, Timer,
            Calendar, Search, Package, MessageSquare, ShieldAlert, Check, FileText, Printer, UserCheck, ClipboardCheck, MapPin, LayoutDashboard, ArrowRight
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, push, update, remove, onDisconnect } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- TOAST NOTIFICATIONS (replaces blocking alert popups) ---
        const _toastListeners = new Set();
        let _toastSeq = 0;
        const toast = (message, type) => {
            const t = { id: ++_toastSeq, message: String(message), type: type || 'info' };
            _toastListeners.forEach(fn => fn(t));
        };
        const alert = (message) => {
            const m = String(message);
            let type = 'info';
            if (/error|invalid|wrong|required|fail|denied|not found|unable|must|please/i.test(m)) type = 'error';
            else if (/success|submitted|saved|approved|complete|added|sent|done/i.test(m)) type = 'success';
            toast(m, type);
        };
        const ToastHost = () => {
            const [items, setItems] = useState([]);
            useEffect(() => {
                const add = (t) => {
                    setItems(prev => [...prev, t]);
                    setTimeout(() => setItems(prev => prev.filter(x => x.id !== t.id)), 4000);
                };
                _toastListeners.add(add);
                return () => _toastListeners.delete(add);
            }, []);
            const colors = { info: 'bg-slate-800', success: 'bg-emerald-600', error: 'bg-red-600', warning: 'bg-orange-500' };
            return (
                <div className="fixed bottom-4 right-4 z-[200] flex flex-col gap-2 items-end pointer-events-none">
                    {items.map(t => (
                        <div key={t.id} className={`${colors[t.type] || colors.info} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-medium max-w-xs`}>
                            {t.message}
                        </div>
                    ))}
                </div>
            );
        };

        // ============================================================
        //  DEPARTMENT CONFIG — to clone this hub for another team,
        //  copy this file and change ONLY these three values.
        //   NAME       : must match the `department` value written onto machines (by worker
        //                report flows, the Kiosk, or this hub's own Raise Ticket form)
        //   TITLE      : label shown in the sidebar and login screen
        //   INCLUDE_PM : true only for the team that owns Preventive Maintenance
        // ============================================================
        const DEPT = {
            NAME: "Technical",
            TITLE: "Technical Hub",
            INCLUDE_PM: false,
            // APMS tracks QCM-raised quality problems through to a fix — not machine downtime
            // (QCM tickets are always skipDowntime, so the number would be meaningless anyway).
            // Every downtime KPI/table/export is hidden; response time + repair time still show.
            SHOW_DOWNTIME: false
        };

        // Other department hubs a worker can hand an issue off to when it's not actually theirs.
        const OTHER_DEPTS = ['Mechanical', 'Technical', 'IE', 'Quality'].filter(d => d !== DEPT.NAME);

        const MACHINE_TYPES = ['Flatlock', 'Zigzag', 'Flatseam', 'Single needle', 'Overlock', 'Bartack'];

        const KPIBox = ({ title, value, unit, color }) => (
            <div className={`bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between`}>
                <div className="text-[10px] font-bold uppercase text-slate-500 tracking-wider mb-2">{title}</div>
                <div className="flex items-baseline gap-1">
                    <div className={`text-4xl font-bold text-${color}-600`}>{value}</div>
                    <span className="text-sm font-medium text-slate-400">{unit}</span>
                </div>
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", disabled = false, size = "md", fullWidth = false }) => {
            const variants = {
                primary: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-50 text-red-600 hover:bg-red-100",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                outline: "border border-slate-300 text-slate-700 hover:bg-slate-50"
            };
            const sizes = { sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            return (
                <button onClick={onClick} disabled={disabled} className={`rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${variants[variant]} ${sizes[size]} ${fullWidth ? 'w-full' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ status }) => {
            const styles = {
                "Pending": "bg-red-100 text-red-800 border-red-200 animate-pulse",
                "In Progress": "bg-yellow-100 text-yellow-800 border-yellow-200",
                "Available": "bg-emerald-100 text-emerald-800 border-emerald-200",
                "Busy": "bg-orange-100 text-orange-800 border-orange-200",
                "Offline": "bg-slate-100 text-slate-500 border-slate-200",
                "Critical": "bg-red-600 text-white font-bold shadow-sm"
            };
            return <span className={`px-2 py-1 rounded text-[10px] font-bold border uppercase tracking-wide ${styles[status] || 'bg-slate-100 text-slate-800'}`}>{status}</span>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>
                {children}
            </div>
        );

        const QRScanner = ({ onScan, onClose, title }) => {
            useEffect(() => {
                const onScanSuccess = (decodedText) => {
                    html5QrcodeScanner.clear().then(() => {
                        onScan(decodedText);
                    }).catch(err => console.error("Failed to clear scanner", err));
                };

                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, (error) => {});

                return () => { try { html5QrcodeScanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title || "Scan QR Code"}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="p-4 border-b flex justify-between items-center bg-slate-50 shrink-0">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-slate-500" /></button>
                        </div>
                        <div className="p-4 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        const MaintenanceDashboard = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginError, setLoginError] = useState("");
            const [creds, setCreds] = useState({ username: "", password: "" });

            const [activeTab, setActiveTab] = useState('tickets');
            const [allUsers, setAllUsers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [lines, setLines] = useState([]);
            const [machines, setMachines] = useState({});
            // Factory Manager's real Building > Section > Module hierarchy — used to show
            // "where is this machine right now" on every ticket card, and to filter the
            // ticket queue by line/module/yard.
            const [buildings, setBuildings] = useState([]);
            const [sections, setSections] = useState([]);
            const [modules, setModules] = useState([]);
            const [ticketSearch, setTicketSearch] = useState("");
            const [ticketLocationFilter, setTicketLocationFilter] = useState("");
            
            const [showScanner, setShowScanner] = useState(false);
            const [scanTargetTicket, setScanTargetTicket] = useState(null);
            const [signOffTicket, setSignOffTicket] = useState(null);
            const [signOffData, setSignOffData] = useState({ operatorId: "", remarks: "" });

            const [editingWorkerId, setEditingWorkerId] = useState(null);
            const [newWorker, setNewWorker] = useState({ 
                name: "", username: "", password: "", department: DEPT.NAME, role: "technician", 
                status: "Offline", mechanicType: "Jr Mechanic", section: "Section A", assignedLines: "", idNumber: "", shift: "Shift 1",
                skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
            });

            const [partRequests, setPartRequests] = useState([]);
            const [shiftNotes, setShiftNotes] = useState([]);
            const [serviceRecords, setServiceRecords] = useState([]);
            const [serviceIssues, setServiceIssues] = useState([]);
            const [closingIssue, setClosingIssue] = useState(null); // issue object mid close-comment
            const [closeComment, setCloseComment] = useState("");
            const [serviceRequests, setServiceRequests] = useState([]);
            const [serviceYear, setServiceYear] = useState(new Date().getFullYear());
            const [serviceTypeView, setServiceTypeView] = useState('monthly'); // 'monthly' | 'sixmonth'
            const [openServiceMachine, setOpenServiceMachine] = useState(null); // drill-down machine id
            // PDF export filters
            const [pdfMachine, setPdfMachine] = useState('all');
            const [pdfFrom, setPdfFrom] = useState('');
            const [pdfTo, setPdfTo] = useState('');
            const [healthSearch, setHealthSearch] = useState("");
            const [selectedHealthMachine, setSelectedHealthMachine] = useState(null);
            const [newShiftNote, setNewShiftNote] = useState("");

            // RAISE TICKET — supervisor/admin creates a ticket directly in this dept queue,
            // for problems that don't come from a QR scan (e.g. supervisor notices a pattern
            // or a post-service issue).
            const [showRaiseTicket, setShowRaiseTicket] = useState(false);
            const [rtMachineId, setRtMachineId] = useState("");
            const [rtIssue, setRtIssue] = useState("");
            const [rtPriority, setRtPriority] = useState("Normal");

            // REPORTING STATE
            const [reportType, setReportType] = useState('daily');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [reportMachine, setReportMachine] = useState("");
            const [reportShift, setReportShift] = useState("all");

            const mechanicalWorkers = allUsers.filter(u => u.department === DEPT.NAME || u.role === 'admin');
            const isSupervisor = currentUser && (currentUser.role === 'admin' || currentUser.mechanicType === 'Supervisor');

            // Machines arrive from Firebase as a keyed object; build a list that carries
            // each record's DB key as `id` so Claim/Scan/Sign-off/PM all target the right node.
            const machineList = useMemo(() => Object.entries(machines).map(([id, m]) => ({ id, ...m })), [machines]);

            // --- PM SERVICE CARD TRACKING (mirrors worker.html's due/overdue logic) ---
            const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const SIX_MONTH_DAYS = 182;
            // Machine names repeat a lot on the floor (many identical units) — Model + Serial
            // No. is what actually identifies one machine, so that's the label used throughout
            // Service Cards instead of the (ambiguous) name.
            const machineLabel = (m) => `${(m && (m.model || m.type)) || '—'} · SN ${(m && (m.serial || m.id)) || '—'}`;
            const thisPeriod = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
            const serviceStatus = useMemo(() => machineList.map(m => {
                const monthlyDone = (m.lastMonthlyService || '') === thisPeriod;
                const sixOverdue = !m.lastSixMonthServiceAt || (Date.now() - new Date(m.lastSixMonthServiceAt).getTime()) > SIX_MONTH_DAYS*86400000;
                return { ...m, monthlyDone, sixOverdue };
            }), [machineList]);
            const monthlyDueList = serviceStatus.filter(m => !m.monthlyDone);
            const sixOverdueList = serviceStatus.filter(m => m.sixOverdue);
            // Records grouped by machine for the yearly grid + drill-down.
            const recordsByMachine = useMemo(() => {
                const map = {};
                serviceRecords.forEach(r => { (map[r.machineId] = map[r.machineId] || []).push(r); });
                return map;
            }, [serviceRecords]);
            const pendingServiceRequests = serviceRequests.filter(r => r.status === 'Pending');
            const openServiceIssues = serviceIssues.filter(i => i.status === 'Open').slice().sort((a,b) => new Date(b.raisedAt) - new Date(a.raisedAt));
            const closeServiceIssue = () => {
                if (!closingIssue) return;
                if (!closeComment.trim()) return alert("A comment is required (e.g. \"Changed/Repaired - replaced screw\").");
                update(ref(db, `serviceIssues/${closingIssue.id}`), {
                    status: 'Closed', closedBy: currentUser.id, closedByName: currentUser.name,
                    closedAt: new Date().toISOString(), resolutionComment: closeComment.trim()
                });
                setClosingIssue(null); setCloseComment("");
            };

            const approveServiceRequest = (id) => update(ref(db, `serviceRequests/${id}`), { status: 'Approved', approvedBy: currentUser?.name, approvedAt: new Date().toISOString() });
            const rejectServiceRequest = (id) => update(ref(db, `serviceRequests/${id}`), { status: 'Rejected', approvedBy: currentUser?.name, approvedAt: new Date().toISOString() });

            const handleRaiseTicket = () => {
                if (!rtMachineId || !rtIssue.trim()) { alert("Select a machine and describe the problem."); return; }
                const ticketId = `#MAINT-${Math.floor(1000 + Math.random() * 9000)}`;
                update(ref(db, `machines/${rtMachineId}`), {
                    department: DEPT.NAME, status: 'Pending',
                    issue: rtIssue.trim(), priority: rtPriority,
                    reportedAt: new Date().toISOString(),
                    reportedBy: currentUser.name, ticketId
                });
                push(ref(db, 'logs'), { machineId: rtMachineId, action: 'Ticket Raised', department: DEPT.NAME, userId: currentUser.id, userName: currentUser.name, details: rtIssue.trim(), timestamp: new Date().toISOString() });
                setShowRaiseTicket(false); setRtMachineId(""); setRtIssue(""); setRtPriority("Normal");
                alert(`Ticket ${ticketId} raised — it will appear in the queue immediately.`);
            };

            // Convert an open service-card issue into a trackable maintenance work order.
            // The service issue stays Open (supervisor still closes it with a resolution
            // comment); the work order is a separate queue ticket for the repair job.
            const handleCreateWorkOrder = (iss) => {
                const ticketId = `#SVC-${Math.floor(1000 + Math.random() * 9000)}`;
                update(ref(db, `machines/${iss.machineId}`), {
                    department: DEPT.NAME, status: 'Pending',
                    issue: `Service Issue: ${iss.item}${iss.note ? ` — ${iss.note}` : ''}`,
                    priority: 'Normal', reportedAt: new Date().toISOString(),
                    reportedBy: `Service Card (${iss.raisedByName})`, ticketId,
                    serviceIssueId: iss.id
                });
                push(ref(db, 'logs'), { machineId: iss.machineId, action: 'Work Order from Service Issue', department: DEPT.NAME, userId: currentUser.id, userName: currentUser.name, details: `${iss.item}${iss.note ? ': ' + iss.note : ''}`, timestamp: new Date().toISOString() });
                alert(`Work order ${ticketId} raised — appears in the ${DEPT.NAME} ticket queue.`);
            };

            // PDF export of service records — filter by machine + date range. Prints the full
            // checklist in WORDS for every record (Machine Cleaning, Oil Changing, ...) with a
            // ✓/✗/— symbol each, the same way the physical card and the on-screen drill-down
            // show it — not just an issue count.
            const itemsOf = (r) => Array.isArray(r.items) ? r.items.map(x => [x.name, x.state]) : Object.entries(r.items || {});
            const exportServicePDF = () => {
                const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
                if (!jsPDFCtor) return alert("PDF library is still loading — try again in a moment.");
                let rows = serviceRecords.slice();
                if (pdfMachine !== 'all') rows = rows.filter(r => r.machineId === pdfMachine);
                if (pdfFrom) rows = rows.filter(r => (r.date || '').slice(0, 10) >= pdfFrom);
                if (pdfTo) rows = rows.filter(r => (r.date || '').slice(0, 10) <= pdfTo);
                rows.sort((a, b) => new Date(a.date) - new Date(b.date));
                if (rows.length === 0) return alert("No service records match those filters.");
                const doc = new jsPDFCtor();
                const singleMachine = pdfMachine !== 'all' ? machineList.find(x => x.id === pdfMachine) : null;
                const machName = pdfMachine === 'all' ? 'All Machines' : machineLabel(singleMachine || { id: pdfMachine });
                const period = (pdfFrom || pdfTo) ? `${pdfFrom || '…'} to ${pdfTo || '…'}` : `Year ${serviceYear}`;
                doc.setFontSize(16); doc.text(`${DEPT.TITLE} — Service Card Report`, 14, 18);
                doc.setFontSize(10); doc.setTextColor(100);
                doc.text(`Machine: ${machName}    Period: ${period}    Records: ${rows.length}`, 14, 25);
                // Summary table — one row per record, full checklist spelled out in words.
                // NOTE: jsPDF's built-in fonts only support WinAnsi/Latin-1 — the ✓/✗/— symbols
                // used on-screen fall outside that range and render as garbled repeating
                // characters in the PDF, so plain ASCII (OK/X/N-A) is used here instead.
                doc.autoTable({
                    startY: 31,
                    head: [['Date', 'Machine (Model · SN)', 'Type', 'By', 'Checklist (OK / X / N-A)', 'Result']],
                    body: rows.map(r => [
                        new Date(r.date).toLocaleDateString(),
                        r.machineModel || r.machineSerial ? `${r.machineModel || '-'} · SN ${r.machineSerial || r.machineId}` : machineLabel(machineList.find(x => x.id === r.machineId) || { id: r.machineId }),
                        r.serviceType === 'monthly' ? 'Monthly' : '6-Month',
                        r.performedByName || '-',
                        itemsOf(r).map(([name, val]) => `${name}: ${val === 'ok' ? 'OK' : val === 'issue' ? 'X' : 'N/A'}`).join('   '),
                        (r.issuesFound && r.issuesFound.length) ? `${r.issuesFound.length} issue(s)` : 'All passed'
                    ]),
                    styles: { fontSize: 7, cellPadding: 2 },
                    headStyles: { fillColor: [79, 70, 229] },
                    columnStyles: { 4: { cellWidth: 90 } }
                });
                doc.save(`${DEPT.NAME}_service_report_${pdfMachine === 'all' ? 'all' : machName}_${new Date().toISOString().slice(0,10)}.pdf`);
            };

            useEffect(() => {
                onValue(ref(db, 'users'), (snap) => setAllUsers(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'logs'), (snap) => setLogs(snap.val() ? Object.values(snap.val()) : []));
                onValue(ref(db, 'lines'), (snap) => setLines(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'machines'), (snap) => setMachines(snap.val() || {}));
                onValue(ref(db, 'partRequests'), (snap) => setPartRequests(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'shiftNotes'), (snap) => setShiftNotes(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'serviceRecords'), (snap) => setServiceRecords(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'serviceIssues'), (snap) => setServiceIssues(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'serviceRequests'), (snap) => setServiceRequests(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'buildings'), (snap) => setBuildings(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'sections'), (snap) => setSections(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'modules'), (snap) => setModules(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
            }, []);

            // Real current location — Factory Manager's own Building > Section > Module
            // hierarchy is the source of truth (mirrors worker.html / factory_manager.html).
            const resolveLocation = (m) => {
                if (!m || !m.moduleId || m.moduleId === 'yard') return 'Yard';
                const mod = modules.find(x => x.id === m.moduleId);
                const sec = mod ? sections.find(s => s.id === mod.sectionId) : null;
                const bld = sec ? buildings.find(b => b.id === sec.buildingId) : null;
                return [bld && bld.name, sec && sec.name, mod && mod.name].filter(Boolean).join(' > ') || 'Yard';
            };
            // Modules grouped by section, for the location filter dropdown.
            const modulesBySection = useMemo(() => modules.reduce((acc, mod) => { (acc[mod.sectionId] = acc[mod.sectionId] || []).push(mod); return acc; }, {}), [modules]);

            // Report flows (worker.html, the Kiosk, this hub's own Raise Ticket form) write
            // `department: DEPT.NAME` directly onto the machine — we just filter for it here.
            const tickets = useMemo(() => {
                return machineList.filter(m =>
                    (m.department === DEPT.NAME || (DEPT.INCLUDE_PM && m.isPM)) &&
                    (m.status === 'Pending' || m.status === 'In Progress')
                );
            }, [machineList]);

            // Search box + Line/Module/Yard filter for the ticket queue — matches on machine
            // name/ID/issue text, and on the machine's real current location (moduleId).
            const filteredTickets = useMemo(() => {
                const q = ticketSearch.trim().toLowerCase();
                return tickets.filter(t => {
                    if (q && !(`${t.name || ''} ${t.id || ''} ${t.issue || ''}`.toLowerCase().includes(q))) return false;
                    if (ticketLocationFilter === 'yard') { if (t.moduleId && t.moduleId !== 'yard') return false; }
                    else if (ticketLocationFilter) { if (t.moduleId !== ticketLocationFilter) return false; }
                    return true;
                });
            }, [tickets, ticketSearch, ticketLocationFilter]);

            const getMachineName = (id) => machines[id]?.name || id;

            const formatDuration = (ms) => {
                if(!ms || ms < 0) return "0m";
                const minutes = Math.floor(ms / 60000);
                const hours = Math.floor(minutes / 60);
                if (hours > 0) return `${hours}h ${minutes % 60}m`;
                return `${minutes}m`;
            };

            const calculateAverage = (skillsObj) => {
                if (!skillsObj) return 0;
                let total = 0;
                MACHINE_TYPES.forEach(type => { total += (parseInt(skillsObj[type]) || 0); });
                return Math.round(total / MACHINE_TYPES.length) || 0;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const user = allUsers.find(u => u.username === creds.username && u.password === creds.password);
                if (user) {
                    if (user.department === DEPT.NAME || user.role === 'admin') {
                        // Mark a technician Available the moment they log into the hub so the AI
                        // auto-assign (which only picks 'Available' workers) can actually route to them.
                        if (user.role !== 'admin') {
                            update(ref(db, `users/${user.id}`), { status: 'Available' });
                            setCurrentUser({ ...user, status: 'Available' });
                            setActiveTab('my_tasks');
                        } else {
                            setCurrentUser(user);
                        }
                        setLoginError("");
                    } else {
                        setLoginError(`Access Denied: This hub is restricted to ${DEPT.NAME} Department staff only.`);
                    }
                } else if (creds.username === 'admin' && creds.password === '123') {
                    setCurrentUser({ id: 'admin', name: 'System Admin', role: 'admin', department: DEPT.NAME });
                } else {
                    setLoginError("Invalid username or password.");
                }
            };

            const handleLogout = () => {
                if (currentUser && currentUser.role !== 'admin' && currentUser.id) {
                    update(ref(db, `users/${currentUser.id}`), { status: 'Offline' });
                }
                setCurrentUser(null);
            };

            const toggleMyStatus = () => {
                if (!currentUser || currentUser.role === 'admin') return;
                const newStatus = currentUser.status === 'Available' ? 'Offline' : 'Available';
                update(ref(db, `users/${currentUser.id}`), { status: newStatus });
                setCurrentUser({ ...currentUser, status: newStatus });
            };

            // PRESENCE: keep a logged-in technician marked Available, and auto-flip them to
            // Offline if their connection drops (browser/tab closed, network loss).
            useEffect(() => {
                if (!currentUser || currentUser.role === 'admin' || !currentUser.id) return;
                const statusRef = ref(db, `users/${currentUser.id}/status`);
                const connectedRef = ref(db, '.info/connected');
                const unsub = onValue(connectedRef, (snap) => {
                    if (snap.val() === true) {
                        onDisconnect(statusRef).set('Offline');
                        update(ref(db, `users/${currentUser.id}`), { status: 'Available' });
                    }
                });
                return () => unsub();
            }, [currentUser?.id]);

            // NEW-TICKET ALERT: chime when this dept's open queue grows (supervisors/techs get notified).
            const [lastTicketCount, setLastTicketCount] = useState(null);
            const playChime = () => {
                try {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    if (!Ctx) return;
                    const ctx = new Ctx();
                    [523, 659, 784].forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        osc.connect(gain); gain.connect(ctx.destination);
                        const t = ctx.currentTime + i * 0.16;
                        gain.gain.setValueAtTime(0.0001, t);
                        gain.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
                        osc.start(t); osc.stop(t + 0.24);
                    });
                    setTimeout(() => ctx.close(), 1200);
                } catch (e) {}
            };
            useEffect(() => {
                if (!currentUser) return;
                const openCount = tickets.length;
                if (lastTicketCount !== null && openCount > lastTicketCount) {
                    playChime();
                    if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                        try { new Notification(`New ${DEPT.NAME} ticket`, { body: 'A new job has entered the queue.' }); } catch (e) {}
                    }
                }
                setLastTicketCount(openCount);
            }, [tickets.length, currentUser]);

            const handleDeleteWorker = (id) => {
                if(window.confirm("Remove this mechanic from the database?")) {
                    remove(ref(db, `users/${id}`));
                }
            };

            const handleSkillChange = (machine, value) => {
                let val = parseInt(value) || 0;
                if(val > 100) val = 100;
                if(val < 0) val = 0;
                setNewWorker({ ...newWorker, skills: { ...newWorker.skills, [machine]: val } });
            };

            const handleSaveWorker = () => {
                if(newWorker.name && newWorker.username && newWorker.password) {
                    if (editingWorkerId) {
                        update(ref(db, `users/${editingWorkerId}`), newWorker);
                        setEditingWorkerId(null);
                    } else {
                        push(ref(db, 'users'), newWorker);
                    }
                    setNewWorker({ 
                        name: "", username: "", password: "", department: DEPT.NAME, role: "technician", 
                        status: "Offline", mechanicType: "Jr Mechanic", section: "Section A", assignedLines: "", idNumber: "", shift: "Shift 1",
                        skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                    });
                } else {
                    alert("Please fill name, username, and password");
                }
            };

            const handleEditWorker = (worker) => {
                setNewWorker({
                    name: worker.name || "", username: worker.username || "", password: worker.password || "",
                    department: worker.department || DEPT.NAME, role: worker.role || "technician", status: worker.status || "Offline",
                    mechanicType: worker.mechanicType || "Jr Mechanic", section: worker.section || "Section A", assignedLines: worker.assignedLines || "",
                    idNumber: worker.idNumber || "", shift: worker.shift || "Shift 1",
                    skills: worker.skills || { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                });
                setEditingWorkerId(worker.id);
                document.getElementById('worker-form-section')?.scrollIntoView({ behavior: 'smooth' });
            };

            const handleAssignToMe = (ticket) => {
                // Now writes directly to the machine entity
                update(ref(db, `machines/${ticket.id}`), {
                    assignedTo: currentUser.id,
                    assignedAt: new Date().toISOString()
                });
            };

            const handleScanVerify = (decodedText) => {
                if (decodedText === scanTargetTicket.id || machines[decodedText]?.name === scanTargetTicket.name) {
                    update(ref(db, `machines/${scanTargetTicket.id}`), {
                        status: 'In Progress',
                        startedAt: new Date().toISOString()
                    });
                    setShowScanner(false);
                    setScanTargetTicket(null);
                } else {
                    alert(`Wrong Machine! You scanned ${decodedText}, but expected ${scanTargetTicket.id}`);
                    setShowScanner(false);
                }
            };

            const handleSignOffSubmit = () => {
                if(!signOffData.operatorId) return alert("Operator ID is required for sign-off.");

                const now = new Date();
                const startedAt = new Date(signOffTicket.startedAt);
                const assignedAt = signOffTicket.assignedAt ? new Date(signOffTicket.assignedAt) : new Date(signOffTicket.reportedAt);
                const reportedAt = new Date(signOffTicket.reportedAt);

                const responseMs = startedAt - assignedAt;
                const repairMs = now - startedAt;
                const downtimeMs = now - reportedAt;

                push(ref(db, 'logs'), {
                    machineId: signOffTicket.id,
                    action: signOffTicket.isPM ? 'PM Completed (Pending Review)' : 'Fixed (Pending Review)',
                    department: signOffTicket.department || DEPT.NAME,
                    userId: currentUser.id,
                    userName: currentUser.name,
                    operatorSignOff: signOffData.operatorId,
                    details: signOffData.remarks,
                    timestamp: now.toISOString(),
                    repairTime: formatDuration(repairMs),
                    metrics: { responseMs, repairMs, downtimeMs }
                });

                // Straight to Main Hub for final close-out — no separate department
                // review step anymore.
                update(ref(db, `machines/${signOffTicket.id}`), {
                    status: 'Pending Admin Approval',
                    completionRemarks: signOffData.remarks,
                    completionOperator: signOffData.operatorId,
                    completedBy: currentUser.id,
                    completedByName: currentUser.name,
                    metrics: { responseMs, repairMs, downtimeMs }
                });

                // Free the worker for the next job so the AI auto-assign can pick them again.
                if (currentUser.role !== 'admin') {
                    update(ref(db, `users/${currentUser.id}`), { status: 'Available', currentTask: null });
                }

                setSignOffTicket(null);
                setSignOffData({ operatorId: "", remarks: "" });
                alert("Submitted for Admin Approval.");
            };

            const handleTransferDept = (ticket, newDept) => {
                if (!newDept || !window.confirm(`Send "${ticket.name}" to the ${newDept} hub instead?`)) return;
                update(ref(db, `machines/${ticket.id}`), { department: newDept, assignedTo: null, assignedAt: null });
                push(ref(db, 'logs'), { machineId: ticket.id, action: 'Transferred', details: `${DEPT.NAME} -> ${newDept}`, department: newDept, userId: currentUser.id, userName: currentUser.name, timestamp: new Date().toISOString() });
            };

            // Most historical logs predate department tracking and have no `department` field
            // of their own — fall back to the machine's CURRENT department so old records don't
            // just vanish. If neither is known (e.g. the ticket was fully closed and reset since),
            // the log is unattributable and is left out of every dept-scoped view rather than
            // leaked into all of them.
            const logDept = (l) => l.department || machines[l.machineId]?.department || null;
            const deptLogs = useMemo(() => logs.filter(l => logDept(l) === DEPT.NAME), [logs, machines]);

            const filteredReportLogs = useMemo(() => {
                return deptLogs.filter(log => {
                    if (log.action !== 'Fixed (Pending Review)' && log.action !== 'PM Completed (Pending Review)') return false;

                    // Skip logs with a missing/invalid timestamp so toISOString() can't crash the tab.
                    const logDateObj = log.timestamp ? new Date(log.timestamp) : null;
                    if (!logDateObj || isNaN(logDateObj.getTime())) return false;
                    const logDate = logDateObj.toISOString().split('T')[0];
                    const logHour = logDateObj.getHours();

                    let dateMatch = true;
                    if (reportType === 'daily') dateMatch = logDate === startDate;
                    if (reportType === 'weekly') {
                        const s = new Date(startDate);
                        const e = new Date(startDate);
                        e.setDate(e.getDate() + 7);
                        dateMatch = logDateObj >= s && logDateObj <= e;
                    }
                    if (reportType === 'monthly') dateMatch = logDate.slice(0, 7) === startDate.slice(0, 7);
                    if (reportType === 'custom') dateMatch = logDate >= startDate && logDate <= endDate;

                    let shiftMatch = true;
                    if (reportShift === 'shift1') shiftMatch = logHour >= 6 && logHour < 14;
                    if (reportShift === 'shift2') shiftMatch = logHour >= 14 && logHour < 22;

                    let machineMatch = true;
                    if (reportMachine) {
                        const mName = getMachineName(log.machineId);
                        machineMatch = mName.toLowerCase().includes(reportMachine.toLowerCase()) || log.machineId.toLowerCase().includes(reportMachine.toLowerCase());
                    }

                    return dateMatch && shiftMatch && machineMatch;
                }).reverse();
            }, [deptLogs, reportType, startDate, endDate, reportMachine, reportShift, machines]);

            const reportStats = useMemo(() => {
                const total = filteredReportLogs.length;
                const totalResponseMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.responseMs || 0), 0);
                const totalRepairMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                const totalDowntimeMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);

                return {
                    total,
                    avgResponse: total ? formatDuration(totalResponseMs / total) : "0m",
                    avgRepair: total ? formatDuration(totalRepairMs / total) : "0m",
                    totalDowntime: formatDuration(totalDowntimeMs)
                };
            }, [filteredReportLogs]);

            // DOWNTIME BY LINE — this dept's machines only, for whichever date range is picked above.
            const lineDowntimeReport = useMemo(() => {
                const map = {};
                filteredReportLogs.filter(l => !l.skipDowntime && l.department === DEPT.NAME).forEach(l => {
                    const machine = machineList.find(m => m.id === l.machineId);
                    const line = machine ? lines.find(ln => ln.id === machine.lineId) : null;
                    const key = line?.name || 'Unassigned';
                    if (!map[key]) map[key] = { line: key, downtimeMs: 0, jobs: 0 };
                    map[key].downtimeMs += (l.metrics?.downtimeMs || 0);
                    map[key].jobs += 1;
                });
                return Object.values(map).sort((a, b) => b.downtimeMs - a.downtimeMs);
            }, [filteredReportLogs, machineList, lines]);

            // Generate and download a real .pdf of the current report (no print dialog).
            const handleDownloadPDF = () => {
                const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
                if (!jsPDFCtor) return alert("PDF library is still loading — please try again in a moment.");
                const doc = new jsPDFCtor();

                const periodLabel = reportType === 'custom' ? `${startDate} to ${endDate}` : `${reportType.toUpperCase()} (${startDate})`;
                const shiftLabel = reportShift === 'all' ? 'All Shifts' : reportShift === 'shift1' ? 'Shift 1 (06:00-14:00)' : 'Shift 2 (14:00-22:00)';

                doc.setFontSize(16);
                doc.text(`${DEPT.TITLE} - Maintenance & Repair Log`, 14, 18);
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.text(`Period: ${periodLabel}    Shift: ${shiftLabel}${reportMachine ? `    Machine: ${reportMachine}` : ''}`, 14, 25);
                doc.text(`Total Jobs: ${reportStats.total}    Avg Response: ${reportStats.avgResponse}    Avg Repair: ${reportStats.avgRepair}${DEPT.SHOW_DOWNTIME ? `    Total Downtime: ${reportStats.totalDowntime}` : ''}`, 14, 31);

                if (DEPT.SHOW_DOWNTIME) {
                    doc.autoTable({
                        startY: 37,
                        head: [['Line', 'Breakdowns', 'Total Downtime']],
                        body: lineDowntimeReport.map(r => [r.line, String(r.jobs), formatDuration(r.downtimeMs)]),
                        styles: { fontSize: 8, cellPadding: 2 },
                        headStyles: { fillColor: [220, 38, 38] }
                    });
                }

                doc.autoTable({
                    startY: DEPT.SHOW_DOWNTIME ? (doc.lastAutoTable?.finalY || 37) + 10 : 37,
                    head: [['Date/Time', 'Machine', 'Mechanic', 'Resp.', 'Repair', 'Action / Notes']],
                    body: filteredReportLogs.map(log => [
                        new Date(log.timestamp).toLocaleString(),
                        getMachineName(log.machineId),
                        log.userName || log.userId || '-',
                        formatDuration(log.metrics?.responseMs),
                        log.repairTime || '-',
                        `${log.action}: ${log.details || '-'}`
                    ]),
                    styles: { fontSize: 8, cellPadding: 2 },
                    headStyles: { fillColor: [79, 70, 229] },
                    columnStyles: { 5: { cellWidth: 60 } }
                });

                doc.save(`${DEPT.NAME}_report_${startDate}.pdf`);
            };

            // Export the same filtered rows as a CSV/Excel-friendly file for audits.
            const handleDownloadCSV = () => {
                if (filteredReportLogs.length === 0) return alert("No data to export for the selected filters.");
                const esc = (v) => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
                const header = ['Date', 'Time', 'Machine', 'Worker', 'Operator Verified', 'Response Time', 'Repair Time', ...(DEPT.SHOW_DOWNTIME ? ['Downtime'] : []), 'Action', 'Notes'];
                const rows = filteredReportLogs.map(log => {
                    const d = new Date(log.timestamp);
                    return [
                        d.toLocaleDateString(),
                        d.toLocaleTimeString(),
                        getMachineName(log.machineId),
                        log.userName || log.userId || '-',
                        log.operatorSignOff || '-',
                        formatDuration(log.metrics?.responseMs),
                        log.repairTime || '-',
                        ...(DEPT.SHOW_DOWNTIME ? [formatDuration(log.metrics?.downtimeMs)] : []),
                        log.action || '-',
                        log.details || '-'
                    ].map(esc).join(',');
                });
                const lineRows = DEPT.SHOW_DOWNTIME ? [
                    [].map(esc).join(','),
                    ['Downtime by Line', '', ''].map(esc).join(','),
                    ['Line', 'Breakdowns', 'Total Downtime'].map(esc).join(','),
                    ...lineDowntimeReport.map(r => [r.line, r.jobs, formatDuration(r.downtimeMs)].map(esc).join(','))
                ] : [];
                const csv = [header.map(esc).join(','), ...rows, ...lineRows].join('\r\n');
                const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${DEPT.NAME}_report_${startDate}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const stats = useMemo(() => {
                const fixes = deptLogs.filter(l => l.action === 'Fixed (Pending Review)' || l.action === 'PM Completed (Pending Review)');
                const totalFixes = fixes.length;
                // QCM-originated tickets (l.skipDowntime) are quality-flagged issues, not actual
                // breakdowns — exclude them from downtime-based metrics so they don't dilute MTBF/MTTR.
                const downtimeFixes = fixes.filter(l => !l.skipDowntime);
                const totalDowntimeFixes = downtimeFixes.length;
                const totalDowntime = downtimeFixes.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);
                const totalRepair = fixes.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                const totalResponse = fixes.reduce((acc, l) => acc + (l.metrics?.responseMs || 0), 0);

                return {
                    mtbf: totalDowntimeFixes ? (totalDowntime / totalDowntimeFixes / 3600000).toFixed(1) : "0.0",
                    mtta: totalFixes ? (totalResponse / totalFixes / 60000).toFixed(0) : "0",
                    mttrRepair: totalFixes ? (totalRepair / totalFixes / 60000).toFixed(0) : "0",
                    mttrRecovery: totalDowntimeFixes ? (totalDowntime / totalDowntimeFixes / 60000).toFixed(0) : "0",
                    repairs: totalFixes
                };
            }, [deptLogs]);

            // Chart data for the analytics tab (pure-SVG/CSS bars, no external chart lib).
            const chartData = useMemo(() => {
                const fixes = deptLogs.filter(l => l.action === 'Fixed (Pending Review)' || l.action === 'PM Completed (Pending Review)');

                // Jobs completed per worker (top 8)
                const perWorker = {};
                fixes.forEach(l => {
                    const key = l.userName || l.userId || 'Unknown';
                    perWorker[key] = (perWorker[key] || 0) + 1;
                });
                const workerBars = Object.entries(perWorker)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 8);

                // Jobs completed per day, last 7 days
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setHours(0, 0, 0, 0);
                    d.setDate(d.getDate() - i);
                    days.push({ key: d.toISOString().split('T')[0], label: d.toLocaleDateString(undefined, { weekday: 'short' }), count: 0 });
                }
                fixes.forEach(l => {
                    if (!l.timestamp) return;
                    const k = new Date(l.timestamp).toISOString().split('T')[0];
                    const slot = days.find(x => x.key === k);
                    if (slot) slot.count++;
                });

                // Live ticket status mix for this dept
                const statusMix = { Pending: 0, 'In Progress': 0, 'Pending Admin Approval': 0 };
                machineList.forEach(m => {
                    if (m.department !== DEPT.NAME && !(DEPT.INCLUDE_PM && m.isPM)) return;
                    if (statusMix[m.status] !== undefined) statusMix[m.status]++;
                });

                return { workerBars, days, dayMax: Math.max(1, ...days.map(d => d.count)), workerMax: Math.max(1, ...workerBars.map(w => w.count)), statusMix };
            }, [deptLogs, machineList]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border-t-8 border-emerald-600 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><Wrench className="w-32 h-32" /></div>
                            <div className="text-center mb-8 relative z-10">
                                <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Lock className="w-8 h-8 text-emerald-600" />
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800">{DEPT.TITLE}</h1>
                                <p className="text-slate-500 font-medium">Authorized Personnel Only</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded mb-6 text-sm font-bold border border-red-200 text-center">{loginError}</div>}
                            
                            <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Username / ID</label>
                                    <input type="text" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="e.g. prasad.274" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                    <input type="password" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="••••••••" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                                </div>
                                <Button fullWidth size="lg" className="mt-4"><LogIn className="w-5 h-5"/> Secure Login</Button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 font-sans">
                    <div className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10 shrink-0 print:hidden">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <Wrench className="w-8 h-8 text-emerald-400" />
                            <span className="text-xl font-bold tracking-tight">{DEPT.TITLE}</span>
                        </div>
                        
                        <div className="p-6 bg-slate-800/50 mb-4 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center font-bold text-lg text-white">
                                {currentUser.name.charAt(0)}
                            </div>
                            <div className="min-w-0">
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">{currentUser.mechanicType || currentUser.role}</p>
                                <p className="font-bold text-sm tracking-wide truncate">{currentUser.name}</p>
                                {currentUser.role !== 'admin' && (
                                    <button
                                        onClick={toggleMyStatus}
                                        title="Tap to go on/off duty"
                                        className={`mt-1 text-[10px] px-2 py-0.5 rounded-full font-bold border transition-colors ${currentUser.status === 'Available' ? 'bg-emerald-500 text-white border-emerald-600 hover:bg-emerald-600' : 'bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600'}`}
                                    >
                                        {currentUser.status === 'Available' ? '● On Duty' : '○ Off Duty'}
                                    </button>
                                )}
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 overflow-y-auto pb-4">
                            {currentUser.role !== 'admin' && (
                                <button onClick={() => setActiveTab('my_tasks')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'my_tasks' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                    <ClipboardList className="w-5 h-5" /> My Tasks
                                </button>

                            {currentUser.role === 'admin' && (

                                    <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                                        <h3 className="font-bold flex items-center gap-2"><CheckCircle className="w-5 h-5 text-emerald-400"/> Close Issue</h3>

                                            <span className="ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-red-100 text-red-700">{closingIssue.item}</span>

                            const latest = recs[0];
                            return (
                                <div className="fixed inset-0 bg-black/60 z-[80] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setOpenServiceMachine(null)}>
                                    <Card className="w-full max-w-lg max-h-[85vh] overflow-y-auto p-0" onClick={e => e.stopPropagation()}>
                                        <div className="p-4 bg-slate-900 text-white flex justify-between items-center sticky top-0">
                                            <h3 className="font-bold flex items-center gap-2"><ClipboardCheck className="w-5 h-5 text-emerald-400"/> {m ? machineLabel(m) : openServiceMachine} — Service History</h3>
                                            <button onClick={() => setOpenServiceMachine(null)}><X className="w-5 h-5"/></button>
                                        </div>
                                        <div className="p-5">
                                            <div className="grid grid-cols-2 gap-2 text-sm bg-slate-50 border border-slate-200 rounded-xl p-3 mb-4">
                                                <div><span className="text-slate-400 text-xs uppercase font-bold block">Model</span><span className="font-mono font-bold text-slate-700">{(latest && latest.machineModel) || m?.model || m?.type || '—'}</span></div>
                                                <div><span className="text-slate-400 text-xs uppercase font-bold block">Serial No.</span><span className="font-mono font-bold text-slate-700">{(latest && latest.machineSerial) || m?.serial || m?.id || '—'}</span></div>
                                            </div>
                                            {!latest ? <p className="text-slate-400 text-center py-8">No service records yet for this machine.</p> : (
                                                <>
                                                    <div className="mb-4">
                                                        <div className="text-xs text-slate-400 uppercase font-bold mb-2">Latest: {latest.serviceType === 'monthly' ? 'Monthly' : '6-Month'} · {new Date(latest.date).toLocaleDateString()} · by {latest.performedByName}</div>
                                                        <div className="grid grid-cols-2 gap-1.5">
                                                            {/* items is an array of {name,state} (item names can contain "/" so they can't be object keys); tolerate the old object shape too */}
                                                            {(Array.isArray(latest.items) ? latest.items.map(x => [x.name, x.state]) : Object.entries(latest.items || {})).map(([item, val]) => (
                                                                <div key={item} className="flex items-center justify-between text-xs bg-slate-50 rounded px-2 py-1.5 border">
                                                                    <span className="text-slate-700">{item}</span>
                                                                    <span className={`font-bold ${val==='ok'?'text-emerald-600':val==='issue'?'text-red-600':'text-slate-400'}`}>{val==='ok'?'✓':val==='issue'?'✗':'—'}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {latest.remarks && <div className="mt-3 text-xs bg-amber-50 border border-amber-200 rounded p-2 text-amber-800"><b>Remarks:</b> {latest.remarks}</div>}
                                                    </div>
                                                    <div className="border-t pt-3">
                                                        <div className="text-xs text-slate-400 uppercase font-bold mb-2">All Records ({recs.length})</div>
                                                        <div className="space-y-1.5">
                                                            {recs.map(r => (
                                                                <div key={r.id} className="flex justify-between items-center text-xs bg-white border rounded px-3 py-2">
                                                                    <span className="font-medium text-slate-700">{r.serviceType==='monthly'?'Monthly':'6-Month'} · {new Date(r.date).toLocaleDateString()}</span>
                                                                    <span className="text-slate-500">{r.performedByName}</span>
                                                                    {(r.issuesFound||[]).length > 0
                                                                        ? <span className="px-2 py-0.5 rounded bg-red-100 text-red-700 font-bold">{r.issuesFound.length} issue</span>
                                                                        : <span className="px-2 py-0.5 rounded bg-emerald-100 text-emerald-700 font-bold">Clean</span>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </Card>
                                </div>
                            );
                        })()}

                        {/* PARTS APPROVAL TAB */}
                        {activeTab === 'parts' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Package className="text-emerald-600"/> Spare Parts Requisition</h2>
                                <Card className="p-6">
                                    {partRequests.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400 border-2 border-dashed rounded-xl">
                                            <Package className="w-12 h-12 mx-auto mb-3 opacity-50"/>
                                            <p>No pending part requests from the floor.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {partRequests.filter(r => r.status === 'Pending').map(req => (
                                                <div key={req.id} className="flex justify-between items-center p-5 bg-orange-50 border-l-4 border-l-orange-500 border border-orange-200 rounded-xl shadow-sm">
                                                    <div>
                                                        <div className="font-bold text-orange-900 text-xl">{req.partName}</div>
                                                        <div className="text-sm text-orange-800 mt-1">Requested by: <span className="font-bold">{req.techName}</span></div>
                                                        <div className="text-xs bg-white border border-orange-100 inline-block px-2 py-1 rounded text-orange-600 mt-2 font-mono">Machine: {getMachineName(req.machineId)}</div>
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        <Button size="md" variant="success" onClick={() => update(ref(db, `partRequests/${req.id}`), { status: 'Approved' })}><Check className="w-4 h-4"/> Approve Request</Button>
                                                        <Button size="sm" variant="danger" className="bg-white" onClick={() => remove(ref(db, `partRequests/${req.id}`))}>Reject</Button>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {partRequests.filter(r => r.status === 'Approved').length > 0 && (
                                                <>
                                                    <h3 className="font-bold text-sm text-slate-400 uppercase mt-8 mb-2 border-b pb-2">Recently Approved</h3>
                                                    <div className="space-y-2">
                                                        {partRequests.filter(r => r.status === 'Approved').map(req => (
                                                            <div key={req.id} className="flex justify-between items-center p-3 bg-slate-50 border border-slate-200 rounded-lg opacity-75">
                                                                <div>
                                                                    <span className="font-bold text-slate-700">{req.partName}</span>
                                                                    <span className="text-xs text-slate-500 ml-2">({req.techName})</span>
                                                                </div>
                                                                <span className="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded font-bold uppercase tracking-wide">Approved</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </Card>
                            </div>
                        )}

                        {/* SHIFT HANDOVER TAB */}
                        {activeTab === 'handover' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><MessageSquare className="text-emerald-600"/> Shift Handover Log</h2>
                                <Card className="p-6 mb-8 bg-gradient-to-r from-emerald-50 to-blue-50 border-emerald-100 shadow-inner">
                                    <h3 className="font-bold text-emerald-900 mb-3">Leave a note for the incoming shift manager</h3>
                                    <textarea 
                                        className="w-full p-4 border border-emerald-200 rounded-xl bg-white h-28 mb-4 focus:ring-2 focus:ring-emerald-500 outline-none resize-none shadow-sm text-sm" 
                                        placeholder="e.g., Machine 42 is waiting for a motor from stores. Leave it offline until A-Shift arrives." 
                                        value={newShiftNote} 
                                        onChange={e => setNewShiftNote(e.target.value)}>
                                    </textarea>
                                    <div className="flex justify-end">
                                        <Button size="lg" onClick={() => {
                                            if(!newShiftNote) return;
                                            push(ref(db, 'shiftNotes'), {
                                                author: currentUser.name,
                                                note: newShiftNote,
                                                timestamp: new Date().toISOString()
                                            });
                                            setNewShiftNote("");
                                        }}><CheckCircle className="w-5 h-5"/> Post Handover Note</Button>
                                    </div>
                                </Card>
                                <div className="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                                    {shiftNotes.slice().reverse().map((note, idx) => (
                                        <div key={note.id} className={`relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active`}>
                                            <div className="flex items-center justify-center w-10 h-10 rounded-full border border-white bg-slate-200 text-slate-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                                <MessageSquare className="w-4 h-4" />
                                            </div>
                                            <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                                <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                                                    <span className="font-bold text-slate-800 text-sm">{note.author}</span>
                                                    <span className="text-xs text-slate-400 font-mono bg-slate-50 px-2 py-0.5 rounded">{new Date(note.timestamp).toLocaleString()}</span>
                                                </div>
                                                <p className="text-slate-600 text-sm whitespace-pre-wrap">{note.note}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {shiftNotes.length === 0 && <p className="text-center text-slate-400 italic mt-8 relative z-10 bg-slate-50 py-2 w-48 mx-auto rounded-full">No handover notes logged.</p>}
                                </div>
                            </div>
                        )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MaintenanceDashboard />);
    </script>
</body>
</html>
