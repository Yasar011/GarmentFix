<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APMS - Automatic Problem Management System</title>
    
    <!-- 1. Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Load Babel to compile React code in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Load HTML5-QRCode Library for Scanning -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- 4. Define where to import libraries from (Import Map) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .card { border: 1px solid #ccc; box-shadow: none; }
            .print-break-inside { break-inside: avoid; }
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          QrCode, ClipboardList, Wrench, LayoutDashboard, PlusCircle, AlertTriangle, 
          CheckCircle, Factory, Printer, ScanLine, Clock, PlayCircle, CheckSquare, 
          Building, History, X, Wifi, Database, Trash2, Loader2, User, LogOut, 
          Lock, MapPin, Briefcase, UserCheck, UserX, RefreshCw, Hand, Activity, 
          Settings, Package, BarChart2, AlertOctagon, CalendarClock, TrendingUp,
          ShoppingBag, MessageSquare, Camera, HelpCircle, LogIn,
          FileText, Calendar, Filter, Search, Edit, Zap, BookOpen, DollarSign, ShieldCheck, Timer, Gauge, List, TrendingDown, ClipboardCheck, ArrowUpRight
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously } from "firebase/auth";
        import { getDatabase, ref, push, update, onValue, set, remove, get } from "firebase/database";

        // --- 1. CONFIGURATION & SERVICES ---
        const firebaseConfig = {
          apiKey: "AIzaSyBUbE6WtnWnHQsCul_5bDDPHz78jlaHCxs",
          authDomain: "apparel-maintenance.firebaseapp.com",
          databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com",
          projectId: "apparel-maintenance",
          storageBucket: "apparel-maintenance.firebasestorage.app",
          messagingSenderId: "716246308986",
          appId: "1:716246308986:web:0f5f33db9c65ffba1543c3",
          measurementId: "G-4G0694Q22Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Helper to format duration
        const formatDuration = (ms) => {
            if(!ms) return "0m";
            const minutes = Math.floor(ms / 60000);
            const hours = Math.floor(minutes / 60);
            if (hours > 0) return `${hours}h ${minutes % 60}m`;
            return `${minutes}m`;
        };

        // API Layer
        const api = {
            // Writes straight to machines/{id} — no queue, no n8n. The Kiosk operator picks the
            // department themselves, and it appears in that dept's hub immediately. The existing
            // client-side auto-assign (LiveMonitor) picks up unassigned tickets from here same as
            // any other.
            reportIssue: async (machineId, issue, priority, opName, opId, department) => {
                const ticketId = `#TKT-${Math.floor(1000 + Math.random() * 9000)}`;
                const timestamp = new Date().toISOString();

                try {
                    await update(ref(db, `machines/${machineId}`), {
                        department,
                        status: 'Pending',
                        issue,
                        priority,
                        reportedAt: timestamp,
                        reportedBy: `${opName} (${opId})`,
                        ticketId
                    });
                    await push(ref(db, 'logs'), {
                        machineId, action: 'Ticket Raised', department,
                        details: issue, timestamp
                    });
                    alert(`Ticket submitted — now in the ${department} queue.`);
                } catch (error) {
                    console.error("Firebase Upload Error:", error);
                    alert("Error submitting ticket to database. Please check connection.");
                }
            },
            startWork: (machineId, userId) => {
                update(ref(db, `machines/${machineId}`), { status: 'In Progress', startedAt: new Date().toISOString() });
                update(ref(db, `users/${userId}`), { status: 'Busy', currentTask: machineId });
                push(ref(db, 'logs'), { machineId, action: 'Started Work', userId, timestamp: new Date().toISOString() });
            },
            completeWork: (machineId, userId, remarks, machine, partsUsedIds, partsList) => {
                const finishedAt = new Date();
                const startedAt = machine.startedAt ? new Date(machine.startedAt) : finishedAt;
                const reportedAt = machine.reportedAt ? new Date(machine.reportedAt) : startedAt;
                
                const repairDurationMs = finishedAt - startedAt;
                // QCM-originated tickets (machine.skipDowntime) are quality-flagged issues, not
                // actual breakdowns — the machine kept running, so exclude from downtime KPIs.
                const totalDowntimeMs = machine.skipDowntime ? null : (finishedAt - reportedAt);

                // Calculate Cost
                let totalCost = 0;
                partsUsedIds.forEach(partId => {
                    const part = partsList.find(p => p.id === partId);
                    if(part) {
                        update(ref(db, `parts/${partId}`), { stock: (part.stock || 0) - 1, totalUsed: (part.totalUsed || 0) + 1 });
                        totalCost += parseFloat(part.price || 0);
                    }
                });

                // Every completed job goes to Pending Admin Approval instead of closing
                // outright — this Main Hub gate is the only approval step before it closes.
                update(ref(db, `machines/${machineId}`), {
                    status: 'Pending Admin Approval',
                    assignedTo: null,
                    completedBy: userId,
                    completionRemarks: remarks,
                    lastMaintenance: finishedAt.toISOString()
                });
                update(ref(db, `users/${userId}`), { status: 'Available', currentTask: null });

                const usedPartNames = partsUsedIds.map(id => partsList.find(p => p.id === id)?.name).filter(Boolean);
                push(ref(db, 'logs'), {
                    machineId,
                    ticketId: machine?.ticketId,
                    action: machine.isPM ? 'PM Completed (Pending Review)' : 'Fixed (Pending Review)',
                    userId,
                    department: machine.department || null,
                    details: remarks,
                    partsUsed: usedPartNames,
                    cost: totalCost,
                    timestamp: finishedAt.toISOString(),
                    repairTime: formatDuration(repairDurationMs),
                    totalDowntime: machine.skipDowntime ? null : formatDuration(totalDowntimeMs),
                    source: machine.source || null,
                    skipDowntime: !!machine.skipDowntime,
                    metrics: { repairMs: repairDurationMs, downtimeMs: totalDowntimeMs }
                });
            },
            // Main Hub final close-out
            finalApprove: (machineId, userId) => {
                update(ref(db, `machines/${machineId}`), {
                    status: 'Running',
                    issue: null,
                    priority: null,
                    ticketId: null,
                    department: null,
                    aiDiagnostic: null,
                    isPM: null,
                    completedBy: null,
                    completionRemarks: null,
                    reportedAt: null, assignedAt: null, startedAt: null
                });
                push(ref(db, 'logs'), { machineId, action: 'Final Approved - Closed', userId, timestamp: new Date().toISOString() });
            },
            finalReject: (machineId, userId, machine, reason) => {
                update(ref(db, `machines/${machineId}`), {
                    status: 'In Progress',
                    assignedTo: machine.completedBy,
                    startedAt: new Date().toISOString(),
                    completedBy: null,
                    completionRemarks: null
                });
                push(ref(db, 'logs'), { machineId, action: 'Admin Rejected', details: reason, userId, timestamp: new Date().toISOString() });
            },
            transferDept: (machineId, userId, newDept) => {
                update(ref(db, `machines/${machineId}`), { department: newDept, assignedTo: null, assignedAt: null });
                push(ref(db, 'logs'), { machineId, action: 'Transferred', details: `-> ${newDept}`, department: newDept, userId, timestamp: new Date().toISOString() });
            },
            assignPM: (machineId, techId) => {
                const ticketId = `#PM-${Math.floor(1000 + Math.random() * 9000)}`;
                return update(ref(db, `machines/${machineId}`), { 
                    status: "Pending", 
                    issue: "Preventive Maintenance", 
                    priority: "Low", 
                    ticketId,
                    assignedTo: techId,
                    assignedAt: new Date().toISOString(),
                    isPM: true, 
                    reportedAt: new Date().toISOString()
                });
            },
            assignTech: (machineId, techId) => update(ref(db, `machines/${machineId}`), { assignedTo: techId, assignedAt: new Date().toISOString() }),
            selfAssign: (machineId, userId) => update(ref(db, `machines/${machineId}`), { assignedTo: userId, assignedAt: new Date().toISOString() }),
            updateStock: (id, change, currentStock) => update(ref(db, `parts/${id}`), { stock: currentStock + change }),
            requestPart: (machineId, partName, user) => push(ref(db, 'partRequests'), {
                techName: user.name, techId: user.id, machineId, partName, status: 'Pending', timestamp: new Date().toISOString()
            }),
            resolveRequest: (reqId) => remove(ref(db, `partRequests/${reqId}`)),

            // --- ADDED LOGGING FUNCTION ---
            logAccess: (userId, userName, action) => {
                push(ref(db, 'access_logs'), { 
                    userId, 
                    userName, 
                    action, 
                    timestamp: new Date().toISOString() 
                });
            }
        };

        // --- 2. CUSTOM HOOKS ---
        const useFactoryData = () => {
            const [data, setData] = useState({ users: [], buildings: [], floors: [], lines: [], machines: [], logs: [], parts: [], partRequests: [], access_logs: [], serviceRecords: [], machineBookings: [] });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                const endpoints = ['users', 'buildings', 'floors', 'lines', 'machines', 'logs', 'parts', 'partRequests', 'access_logs', 'serviceRecords', 'machineBookings'];
                let loadedCount = 0;
                const unsubscribers = endpoints.map(endpoint => {
                    return onValue(ref(db, endpoint), (snapshot) => {
                        const val = snapshot.val();
                        const list = val ? Object.keys(val).map(key => ({id: key, ...val[key]})) : [];
                        setData(prev => ({ ...prev, [endpoint]: list }));
                        loadedCount++;
                        if(loadedCount >= 1) setLoading(false); 
                    }, (err) => {
                        console.error(`Error loading ${endpoint}:`, err);
                        setError(`Firebase Error: ${err.code || err.message}. Check Database Rules.`);
                        setLoading(false);
                    });
                });
                return () => unsubscribers.forEach(unsub => unsub());
            }, []);

            const maps = useMemo(() => ({
                floorsMap: data.floors.reduce((acc, f) => { (acc[f.buildingId] = acc[f.buildingId] || []).push(f); return acc; }, {}),
                linesMap: data.lines.reduce((acc, l) => { (acc[l.floorId] = acc[l.floorId] || []).push(l); return acc; }, {}),
                machinesMap: data.machines.reduce((acc, m) => { (acc[m.lineId] = acc[m.lineId] || []).push(m); return acc; }, {})
            }), [data.floors, data.lines, data.machines]);

            return { ...data, ...maps, loading, error };
        };

        // --- 3. UI COMPONENTS ---
        const LoadingOverlay = ({ message, error }) => (
          <div className="fixed inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-[100] text-white backdrop-blur-sm">
            {error ? (
                <div className="text-center p-8 bg-white text-red-600 rounded-xl">
                    <AlertTriangle className="w-16 h-16 mx-auto mb-4" />
                    <h3 className="text-xl font-bold mb-2">Connection Error</h3>
                    <p>{error}</p>
                </div>
            ) : (
                <>
                    <Loader2 className="w-16 h-16 animate-spin text-blue-500 mb-4" />
                    <h3 className="text-2xl font-bold">{message || "Connecting to Factory..."}</h3>
                </>
            )}
          </div>
        );

        const Card = ({ children, className = "" }) => (
          <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className} card`}>
            {children}
          </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", disabled = false, size = "md", fullWidth = false }) => {
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-600 text-white hover:bg-red-700",
                success: "bg-green-600 text-white hover:bg-green-700",
                warning: "bg-yellow-500 text-white hover:bg-yellow-600",
                outline: "border border-slate-300 text-slate-600 hover:bg-slate-50"
            };
            const sizes = { sm: "px-2 py-1 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            return (
                <button onClick={onClick} disabled={disabled} className={`rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${variants[variant]} ${sizes[size]} ${fullWidth ? 'w-full' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ status, type = "status" }) => {
            const styles = {
                Running: "bg-green-100 text-green-800 border-green-200",
                Pending: "bg-red-100 text-red-800 border-red-200 animate-pulse",
                "In Progress": "bg-yellow-100 text-yellow-800 border-yellow-200",
                Available: "bg-emerald-100 text-emerald-800 border-emerald-200",
                Active: "bg-orange-100 text-orange-800 border-orange-200",
                Busy: "bg-orange-100 text-orange-800 border-orange-200",
                Offline: "bg-slate-100 text-slate-500 border-slate-200",
                Low: "bg-blue-100 text-blue-800 border-blue-200",
                Normal: "bg-slate-100 text-slate-800 border-slate-200",
                Critical: "bg-red-600 text-white border-red-700 animate-pulse font-bold shadow-sm",
                "Pending Admin Approval": "bg-orange-100 text-orange-800 border-orange-200 animate-pulse font-bold",
            };
            return <span className={`px-2 py-1 rounded-full text-xs font-bold border ${styles[status] || styles.Running}`}>{status}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-4 border-b flex justify-between items-center bg-slate-50 shrink-0">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-slate-500" /></button>
                        </div>
                        <div className="p-4 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- NEW: QR SCANNER COMPONENT ---
        const QRScanner = ({ onScan, onClose, title }) => {
            useEffect(() => {
                const onScanSuccess = (decodedText) => {
                    html5QrcodeScanner.clear().then(() => {
                        onScan(decodedText);
                    }).catch(err => console.error("Failed to clear scanner", err));
                };

                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, (error) => {});

                return () => { try { html5QrcodeScanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title || "Scan QR Code"}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        // --- 4. FEATURE VIEWS ---

        const LoginModal = ({ isOpen, onClose, onLogin, error }) => {
            const [creds, setCreds] = useState({username: "", password: ""});
            if(!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                    <Card className="w-full max-w-sm p-6 relative bg-white">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><X className="w-5 h-5"/></button>
                        <div className="text-center mb-6">
                            <div className="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-2"><User className="w-6 h-6 text-blue-600" /></div>
                            <h2 className="text-xl font-bold text-slate-800">Staff Login</h2>
                            <p className="text-slate-500 text-sm">Access Technician or Admin Tools</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-2 text-sm rounded mb-4 font-bold border border-red-200 text-center">{error}</div>}
                        <form onSubmit={(e) => { e.preventDefault(); onLogin(creds.username, creds.password); }} className="space-y-4">
                            <input type="text" className="w-full p-2 border rounded-lg" placeholder="Username" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} autoFocus />
                            <input type="password" className="w-full p-2 border rounded-lg" placeholder="Password" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                            <Button fullWidth size="md">Login</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const LoginView = ({ onLogin, onOpenScanner, error }) => {
            const [creds, setCreds] = useState({username: "", password: ""});
            return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
                    <Card className="w-full max-w-md p-8 bg-white relative mb-4">
                        <div className="text-center mb-8">
                            <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Factory className="w-8 h-8 text-blue-600" /></div>
                            <h1 className="text-2xl font-bold text-slate-800">APMS</h1>
                            <p className="text-slate-500">Automatic Problem Management System</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm font-bold border border-red-200">{error}</div>}
                        <form onSubmit={(e) => { e.preventDefault(); onLogin(creds.username, creds.password); }} className="space-y-4">
                            <input type="text" className="w-full p-3 border rounded-lg" placeholder="Username" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} autoFocus />
                            <input type="password" className="w-full p-3 border rounded-lg" placeholder="Password" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                            <Button fullWidth size="lg">Sign In</Button>
                        </form>
                    </Card>
                    <button onClick={onOpenScanner} className="w-full max-w-md bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-xl flex items-center justify-center gap-3 shadow-lg transition-transform hover:scale-[1.02]">
                        <div className="bg-white/20 p-2 rounded-full"><QrCode className="w-6 h-6" /></div>
                        <div className="text-left"><div className="font-bold text-lg">Scan QR Code</div><div className="text-xs text-blue-200">Report Breakdown (No Login)</div></div>
                    </button>
                </div>
            );
        };

        const KioskView = ({ machines, onReport, onClose }) => {
            const [selectedMachine, setSelectedMachine] = useState(null);
            const [form, setForm] = useState({ issue: "", priority: "Normal", opName: "", opId: "", department: "Mechanical" });
            const [showScanner, setShowScanner] = useState(false);
            const DEPARTMENTS = ['Mechanical', 'Technical', 'IE', 'Quality'];

            const handleScan = (data) => {
                const machine = machines.find(m => m.id === data || m.name === data);
                if (machine) {
                    setSelectedMachine(machine);
                    setShowScanner(false);
                } else {
                    alert("Machine not found: " + data);
                    setShowScanner(false);
                }
            };

            const handleSubmit = () => {
                if(selectedMachine && form.issue && form.opName && form.opId) {
                    onReport(selectedMachine.id, form.issue, form.priority, form.opName, form.opId, form.department);
                    setSelectedMachine(null); setForm({ issue: "", priority: "Normal", opName: "", opId: "", department: "Mechanical" });
                } else alert("Please fill in all fields.");
            };

            return (
                <div className="fixed inset-0 bg-white z-50 flex flex-col">
                    {showScanner && <QRScanner onScan={handleScan} onClose={() => setShowScanner(false)} title="Scan Machine QR" />}
                    
                    <div className="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md shrink-0">
                        <h2 className="text-xl font-bold flex items-center gap-2"><ScanLine className="w-6 h-6 text-blue-400"/> Scan To Report</h2>
                        <Button variant="secondary" onClick={onClose}><X className="w-4 h-4"/> Close</Button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 bg-slate-50">
                        {!selectedMachine ? (
                            <div className="max-w-4xl mx-auto">
                                <div className="text-center mb-8">
                                    <button onClick={() => setShowScanner(true)} className="bg-blue-600 text-white p-6 rounded-full shadow-xl hover:bg-blue-700 transition-transform hover:scale-110 mb-4">
                                        <Camera className="w-12 h-12" />
                                    </button>
                                    <p className="text-slate-600 font-bold text-lg">Tap Camera to Scan Machine</p>
                                    <p className="text-slate-400 text-sm">Or select manually below</p>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {machines.slice(0, 50).map(m => (
                                        <button key={m.id} onClick={() => setSelectedMachine(m)} className="p-4 bg-white border rounded-xl hover:border-blue-500 hover:shadow-md text-left group">
                                            <div className="flex justify-between items-start mb-2"><QrCode className="w-8 h-8 text-slate-300 group-hover:text-blue-500" /><Badge status={m.status} /></div>
                                            <div className="font-bold text-lg text-slate-800">{m.name}</div>
                                            <div className="text-xs text-slate-500">{m.type}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-md mx-auto mt-10">
                                <Card className="p-6 shadow-xl border-t-4 border-t-blue-600">
                                    <div className="flex justify-between items-start mb-6 border-b pb-4">
                                        <div><h3 className="text-2xl font-bold text-slate-800">{selectedMachine.name}</h3><p className="text-slate-500">{selectedMachine.type}</p></div>
                                        <button onClick={() => setSelectedMachine(null)} className="text-sm text-blue-600 hover:underline">Change</button>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="block text-sm font-bold text-slate-700">Which Department?</label>
                                        <div className="grid grid-cols-2 gap-2">{DEPARTMENTS.map(d => (
                                            <button key={d} onClick={() => setForm({...form, department: d})} className={`py-2 rounded text-sm font-bold border ${form.department === d ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-300 hover:border-slate-400'}`}>{d}</button>
                                        ))}</div>
                                        <label className="block text-sm font-bold text-slate-700">Problem Description</label>
                                        <textarea className="w-full p-3 border rounded-lg h-24" placeholder="e.g. Needle broken..." value={form.issue} onChange={e => setForm({...form, issue: e.target.value})} />
                                        <label className="block text-sm font-bold text-slate-700">Priority</label>
                                        <div className="flex gap-2">{['Low', 'Normal', 'Critical'].map(p => (
                                            <button key={p} onClick={() => setForm({...form, priority: p})} className={`flex-1 py-2 rounded text-sm font-bold border ${form.priority === p ? 'bg-blue-600 text-white' : 'bg-white'}`}>{p}</button>
                                        ))}</div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input className="w-full p-3 border rounded-lg" placeholder="Operator Name" value={form.opName} onChange={e => setForm({...form, opName: e.target.value})} />
                                            <input className="w-full p-3 border rounded-lg" placeholder="ID (OP-123)" value={form.opId} onChange={e => setForm({...form, opId: e.target.value})} />
                                        </div>
                                        <Button fullWidth size="lg" onClick={handleSubmit} disabled={!form.issue || !form.opName || !form.opId}>Submit Report</Button>
                                    </div>
                                </Card>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // EXECUTIVE COMMAND CENTER — the redesigned main landing dashboard.
        // Pure CSS/SVG visuals (no chart lib). Read-only overview; deep actions live in
        // the other tabs/hubs. Everything recomputes live from Firebase data.
        // ============================================================================
        const Kpi = ({ icon, label, value, sub, ring, onClick, alert }) => (
            <div onClick={onClick} className={`bg-white rounded-2xl border border-slate-200 p-4 shadow-sm relative overflow-hidden transition-all ${onClick ? 'cursor-pointer hover:shadow-md hover:-translate-y-0.5 hover:border-slate-300' : ''}`}>
                <div className={`absolute -right-6 -top-6 w-20 h-20 rounded-full opacity-10 ${ring || 'bg-blue-500'}`}></div>
                <div className="flex items-center gap-1.5 text-slate-400 text-[11px] font-bold uppercase tracking-wide mb-1">{icon}{label}</div>
                <div className="text-3xl font-extrabold text-slate-800 leading-none">{value}</div>
                {sub && <div className={`text-xs mt-1.5 font-medium ${alert ? 'text-red-500' : 'text-slate-400'}`}>{sub}</div>}
            </div>
        );

        const CommandCenter = ({ machines = [], users = [], logs = [], parts = [], partRequests = [], serviceRecords = [], machineBookings = [], onNavigate, currentUser }) => {
            const [clock, setClock] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setClock(new Date()), 1000); return () => clearInterval(t); }, []);

            const d = useMemo(() => {
                const todayStr = new Date().toISOString().slice(0, 10);
                const thisPeriod = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
                const sc = {};
                machines.forEach(x => { const s = x.status || 'Running'; sc[s] = (sc[s] || 0) + 1; });
                const running = sc['Running'] || 0, pending = sc['Pending'] || 0, inProgress = sc['In Progress'] || 0,
                    adminApproval = sc['Pending Admin Approval'] || 0,
                    offline = sc['Offline'] || 0, escalated = sc['Escalated'] || 0;
                const downNow = pending + inProgress + escalated;
                const openTickets = pending + inProgress + adminApproval + escalated;
                const total = machines.length;
                const uptimePct = total ? Math.round((total - downNow) / total * 100) : 100;

                const techs = users.filter(u => u.role === 'technician');
                const techOnline = techs.filter(t => t.status && t.status !== 'Offline').length;
                const techBusy = techs.filter(t => t.status === 'Busy').length;
                const techAvail = techs.filter(t => t.status === 'Available').length;

                const isDone = a => a === 'Fixed (Pending Review)' || a === 'PM Completed (Pending Review)' || a === 'Final Approved - Closed';
                const completedToday = logs.filter(l => isDone(l.action) && (l.timestamp || '').slice(0, 10) === todayStr);
                const repairToday = logs.filter(l => (l.action === 'Fixed (Pending Review)' || l.action === 'PM Completed (Pending Review)') && (l.timestamp || '').slice(0, 10) === todayStr && l.metrics && l.metrics.repairMs);
                const mttrToday = repairToday.length ? repairToday.reduce((a, l) => a + l.metrics.repairMs, 0) / repairToday.length : 0;
                const costToday = completedToday.reduce((a, l) => a + (l.cost || 0), 0);
                const servicesToday = serviceRecords.filter(r => (r.date || '').slice(0, 10) === todayStr).length;

                const monthlyDone = machines.filter(x => (x.lastMonthlyService || '') === thisPeriod).length;
                const monthlyPct = total ? Math.round(monthlyDone / total * 100) : 0;
                const sixOverdue = machines.filter(x => !x.lastSixMonthServiceAt || (Date.now() - new Date(x.lastSixMonthServiceAt).getTime()) > 182 * 86400000).length;

                const DEPTS = ['Mechanical', 'Technical', 'IE', 'Quality'];
                const deptLoad = DEPTS.map(dep => ({ dept: dep, count: machines.filter(x => x.department === dep && ['Pending', 'In Progress', 'Escalated'].includes(x.status)).length }));

                const criticalPending = machines.filter(x => x.priority === 'Critical' && ['Pending', 'In Progress'].includes(x.status));
                const nameOf = id => (machines.find(x => x.id === id) || {}).name || id;

                // QCM → APMS bridge — this is now the core loop the whole system exists for
                // (a quality problem comes in, gets routed to the right dept, gets fixed), so it
                // gets its own visibility instead of being buried inside general ticket counts.
                const qcmOpenTickets = machines.filter(x => x.source === 'QCM' && ['Pending', 'In Progress', 'Pending Admin Approval'].includes(x.status));
                const qcmFixedToday = completedToday.filter(l => l.source === 'QCM').length;
                const qcmByDept = DEPTS.map(dep => ({ dept: dep, count: qcmOpenTickets.filter(x => x.department === dep).length })).filter(d => d.count > 0);

                // Worker capacity — auto-assign now caps everyone at 3 concurrent tickets so work
                // can't pile onto one person; surface who's actually at that ceiling right now.
                const MAX_CONCURRENT = 3;
                const techLoad = {};
                machines.forEach(m => { if (m.assignedTo && m.status !== 'Running') techLoad[m.assignedTo] = (techLoad[m.assignedTo] || 0) + 1; });
                const techsAtCapacity = techs.filter(t => (techLoad[t.id] || 0) >= MAX_CONCURRENT).length;

                // Machine Booking board lives in Factory Manager — just a pending-count and a
                // link here, not a full mirror of that tool.
                const pendingBookings = (machineBookings || []).filter(b => b.status === 'Pending').length;

                const mt = {};
                logs.forEach(l => { if (l.machineId && (l.action === 'AI Assigned' || l.action === 'Fixed (Pending Review)')) mt[l.machineId] = (mt[l.machineId] || 0) + 1; });
                const topProblem = Object.entries(mt).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([id, n]) => ({ name: nameOf(id), n }));

                const tj = {};
                completedToday.forEach(l => { if (l.userId) tj[l.userId] = (tj[l.userId] || 0) + 1; });
                const leaderboard = Object.entries(tj).map(([uid, n]) => ({ name: (users.find(u => u.id === uid) || {}).name || uid, n })).sort((a, b) => b.n - a.n).slice(0, 5);

                const recent = logs.slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 8);
                const lowParts = parts.filter(p => (p.stock || 0) <= (p.minStock || 3));
                const pendingParts = partRequests.filter(r => r.status === 'Pending').length;

                return { running, pending, inProgress, adminApproval, offline, escalated, downNow, openTickets, total, uptimePct,
                    techs, techOnline, techBusy, techAvail, completedToday, mttrToday, costToday, servicesToday, monthlyDone, monthlyPct, sixOverdue,
                    deptLoad, criticalPending, topProblem, leaderboard, recent, lowParts, pendingParts,
                    qcmOpenTickets, qcmFixedToday, qcmByDept, techsAtCapacity, pendingBookings };
            }, [machines, users, logs, parts, partRequests, serviceRecords, machineBookings]);

            // Donut chart (machine status mix)
            const donutSrc = [
                { label: 'Running', n: d.running, color: '#10b981' },
                { label: 'In Progress', n: d.inProgress, color: '#f59e0b' },
                { label: 'Pending', n: d.pending, color: '#ef4444' },
                { label: 'Review', n: d.adminApproval, color: '#a855f7' },
                { label: 'Offline', n: d.offline + d.escalated, color: '#94a3b8' },
            ].filter(s => s.n > 0);
            const donutTotal = donutSrc.reduce((a, s) => a + s.n, 0) || 1;
            const R = 54, CIRC = 2 * Math.PI * R;
            let acc = 0;
            const segs = donutSrc.map(s => { const frac = s.n / donutTotal; const seg = { ...s, dash: frac * CIRC, offset: -acc * CIRC, frac }; acc += frac; return seg; });

            const maxDept = Math.max(1, ...d.deptLoad.map(x => x.count));
            const maxLb = Math.max(1, ...d.leaderboard.map(x => x.n));
            const deptColor = { Mechanical: 'bg-red-500', Technical: 'bg-emerald-500', IE: 'bg-blue-500', Quality: 'bg-yellow-500' };
            const pipeline = [
                { label: 'Pending', n: d.pending, color: 'bg-red-500' },
                { label: 'In Progress', n: d.inProgress, color: 'bg-orange-500' },
                { label: 'Admin Approval', n: d.adminApproval, color: 'bg-purple-500' },
            ];
            const actIcon = (a) => {
                if (/Fixed|Completed|Approved/.test(a)) return <CheckCircle className="w-4 h-4 text-emerald-500" />;
                if (/Assigned/.test(a)) return <Zap className="w-4 h-4 text-indigo-500" />;
                if (/Escalat|Reject/.test(a)) return <AlertOctagon className="w-4 h-4 text-red-500" />;
                if (/Service|Moved/.test(a)) return <ClipboardCheck className="w-4 h-4 text-blue-500" />;
                return <Activity className="w-4 h-4 text-slate-400" />;
            };
            const fmtMins = (ms) => { const mn = Math.round(ms / 60000); return mn >= 60 ? `${Math.floor(mn / 60)}h ${mn % 60}m` : `${mn}m`; };

            return (
                <div className="space-y-6 max-w-7xl mx-auto pb-10">
                    {/* HERO */}
                    <div className="rounded-3xl bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 text-white p-6 md:p-8 shadow-xl relative overflow-hidden">
                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 1px 1px, white 1px, transparent 0)', backgroundSize: '24px 24px' }}></div>
                        <div className="relative flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <div className="flex items-center gap-2 text-blue-300 text-sm font-bold uppercase tracking-widest mb-1"><Factory className="w-4 h-4" /> APMS Command Center</div>
                                <h1 className="text-3xl md:text-4xl font-extrabold">Welcome, {currentUser?.name || 'Admin'}</h1>
                                <div className="text-slate-300 text-sm mt-1">{clock.toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} · <span className="font-mono">{clock.toLocaleTimeString()}</span></div>
                            </div>
                            <div className="flex gap-3">
                                <div className="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 text-center border border-white/10">
                                    <div className="text-3xl font-extrabold">{d.uptimePct}%</div>
                                    <div className="text-[11px] text-blue-200 uppercase font-bold tracking-wide">Fleet Uptime</div>
                                </div>
                                <div className="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 text-center border border-white/10">
                                    <div className="text-3xl font-extrabold">{d.openTickets}</div>
                                    <div className="text-[11px] text-blue-200 uppercase font-bold tracking-wide">Open Tickets</div>
                                </div>
                                <div className="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 text-center border border-white/10">
                                    <div className="text-3xl font-extrabold">{d.techOnline}<span className="text-lg text-blue-200">/{d.techs.length}</span></div>
                                    <div className="text-[11px] text-blue-200 uppercase font-bold tracking-wide">Techs Online</div>
                                </div>
                            </div>
                        </div>
                        {/* Quick actions */}
                        <div className="relative flex flex-wrap gap-2 mt-6">
                            <button onClick={() => onNavigate('live_monitor')} className="bg-white text-slate-900 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-50"><Activity className="w-4 h-4" /> Live Monitor</button>
                            <button onClick={() => onNavigate('analytics')} className="bg-white/10 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-white/20 border border-white/20"><BarChart2 className="w-4 h-4" /> Analytics</button>
                            <a href="Maintenance.html" target="_blank" className="bg-white/10 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-white/20 border border-white/20 no-underline"><Wrench className="w-4 h-4" /> Mechanical Hub</a>
                            <button onClick={() => onNavigate('inventory')} className="bg-white/10 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-white/20 border border-white/20"><Package className="w-4 h-4" /> Inventory</button>
                            <a href="factory_manager.html" target="_blank" className="bg-white/10 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-white/20 border border-white/20 no-underline"><LayoutDashboard className="w-4 h-4" /> Factory Manager</a>
                        </div>
                    </div>

                    {/* KPI GRID */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <Kpi icon={<Factory className="w-3.5 h-3.5" />} label="Total Machines" value={d.total} sub={`${d.running} running`} ring="bg-blue-500" />
                        <Kpi icon={<AlertTriangle className="w-3.5 h-3.5" />} label="Down Now" value={d.downNow} sub={d.downNow ? 'needs attention' : 'all healthy'} ring="bg-red-500" alert={d.downNow > 0} onClick={() => onNavigate('live_monitor')} />
                        <Kpi icon={<CheckCircle className="w-3.5 h-3.5" />} label="Fixed Today" value={d.completedToday.length} sub={`$${d.costToday.toFixed(0)} parts cost`} ring="bg-emerald-500" />
                        <Kpi icon={<Timer className="w-3.5 h-3.5" />} label="MTTR Today" value={d.mttrToday ? fmtMins(d.mttrToday) : '—'} sub="avg repair time" ring="bg-indigo-500" />
                        <Kpi icon={<ShieldCheck className="w-3.5 h-3.5" />} label="QCM Tickets" value={d.qcmOpenTickets.length} sub={`${d.qcmFixedToday} fixed today`} ring="bg-purple-500" onClick={() => onNavigate('live_monitor')} />
                        <Kpi icon={<UserX className="w-3.5 h-3.5" />} label="Workers At Capacity" value={d.techsAtCapacity} sub={`of ${d.techs.length} techs · cap 3`} ring="bg-amber-500" alert={d.techsAtCapacity > 0} />
                        <Kpi icon={<BookOpen className="w-3.5 h-3.5" />} label="Booking Requests" value={d.pendingBookings} sub="pending in Factory Manager" ring="bg-teal-500" alert={d.pendingBookings > 0} onClick={() => window.open('factory_manager.html', '_blank')} />
                        <Kpi icon={<Zap className="w-3.5 h-3.5" />} label="In Pipeline" value={d.openTickets} sub="pending + in progress + review" ring="bg-orange-500" onClick={() => onNavigate('live_monitor')} />
                        <Kpi icon={<UserCheck className="w-3.5 h-3.5" />} label="Techs Available" value={d.techAvail} sub={`${d.techBusy} busy · ${d.techOnline} online`} ring="bg-cyan-500" />
                        <Kpi icon={<ClipboardCheck className="w-3.5 h-3.5" />} label="Monthly Service" value={`${d.monthlyPct}%`} sub={`${d.monthlyDone}/${d.total} done`} ring="bg-violet-500" />
                        <Kpi icon={<CalendarClock className="w-3.5 h-3.5" />} label="6-Month Overdue" value={d.sixOverdue} sub={d.sixOverdue ? 'service overdue' : 'all serviced'} ring="bg-rose-500" alert={d.sixOverdue > 0} />
                    </div>

                    {/* ROW: status donut + dept workload */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        <Card className="p-5">
                            <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Gauge className="w-4 h-4 text-blue-600" /> Machine Status</h3>
                            <div className="flex items-center gap-4">
                                <svg viewBox="0 0 140 140" className="w-36 h-36 shrink-0 -rotate-90">
                                    <circle cx="70" cy="70" r={R} fill="none" stroke="#f1f5f9" strokeWidth="16" />
                                    {segs.map((s, i) => (
                                        <circle key={i} cx="70" cy="70" r={R} fill="none" stroke={s.color} strokeWidth="16"
                                            strokeDasharray={`${s.dash} ${CIRC - s.dash}`} strokeDashoffset={s.offset} strokeLinecap="butt" />
                                    ))}
                                </svg>
                                <div className="flex-1 space-y-1.5">
                                    {donutSrc.map((s, i) => (
                                        <div key={i} className="flex items-center justify-between text-sm">
                                            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{ background: s.color }}></span>{s.label}</span>
                                            <span className="font-bold text-slate-700">{s.n} <span className="text-slate-400 text-xs">({Math.round(s.n / donutTotal * 100)}%)</span></span>
                                        </div>
                                    ))}
                                    {donutSrc.length === 0 && <div className="text-slate-400 text-sm">No machines yet.</div>}
                                </div>
                            </div>
                        </Card>

                        <Card className="p-5 lg:col-span-2">
                            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><BarChart2 className="w-4 h-4 text-blue-600" /> Open Workload by Department</h3>
                            <div className="space-y-3">
                                {d.deptLoad.map(dep => (
                                    <div key={dep.dept} className="flex items-center gap-3">
                                        <div className="w-24 text-sm font-medium text-slate-600 shrink-0">{dep.dept}</div>
                                        <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden">
                                            <div className={`h-full ${deptColor[dep.dept]} rounded-full flex items-center justify-end px-2 transition-all`} style={{ width: `${Math.max(dep.count / maxDept * 100, dep.count ? 8 : 0)}%` }}>
                                                {dep.count > 0 && <span className="text-white text-xs font-bold">{dep.count}</span>}
                                            </div>
                                        </div>
                                        {dep.count === 0 && <span className="text-slate-300 text-xs w-6">0</span>}
                                    </div>
                                ))}
                            </div>
                            {/* Pipeline */}
                            <h3 className="font-bold text-slate-800 mb-3 mt-6 flex items-center gap-2"><Activity className="w-4 h-4 text-blue-600" /> Ticket Pipeline</h3>
                            <div className="flex items-stretch gap-1">
                                {pipeline.map((p, i) => (
                                    <div key={i} className="flex-1 text-center">
                                        <div className={`${p.color} text-white rounded-lg py-3 font-extrabold text-xl`}>{p.n}</div>
                                        <div className="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-wide">{p.label}</div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    </div>

                    {/* ROW: alerts + top problems + leaderboard */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        {/* Alerts */}
                        <Card className="p-5 border-l-4 border-l-red-500">
                            <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><AlertOctagon className="w-4 h-4 text-red-600" /> Priority Alerts</h3>
                            <div className="space-y-2 text-sm">
                                {d.criticalPending.length > 0 && (
                                    <div className="flex items-center justify-between bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                                        <span className="text-red-700 font-medium flex items-center gap-2"><AlertTriangle className="w-4 h-4" /> Critical breakdowns</span>
                                        <span className="font-bold text-red-700">{d.criticalPending.length}</span>
                                    </div>
                                )}
                                {d.qcmOpenTickets.length > 0 && (
                                    <div className="flex items-center justify-between bg-purple-50 border border-purple-200 rounded-lg px-3 py-2 cursor-pointer" onClick={() => onNavigate('live_monitor')}>
                                        <span className="text-purple-700 font-medium flex items-center gap-2"><ShieldCheck className="w-4 h-4" /> Quality-flagged (QCM) awaiting fix</span>
                                        <span className="font-bold text-purple-700">{d.qcmOpenTickets.length}</span>
                                    </div>
                                )}
                                {d.techsAtCapacity > 0 && (
                                    <div className="flex items-center justify-between bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                                        <span className="text-amber-700 font-medium flex items-center gap-2"><UserX className="w-4 h-4" /> Techs at 3-ticket capacity</span>
                                        <span className="font-bold text-amber-700">{d.techsAtCapacity}</span>
                                    </div>
                                )}
                                {d.pendingBookings > 0 && (
                                    <div className="flex items-center justify-between bg-teal-50 border border-teal-200 rounded-lg px-3 py-2 cursor-pointer" onClick={() => window.open('factory_manager.html', '_blank')}>
                                        <span className="text-teal-700 font-medium flex items-center gap-2"><BookOpen className="w-4 h-4" /> Machine booking requests</span>
                                        <span className="font-bold text-teal-700">{d.pendingBookings}</span>
                                    </div>
                                )}
                                {d.sixOverdue > 0 && (
                                    <div className="flex items-center justify-between bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">
                                        <span className="text-rose-700 font-medium flex items-center gap-2"><CalendarClock className="w-4 h-4" /> 6-month service overdue</span>
                                        <span className="font-bold text-rose-700">{d.sixOverdue}</span>
                                    </div>
                                )}
                                {d.escalated > 0 && (
                                    <div className="flex items-center justify-between bg-orange-50 border border-orange-200 rounded-lg px-3 py-2">
                                        <span className="text-orange-700 font-medium flex items-center gap-2"><AlertOctagon className="w-4 h-4" /> Escalated tickets</span>
                                        <span className="font-bold text-orange-700">{d.escalated}</span>
                                    </div>
                                )}
                                {d.pendingParts > 0 && (
                                    <div className="flex items-center justify-between bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 cursor-pointer" onClick={() => onNavigate('inventory')}>
                                        <span className="text-amber-700 font-medium flex items-center gap-2"><Package className="w-4 h-4" /> Part requests pending</span>
                                        <span className="font-bold text-amber-700">{d.pendingParts}</span>
                                    </div>
                                )}
                                {d.lowParts.length > 0 && (
                                    <div className="flex items-center justify-between bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2 cursor-pointer" onClick={() => onNavigate('inventory')}>
                                        <span className="text-yellow-700 font-medium flex items-center gap-2"><TrendingDown className="w-4 h-4" /> Low-stock parts</span>
                                        <span className="font-bold text-yellow-700">{d.lowParts.length}</span>
                                    </div>
                                )}
                                {d.criticalPending.length === 0 && d.sixOverdue === 0 && d.escalated === 0 && d.pendingParts === 0 && d.lowParts.length === 0 && d.qcmOpenTickets.length === 0 && d.techsAtCapacity === 0 && d.pendingBookings === 0 && (
                                    <div className="text-center py-6 text-emerald-600"><CheckCircle className="w-8 h-8 mx-auto mb-1" /><p className="text-sm font-medium">All clear — no alerts.</p></div>
                                )}
                            </div>
                        </Card>

                        {/* Top problem machines */}
                        <Card className="p-5">
                            <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><TrendingUp className="w-4 h-4 text-red-600" /> Top Problem Machines</h3>
                            <div className="space-y-2">
                                {d.topProblem.length === 0 ? <p className="text-slate-400 text-sm py-4 text-center">No history yet.</p> : d.topProblem.map((p, i) => (
                                    <div key={i} className="flex items-center gap-3">
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i === 0 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>{i + 1}</div>
                                        <div className="flex-1 text-sm font-medium text-slate-700 truncate">{p.name}</div>
                                        <div className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded">{p.n} tickets</div>
                                    </div>
                                ))}
                            </div>
                        </Card>

                        {/* Tech leaderboard */}
                        <Card className="p-5">
                            <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><UserCheck className="w-4 h-4 text-emerald-600" /> Top Techs Today</h3>
                            <div className="space-y-2.5">
                                {d.leaderboard.length === 0 ? <p className="text-slate-400 text-sm py-4 text-center">No jobs completed yet today.</p> : d.leaderboard.map((t, i) => (
                                    <div key={i} className="flex items-center gap-3">
                                        <div className="text-lg w-6 text-center">{['🥇', '🥈', '🥉'][i] || '🔧'}</div>
                                        <div className="flex-1">
                                            <div className="text-sm font-medium text-slate-700">{t.name}</div>
                                            <div className="bg-slate-100 rounded-full h-2 mt-1 overflow-hidden"><div className="h-full bg-emerald-500 rounded-full" style={{ width: `${t.n / maxLb * 100}%` }}></div></div>
                                        </div>
                                        <div className="text-sm font-bold text-emerald-600">{t.n}</div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    </div>

                    {/* Recent activity */}
                    <Card className="p-5">
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><History className="w-4 h-4 text-blue-600" /> Live Activity Feed</h3>
                        <div className="divide-y divide-slate-100">
                            {d.recent.length === 0 ? <p className="text-slate-400 text-sm py-4 text-center">No activity yet.</p> : d.recent.map((l, i) => (
                                <div key={i} className="flex items-center gap-3 py-2.5">
                                    {actIcon(l.action || '')}
                                    <div className="flex-1 min-w-0">
                                        <div className="text-sm text-slate-700"><span className="font-bold">{l.action}</span>{l.userName ? <span className="text-slate-400"> · {l.userName}</span> : ''}</div>
                                        {l.details && <div className="text-xs text-slate-400 truncate">{l.details}</div>}
                                    </div>
                                    <div className="text-xs text-slate-400 shrink-0 font-mono">{l.timestamp ? new Date(l.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}</div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        const LiveMonitor = ({ machines, users, onAssign, currentUser, serviceRecords = [], filters = { q: '', dept: 'all', status: 'all', priority: 'all' }, setFilters = () => {} }) => {
            const pending = machines.filter(m => m.status === "Pending");
            const qaPending = machines.filter(m => m.status === "Pending Admin Approval");
            const DEPARTMENTS = ['Mechanical', 'Technical', 'IE', 'Quality'];
            const [modal, setModal] = useState(null);
            const [selTech, setSelTech] = useState("");
            // Defaults ON now that n8n no longer exists to auto-assign new tickets — this is the
            // only thing that routes an unassigned breakdown to an available worker.
            const [autoAssign, setAutoAssign] = useState(true);
            const [viewMode, setViewMode] = useState('live'); // 'live' or 'pm'

            // PM SERVICE-CARD COMPLIANCE (monthly + 6-month) — mirrors worker.html/hub logic
            const thisPeriod = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
            const monthlyDueMachines = machines.filter(m => (m.lastMonthlyService || '') !== thisPeriod);
            const sixMonthOverdueMachines = machines.filter(m => !m.lastSixMonthServiceAt || (Date.now() - new Date(m.lastSixMonthServiceAt).getTime()) > 182*86400000);
            const servicesToday = serviceRecords.filter(r => (r.date || '').slice(0,10) === new Date().toISOString().slice(0,10));

            // PM SCHEDULER LOGIC (30 Days)
            const serviceDueMachines = machines.filter(m => {
                if(!m.lastMaintenance) return true; 
                const last = new Date(m.lastMaintenance);
                const diff = (new Date() - last) / (1000 * 60 * 60 * 24);
                return diff > 30; 
            });

            // AUTO-ASSIGN LOGIC (Intelligent Load Balancing & Limits)
            useEffect(() => {
                if (!autoAssign) return;

                const techs = users.filter(u => u.role === 'technician' && u.status !== 'Offline');
                if (techs.length === 0) return;

                // --- 1. IDENTIFY WORK ---
                const unassignedBreakdowns = machines.filter(m => m.status === 'Pending' && !m.assignedTo && !m.isPM);
                const unassignedPMs = machines.filter(m => {
                    if (m.status !== 'Running') return false; 
                    if (!m.lastMaintenance) return true; 
                    const last = new Date(m.lastMaintenance);
                    const diff = (new Date() - last) / (1000 * 60 * 60 * 24);
                    return diff > 30;
                });

                if (unassignedBreakdowns.length === 0 && unassignedPMs.length === 0) return;

                // --- 2. CALCULATE CURRENT LOAD ---
                const workload = {};
                const pmCounts = {};
                
                techs.forEach(t => {
                    workload[t.id] = 0;
                    pmCounts[t.id] = 0;
                });

                machines.forEach(m => {
                    if (m.status !== 'Running' && m.assignedTo && workload[m.assignedTo] !== undefined) {
                        workload[m.assignedTo]++;
                        if (m.isPM) pmCounts[m.assignedTo]++;
                    }
                });

                // --- 3. ASSIGN BREAKDOWNS (PRIORITY 1) ---
                const sortedBreakdowns = [...unassignedBreakdowns].sort((a, b) => {
                    if (a.priority === 'Critical' && b.priority !== 'Critical') return -1;
                    if (a.priority !== 'Critical' && b.priority === 'Critical') return 1;
                    return 0;
                });

                // No technician gets more than MAX_CONCURRENT active tickets at once — without
                // this, if only one tech in a department is online, every new breakdown kept
                // piling onto that same person with no limit (the actual bug reported: one
                // worker ends up holding all the work). Once everyone in the department is at
                // the cap, remaining tickets are left unassigned for manual claim instead.
                const MAX_CONCURRENT = 3;
                sortedBreakdowns.forEach(m => {
                    // Only consider techs in the AI-routed department for this machine; if nobody in
                    // that department is online yet, leave it unassigned rather than misroute it.
                    const deptTechs = (m.department ? techs.filter(t => t.department === m.department) : techs)
                        .filter(t => workload[t.id] < MAX_CONCURRENT);
                    if (deptTechs.length === 0) return;
                    const bestTech = deptTechs.reduce((prev, curr) => workload[prev.id] <= workload[curr.id] ? prev : curr);
                    if (bestTech) {
                        api.assignTech(m.id, bestTech.id);
                        workload[bestTech.id]++;
                    }
                });

                // --- 4. ASSIGN PM TASKS (PRIORITY 2) ---
                unassignedPMs.forEach(m => {
                    const eligibleTechs = techs.filter(t => pmCounts[t.id] < 5);
                    if (eligibleTechs.length > 0) {
                        const bestTech = eligibleTechs.reduce((prev, curr) => workload[prev.id] <= workload[curr.id] ? prev : curr);
                        api.assignPM(m.id, bestTech.id);
                        workload[bestTech.id]++;
                        pmCounts[bestTech.id]++;
                    }
                });

            }, [machines, users, autoAssign]);

            // NEW: Quick Force-Clear Function for Admins
            const handleForceClear = (machineId) => {
                if(confirm("Are you sure you want to force-clear this ticket and reset the machine to Running?")) {
                    update(ref(db, `machines/${machineId}`), {
                        status: 'Running', issue: null, priority: null, department: null, 
                        ticketId: null, aiDiagnostic: null, assignedTo: null,
                        reportedAt: null, startedAt: null, assignedAt: null, isPM: null
                    });
                }
            };

            // --- QMS-STYLE FILTERS (shared with the top-bar search box) ---
            const DEPT_OPTS = ['Mechanical', 'Technical', 'IE', 'Quality'];
            const matchF = (m) => {
                const q = (filters.q || '').trim().toLowerCase();
                if (q && !(`${m.name || ''} ${m.issue || ''} ${m.id || ''} ${m.ticketId || ''}`.toLowerCase().includes(q))) return false;
                if (filters.dept !== 'all' && m.department !== filters.dept) return false;
                if (filters.priority !== 'all' && (m.priority || 'Normal') !== filters.priority) return false;
                return true;
            };
            const fPending = pending.filter(matchF);
            const fInProgress = machines.filter(m => m.status === 'In Progress').filter(matchF);
            const fQa = qaPending.filter(matchF);
            const activeFilterCount = (filters.dept !== 'all' ? 1 : 0) + (filters.priority !== 'all' ? 1 : 0) + (filters.status !== 'all' ? 1 : 0) + (filters.q ? 1 : 0);
            const showSec = (key) => filters.status === 'all' || filters.status === key;
            const chips = [
                { key: 'Pending', label: 'Pending', n: fPending.length, cls: 'text-red-600', icon: <AlertTriangle className="w-4 h-4 text-red-500" /> },
                { key: 'In Progress', label: 'In Progress', n: fInProgress.length, cls: 'text-yellow-600', icon: <Wrench className="w-4 h-4 text-yellow-500" /> },
                { key: 'Pending Admin Approval', label: 'Approval', n: fQa.length, cls: 'text-orange-600', icon: <ShieldCheck className="w-4 h-4 text-orange-500" /> },
            ];

            return (
                <div className="space-y-5">
                    {/* ===== FILTER TOOLBAR ===== */}
                    <Card className="p-3">
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-2 flex-1 min-w-[200px]">
                                <Search className="w-4 h-4 text-slate-400 shrink-0" />
                                <input value={filters.q} onChange={e => setFilters({ ...filters, q: e.target.value })} placeholder="Search machine, issue, ticket…" className="bg-transparent outline-none text-sm w-full text-slate-700" />
                                {filters.q && <button onClick={() => setFilters({ ...filters, q: '' })}><X className="w-4 h-4 text-slate-400 hover:text-slate-600" /></button>}
                            </div>
                            <select value={filters.dept} onChange={e => setFilters({ ...filters, dept: e.target.value })} className="text-sm border border-slate-200 rounded-xl px-3 py-2 bg-white font-medium text-slate-600">
                                <option value="all">All Departments</option>
                                {DEPT_OPTS.map(dp => <option key={dp} value={dp}>{dp}</option>)}
                            </select>
                            <select value={filters.priority} onChange={e => setFilters({ ...filters, priority: e.target.value })} className="text-sm border border-slate-200 rounded-xl px-3 py-2 bg-white font-medium text-slate-600">
                                <option value="all">All Priority</option>
                                <option>Critical</option><option>Normal</option><option>Low</option>
                            </select>
                            {activeFilterCount > 0 && <button onClick={() => setFilters({ q: '', dept: 'all', status: 'all', priority: 'all' })} className="text-sm text-slate-500 hover:text-slate-800 flex items-center gap-1 px-2 font-medium"><X className="w-4 h-4" />Clear ({activeFilterCount})</button>}
                            <div className="ml-auto flex items-center gap-2">
                                <div className="flex rounded-xl overflow-hidden border border-slate-200">
                                    <button onClick={() => setViewMode('live')} className={`px-3 py-2 text-xs font-bold transition-colors ${viewMode === 'live' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500'}`}>Breakdowns</button>
                                    <button onClick={() => setViewMode('pm')} className={`px-3 py-2 text-xs font-bold transition-colors ${viewMode === 'pm' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500'}`}>PM Due</button>
                                </div>
                                {currentUser.role === 'admin' && <button onClick={() => setAutoAssign(!autoAssign)} className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition-colors ${autoAssign ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}><Zap className={`w-3.5 h-3.5 ${autoAssign ? 'fill-current' : ''}`} />{autoAssign ? 'Auto ON' : 'Auto OFF'}</button>}
                            </div>
                        </div>
                    </Card>

                    {/* ===== STATUS QUICK-FILTER CHIPS ===== */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {chips.map(c => (
                            <button key={c.key} onClick={() => setFilters({ ...filters, status: filters.status === c.key ? 'all' : c.key })}
                                className={`text-left rounded-2xl border p-3 bg-white transition-all ${filters.status === c.key ? 'ring-2 ring-blue-500 border-blue-300 shadow-sm' : 'border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
                                <div className="flex items-center justify-between">{c.icon}<span className="text-2xl font-extrabold text-slate-800">{c.n}</span></div>
                                <div className="text-[11px] font-bold text-slate-500 uppercase tracking-wide mt-1">{c.label}</div>
                            </button>
                        ))}
                    </div>

                    {/* ===== PENDING TICKETS — dedicated, separated area ===== */}
                    {showSec('Pending') && (
                        <Card className="p-0 overflow-hidden border-l-4 border-l-red-500">
                            <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between bg-red-50/40">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2"><AlertTriangle className="w-5 h-5 text-red-600" /> Pending Tickets <span className="text-sm font-normal text-slate-400">({fPending.length})</span></h3>
                                {activeFilterCount > 0 && <span className="text-xs text-slate-400">filtered</span>}
                            </div>
                            <div className="divide-y divide-slate-100 max-h-[26rem] overflow-y-auto">
                                {fPending.length === 0 ? <div className="p-8 text-center text-slate-400 text-sm">No pending tickets match your filters.</div> :
                                    fPending.map(m => (
                                        <div key={m.id} className="px-5 py-3 flex items-center gap-3 hover:bg-slate-50 group">
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <span className="font-bold text-slate-800">{m.name}</span>
                                                    {m.priority && <Badge status={m.priority} type="priority" />}
                                                    {m.department && <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-100 text-indigo-800 border border-indigo-200 flex items-center gap-1"><Zap className="w-3 h-3" />{m.department.toUpperCase()}</span>}
                                                    {m.source === 'QCM' && <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-purple-100 text-purple-800 border border-purple-200 flex items-center gap-1"><ShieldCheck className="w-3 h-3" />QCM</span>}
                                                </div>
                                                <div className="text-xs text-slate-500 mt-0.5 truncate">{m.issue}{m.reportedBy ? ` · ${m.reportedBy}` : ''}</div>
                                            </div>
                                            <div className="flex items-center gap-2 shrink-0">
                                                {!m.assignedTo ? <Button size="sm" onClick={() => setModal(m)}>Assign</Button> : <span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">Assigned</span>}
                                                {currentUser.role === 'admin' && <select className="text-xs border border-slate-200 rounded px-1 py-1 bg-white" defaultValue="" onChange={e => { const v = e.target.value; e.target.value = ""; if (v) api.transferDept(m.id, currentUser.id, v); }} title="Re-route department"><option value="" disabled>Re-route…</option>{DEPARTMENTS.filter(dp => dp !== m.department).map(dp => <option key={dp} value={dp}>{dp}</option>)}</select>}
                                                {currentUser.role === 'admin' && <button onClick={() => handleForceClear(m.id)} className="text-red-400 hover:text-red-700 p-1 opacity-0 group-hover:opacity-100 transition-opacity" title="Force clear ticket"><Trash2 className="w-4 h-4" /></button>}
                                            </div>
                                        </div>
                                    ))}
                            </div>
                        </Card>
                    )}

                    <Card className="p-4 bg-slate-800 text-white border-slate-700">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold flex items-center gap-2"><UserCheck className="w-4 h-4 text-emerald-400"/> Technician Status Board</h3>
                            <span className="text-xs text-slate-400">{users.filter(u => u.role === 'technician' && u.status && u.status !== 'Offline').length} online</span>
                        </div>
                        <div className="flex gap-4 overflow-x-auto pb-2">
                            {users.filter(u => u.role === 'technician').map(tech => {
                                const activePMs = machines.filter(m => m.assignedTo === tech.id && m.isPM && m.status !== 'Running').length;
                                return (
                                    <div key={tech.id} className="bg-slate-700 p-2 rounded-lg min-w-[140px] flex flex-col items-center border border-slate-600">
                                        <div className="font-bold text-sm">{tech.name}</div>
                                        <div className="text-xs text-slate-400 mb-1">@{tech.username}</div>
                                        <Badge status={tech.status} />
                                        <div className="text-[10px] mt-1 text-slate-400 w-full text-center">
                                            Tasks: {machines.filter(m => m.assignedTo === tech.id && m.status !== 'Running').length}
                                        </div>
                                        {tech.currentTask && <div className="text-[9px] text-emerald-300 w-full text-center truncate" title={tech.currentTask}>📍 {tech.currentTask}</div>}
                                        <div className="text-[9px] text-indigo-300">PM Goal: {activePMs}/5</div>
                                    </div>
                                )
                            })}
                        </div>
                    </Card>

                    {/* PM SERVICE-CARD COMPLIANCE — monthly + 6-month service status across all machines */}
                    {currentUser.role === 'admin' && (
                        <Card className="p-4">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2"><ClipboardCheck className="w-4 h-4 text-indigo-600"/> Service-Card Compliance</h3>
                                <span className="text-xs text-slate-400">{servicesToday.length} service{servicesToday.length!==1?'s':''} logged today</span>
                            </div>
