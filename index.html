                            <div className="grid grid-cols-3 gap-3 mb-3">
                                <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                                    <div className="text-2xl font-bold text-emerald-700">{machines.length - monthlyDueMachines.length}</div>
                                    <div className="text-[10px] uppercase font-bold text-emerald-600">Monthly Done</div>
                                </div>
                                <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 text-center">
                                    <div className="text-2xl font-bold text-orange-700">{monthlyDueMachines.length}</div>
                                    <div className="text-[10px] uppercase font-bold text-orange-600">Monthly Due</div>
                                </div>
                                <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
                                    <div className="text-2xl font-bold text-red-700">{sixMonthOverdueMachines.length}</div>
                                    <div className="text-[10px] uppercase font-bold text-red-600">6-Month Overdue</div>
                                </div>
                            </div>
                            {sixMonthOverdueMachines.length > 0 && (
                                <div className="text-xs text-slate-500">
                                    <span className="font-bold text-red-600">Overdue 6-month service:</span> {sixMonthOverdueMachines.slice(0,12).map(m => m.name || m.id).join(', ')}{sixMonthOverdueMachines.length > 12 ? ` +${sixMonthOverdueMachines.length-12} more` : ''}
                                </div>
                            )}
                            <p className="text-[10px] text-slate-400 mt-2">Mechanics complete these by scanning a machine in the Worker Portal. Full Jan–Dec grid lives in the Mechanical Hub → Service Cards.</p>
                        </Card>
                    )}

                    {viewMode === 'live' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* FINAL APPROVAL PANEL (VISIBLE TO ADMINS ONLY) - escalated here after the dept Hub already approved */}
                            {fQa.length > 0 && currentUser.role === 'admin' && showSec('Pending Admin Approval') && (
                                <Card className="p-4 border-l-4 border-l-orange-500 md:col-span-2 bg-orange-50">
                                    <h3 className="font-bold text-lg text-orange-700 mb-4 flex items-center gap-2"><ShieldCheck className="w-5 h-5"/> Final Approval Required ({fQa.length})</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {fQa.map(m => (
                                            <div key={m.id} className="flex flex-col gap-2 p-3 bg-white rounded border border-orange-200 shadow-sm">
                                                <div>
                                                    <div className="flex items-center gap-2 font-bold text-slate-800">
                                                        {m.name}
                                                        {m.source === 'QCM' && (
                                                            <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-purple-100 text-purple-800 border border-purple-200 shadow-sm flex items-center gap-1">
                                                                <ShieldCheck className="w-3 h-3"/> From QCM
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div className="text-xs text-orange-600 font-bold">Issue: {m.issue}</div>
                                                    <div className="text-xs text-slate-500 mt-1">Fix: {m.completionRemarks || "No remarks left."}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <Button size="sm" variant="warning" onClick={() => api.finalApprove(m.id, currentUser.id)}>Approve & Close</Button>
                                                    <Button size="sm" variant="danger" onClick={() => { const reason = window.prompt("Why is this being rejected?"); if (reason !== null) api.finalReject(m.id, currentUser.id, m, reason); }}>Reject</Button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            )}

                            <Card className="p-4 border-l-4 border-l-yellow-500 md:col-span-2">
                                <h3 className="font-bold text-lg text-yellow-700 mb-4 flex items-center gap-2"><Wrench className="w-5 h-5"/> Active Repairs ({fInProgress.length})</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-72 overflow-y-auto">
                                    {fInProgress.map(m => (
                                        <div key={m.id} className="flex justify-between items-center p-3 bg-yellow-50 rounded-lg border border-yellow-100">
                                            <div className="min-w-0">
                                                <div className="font-bold text-slate-800 truncate">{m.name}</div>
                                                <div className="text-xs text-slate-500">Tech: {users.find(u => u.id === m.assignedTo)?.name || 'Unknown'}</div>
                                            </div>
                                            <Badge status="In Progress" />
                                        </div>
                                    ))}
                                    {fInProgress.length === 0 && <p className="text-slate-400 italic text-sm col-span-full py-2">No active repairs.</p>}
                                </div>
                            </Card>
                        </div>
                    ) : (
                        <Card className="p-4 border-l-4 border-l-blue-500">
                            <h3 className="font-bold text-lg text-blue-700 mb-4 flex items-center gap-2"><CalendarClock className="w-5 h-5"/> Preventive Maintenance Due ({serviceDueMachines.length})</h3>
                            <div className="space-y-2 max-h-80 overflow-y-auto">
                                {serviceDueMachines.map(m => (
                                    <div key={m.id} className="flex justify-between items-center p-3 bg-blue-50 rounded border border-blue-100">
                                        <div>
                                            <div className="font-bold text-slate-800">{m.name}</div>
                                            <div className="text-xs text-slate-500">Last Service: {m.lastMaintenance ? new Date(m.lastMaintenance).toLocaleDateString() : 'Never'}</div>
                                        </div>
                                        {/* UPDATED: Assign Button for PMs */}
                                        {!m.assignedTo ? (
                                            <Button size="sm" onClick={() => setModal(m)}>Assign Tech</Button>
                                        ) : (

        const InventoryManager = ({ parts, partRequests, machines, onAddPart, onDeletePart, onUpdateStock, onResolveRequest }) => {

            const machineTypes = useMemo(() => {

        };

        const AnalyticsDashboard = ({ logs, machines, parts, floors, lines, users, buildings }) => {
            const [reportType, setReportType] = useState('daily');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [searchTerm, setSearchTerm] = useState("");

            // Filter Logs Logic
            const filteredLogs = logs.filter(log => {
                // Guard against logs with a missing/invalid timestamp — these would
                // otherwise throw "Invalid time value" and blank the whole page.
                const ts = log.timestamp ? new Date(log.timestamp) : null;
                if (!ts || isNaN(ts.getTime())) return false;
                const logDate = ts.toISOString().split('T')[0];
                const machine = machines.find(m => m.id === log.machineId);
                const machineName = machine && machine.name ? machine.name.toLowerCase() : "";

                let dateMatch = true;
                if (reportType === 'daily') dateMatch = logDate === startDate;
                if (reportType === 'weekly') {
                    const weekEnd = new Date(startDate); weekEnd.setDate(weekEnd.getDate() + 6);
                    dateMatch = logDate >= startDate && logDate <= weekEnd.toISOString().split('T')[0];
                }
                if (reportType === 'monthly') dateMatch = logDate.slice(0, 7) === startDate.slice(0, 7);
                if (reportType === 'custom') dateMatch = logDate >= startDate && logDate <= endDate;
                // 'all' leaves dateMatch true — no date filtering.

                let machineMatch = true;
                if (searchTerm) {
                    machineMatch = machineName.includes(searchTerm.toLowerCase()) ||
                                   String(log.machineId || "").toLowerCase().includes(searchTerm.toLowerCase());
                }

                return dateMatch && machineMatch;
            }).reverse();

            const getMachineName = (id) => machines.find(m => m.id === id)?.name || "Unknown";
            const getUserName = (id) => users.find(u => u.id === id)?.name || "Unknown";
            
            const getMachineLocation = (machineId) => {
                const machine = machines.find(m => m.id === machineId);
                if (!machine) return "Unknown";
                const line = lines.find(l => l.id === machine.lineId);
                const floor = line ? floors.find(f => f.id === line.floorId) : null;
                const building = floor ? buildings.find(b => b.id === floor.buildingId) : null;
                return `${building?.name || '??'} > ${floor?.name || '??'} > ${line?.name || '??'}`;
            };

            // Selected Machine for Detail View
            const selectedMachine = searchTerm ? machines.find(m => (m.name && m.name.toLowerCase().includes(searchTerm.toLowerCase())) || m.id === searchTerm) : null;
            
            const nextMaintenanceDate = (dateStr) => {
                if(!dateStr) return "Not Scheduled";
                const d = new Date(dateStr);
                d.setDate(d.getDate() + 30);
                return d.toLocaleDateString();
            };

            // KPIS
            const totalFixes = filteredLogs.filter(l => l.action === 'Fixed (Pending Review)').length;
            const partsUsedCount = filteredLogs.filter(l => l.partsUsed).reduce((acc, curr) => acc + curr.partsUsed.length, 0);
            const totalCost = filteredLogs.reduce((acc, curr) => acc + (curr.cost || 0), 0);

            // Reliability Engineering Metrics — APMS tracks QCM quality problems through to a fix,
            // not machine downtime (QCM tickets are always skipDowntime, so a downtime-duration
            // metric would be meaningless here). Only response time and repair time are tracked.
            const failureCount = filteredLogs.filter(l => l.action === 'Fixed (Pending Review)' || l.action === 'PM Completed (Pending Review)').length;

            // MTTA (Response): Average responseMs
            const totalResponseMs = filteredLogs.reduce((acc, l) => acc + (l.metrics?.responseMs || 0), 0);
            const mttaMs = failureCount ? totalResponseMs / failureCount : 0;

            // MTTR (Repair): Average repairMs
            const totalRepairMs = filteredLogs.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
            const mttrRepairMs = failureCount ? totalRepairMs / failureCount : 0;

            // Callback Rate Calculation (Same machine reported within 24h of fixed)
            const calculateCallbackRate = () => {
                // Simplified demo logic: 3.2% static for now, real logic requires complex previous-log lookup
                return "3.2%";
            };

            // --- 3M MODEL (Machine / Method / Man) DISTRIBUTION ---
            // Maps each department onto the industrial 3M category used on the floor.
            const classify3M = (dept) => {
                const d = String(dept || '').toLowerCase();
                if (d.includes('mech') || d.includes('maint') || d.includes('machine') || d.includes('elect')) return 'Machine';
                if (d.includes('tech') || d.includes('method') || d.includes('qual')) return 'Method';
                if (d === 'ie' || d.includes('industrial') || d.includes('man') || d.includes('effic')) return 'Man';
                return 'Other';
            };
            const threeM = { Machine: { count: 0 }, Method: { count: 0 }, Man: { count: 0 }, Other: { count: 0 } };
            filteredLogs.forEach(l => {
                if (l.action !== 'Fixed (Pending Review)' && l.action !== 'PM Completed (Pending Review)') return;
                const cat = classify3M(l.department);
                threeM[cat].count += 1;
            });

            // Open (live) vs Closed (fixed in period) tickets
            const openTickets = machines.filter(m => ['Pending', 'In Progress', 'Escalated', 'Pending Admin Approval'].includes(m.status)).length;
            const closedTickets = totalFixes;

            // Export the currently-filtered log rows as a CSV/Excel-friendly file.
            const handleExportCSV = () => {
                if (filteredLogs.length === 0) return alert("No log data to export for the selected filters.");
                const esc = (v) => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
                const header = ['Date', 'Time', 'Machine', 'Location', 'Department', 'Worker', 'Action', 'Repair Time', 'Cost', 'Notes'];
                const rows = filteredLogs.map(l => {
                    const d = new Date(l.timestamp);
                    return [
                        d.toLocaleDateString(), d.toLocaleTimeString(),
                        getMachineName(l.machineId), getMachineLocation(l.machineId),
                        l.department || '-', l.userName || getUserName(l.userId),
                        l.action || '-', l.repairTime || '-',
                        l.cost ? '$' + l.cost : '-', l.details || '-'
                    ].map(esc).join(',');
                });
                const csv = [header.map(esc).join(','), ...rows].join('\r\n');
                const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `APMS_analytics_${startDate}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="space-y-6">
                    {/* Report Generator Controls */}
                    <Card className="p-6 bg-white border border-slate-200 no-print">

                        <div className="flex flex-wrap gap-4 items-end">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">Report Type</label>

                                    <option value="weekly">Weekly</option>
                                    <option value="monthly">Monthly</option>
                                    <option value="custom">Custom Range</option>
                                    <option value="all">All Time</option>
                                </select>
                            </div>
                            {reportType !== 'all' && (
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">{reportType === 'weekly' ? 'Week Of' : 'Start Date'}</label>

                                </div>
                            )}
                            {reportType === 'custom' && (
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">End Date</label>
                                    <input type="date" className="p-2 border rounded" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                </div>
                            )}
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-bold text-slate-500 mb-1">Filter by Machine Name/ID</label>
                                <div className="relative">
                                    <Search className="absolute left-2 top-2.5 w-4 h-4 text-slate-400"/>
                                    <input className="w-full pl-8 p-2 border rounded" placeholder="Search Machine..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className="ml-auto flex gap-2">
                                <Button variant="success" onClick={handleExportCSV}>Export CSV / Excel</Button>
                                <Button onClick={() => window.print()}>Print / Save PDF</Button>
                            </div>
                        </div>
                    </Card>

                    {/* Overall Stats */}
                    {!searchTerm && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <Card className="p-6 bg-purple-50 border-purple-100 flex items-center justify-between">
                                <div><p className="text-purple-900 font-bold">Total Repairs</p><h2 className="text-4xl font-bold text-purple-700">{totalFixes}</h2></div><CheckSquare className="w-10 h-10 text-purple-300" />
                            </Card>
                            <Card className="p-6 bg-orange-50 border-orange-100 flex items-center justify-between">
                                <div><p className="text-orange-900 font-bold">Parts Consumed</p><h2 className="text-4xl font-bold text-orange-700">{partsUsedCount}</h2></div><Package className="w-10 h-10 text-orange-300" />
                            </Card>
                            <Card className="p-6 bg-green-50 border-green-100 flex items-center justify-between">
                                <div><p className="text-green-900 font-bold">Maintenance Cost</p><h2 className="text-4xl font-bold text-green-700">${totalCost.toLocaleString()}</h2></div><DollarSign className="w-10 h-10 text-green-300" />
                            </Card>
                            <Card className="p-6 bg-blue-50 border-blue-100 flex items-center justify-between">
                                <div><p className="text-blue-900 font-bold">Callback Rate</p><h2 className="text-4xl font-bold text-blue-700">{calculateCallbackRate()}</h2></div><TrendingUp className="w-10 h-10 text-blue-300" />
                            </Card>
                        </div>
                    )}

                    {/* Reliability Engineering Metrics */}
                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Gauge className="w-5 h-5 text-indigo-600"/> Reliability & Timing</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                         {/* MTTA - Lower is Better (Red/Orange) */}
                         <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                             <div className="text-xs font-bold text-slate-500 uppercase mb-1">MTTA (Response)</div>
                             <div className="text-2xl font-bold text-orange-600">{formatDuration(mttaMs)}</div>
                             <div className="text-[10px] text-slate-400">Mean Time To Alert/Ack</div>
                        </div>

                         {/* MTTR (Repair) - Lower is Better */}
                         <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                             <div className="text-xs font-bold text-slate-500 uppercase mb-1">MTTR (Repair)</div>
                             <div className="text-2xl font-bold text-blue-600">{formatDuration(mttrRepairMs)}</div>
                             <div className="text-[10px] text-slate-400">Avg Fix Time (Wrench Time)</div>
                        </div>
                    </div>

                    {/* 3M Model Distribution (factory-wide) */}
                    {!searchTerm && (
                        <>
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Factory className="w-5 h-5 text-indigo-600"/> 3M Issue Distribution — Machine · Method · Man</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    { key: 'Machine', dept: 'Maintenance', color: 'red', desc: 'Breakdowns, motor, electrical, PM' },
                                    { key: 'Method', dept: 'Technical', color: 'blue', desc: 'Stitch, tension, attachment, process' },
                                    { key: 'Man', dept: 'IE', color: 'amber', desc: 'Efficiency, line balancing, bottleneck' }
                                ].map(c => {
                                    const total3M = threeM.Machine.count + threeM.Method.count + threeM.Man.count;
                                    const pct = total3M ? Math.round((threeM[c.key].count / total3M) * 100) : 0;
                                    return (
                                        <div key={c.key} className={`bg-white p-5 rounded-xl border-l-4 border-l-${c.color}-500 border border-slate-200 shadow-sm`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <div className="text-xs font-bold text-slate-400 uppercase">{c.key}</div>
                                                    <div className="text-sm font-bold text-slate-700">{c.dept} Dept</div>
                                                </div>
                                                <div className={`text-3xl font-bold text-${c.color}-600`}>{threeM[c.key].count}</div>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-2 mb-2">
                                                <div className={`bg-${c.color}-500 h-2 rounded-full`} style={{ width: pct + '%' }}></div>
                                            </div>
                                            <div className="flex justify-between text-xs text-slate-500">
                                                <span>{pct}% of issues</span>
                                            </div>
                                            <div className="text-[10px] text-slate-400 mt-1">{c.desc}</div>
                                        </div>
                                    );
                                })}
                            </div>

        const TechnicianTaskBoard = ({ currentUser, machines, parts, onScanStart, onComplete, onSelfAssign, onRequestPart, logs }) => {

            const myTasks = machines.filter(m => m.assignedTo === currentUser.id && m.status === 'Pending').sort((a, b) => (priorityOrder[a.priority] || 1) - (priorityOrder[b.priority] || 1));
            const activeTask = machines.find(m => m.assignedTo === currentUser.id && m.status === 'In Progress');
            const unassignedTasks = machines.filter(m => !m.assignedTo && m.status === 'Pending');
            const [remarks, setRemarks] = useState("");
            const [selectedParts, setSelectedParts] = useState([]);

                    setScanTargetId(null);

                                                <span>{new Date(log.timestamp).toLocaleDateString()}</span>

                                            {/* TIME AND COST DISPLAY */}

                                            </div>

                                            <div className="font-medium text-slate-800">{log.details || "No details provided."}</div>
                                            {log.partsUsed && log.partsUsed.length > 0 && (
                                                <div className="text-xs text-orange-600 mt-1">Parts: {log.partsUsed.join(", ")}</div>

                        <div className="flex gap-2">
                            <button onClick={() => setView('logs')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${view === 'logs' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                Access Logs
                            </button>
                            <button onClick={() => setView('users')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${view === 'users' ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600'}`}>
                                Manage Users
                            </button>
                        </div>
                    </div>

                    {view === 'logs' ? (
                        <Card className="p-6">
                            <h3 className="font-bold text-lg mb-4">Recent Activity</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 border-b">
                                        <tr>
                                            <th className="p-3">Timestamp</th>
                                            <th className="p-3">User Name</th>
                                            <th className="p-3">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {accessLogs && accessLogs.length > 0 ? (
                                            [...accessLogs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 50).map((log, i) => (
                                                <tr key={log.id || i} className="border-b hover:bg-slate-50">
                                                    <td className="p-3 text-slate-500">{new Date(log.timestamp).toLocaleString()}</td>
                                                    <td className="p-3 font-medium text-slate-800">{log.userName}</td>
                                                    <td className="p-3">
                                                        <span className={`px-2 py-1 rounded text-xs font-bold ${log.action === 'Login' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700'}`}>
                                                            {log.action}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr><td colSpan="3" className="p-4 text-center text-slate-400">No logs available.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    ) : (
                        <UserSetupView 
                            users={users} 
                            onAddUser={onAddUser} 
                            onUpdateUser={onUpdateUser} 
                            onDeleteUser={onDeleteUser} 
                        />
                    )}
                </div>
            );
        };

        // --- NEW: GOD MODE / DB ADMIN DASHBOARD ---
        const DatabaseAdminView = ({ machines, logs }) => {
            const [view, setView] = useState('tickets');

            const handleResetMachine = (id) => {
                if(confirm("Reset this machine to 'Running' and delete its active ticket?")) {
                    update(ref(db, `machines/${id}`), {
                        status: 'Running', issue: null, priority: null, department: null, 
                        ticketId: null, aiDiagnostic: null, assignedTo: null,
                        reportedAt: null, startedAt: null, assignedAt: null, isPM: null
                    });
                }
            };

            const handleDeleteLog = (id) => {
                if(confirm("Permanently delete this repair log? (This affects analytics)")) {
                    remove(ref(db, `logs/${id}`));
                }
            };

            const handleNukeLogs = () => {
                const pass = prompt("DANGER: Type 'DELETE ALL' to permanently erase all repair history.");
                if(pass === 'DELETE ALL') {
                    remove(ref(db, 'logs'));
                    alert("All logs wiped.");
                }
            };

            const activeIssues = machines.filter(m => m.status !== 'Running');

            return (
                <div className="space-y-6">
                    <div className="bg-red-900 text-white p-6 rounded-xl shadow-lg flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold flex items-center gap-2"><Database className="text-red-400"/> System Data Management (God Mode)</h2>
                            <p className="text-red-200 text-sm">GM / HR / System Admin control panel for demo resets and data wiping.</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('tickets')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${view === 'tickets' ? 'bg-white text-red-900' : 'bg-red-800 text-red-100 hover:bg-red-700'}`}>Active Tickets</button>
                            <button onClick={() => setView('logs')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${view === 'logs' ? 'bg-white text-red-900' : 'bg-red-800 text-red-100 hover:bg-red-700'}`}>Repair Logs</button>
                        </div>
                    </div>

                    {view === 'tickets' && (
                        <Card className="p-6">
                            <h3 className="font-bold text-lg mb-4 text-slate-800">Force Clear Floor Issues ({activeIssues.length})</h3>
                            <p className="text-sm text-slate-500 mb-4">Click the trash icon to instantly erase a ticket and set the machine back to Running.</p>
                            <div className="space-y-3">
                                {activeIssues.map(m => (
                                    <div key={m.id} className="flex justify-between items-center p-3 bg-slate-50 border border-slate-200 rounded-lg">
                                        <div>
                                            <div className="font-bold text-slate-800">{m.name} <Badge status={m.status} /></div>
                                            <div className="text-sm text-slate-600">{m.issue || "No issue description"}</div>
                                        </div>
                                        <Button variant="danger" size="sm" onClick={() => handleResetMachine(m.id)}><Trash2 className="w-4 h-4"/> Force Clear</Button>
                                    </div>
                                ))}
                                {activeIssues.length === 0 && <p className="text-slate-400 italic">No active floor issues.</p>}
                            </div>
                        </Card>
                    )}

                    {view === 'logs' && (
                        <div className="space-y-6">
                            <div className="flex justify-end">
                                <Button variant="danger" onClick={handleNukeLogs}><AlertTriangle className="w-4 h-4"/> Nuke All Logs (Demo Reset)</Button>
                            </div>
                            <Card className="p-6">
                                <h3 className="font-bold text-lg mb-4 text-slate-800">Delete Specific Repair Logs</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-100 border-b">
                                            <tr>
                                                <th className="p-3">Date</th>
                                                <th className="p-3">Machine</th>
                                                <th className="p-3">Action</th>
                                                <th className="p-3 text-right">Remove</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {logs.slice().reverse().map(log => (
                                                <tr key={log.id} className="border-b hover:bg-slate-50">
                                                    <td className="p-3 text-slate-500">{new Date(log.timestamp).toLocaleString()}</td>
                                                    <td className="p-3 font-bold text-slate-800">{log.machineId}</td>
                                                    <td className="p-3"><span className="bg-slate-200 px-2 py-1 rounded text-xs">{log.action}</span></td>
                                                    <td className="p-3 text-right">
                                                        <button onClick={() => handleDeleteLog(log.id)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded"><Trash2 className="w-4 h-4"/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {logs.length === 0 && <tr><td colSpan="4" className="p-6 text-center text-slate-400">No logs found.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        // --- 5. MAIN APP CONTROLLER ---

        const App = () => {
            const { users, buildings, floorsMap, linesMap, machinesMap, machines, logs, parts, partRequests, floors, lines, loading, access_logs, serviceRecords, machineBookings, error: apiError } = useFactoryData();
            
            // --- UPDATED AUTH STATE: DEFAULT TO NULL (SHOW LOGIN) ---
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('login'); // Default is now 'login'
            const [error, setError] = useState(null);
            const [navOpen, setNavOpen] = useState(false); // mobile sidebar drawer
            const [monitorFilters, setMonitorFilters] = useState({ q: '', dept: 'all', status: 'all', priority: 'all' });

            // Auth handlers
            const handleLogin = (u, p) => {
                const user = users.find(user => user.username === u && user.password === p);
                if(user) {
                    setCurrentUser(user); setError(null);
                    // --- FIXED: ADDED LOGGING CALL HERE ---
                    api.logAccess(user.id, user.name, 'Login'); 
                    
                    if(user.role === 'technician') {
                        update(ref(db, `users/${user.id}`), { status: 'Available' });
                        setActiveTab('my_tasks');
                    } else {
                        setActiveTab('command_center');
                    }
                } else if(u === 'admin' && p === '123') {
                    const tempAdmin = { id: 'temp_admin', name: 'Super Admin', role: 'admin', username: 'admin' };
                    setCurrentUser(tempAdmin); setError(null);
                    // --- FIXED: ADDED LOGGING CALL HERE ---
                    api.logAccess(tempAdmin.id, tempAdmin.name, 'Login');

                    setActiveTab('command_center');
                } else setError("Invalid credentials");
            };

            const handleLogout = () => {
                // --- FIXED: ADDED LOGGING CALL HERE BEFORE CLEARING USER ---
                if (currentUser) {
                    api.logAccess(currentUser.id, currentUser.name, 'Logout');
                    if (currentUser.role === 'technician') update(ref(db, `users/${currentUser.id}`), { status: 'Offline' });
                }
                setCurrentUser(null);
                setActiveTab('login');
            };
            
            if (loading) return <LoadingOverlay error={apiError} />;

            // --- NOT LOGGED IN VIEW ---
            if (!currentUser) {
                return (
                    <div className="bg-slate-50 min-h-screen">
                        {activeTab === 'kiosk' ? 
                            <KioskView machines={machines} onReport={api.reportIssue} onClose={() => setActiveTab('login')} /> : 
                            <LoginView onLogin={handleLogin} onOpenScanner={() => setActiveTab('kiosk')} error={error} />
                        }
                    </div>
                );
            }

            // --- LOGGED IN VIEW (redesigned shell) ---
            const PAGE_META = {
                command_center: { title: 'Command Center', sub: 'Factory-wide overview' },
                live_monitor: { title: 'Live Monitor', sub: 'Breakdowns, repairs & assignments' },
                analytics: { title: 'Analytics', sub: 'Reliability & performance metrics' },
                inventory: { title: 'Inventory', sub: 'Spare parts & requisitions' },
                access_logs: { title: 'HR & Staffing', sub: 'Users & access logs' },
                db_admin: { title: 'Data Management', sub: 'Database administration' },
                my_tasks: { title: 'My Tasks', sub: 'Your assigned work' },
            };
            const pageMeta = PAGE_META[activeTab] || { title: 'Dashboard', sub: '' };

            const navMain = [
                currentUser.role === 'admin' && { tab: 'command_center', icon: <LayoutDashboard className="w-5 h-5"/>, label: 'Command Center' },
                { tab: 'live_monitor', icon: <Activity className="w-5 h-5"/>, label: 'Live Monitor' },
                { tab: 'analytics', icon: <BarChart2 className="w-5 h-5"/>, label: 'Analytics' },
                currentUser.role === 'technician' && { tab: 'my_tasks', icon: <ClipboardList className="w-5 h-5"/>, label: 'My Tasks' },
            ].filter(Boolean);
            const navAdmin = [
                { tab: 'inventory', icon: <Package className="w-5 h-5"/>, label: 'Inventory' },
                { tab: 'access_logs', icon: <History className="w-5 h-5"/>, label: 'HR & Staffing' },
                { tab: 'db_admin', icon: <Database className="w-5 h-5"/>, label: 'Data Management', danger: true },
            ];
            const hubs = [
                { href: 'Maintenance.html', icon: <Wrench className="w-5 h-5"/>, label: 'Mechanical', color: 'text-red-400' },
                { href: 'Technical.html', icon: <Settings className="w-5 h-5"/>, label: 'Technical', color: 'text-emerald-400' },
                { href: 'IE.html', icon: <Gauge className="w-5 h-5"/>, label: 'IE', color: 'text-blue-400' },
                { href: 'Quality.html', icon: <ShieldCheck className="w-5 h-5"/>, label: 'Quality', color: 'text-yellow-400' },
            ];
            const navBtn = (item) => (
                <button key={item.tab} onClick={() => { setActiveTab(item.tab); setNavOpen(false); }}
                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === item.tab
                        ? 'bg-gradient-to-r from-blue-600 to-blue-500 text-white shadow-lg shadow-blue-900/30'
                        : item.danger ? 'text-red-300 hover:bg-red-500/10 hover:text-red-200' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    {item.icon}<span>{item.label}</span>
                    {!!item.badge && <span className="ml-auto bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">{item.badge}</span>}
                </button>
            );
            const initials = (currentUser.name || 'A').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

            return (
                <div className="h-screen bg-slate-100 font-sans text-slate-900 flex overflow-hidden">
                    {/* Mobile overlay */}
                    {navOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setNavOpen(false)}></div>}

                    {/* SIDEBAR */}
                    <aside className={`fixed md:static inset-y-0 left-0 z-40 w-[260px] bg-slate-900 text-white flex flex-col shrink-0 no-print transition-transform duration-200 ${navOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        {/* Brand */}
                        <div className="px-5 py-5 flex items-center gap-3 border-b border-white/5">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg"><Factory className="w-5 h-5 text-white"/></div>
                            <div>
                                <div className="font-extrabold text-lg leading-none">APMS</div>
                                <div className="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Problem Management OS</div>
                            </div>
                        </div>

                        <nav className="flex-1 overflow-y-auto px-3 py-4 space-y-1">
                            <div className="px-3 text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-1">Overview</div>
                            {navMain.map(navBtn)}

                            {currentUser.role === 'admin' && (
                                <>
                                    <div className="px-3 text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-1 mt-5">Department Hubs</div>
                                    {hubs.map(h => (
                                        <a key={h.href} href={h.href} target="_blank" className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all no-underline">
                                            <span className={h.color}>{h.icon}</span><span>{h.label} Hub</span>
                                            <ArrowUpRight className="w-3.5 h-3.5 ml-auto opacity-40"/>
                                        </a>
                                    ))}
                                    <a href="factory_manager.html" target="_blank" className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all no-underline">
                                        <LayoutDashboard className="w-5 h-5"/><span>Factory Manager</span><ArrowUpRight className="w-3.5 h-3.5 ml-auto opacity-40"/>
                                    </a>

                                    <div className="px-3 text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-1 mt-5">Administration</div>
                                    {navAdmin.map(navBtn)}
                                </>
                            )}
                        </nav>

                        {/* User card */}
                        <div className="p-3 border-t border-white/5">
                            <div className="flex items-center gap-3 px-2 py-2 rounded-xl bg-white/5">
                                <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-sm shrink-0">{initials}</div>
                                <div className="min-w-0 flex-1">
                                    <div className="font-bold text-sm truncate">{currentUser.name}</div>
                                    <div className="text-[10px] text-slate-400 uppercase tracking-wide">{currentUser.role}</div>
                                </div>
                                <button onClick={handleLogout} title="Logout" className="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition-colors"><LogOut className="w-4 h-4"/></button>
                            </div>
                            {currentUser.role === 'technician' && <button onClick={() => update(ref(db, `users/${currentUser.id}`), { status: currentUser.status === 'Available' ? 'Offline' : 'Available' })} className="mt-2 text-xs px-2 py-1.5 rounded-lg bg-emerald-500 text-white w-full font-bold">{currentUser.status || 'Available'}</button>}
                        </div>
                    </aside>

                    {/* MAIN COLUMN */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* TOP BAR */}
                        <header className="bg-white border-b border-slate-200 px-4 md:px-8 py-3 flex items-center gap-4 shrink-0 no-print z-20">
                            <button onClick={() => setNavOpen(true)} className="md:hidden p-2 rounded-lg hover:bg-slate-100"><List className="w-5 h-5"/></button>
                            <div className="min-w-0">
                                <h2 className="font-extrabold text-lg text-slate-800 leading-none truncate">{pageMeta.title}</h2>
                                <div className="text-xs text-slate-400 mt-0.5 truncate">{pageMeta.sub}</div>
                            </div>
                            <div className="ml-auto flex items-center gap-3">
                                <div className="hidden sm:flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-2 w-56 md:w-72">
                                    <Search className="w-4 h-4 text-slate-400 shrink-0"/>
                                    <input value={monitorFilters.q}
                                        onChange={e => { setMonitorFilters({ ...monitorFilters, q: e.target.value }); if (e.target.value && activeTab !== 'live_monitor' && currentUser.role === 'admin') setActiveTab('live_monitor'); }}
                                        placeholder="Search machines, tickets..." className="bg-transparent outline-none text-sm w-full text-slate-700 placeholder:text-slate-400"/>
                                </div>
                                <div className="hidden md:flex items-center gap-1.5 text-xs font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1.5 rounded-full border border-emerald-200">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-sm text-white">{initials}</div>
                            </div>
                        </header>

                        {/* CONTENT */}
                        <main className="flex-1 overflow-y-auto p-4 md:p-8 w-full">
                        {activeTab === 'command_center' && <CommandCenter machines={machines} users={users} logs={logs} parts={parts} partRequests={partRequests} serviceRecords={serviceRecords} machineBookings={machineBookings} currentUser={currentUser} onNavigate={setActiveTab} />}
                        {activeTab === 'live_monitor' && <LiveMonitor machines={machines} users={users} onAssign={api.assignTech} currentUser={currentUser} serviceRecords={serviceRecords} filters={monitorFilters} setFilters={setMonitorFilters} />}
                        
                        {/* Only Admin Features */}
                        {currentUser.role === 'admin' && activeTab === 'inventory' && <InventoryManager parts={parts} partRequests={partRequests} machines={machines} onAddPart={(p) => push(ref(db, 'parts'), p)} onDeletePart={(id) => remove(ref(db, `parts/${id}`))} onUpdateStock={api.updateStock} onResolveRequest={api.resolveRequest} />}

                        
                        {/* Access & User Management */}
                        {currentUser.role === 'admin' && activeTab === 'access_logs' && <AccessManager 
                            accessLogs={access_logs}
                            users={users} 
                            onAddUser={(data) => push(ref(db, 'users'), { ...data, status: 'Offline', createdAt: new Date().toISOString() })} 
                            onUpdateUser={(id, data) => update(ref(db, `users/${id}`), data)}
                            onDeleteUser={(id) => remove(ref(db, `users/${id}`))}
                        />}

                        {/* Database God Mode */}
                        {currentUser.role === 'admin' && activeTab === 'db_admin' && <DatabaseAdminView machines={machines} logs={logs} />}
                        
                        {/* Shared Features */}
                        {activeTab === 'analytics' && <AnalyticsDashboard logs={logs} machines={machines} parts={parts} floors={floors} lines={lines} users={users} buildings={buildings} />}
                        
                        {/* Technician Features */}
                        {currentUser.role === 'technician' && activeTab === 'my_tasks' && <TechnicianTaskBoard currentUser={users.find(u => u.id === currentUser.id) || currentUser} machines={machines} parts={parts} logs={logs} onScanStart={(id) => api.startWork(id, currentUser.id)} onComplete={(mid, uid, rem, mach, partsIds) => api.completeWork(mid, currentUser.id, rem, mach, partsIds, parts)} onSelfAssign={(id) => api.selfAssign(id, currentUser.id)} onRequestPart={api.requestPart} />}
                        </main>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
