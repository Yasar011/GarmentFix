<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brandix QMS — Worker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyA-aIRjMPFkK0hQKWY8-rpcA_5TfMhbRM4",
    authDomain: "qc--brandex.firebaseapp.com",
    databaseURL: "https://qc--brandex-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qc--brandex",
    storageBucket: "qc--brandex.firebasestorage.app",
    messagingSenderId: "109990871136",
    appId: "1:109990871136:web:c0dfa5f0ba78bed77c8305"
  });
  const db = getDatabase(app);
  signInAnonymously(getAuth(app)).catch(()=>{});
  window._db = db; window._ref = ref; window._set = set; window._get = get;
  window._push = push; window._onValue = onValue; window._update = update;

  window.dbLogin = async function(username, password) {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) throw new Error('No users in system');
    for (const [key, u] of Object.entries(snap.val())) {
      if ((u.username === username || u.email === username) && u.password === password)
        return { fbKey: key, ...u };
    }
    throw new Error('Invalid username or password');
  };

  window.loadWorkerData = function() {
    onValue(ref(db,'modules'), s => { WS.modules = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];});
    onValue(ref(db,'styles'),  s => { WS.styles  = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];});
    onValue(ref(db,'operations'), s => { WS.operations = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];});
    onValue(ref(db,'defects'), s => { WS.defects = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];});
    onValue(ref(db,'machines'), s => { WS.machines = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];});
    onValue(ref(db,'machineRosters'), s => {
      WS.machineRosters = s.exists()?Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})):[];
    });
    onValue(ref(db,'inspections'), s => {
      if(s.exists()){
        const today=new Date().toISOString().split('T')[0];
        WS.myInspections=Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v}))
          .filter(i=>i.submittedBy===WS.user?.username&&(i.date===today||(i.createdAt||'').startsWith(today)));
      } else WS.myInspections=[];
      if(WS.step==='dashboard') renderW();
    });
    if(WS.user?.fbKey){
      onValue(ref(db,`users/${WS.user.fbKey}`), s => {
        if(s.exists()){
          WS.user={fbKey:WS.user.fbKey,...s.val()};
          if(!s.val().activeModule&&WS.step==='waiting'){WS.step='scan';renderW();toast('Approved!');}
        }
      });
    }
  };

  window.fbAdd = async (path,data)=>{ const r=push(ref(db,path)); await set(r,{...data,createdAt:new Date().toISOString()}); return r.key; };
  window.fbUpd = async (path,key,data)=>{ await update(ref(db,`${path}/${key}`),{...data,updatedAt:new Date().toISOString()}); };
  window.fbAddAlert = async (data)=>{ const r=push(ref(db,'alerts')); await set(r,{...data,createdAt:new Date().toISOString()}); };

  setTimeout(()=>{ if(WS.step==='loading'){WS.step='login';renderW();} }, 2000);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--bg4:#22262f;
  --border:#2a2e38;--text:#e8eaf0;--text2:#9097a8;--text3:#5c6478;
  --accent:#00d4a8;--accent2:#0099d4;--red:#e05555;--yellow:#d4a800;
  --green:#00d4a8;--blue:#4488ff;--purple:#9966ff;--radius:12px;
  --font:'IBM Plex Sans',sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);font-size:16px}
.page{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo-sm{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:12px}
.body{flex:1;padding:16px;overflow-y:auto;max-width:540px;margin:0 auto;width:100%}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:var(--radius);font-size:16px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.15)}
.form-input::placeholder{color:var(--text3)}
.form-input[readonly]{background:var(--bg2);border-color:transparent;color:var(--text2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-big{width:100%;padding:16px;border-radius:var(--radius);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-yellow{background:rgba(212,168,0,.12);color:var(--yellow);border:1px solid rgba(212,168,0,.3)}
.btn-red{background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-accent{background:rgba(0,212,168,.05);border-color:rgba(0,212,168,.25)}
.card-blue{background:rgba(68,136,255,.05);border-color:rgba(68,136,255,.25)}
.card-yellow{background:rgba(212,168,0,.05);border-color:rgba(212,168,0,.25)}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:rgba(0,212,168,.15);color:var(--green)}
.badge-red{background:rgba(224,85,85,.15);color:var(--red)}
.badge-yellow{background:rgba(212,168,0,.15);color:var(--yellow)}
.badge-blue{background:rgba(68,136,255,.15);color:var(--blue)}
.badge-purple{background:rgba(153,102,255,.15);color:var(--purple)}
.scan-area{background:var(--bg3);border:2px dashed var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#qr-reader,#qr-m,#qr-check{width:100%;max-width:400px;border-radius:12px;overflow:hidden}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase}
.sub-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.module-btn{padding:16px;background:var(--bg3);border:2px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s}
.module-btn:active{border-color:var(--accent)}
.machine-row{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg3);border:2px solid var(--border);border-radius:12px;margin-bottom:8px;transition:border-color .2s}
.machine-row.done{border-color:var(--green)}
.machine-row.active{border-color:var(--yellow);background:rgba(212,168,0,.05)}
.check-pill{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.check-btn{padding:10px 20px;border-radius:30px;font-size:14px;font-weight:600;border:2px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer}
.check-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,168,.08)}
.check-btn.done{border-color:var(--text3);color:var(--text3);background:transparent}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:12px;font-size:14px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:90vw;text-align:center}
.toast-success{background:rgba(0,212,168,.95);color:#000}
.toast-error{background:rgba(224,85,85,.95);color:#fff}
.err-msg{color:var(--red);font-size:13px;margin-bottom:12px;padding:12px;background:rgba(224,85,85,.08);border-radius:8px;border:1px solid rgba(224,85,85,.2);display:none}
.dhu-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;text-align:center;display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.progress-bar{height:4px;background:var(--border);border-radius:4px;margin-bottom:16px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
.spinner{width:20px;height:20px;border:2px solid rgba(0,212,168,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.btn-sm{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:13px;cursor:pointer}
@media(max-width:400px){.stats-row{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============ STATE ============
window.WS = {
  step:'loading', user:null, loading:false,
  scannedModule:null, modules:[], styles:[], operations:[], defects:[],
  machines:[], machineRosters:[], myInspections:[],
  // Worker-specific
  myMachine:null,
  // Check round state
  checkRound:1, checkMachineIdx:0, checkRoundData:[], checkRoundResults:[],
  // Event modal
  showEventModal:false,
  // Dashboard
  todayRoundCount:0
};
let qrActive = null; // tracks running scanner id

function toast(m,t='success'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const d=document.createElement('div');d.className=`toast toast-${t}`;d.textContent=m;
  document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
}

// Role helpers
function isWorker(){ return WS.user?.role?.toLowerCase().includes('worker')||WS.user?.role?.toLowerCase().includes('operator'); }
function isEndline(){ return WS.user?.role?.toLowerCase().includes('end'); }
function isQC(){ return !isWorker(); } // QC = Inline QC or Endline QC

// ============ RENDER ============
window.renderW = function(){
  stopQR();
  const app=document.getElementById('app');
  const s=WS;
  if(s.step==='loading'){
    app.innerHTML=`<div class="login-page"><div style="text-align:center"><div class="spinner" style="width:36px;height:36px;margin:0 auto 16px"></div><div style="color:var(--text2)">Connecting...</div></div></div>`;
    return;
  }
  if(s.step==='login'||!s.user){app.innerHTML=renderLogin();bindLogin();return;}
  app.innerHTML=`<div class="page">${renderHeader()}<div class="body fade-in">${renderStep()}</div></div>`;
  bindStep();
  startQRIfNeeded();
};

function renderStep(){
  const s=WS.step;
  if(s==='scan')           return renderScan();
  if(s==='verify')         return renderVerify();
  if(s==='worker_machine') return renderWorkerMachine();
  if(s==='worker_done')    return renderWorkerDone();
  if(s==='check_home')     return renderCheckHome();
  if(s==='check_scan')     return renderCheckScan();
  if(s==='check_form')     return renderCheckForm();
  if(s==='check_end')      return renderCheckEnd();
  if(s==='endline_home')   return renderEndlineHome();
  if(s==='endline_form')   return renderEndlineForm();
  if(s==='roster_manual')  return renderRosterManual();
  if(s==='dashboard')      return renderDash();
  if(s==='waiting')        return renderWaiting();
  return renderScan();
}

function renderHeader(){
  const role = WS.user?.role||'';
  const roleColor = isWorker()?'var(--blue)':isEndline()?'var(--purple)':'var(--accent)';
  const roleLabel = isWorker()?'Machine Operator':isEndline()?'End Line QC':'Inline QC';
  return`<div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-sm">BX</div>
      <div>
        <div style="font-size:14px;font-weight:600">${WS.user?.name||'Worker'}</div>
        <div style="font-size:10px;color:${roleColor}">${roleLabel}${WS.scannedModule?' • '+WS.scannedModule.name:''}</div>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      ${WS.step!=='dashboard'&&WS.step!=='scan'?`<button class="btn-sm" onclick="WS.step='dashboard';renderW()">📊</button>`:''}
      <button class="btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </div>`;
}

function doLogout(){
  WS.user=null;WS.step='login';WS.scannedModule=null;
  WS.myMachine=null;WS.checkRound=1;WS.checkRoundData=[];
  renderW();
}

// ============ QR SCANNER MANAGEMENT ============
function stopQR(){
  if(qrActive){
    try{qrActive.stop().catch(()=>{});}catch(e){}
    qrActive=null;
  }
}
function startQRIfNeeded(){
  const s=WS.step;
  if(s==='scan')initQRIn('qr-reader',handleModuleQR);
  else if(s==='worker_machine')initQRIn('qr-m',handleWorkerMachineQR);
  else if(s==='check_scan')initQRIn('qr-check',handleCheckMachineQR);
}
function initQRIn(elId, cb){
  const el=document.getElementById(elId);if(!el)return;
  try{
    const sc=new Html5Qrcode(elId);
    sc.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},(text)=>{
      sc.stop().then(()=>cb(text)).catch(()=>cb(text));
    },()=>{}).catch(()=>{
      el.innerHTML='<div style="padding:20px;color:var(--text3);text-align:center">📷 Camera unavailable. Use manual option below.</div>';
    });
    qrActive=sc;
  }catch(e){}
}

// ============ LOGIN ============
function renderLogin(){
  return`<div class="login-page"><div class="login-card fade-in">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
      <div class="logo-sm" style="width:44px;height:44px;font-size:16px;border-radius:12px">BX</div>
      <div><div style="font-size:18px;font-weight:700">Brandix QMS</div><div style="font-size:12px;color:var(--text2)">Worker / QC Portal</div></div>
    </div>
    <div class="err-msg" id="w-err"></div>
    <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="w-user" placeholder="Your username" autocomplete="username"></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="w-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-big btn-primary" id="w-login-btn">${WS.loading?'<span class="spinner"></span> Signing in...':'Sign In'}</button>
    <div style="margin-top:12px;text-align:center;font-size:11px;color:var(--text3)">Login with credentials given by your admin</div>
  </div></div>`;
}
function bindLogin(){
  const btn=document.getElementById('w-login-btn');if(!btn)return;
  const go=async()=>{
    const u=document.getElementById('w-user')?.value.trim();
    const p=document.getElementById('w-pass')?.value;
    const err=document.getElementById('w-err');
    if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
    err.style.display='none';WS.loading=true;renderW();
    try{
      const user=await window.dbLogin(u,p);
      WS.user=user;WS.loading=false;
      window.loadWorkerData();
      toast('Welcome, '+user.name);
      // Route based on role
      if(isWorker()){WS.step='scan';}
      else {WS.step='dashboard';}
      renderW();
    }catch(e){
      WS.loading=false;renderW();
      const el=document.getElementById('w-err');
      if(el){el.style.display='block';el.textContent=e.message||'Login failed';}
    }
  };
  btn.onclick=go;
  ['w-user','w-pass'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>e.key==='Enter'&&go()));
}

// ============ MODULE SCAN (shared) ============
function renderScan(){
  const mods=WS.modules;
  const title=isWorker()?'Scan Your Line QR':'Scan Module QR';
  const sub=isWorker()?'Then you will register your machine':'Point camera at module QR code';
  return`<div style="text-align:center;margin-bottom:16px">
    <div style="font-size:20px;font-weight:600">${title}</div>
    <div style="font-size:13px;color:var(--text2)">${sub}</div>
  </div>
  <div class="scan-area"><div id="qr-reader"></div></div>
  <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:12px">— OR select module below —</div>
  <div class="module-grid">
    ${mods.map(m=>`<div class="module-btn" onclick="pickModule('${m.fbKey}')">
      <div style="font-size:14px;font-weight:600">${m.name||m.moduleId}</div>
      <div style="font-size:11px;color:var(--text3)">${m.styleName||'No style'}</div>
    </div>`).join('')}
  </div>
  ${mods.length===0?'<div style="text-align:center;color:var(--text3);padding:20px">No modules. Ask admin to add them.</div>':''}
  <div style="margin-top:16px"><button class="btn-big btn-ghost" onclick="WS.step='dashboard';renderW()">📊 My Dashboard</button></div>`;
}

function handleModuleQR(text){
  let data;try{data=JSON.parse(text);}catch(e){data={name:text};}
  const mod=WS.modules.find(m=>m.moduleId===data.moduleId||m.name===data.name||m.fbKey===data.fbKey||m.name===text);
  WS.scannedModule=mod||{name:data.name||text,moduleId:data.moduleId||text,styleName:data.styleName||'',buyer:data.buyer||''};
  toast('Module: '+WS.scannedModule.name);
  if(isWorker()) { WS.step='verify'; renderW(); }
  else { WS.step='verify'; renderW(); }
}

window.pickModule=function(k){
  const mod=WS.modules.find(m=>m.fbKey===k);
  if(mod){WS.scannedModule=mod;WS.step='verify';renderW();}
};

// ============ VERIFY STYLE ============
function renderVerify(){
  const m=WS.scannedModule;
  return`<div class="card card-accent" style="text-align:center;padding:24px;margin-bottom:16px">
    <div style="font-size:32px;margin-bottom:8px">🏭</div>
    <div style="font-size:22px;font-weight:700;color:var(--accent)">${m?.name||''}</div>
    <div style="font-size:13px;color:var(--text2)">${m?.buyer?'Buyer: '+m.buyer+' • ':''}${m?.styleName?'Style: '+m.styleName:''}</div>
  </div>
  <div class="err-msg" id="v-err"></div>
  <div class="form-group"><label class="form-label">Style Number / Name</label><input class="form-input" id="v-style" placeholder="e.g. STY-1000 or Polo Shirt" autocomplete="off"></div>
  <button class="btn-big btn-primary" id="v-btn">✓ Verify & Continue</button>
  <button class="btn-big btn-ghost" onclick="WS.step='scan';renderW()">← Back</button>`;
}
function bindVerify(){
  const btn=document.getElementById('v-btn');if(!btn)return;
  btn.onclick=async()=>{
    const inp=document.getElementById('v-style')?.value.trim().toLowerCase();
    const err=document.getElementById('v-err');
    if(!inp){err.style.display='block';err.textContent='Enter style number';return;}
    const m=WS.scannedModule;
    const ok=!m?.styleName
      ||(m.styleName||'').toLowerCase().includes(inp)
      ||(m.styleId||'').toLowerCase().includes(inp)
      ||WS.styles.some(s=>(s.styleId||'').toLowerCase().includes(inp)||(s.name||'').toLowerCase().includes(inp));
    if(ok){
      await window._update(window._ref(window._db,'users/'+WS.user.fbKey),{activeModule:JSON.stringify(m),changeRequest:false});
      toast('Verified ✓');
      if(isWorker()) { WS.step='worker_machine'; renderW(); }
      else if(isEndline()) { WS.step='endline_home'; renderW(); }
      else { WS.step='check_home'; renderW(); }
    } else {
      err.style.display='block';err.textContent=`Style mismatch. Expected: ${m?.styleName||m?.styleId||'unknown'}`;
    }
  };
  document.getElementById('v-style')?.addEventListener('keydown',e=>e.key==='Enter'&&btn.click());
}

// ============================================================

function getModuleMachines(){
  const m=WS.scannedModule;
  if(!m)return[];
  const date=new Date().toISOString().split('T')[0];
  const rKey=`${m.fbKey||m.moduleId}_${date}`;
  const roster=WS.machineRosters.find(r=>r.fbKey===rKey);
  if(roster?.workers && Object.keys(roster.workers).length>0){
    return Object.values(roster.workers);
  }
  // Fallback: machines assigned to this module via sync
  // Match by: moduleId (FM module key) OR lineName/moduleName OR fbKey
  const matched=WS.machines.filter(mc=>
    mc.moduleId===m.fbKey ||          // FM module key matches QMS module fbKey
    mc.moduleId===m.moduleId ||       // direct match
    (mc.moduleName && mc.moduleName===m.name) ||  // name match from sync
    (mc.lineName   && mc.lineName===m.name)        // lineName alias
  );
  if(matched.length>0){
    return matched.map(mc=>({
      machineId:mc.fbKey, machineName:mc.name, operatorId:'', operation:'', type:mc.type||''
    }));
  }
  return [];
}

      <input type="hidden" name="module" value="${m?.name||''}">
      <input type="hidden" name="style" value="${m?.styleName||''}">
      <input type="hidden" name="checkRound" value="${WS.checkRound}">
      <div class="form-group"><label class="form-label">Operator *</label>
        <select class="form-input" name="operatorId" id="f-opId" onchange="elOpChanged()">
          <option value="">— Select Operator —</option>
          ${machines.map((w,i)=>{
            const isDone=done.some(d=>d.operatorId===w.operatorId);
            return`<option value="${w.operatorId}" data-op="${w.operation}" data-mid="${w.machineId||''}" data-mname="${w.machineName||''}" ${isDone?'disabled':''} ${i===idx&&!isDone?'selected':''}>
              ${isDone?'✓ ':''}${w.operatorId} — ${w.operation} (${w.machineName||''})
            </option>`;
          }).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Operation</label><input class="form-input" name="operation" id="f-opName" readonly placeholder="Auto-fills"></div>
        <div class="form-group"><label class="form-label">Machine</label><input class="form-input" name="machineId" id="f-machId" readonly placeholder="Auto-fills"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Checked Qty *</label><input class="form-input" name="checkedQty" type="number" min="1" placeholder="0" required oninput="calcDHU()"></div>
        <div class="form-group"><label class="form-label">Defect Qty</label><input class="form-input" name="defectQty" type="number" min="0" value="0" oninput="calcDHU()"></div>
      </div>
      <div class="dhu-box" id="dhu-box"><div style="font-size:12px;color:var(--text2)">DHU</div><div id="dhu-val" style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace"></div></div>
      <div class="form-group"><label class="form-label">Defect Type</label>
        <select class="form-input" name="defectType">
          <option value="">— No Defect —</option>
          ${myDefs.map(d=>`<option value="${d.name}">${d.defectId?d.defectId+' - ':''}${d.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Comments</label><textarea class="form-input" name="comments" rows="2" placeholder="Notes..."></textarea></div>
      <button class="btn-big btn-primary" type="button" id="sub-btn">
        ${idx+1<total?'✓ Save & Next Operator':'✓ Save & End Check '+WS.checkRound}
      </button>
    </form>
  </div>
  <button class="btn-big btn-ghost" onclick="WS.step='endline_home';renderW()">← Back</button>`;
}

window.elOpChanged=function(){
  const s=document.getElementById('f-opId');
  const o=s?.options[s?.selectedIndex];
  if(!o)return;
  const op=document.getElementById('f-opName');
  const mid=document.getElementById('f-machId');
  if(op)op.value=o.getAttribute('data-op')||'';
  if(mid)mid.value=o.getAttribute('data-mname')||o.getAttribute('data-mid')||'';
};

// ============ MACHINE EVENT MODAL ============
function renderEventModal(){
  const machines=WS.checkRoundData||[];
  return`<div class="modal-overlay" onclick="if(event.target===this){WS.showEventModal=false;renderW();}">
    <div class="modal-sheet">
      <div style="font-size:18px;font-weight:600;margin-bottom:4px">⚡ Log Machine Event</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Record mid-check events</div>
      <div class="form-group"><label class="form-label">Event Type</label>
        <select class="form-input" id="ev-type">
          <option value="OperatorChange">👤 Operator Change</option>
          <option value="Breakdown">💥 Machine Breakdown</option>
          <option value="Swap">🔄 Machine Swap</option>
          <option value="ModelChange">🏷 Model / Style Change</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Machine</label>
        <select class="form-input" id="ev-mach">
          ${machines.map(w=>`<option value="${w.machineId}">${w.machineName||w.machineId}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Reason</label>
        <select class="form-input" id="ev-reason">
          <option>Absent</option><option>Break Relief</option><option>Transferred</option>
          <option>Training</option><option>Machine Fault</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="ev-notes" rows="2" placeholder="Additional details..."></textarea></div>
      <div style="display:flex;gap:10px">
        <button class="btn-big btn-ghost" style="margin:0;flex:1" onclick="WS.showEventModal=false;renderW()">Cancel</button>
        <button class="btn-big btn-primary" style="margin:0;flex:2" onclick="submitMachineEvent()">Log Event</button>
      </div>
    </div>
  </div>`;
}

window.submitMachineEvent=async function(){
  const type=document.getElementById('ev-type')?.value;
  const machId=document.getElementById('ev-mach')?.value;
  const reason=document.getElementById('ev-reason')?.value;
  const notes=document.getElementById('ev-notes')?.value;
  const w=WS.checkRoundData?.find(x=>x.machineId===machId);
  try{
    await window.fbAdd('machineEvents',{
      machineId:machId,machineName:w?.machineName||machId,
      type,reason,details:notes||reason,loggedBy:WS.user?.username,
      moduleId:WS.scannedModule?.fbKey,moduleName:WS.scannedModule?.name
    });
    WS.showEventModal=false;renderW();toast('Event logged: '+type);
  }catch(e){toast('Error: '+e.message,'error');}
};

// ============ CHECK END SCREEN ============
function renderCheckEnd(){
  const results=WS.checkRoundResults||[];
  const tc=results.reduce((a,r)=>a+(parseInt(r.checkedQty)||0),0);
  const td=results.reduce((a,r)=>a+(parseInt(r.defectQty)||0),0);
  const dhu=tc?((td/tc)*100).toFixed(1):'0.0';
  return`<div class="card card-accent" style="text-align:center;padding:24px;margin-bottom:16px">
    <div style="font-size:40px;margin-bottom:8px">✅</div>
    <div style="font-size:20px;font-weight:700;color:var(--accent)">Check ${WS.checkRound} Complete!</div>
    <div style="font-size:13px;color:var(--text2)">${results.length} machines inspected</div>
  </div>
  <div class="stats-row" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${tc}</div><div class="stat-label">Checked</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${td}</div><div class="stat-label">Defects</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'}">${dhu}%</div><div class="stat-label">DHU</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
    ${results.map(r=>`<div class="sub-item">
      <div>
        <div style="font-size:13px;font-weight:600">${r.machineName||r.machineId||''}</div>
        <div style="font-size:11px;color:var(--text2)">${r.operatorId||''} • ${r.operation||''}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'IBM Plex Mono',monospace;color:${(parseInt(r.defectQty)||0)>0?'var(--red)':'var(--green)'};font-weight:600">${r.defectQty||0} def</div>
        <div style="font-size:11px;color:var(--text3)">${r.checkedQty||0} chkd</div>
      </div>
    </div>`).join('')}
  </div>
  <button class="btn-big btn-primary" onclick="WS.checkRound++;WS.step=isEndline()?'endline_home':'check_home';renderW()">▶ Start Next Check</button>
  <button class="btn-big btn-ghost" onclick="WS.step=isEndline()?'endline_home':'check_home';renderW()">← Back to Module</button>
  <button class="btn-big btn-ghost" onclick="WS.step='dashboard';renderW()">📊 Dashboard</button>`;
}

// ============ DHU CALC ============
window.calcDHU=function(){
  const f=document.getElementById('wf');if(!f)return;
  const c=parseInt(f.checkedQty?.value)||0,d=parseInt(f.defectQty?.value)||0;
  const box=document.getElementById('dhu-box'),val=document.getElementById('dhu-val');
  if(!box||!val)return;
  if(c>0){
    const dhu=((d/c)*100).toFixed(1);
    box.style.display='block';val.textContent=dhu+'%';
    val.style.color=dhu>5?'var(--red)':dhu>3?'var(--yellow)':'var(--green)';
  } else box.style.display='none';
};

// ============ BIND SUBMIT (shared for check_form + endline_form) ============
function bindSubmit(){
  const btn=document.getElementById('sub-btn');if(!btn)return;
  btn.onclick=async()=>{
    const f=document.getElementById('wf');if(!f)return;
    const fd=new FormData(f);const data=Object.fromEntries(fd.entries());
    // For endline: fill from dropdown
    if(WS.step==='endline_form'){
      const sel=document.getElementById('f-opId');
      const o=sel?.options[sel?.selectedIndex];
      if(!data.operatorId&&o){data.operatorId=o.value;data.operation=o.getAttribute('data-op')||'';}
    }
    if(!data.checkedQty||parseInt(data.checkedQty)<1){toast('Enter Checked Qty','error');return;}
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving...';
    try{
      const inspType=isEndline()?'endline':'inline';
      const id='INS-'+Date.now();
      await window.fbAdd('inspections',{
        id,type:inspType,
        date:new Date().toISOString().split('T')[0],
        time:new Date().toTimeString().slice(0,5),
        ...data,
        submittedBy:WS.user?.username||WS.user?.name,
        inspector:WS.user?.name
      });
      // Auto-alert
      const c=parseInt(data.checkedQty)||0,d=parseInt(data.defectQty)||0;
      if(c>0&&(d/c)*100>5){
        await window.fbAddAlert({
          title:`High DHU ${((d/c)*100).toFixed(1)}% — ${data.module} Check${data.checkRound}`,
          message:`${data.defectType||'Defects'} on ${data.operation} by ${data.operatorId} (${data.machineName||data.machineId||''})`,
          level:(d/c)*100>8?'critical':'high',module:data.module,read:false,createdBy:'qc-auto'
        });
      }
      // Store result for summary
      WS.checkRoundResults.push({...data,id});
      toast('Saved ✓');
      // Move to next machine
      const total=WS.checkRoundData.length;
      const nextIdx=WS.checkRoundData.findIndex((w,i)=>i>WS.checkMachineIdx&&!WS.checkRoundResults.some(r=>r.machineId===w.machineId||r.operatorId===w.operatorId));
      if(nextIdx>=0){
        WS.checkMachineIdx=nextIdx;
        WS._currentCheckMachine=WS.checkRoundData[nextIdx];
        btn.disabled=false;
        if(WS.step==='endline_form'){renderW();}
        else{WS.step='check_scan';renderW();}
      } else {
        // All done — go to summary
        WS.step='check_end';renderW();
      }
    }catch(e){toast('Failed: '+e.message,'error');btn.disabled=false;btn.innerHTML='✓ Save';}
  };
}

// ============ DASHBOARD ============
function renderDash(){
  const ins=WS.myInspections;
  const today=new Date().toISOString().split('T')[0];
  const tc=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const td=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=tc?((td/tc)*100).toFixed(1):'0.0';
  const rounds=[...new Set(ins.map(i=>i.checkRound).filter(Boolean))];
  const roleAction=isWorker()?`<button class="btn-big btn-primary" onclick="WS.step='scan';renderW()">🔧 Register My Machine</button>`:
    isEndline()?`<button class="btn-big btn-primary" onclick="goStartCheck()">📋 Start Check Round</button>`:
    `<button class="btn-big btn-primary" onclick="goStartCheck()">📷 Start Check Round</button>`;
  return`<div style="margin-bottom:16px">
    <div style="font-size:18px;font-weight:600">Today's Summary</div>
    <div style="font-size:12px;color:var(--text3)">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short',year:'numeric'})}</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${ins.length}</div><div class="stat-label">Records</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${td}</div><div class="stat-label">Defects</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'}">${dhu}%</div><div class="stat-label">DHU</div></div>
  </div>
  ${rounds.length>0?`<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:8px">Completed Checks Today</div><div class="check-pill">${rounds.map(n=>`<div class="check-btn done">Check ${n} ✓</div>`).join('')}</div></div>`:''}
  ${roleAction}
  <div style="font-size:13px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;font-weight:500">Recent</div>
  ${ins.length===0?'<div style="text-align:center;padding:32px;color:var(--text3)">No records today</div>':
  ins.slice().reverse().slice(0,8).map(i=>`<div class="sub-item">
    <div>
      <div style="font-size:13px;font-weight:500">${i.operatorId||''} ${i.machineName?'• '+i.machineName:''}</div>
      <div style="font-size:11px;color:var(--text3)">${i.module||''} • Check${i.checkRound||''} • ${i.time||''}</div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;color:${(parseInt(i.defectQty)||0)>0?'var(--red)':'var(--green)'};font-weight:600">${i.defectQty||0}</div>
  </div>`).join('')}`;
}

window.goStartCheck=function(){
  if(WS.scannedModule){
    if(isEndline()) WS.step='endline_home';
    else WS.step='check_home';
    renderW();
  } else {
    WS.step='scan';renderW();
  }
};

// ============ ENDLINE HOME (also add setup button) ============
function renderEndlineHome(){
  const machines=getModuleMachines();
  const m=WS.scannedModule;
  const today=new Date().toISOString().split('T')[0];
  const myRounds=WS.myInspections.filter(i=>i.checkRound&&i.date===today&&i.type==='endline');
  const completedRounds=[...new Set(myRounds.map(i=>i.checkRound))];
  const nextRound=completedRounds.length+1;
  WS.checkRound=nextRound;
  const noMachines=machines.length===0;

  return`<div class="card card-accent">
    <div style="font-size:18px;font-weight:600">${m?.name||''} — End Line QC</div>
    <div style="font-size:12px;color:var(--text2)">${m?.styleName||''} ${m?.buyer?'• '+m.buyer:''}</div>
  </div>
  <div style="margin-bottom:16px">
    <div style="font-size:13px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Today's Checks</div>
    <div class="check-pill">
      ${[1,2,3,4,5].map(n=>`<div class="check-btn ${completedRounds.includes(n)?'done':n===nextRound?'active':''}" onclick="${n===nextRound?`startEndlineRound(${n})`:''}">Check ${n}${completedRounds.includes(n)?' ✓':''}</div>`).join('')}
    </div>
  </div>
  ${!noMachines?`<div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600">Workers on Line (${machines.length})</div>
      <button class="btn-sm" onclick="openManualRoster()">✏️ Edit</button>
    </div>
    ${machines.map(w=>`<div class="sub-item">
      <div><div style="font-weight:600">${w.operatorId||'No ID'}</div><div style="font-size:11px;color:var(--text2)">${w.operation||'—'} • ${w.machineName||''}</div></div>
    </div>`).join('')}
  </div>`:
  `<div class="card card-yellow" style="margin-bottom:16px">
    <div style="font-weight:600;margin-bottom:6px">⚠ No Workers Registered Yet</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Add operators and their machines manually to begin checking.</div>
    <button class="btn-big btn-primary" style="margin:0" onclick="openManualRoster()">➕ Set Up Workers Manually</button>
  </div>`}
  <button class="btn-big btn-primary" onclick="startEndlineRound(${nextRound})" ${noMachines?'disabled style="opacity:.4"':''}>▶ Start Check ${nextRound}</button>
  <button class="btn-big btn-ghost" onclick="openManualRoster()">⚙️ ${noMachines?'Set Up':'Edit'} Roster</button>
  <button class="btn-big btn-ghost" onclick="WS.step='dashboard';renderW()">📊 Dashboard</button>`;
}
function renderWaiting(){
  return`<div class="card card-yellow" style="text-align:center;padding:32px">
    <div class="spinner" style="border-top-color:var(--yellow);margin:0 auto 16px"></div>
    <div style="font-size:18px;font-weight:700;color:var(--yellow)">Waiting for Approval</div>
    <div style="font-size:13px;color:var(--text2)">A supervisor needs to approve your request.</div>
  </div>
  <button class="btn-big btn-ghost" onclick="WS.step='dashboard';renderW()">📊 My Dashboard</button>`;
}

// ============ BIND ALL ============
function bindStep(){
  const s=WS.step;
  if(s==='verify')bindVerify();
  if(s==='worker_machine')bindWorkerMachine();
  if(s==='check_form'||s==='endline_form')bindSubmit();
  if(s==='endline_form'){setTimeout(()=>elOpChanged(),100);}
  if(s==='roster_manual')bindManualRoster();
}

function bindManualRoster(){
  const btn=document.getElementById('manual-save-btn');if(!btn)return;
  btn.onclick=async()=>{
    const rows=WS._manualRows||[];
    // Validate
    const valid=rows.filter(r=>r.machineName||r.operatorId);
    if(valid.length===0){toast('Add at least one machine or operator','error');return;}
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving...';
    const m=WS.scannedModule;
    const date=new Date().toISOString().split('T')[0];
    const rKey=`${m.fbKey||m.moduleId}_${date}`;
    try{
      // Build workers object keyed by machineId or index
      const workers={};
      valid.forEach((row,i)=>{
        const key=row.machineId||(row.machineName.replace(/\s+/g,'-').toLowerCase()||`machine-${i+1}`);
        workers[key]={
          machineId:key,
          machineName:row.machineName||key,
          operatorId:row.operatorId||'',
          operation:row.operation||'',
          moduleId:m.fbKey,
          moduleName:m.name,
          date,
          registeredBy:WS.user?.username,
          registeredAt:new Date().toISOString()
        };
      });
      await window._set(window._ref(window._db,`machineRosters/${rKey}/workers`),workers);
      await window._update(window._ref(window._db,`machineRosters/${rKey}`),{
        moduleId:m.fbKey,moduleName:m.name,date,
        updatedBy:WS.user?.username,updatedAt:new Date().toISOString()
      });
      toast('Roster saved — '+valid.length+' machine(s) ✓');
      WS.step=WS._manualBackStep||'check_home';
      renderW();
    }catch(e){toast('Error: '+e.message,'error');btn.disabled=false;btn.innerHTML='💾 Save Roster';}
  };
}

window.renderW();
</script>
