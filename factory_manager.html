                                            <button onClick={() => setShowAuthModal(true)} className="bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-indigo-500 text-white"><Lock className="w-4 h-4" /> Unlock Edit Mode</button>
                                        ) : (
                                            <button onClick={() => setAdminMode(false)} className="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-amber-400"><Unlock className="w-4 h-4" /> Lock Console</button>
                                        ))}
                                        <button onClick={() => { setIsAuthenticated(false); setCurrentFactoryUser(null); setAdminMode(false); }} className="bg-slate-800 border border-slate-700 text-slate-300 px-3 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-slate-700"><LogOut className="w-4 h-4"/></button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-4 xl:grid-cols-8 gap-3">
                                    <StatCard label="Plants" value={buildings.length} icon={Building} color="indigo" />
                                    <StatCard label="Sections" value={sections.length} icon={Layers} color="blue" />
                                    <StatCard label="Modules" value={modules.length} icon={Zap} color="purple" />
                                    <StatCard label="Floor Machines" value={floorMachines.length} icon={Factory} color="slate" />
                                    <StatCard label="Yard Spares" value={yardMachines.length} icon={Warehouse} color="indigo" />
                                    <StatCard label="Breakdowns" value={brokenCount} icon={AlertTriangle} color="red" subtext={brokenCount > 0 ? "Click to view" : null} onClick={() => setShowBreakdownsPanel(true)} />
                                    <StatCard label="Pending Transfers" value={pendingTransfers.length} icon={ArrowRightLeft} color="orange" />
                                    <StatCard label="Machine Bookings" value={bookingsSorted.filter(b => b.status === 'Pending').length} icon={BookMarked} color="teal" subtext="Click to view/add" onClick={() => setShowBookingsPanel(true)} />
                                </div>

                                {/* GLOBAL FILTER BAR — filters the Facility Overview tree and the Yard together */}
                                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-3 flex flex-wrap items-center gap-2">
                                    <div className="relative flex-1 min-w-[220px]">
                                        <Search className="absolute left-3 top-2.5 w-4 h-4 text-slate-400"/>
                                        <input className="w-full pl-9 pr-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none"
                                            placeholder="Filter machines — model, serial, barcode, name..."
                                            value={filterText} onChange={e => setFilterText(e.target.value)} />
                                    </div>
                                    <select className="border border-slate-200 bg-slate-50 rounded-lg text-sm px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" value={filterSection} onChange={e => setFilterSection(e.target.value)}>
                                        <option value="">All Sections</option>
                                        <option value="yard">Yard Only</option>
                                        {sections.map(s => <option key={s.id} value={s.id}>{buildings.find(b => b.id === s.buildingId)?.name || '?'} · {s.name}</option>)}
                                    </select>
                                    <select className="border border-slate-200 bg-slate-50 rounded-lg text-sm px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                        <option value="">All Statuses</option>
                                        <option value="Running">Running</option>
                                        <option value="In Yard">In Yard</option>
                                        <option value="Breakdown">Breakdown (Pending / In Progress)</option>
                                    </select>
                                    <select className="border border-slate-200 bg-slate-50 rounded-lg text-sm px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" value={filterCondition} onChange={e => setFilterCondition(e.target.value)}>
                                        <option value="">All Conditions</option>
                                        <option>Working</option><option>Damaged</option><option>Under Repair</option><option>Scrapped</option>
                                    </select>
                                    {filtersActive && (
                                        <>
                                            <span className="text-xs font-bold px-2.5 py-1.5 rounded-full bg-indigo-100 text-indigo-700">{totalMatches} match{totalMatches === 1 ? '' : 'es'}</span>
                                            <button onClick={clearFilters} className="text-xs font-bold text-slate-400 hover:text-slate-700 flex items-center gap-1 px-2"><X className="w-3.5 h-3.5"/> Clear</button>
                                        </>
                                    )}
                                </div>
                            </div>

                            {/* PENDING MACHINE TRANSFERS — worker-requested moves to a real module
                                (or Yard) wait here. Factory Manager is the only tool with the power
                                to authorize a move; the worker still has to scan the machine on the
                                floor to actually finalize it. */}
                            {pendingTransfers.length > 0 && (
                                <div className="animate-fade-in">
                                    <h3 className="text-xl font-bold text-orange-700 mb-4 flex items-center gap-2"><ArrowRightLeft className="w-6 h-6" /> Pending Machine Transfers ({pendingTransfers.length})</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {pendingTransfers.map(t => (
                                            <div key={t.id} className="bg-orange-50 border border-orange-200 p-4 rounded-xl shadow-sm">
                                                <div className="font-bold text-orange-900">{t.machineModel ? `${t.machineModel} · SN ${t.machineSerial}` : (t.machineName || t.machineId)}</div>
                                                <div className="text-sm text-orange-800 mt-2 flex items-center gap-1.5"><span className="font-medium">{t.fromLabel || t.fromLocation || 'Yard'}</span><span>→</span><span className="font-bold">{t.toLabel || t.toLocation}</span></div>
                                                <div className="text-xs text-slate-500 mt-1">Requested by {t.requestedByName} · {new Date(t.requestedAt).toLocaleString()}{t.note ? ` · "${t.note}"` : ''}</div>
                                                {adminMode ? (
                                                    <div className="flex gap-2 mt-3">
                                                        <Button variant="success" className="text-sm py-1.5 flex-1" onClick={() => approveTransfer(t)}>Approve</Button>
                                                        <Button variant="danger" className="text-sm py-1.5 flex-1" onClick={() => rejectTransfer(t)}>Reject</Button>
                                                    </div>
                                                ) : (
                                                    <div className="text-xs text-orange-500 mt-2 italic">Unlock Edit Mode to approve</div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ORPHANED MACHINES — their module/section was deleted, so they show
                                nowhere in the tree and aren't in the yard. Rescue them here. */}
                            {orphanMachines.length > 0 && (
                                <div className="bg-amber-50 border border-amber-300 rounded-xl p-5 shadow-sm">
                                    <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                                        <h3 className="text-lg font-bold text-amber-800 flex items-center gap-2"><ShieldAlert className="w-5 h-5"/> Machines With No Location ({orphanMachines.length})</h3>
                                        {adminMode && orphanMachines.length > 1 && (
                                            <Button variant="warning" className="text-xs py-1.5" onClick={() => { if (confirm(`Send all ${orphanMachines.length} lost machines to the Yard?`)) orphanMachines.forEach(rescueOrphan); }}>Send All to Yard</Button>
                                        )}
                                    </div>
                                    <p className="text-xs text-amber-700 mb-3">These machines point at a module that no longer exists (it was deleted), so they don't appear anywhere on the floor plan. Send them to the Yard, then reassign them from there.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                                        {orphanMachines.map(m => (
                                            <div key={m.id} className="bg-white border border-amber-200 rounded-lg p-3 flex justify-between items-center gap-2">
                                                <div className="min-w-0">
                                                    <div className="font-bold text-sm text-slate-800 truncate">{m.machineName || m.name || 'Unnamed machine'}</div>
                                                    <div className="text-[10px] text-slate-400 truncate">{m.model || '-'} · SN {m.serial || '-'}</div>
                                                </div>
                                                {adminMode && <Button variant="warning" className="text-xs py-1 px-2 shrink-0" onClick={() => rescueOrphan(m)}><Warehouse className="w-3 h-3"/> To Yard</Button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 3. Facility Overview — filter-aware: while filters are on, empty
                                buildings/sections/modules disappear and everything auto-expands. */}
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 mb-4">Facility Overview {filtersActive && <span className="text-sm font-medium text-indigo-600">(filtered)</span>}</h3>
                                <div className="space-y-4">
                                    {buildings.length === 0 && <div className="p-8 text-center text-slate-400 bg-white rounded-xl border border-dashed">Start by unlocking Edit Mode and adding a building.</div>}

                                    {buildings.map(b => {
                                        const bldMatchCount = (sectionsMap[b.id] || []).reduce((acc, s) => acc + (modulesMap[s.id] || []).reduce((a2, mod) => a2 + fMachinesFor(mod.id).length, 0), 0);
                                        if (filtersActive && bldMatchCount === 0) return null;
                                        return (
                                        <div key={b.id} className={`border rounded-xl bg-white shadow-sm overflow-hidden transition-all ${adminMode ? 'border-indigo-200 ring-2 ring-indigo-50' : 'border-slate-200'}`}>
                                            <div className="flex justify-between items-center p-4 bg-white cursor-pointer hover:bg-slate-50" onClick={() => toggleBuilding(b.id)}>
                                                <div className="flex items-center gap-3">
                                                    {(expandedBuildings[b.id] || filtersActive) ? <ChevronDown className="w-5 h-5 text-slate-400"/> : <ChevronRight className="w-5 h-5 text-slate-400"/>}
                                                    <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Building className="w-5 h-5 text-indigo-600" /> {b.name}</h4>
                                                    <span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">{(sectionsMap[b.id] || []).length} Sections</span>
                                                    {filtersActive && <span className="text-xs bg-indigo-100 px-2 py-1 rounded text-indigo-700 font-bold">{bldMatchCount} match{bldMatchCount === 1 ? '' : 'es'}</span>}
                                                </div>
                                                <div className="flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                                                    <Button variant="secondary" onClick={() => handlePrintQRs(b.name, getMachinesForBuilding(b.id), resolveLocation)} className="text-xs py-1 h-8"><Printer className="w-3 h-3"/> Plant QRs</Button>
                                                    {adminMode && <button onClick={(e) => handleDelete(e, `buildings/${b.id}`, b.name)} className="p-2 bg-red-50 text-red-500 hover:text-white hover:bg-red-600 rounded border border-red-200 shadow-sm" title="Delete Building"><Trash2 className="w-4 h-4"/></button>}
                                                </div>
                                            </div>

                                            {(expandedBuildings[b.id] || filtersActive) && (
                                                <div className="p-6 border-t border-slate-100 bg-slate-50/50 space-y-6 animate-in slide-in-from-top-2 duration-200">
                                                    {(sectionsMap[b.id] || []).length === 0 && <p className="text-sm text-slate-400 italic pl-8">No sections added yet.</p>}

                                                    {(sectionsMap[b.id] || []).map(section => {
                                                        const secMods = modulesMap[section.id] || [];
                                                        const secMatchCount = secMods.reduce((a, mod) => a + fMachinesFor(mod.id).length, 0);
                                                        if (filtersActive && secMatchCount === 0) return null;
                                                        return (
                                                        <div key={section.id} className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                                                            <div className="flex items-center justify-between mb-4">
                                                                <h5 className="font-bold text-md text-slate-700 flex items-center gap-2"><Layers className="w-4 h-4 text-slate-400" /> {section.name} <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{secMatchCount}</span></h5>
                                                                <div className="flex items-center gap-2">
                                                                    <button onClick={() => handlePrintQRs(`${b.name} - ${section.name}`, getMachinesForSection(section.id), resolveLocation)} className="text-xs text-indigo-600 hover:underline">Print Section QRs</button>
                                                                    {adminMode && <button onClick={(e) => handleDelete(e, `sections/${section.id}`, section.name)} className="text-red-300 hover:text-red-600 ml-2" title="Delete Section"><Trash2 className="w-4 h-4"/></button>}
                                                                </div>
                                                            </div>

                                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                                                {secMods.map(mod => {
                                                                    const modMachines = fMachinesFor(mod.id);
                                                                    if (filtersActive && modMachines.length === 0) return null;
                                                                    return (
                                                                    <div key={mod.id} className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                                        <div className="flex justify-between items-center mb-3">
                                                                            <h5 className="font-bold text-slate-800 text-sm">{mod.name} <span className="text-[10px] font-bold text-slate-400">({modMachines.length})</span></h5>
                                                                            <div className="flex items-center gap-1">
                                                                                <button onClick={() => handlePrintQRs(`${section.name} - ${mod.name}`, machinesMap[mod.id] || [], resolveLocation)} className="p-1 hover:bg-slate-200 rounded"><Printer className="w-3 h-3 text-slate-400"/></button>
                                                                                {adminMode && <button onClick={(e) => handleDelete(e, `modules/${mod.id}`, mod.name)} className="p-1 hover:bg-red-50 rounded text-red-300 hover:text-red-600" title="Delete Module"><Trash2 className="w-3 h-3"/></button>}
                                                                            </div>
                                                                        </div>
                                                                        {/* pr-2.5 keeps the vertical scrollbar clear of the action icons below —
                                                                            without it the scrollbar thumb sits right on top of a row's buttons
                                                                            (looked like some machines were "missing" icons, they weren't). */}
                                                                        <div className="space-y-1 max-h-48 overflow-y-auto pr-2.5">
                                                                            {modMachines.map(machine => (
                                                                                <div key={machine.id} id={`machine-${machine.id}`} className={`flex justify-between items-center gap-2 p-2 rounded border text-xs shadow-sm transition-all duration-500 ${highlightedMachine === machine.id ? 'bg-yellow-100 border-yellow-400 ring-2 ring-yellow-300' : 'bg-white border-slate-100 hover:border-indigo-200'}`}>
                                                                                    <div className="min-w-0 flex-1">
                                                                                        <div className="flex items-center gap-2">
                                                                                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${machine.status === 'Running' ? 'bg-green-500' : machine.status === 'Pending' ? 'bg-red-500 animate-pulse' : 'bg-yellow-500'}`} title={machine.status}></div>
                                                                                            <div className="flex flex-col min-w-0">
                                                                                                <span className="font-medium truncate text-slate-700">
                                                                                                    {machine.machineName || machine.name || 'Unnamed machine'}
                                                                                                    {machine.condition && machine.condition !== 'Working' && <span className="ml-1 px-1.5 py-0.5 rounded text-[8px] font-bold bg-red-100 text-red-700 border border-red-200 uppercase">{machine.condition}</span>}
                                                                                                    {machine.inTransit && <span className="ml-1 px-1.5 py-0.5 rounded text-[8px] font-bold bg-orange-100 text-orange-700 border border-orange-200 uppercase">In-Transit</span>}
                                                                                                </span>
                                                                                                <span className="text-[9px] text-slate-400 truncate">{machine.model || '-'} · SN {machine.serial || '-'}{machine.barcode && ` · ${machine.barcode}`}</span>
                                                                                            </div>
                                                                                        </div>
                                                                                    </div>
                                                                                    <div className="flex items-center gap-1 shrink-0">
                                                                                        <button onClick={() => handlePrintQRs(machine.name, [machine], resolveLocation)} title="Print QR" className="text-slate-300 hover:text-indigo-600"><QrCode className="w-3 h-3"/></button>
                                                                                        {adminMode && (
                                                                                            <>
                                                                                             <button onClick={(e) => handleMoveToYard(e, machine)} className="text-slate-400 hover:text-indigo-600" title="Move to Yard"><Warehouse className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => { e.stopPropagation(); setEditingMachine(machine); }} className="text-slate-400 hover:text-indigo-600" title="Edit Machine"><Edit3 className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => handleCloneMachine(e, machine)} className="text-slate-400 hover:text-blue-600" title="Clone Machine"><Copy className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => handleArchiveMachine(e, machine)} className="text-orange-400 hover:text-orange-600" title="Archive Machine"><Archive className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => handlePermanentDeleteMachine(e, machine)} className="text-red-500 hover:text-red-700" title="Permanently Delete"><Trash2 className="w-3 h-3"/></button>
                                                                                            </>
                                                                                        )}
                                                                                    </div>
                                                                                </div>
                                                                            ))}
                                                                            {modMachines.length === 0 && <p className="text-xs text-slate-400 italic">Empty module.</p>}
                                                                        </div>
                                                                    </div>
                                                                    );
                                                                })}
                                                            </div>
                                                            {secMods.length === 0 && <p className="text-sm text-slate-400 italic">No modules in this section.</p>}
                                                        </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* 4. MACHINE YARD (SPARES) — obeys the same global filter bar */}
                            <div className="pt-8 border-t border-slate-200">
                                <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                                    <h3 className="text-xl font-bold text-slate-700 flex items-center gap-2">
                                        <Warehouse className="w-6 h-6 text-indigo-500"/> Machine Yard / Spares
                                        <span className="text-sm font-bold bg-indigo-100 text-indigo-700 px-2.5 py-0.5 rounded-full">{filtersActive ? `${fYardMachines.length} / ${yardMachines.length}` : yardMachines.length}</span>
                                    </h3>
                                    {yardMachines.length > 0 && (
                                        <Button variant="secondary" onClick={() => handlePrintQRs('Machine Yard - Spares', filtersActive ? fYardMachines : yardMachines, resolveLocation)} className="text-xs py-1.5 h-8"><Printer className="w-3.5 h-3.5"/> Print {filtersActive ? 'Filtered' : 'All'} Yard QRs</Button>
                                    )}
                                </div>
                                <div className="bg-indigo-50/50 rounded-xl p-6 border border-indigo-100 max-h-[36rem] overflow-y-auto">
                                    {fYardMachines.length > 0 ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {fYardMachines.map(m => (
                                                <div key={m.id} id={`machine-${m.id}`} className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col gap-2 hover:border-indigo-300 transition-colors">
                                                    <div className="flex justify-between items-start gap-2">
                                                        <div className="min-w-0">
                                                            <div className="font-bold text-slate-800 text-sm truncate">{m.machineName || m.name || 'Unnamed machine'}</div>
                                                            <div className="text-[10px] text-slate-400 truncate">{m.model || '-'} · SN {m.serial || '-'}{m.barcode && ` · ${m.barcode}`}</div>
                                                        </div>
                                                        <div className="flex items-center gap-1 shrink-0">
                                                            <button onClick={() => handlePrintQRs(m.name, [m], resolveLocation)} title="Print QR" className="text-slate-300 hover:text-indigo-600"><QrCode className="w-3.5 h-3.5"/></button>
                                                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold uppercase">{m.status}</span>
                                                        </div>
                                                    </div>
                                                    {m.condition && m.condition !== 'Working' && <span className="self-start px-1.5 py-0.5 rounded text-[9px] font-bold bg-red-100 text-red-700 border border-red-200 uppercase">{m.condition}</span>}
                                                    {adminMode && (
                                                        <div className="flex gap-2 mt-1 pt-2 border-t border-slate-100">
                                                            <button onClick={() => setEditingMachine(m)} className="flex-1 text-xs bg-indigo-50 text-indigo-700 py-1.5 rounded font-bold hover:bg-indigo-100 flex justify-center items-center gap-1"><ArrowRightLeft className="w-3 h-3"/> Reassign</button>
                                                            <button onClick={(e) => handleArchiveMachine(e, m)} className="px-2 text-xs bg-orange-50 text-orange-600 rounded hover:bg-orange-100" title="Archive"><Archive className="w-3 h-3"/></button>
                                                            <button onClick={(e) => handlePermanentDeleteMachine(e, m)} className="px-2 text-xs bg-red-50 text-red-600 rounded hover:bg-red-100" title="Permanent Delete"><Trash2 className="w-3 h-3"/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center text-slate-400 py-4 italic">{yardMachines.length === 0 ? 'No machines currently in the yard.' : 'No yard machines match the filters.'}</div>
                                    )}
                                </div>
                            </div>

                            {/* 5. DELETED MACHINES (ARCHIVE) */}
                            {adminMode && (
                                <div className="pt-8 border-t border-slate-200">
                                    <h3 className="text-xl font-bold text-slate-600 mb-4 flex items-center gap-2"><Archive className="w-5 h-5"/> Recycle Bin / Archives ({archived_machines.length})</h3>
                                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 max-h-60 overflow-y-auto">
                                        {archived_machines.length > 0 ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {archived_machines.map(m => (
                                                    <div key={m.id} className="bg-white p-3 rounded border border-slate-200 text-sm shadow-sm flex flex-col gap-2">
                                                        <div className="flex justify-between items-start">
                                                            <div className="font-bold text-slate-800">{m.name}</div>
                                                            <div className="text-xs text-slate-400 font-mono">{new Date(m.archivedAt).toLocaleDateString()}</div>
                                                        </div>
                                                        <div className="text-xs text-red-600 bg-red-50 p-1 rounded">Reason: {m.archiveReason || m.deletionReason}</div>
                                                        <div className="flex justify-between items-center mt-auto pt-2">
                                                            <button onClick={() => handleRestore(m)} className="text-xs flex items-center gap-1 text-indigo-600 hover:text-indigo-800 font-bold"><RefreshCw className="w-3 h-3"/> Restore to Yard</button>
                                                            <button onClick={(e) => handlePermanentDeleteMachine(e, m)} className="text-xs flex items-center gap-1 text-red-600 hover:text-red-800 font-bold"><Trash2 className="w-3 h-3"/> Delete</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-center text-slate-400 py-4 italic">No archived machines.</div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<FactoryManagerApp />);
    </script>
</body>
</html>
