<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarmentFix - Factory Manager Tool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, PlusCircle, Factory, Printer, QrCode, 
          Building, Trash2, Loader2, LogOut, Wrench, AlertTriangle, 
          CheckCircle, Settings, Layers, Zap, ChevronDown, ChevronRight, 
          AlertCircle, Lock, Unlock, ShieldAlert, Calendar, Edit3, ScanLine, X, Search, History, Archive, RefreshCw, RotateCcw, FileSpreadsheet, DollarSign, Tag, Upload, TrendingDown, Copy, Move, Warehouse, ArrowRightLeft
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously } from "firebase/auth";
        import { getDatabase, ref, push, onValue, remove, update, set } from "firebase/database";

        // --- SHARED CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyBUbE6WtnWnHQsCul_5bDDPHz78jlaHCxs",
          authDomain: "apparel-maintenance.firebaseapp.com",
          databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com",
          projectId: "apparel-maintenance",
          storageBucket: "apparel-maintenance.firebasestorage.app",
          messagingSenderId: "716246308986",
          appId: "1:716246308986:web:0f5f33db9c65ffba1543c3",
          measurementId: "G-4G0694Q22Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- CONSTANTS ---
        const MACHINE_TYPES = [
            "Single Needle Lockstitch (SNLS)",
            "Double Needle Lockstitch (DNLS)",
            "Overlock (3/4/5 Thread)",
            "Flatlock / Coverstitch",
            "Chain Stitch",
            "Buttonhole Machine",
            "Button Attach Machine",
            "Bar Tack Machine",
            "Feed Off The Arm (FOA)",
            "Zigzag Machine",
            "Multi-Needle / Kansai",
            "Blind Stitch",
            "Computerized Embroidery",
            "Pattern Sewer / Template",
            "Auto Cutter",
            "Spreader",
            "Fusing Machine",
            "Ironing / Pressing",
            "Snap Button Machine",
            "Thread Trimmer",
            "Needle Detector",
            "Other"
        ];

        // --- COMPONENTS ---
        const Card = ({ children, className = "" }) => (
          <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>{children}</div>
        );

        const Button = ({ onClick, children, className = "", variant="primary", disabled=false }) => {
            const styles = {
                primary: "bg-indigo-600 text-white hover:bg-indigo-700",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200",
                warning: "bg-orange-500 text-white hover:bg-orange-600",
                dark: "bg-slate-800 text-white hover:bg-slate-900",
                success: "bg-emerald-600 text-white hover:bg-emerald-700"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`px-4 py-2 rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${styles[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const StatCard = ({ label, value, subtext, icon: Icon, color }) => (
            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div>
                    <p className="text-slate-500 text-xs font-bold uppercase">{label}</p>
                    <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                    {subtext && <p className="text-[10px] text-slate-400 mt-1">{subtext}</p>}
                </div>
                <div className={`p-3 rounded-full bg-${color}-50`}>
                    <Icon className={`w-6 h-6 text-${color}-500`} />
                </div>
            </div>
        );

        const AuthModal = ({ isOpen, onClose, onConfirm, error }) => {
            const [u, setU] = useState("");
            const [p, setP] = useState("");
            if(!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <Card className="w-full max-w-sm p-6 animate-in zoom-in-95 duration-200">
                        <div className="text-center mb-6">
                            <div className="bg-indigo-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-2"><Lock className="w-6 h-6 text-indigo-600"/></div>
                            <h3 className="font-bold text-lg text-slate-800">Admin Locked</h3>
                            <p className="text-sm text-slate-500">Enter credentials to Edit & Delete.</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-2 text-sm rounded mb-4 text-center border border-red-200">{error}</div>}
                        <div className="space-y-3">
                            <input className="w-full p-2 border rounded" placeholder="Admin Username" value={u} onChange={e=>setU(e.target.value)} autoFocus />
                            <input className="w-full p-2 border rounded" type="password" placeholder="Password" value={p} onChange={e=>setP(e.target.value)} />
                            <div className="flex gap-2 pt-2">
                                <Button variant="secondary" className="flex-1" onClick={onClose}>Cancel</Button>
                                <Button variant="primary" className="flex-1" onClick={() => onConfirm(u, p)}>Unlock</Button>
                            </div>
                        </div>
                    </Card>
                </div>
            )
        }

        const EditMachineModal = ({ machine, modulesMap, sections, buildings, onClose, onSave }) => {
            const [formData, setFormData] = useState({ ...machine });
            if (!machine) return null;

            const extractDate = (iso) => iso ? iso.split('T')[0] : "";

            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
                    <Card className="w-full max-w-xl p-6 animate-in zoom-in-95 duration-200 max-h-[90vh] overflow-y-auto">
                         <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Edit3 className="w-5 h-5 text-indigo-600"/> Edit Machine / Move</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-slate-400"/></button>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Machine Name / ID</label>
                                    <input className="w-full p-2 border rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Type</label>
                                    <select className="w-full p-2 border rounded bg-white" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                         {MACHINE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Brand</label>
                                    <input className="w-full p-2 border rounded" value={formData.brand || ""} onChange={e => setFormData({...formData, brand: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Model</label>
                                    <input className="w-full p-2 border rounded" value={formData.model || ""} onChange={e => setFormData({...formData, model: e.target.value})} />
                                </div>
                            </div>

                             <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Serial No.</label>
                                    <input className="w-full p-2 border rounded" value={formData.serial || ""} onChange={e => setFormData({...formData, serial: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Year</label>
                                    <input type="number" className="w-full p-2 border rounded" value={formData.year || ""} onChange={e => setFormData({...formData, year: e.target.value})} />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Price ($)</label>
                                    <input type="number" className="w-full p-2 border rounded" value={formData.price || ""} onChange={e => setFormData({...formData, price: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">PM Interval (Days)</label>
                                    <input type="number" className="w-full p-2 border rounded" value={formData.interval || "30"} onChange={e => setFormData({...formData, interval: e.target.value})} />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 pt-2 border-t">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1 text-indigo-600">Last Service Date</label>
                                    <input type="date" className="w-full p-2 border rounded bg-indigo-50" value={extractDate(formData.lastMaintenance)} onChange={e => setFormData({...formData, lastMaintenance: e.target.value ? new Date(e.target.value).toISOString() : null})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1 text-indigo-600">Location (Module)</label>
                                    <select className="w-full p-2 border rounded bg-indigo-50" value={formData.moduleId} onChange={e => setFormData({...formData, moduleId: e.target.value})}>
                                        <option value="yard">-- Machine Yard (Spare) --</option>
                                        {Object.keys(modulesMap).map(sId => (
                                            <optgroup key={sId} label={sections.find(s => s.id === sId)?.name || 'Unknown Section'}>
                                                {modulesMap[sId].map(mod => <option key={mod.id} value={mod.id}>{mod.name}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 pt-4 border-t mt-4">
                                <Button className="flex-1" onClick={() => onSave(formData.id, formData)}>Save Changes</Button>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        }

        const MachineDetailsModal = ({ machine, logs, onClose }) => {
            if (!machine) return null;

            const intervalDays = parseInt(machine.interval) || 30;
            const lastPM = machine.lastMaintenance ? new Date(machine.lastMaintenance) : null;
            const daysSincePM = lastPM ? Math.floor((new Date() - lastPM) / (1000 * 60 * 60 * 24)) : 999;
            const isPmValid = daysSincePM <= intervalDays;
            const pmStatus = isPmValid ? "Valid" : "Expired / Due";
            
            const history = logs.filter(l => l.machineId === machine.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            return (
                 <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] animate-in zoom-in-95 duration-200 shadow-2xl">
                        <div className="p-4 bg-slate-900 text-white flex justify-between items-center shrink-0">
                             <h3 className="font-bold text-lg flex items-center gap-2"><Factory className="w-5 h-5 text-indigo-400"/> Machine Details</h3>
                             <button onClick={onClose}><X className="w-6 h-6 text-slate-400 hover:text-white"/></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto space-y-6">
                            <div className="text-center">
                                <h2 className="text-2xl font-bold text-slate-900">{machine.name}</h2>
                                <p className="text-slate-500 text-sm font-mono mt-1">ID: {machine.id} • {machine.type || "Universal"}</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Brand</span>
                                    <span className="font-medium text-slate-800">{machine.brand || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Model</span>
                                    <span className="font-medium text-slate-800">{machine.model || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Serial No.</span>
                                    <span className="font-medium text-slate-800">{machine.serial || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Install Year</span>
                                    <span className="font-medium text-slate-800">{machine.year || "-"}</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-4 bg-slate-50 rounded-xl border border-slate-200">
                                    <div className="text-xs text-slate-500 font-bold uppercase mb-1">Current Status</div>
                                    <div className={`font-bold text-lg ${machine.status === 'Running' ? 'text-green-600' : (machine.status === 'In Yard' ? 'text-indigo-600' : 'text-red-600')}`}>{machine.status}</div>
                                </div>
                                <div className={`p-4 rounded-xl border ${isPmValid ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <div className={`text-xs font-bold uppercase mb-1 ${isPmValid ? 'text-green-600' : 'text-red-600'}`}>PM Status ({intervalDays}d)</div>
                                    <div className={`font-bold text-lg ${isPmValid ? 'text-green-800' : 'text-red-800'}`}>{pmStatus}</div>
                                    <div className="text-[11px] opacity-75 mt-1">{lastPM ? `Last: ${lastPM.toLocaleDateString()}` : "Never serviced"}</div>
                                </div>
                            </div>

                            <div>
                                <div className="flex items-center justify-between mb-3 border-b pb-2">
                                    <h4 className="font-bold text-slate-800 flex items-center gap-2"><History className="w-4 h-4 text-indigo-600"/> Maintenance History</h4>
                                    <span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">{history.length} Records</span>
                                </div>
                                
                                <div className="space-y-3">
                                    {history.length > 0 ? history.map(log => (
                                        <div key={log.id} className="text-sm p-3 bg-slate-50 rounded border border-slate-100 hover:bg-white hover:shadow-sm transition-all">
                                            <div className="flex justify-between text-xs text-slate-500 mb-1">
                                                <span>{new Date(log.timestamp).toLocaleDateString()}</span>
                                                <span className="font-mono font-bold text-slate-700">{log.action}</span>
                                            </div>
                                            <div className="text-slate-800 font-medium">{log.details || "No details provided."}</div>
                                            {log.repairTime && <div className="text-xs text-indigo-500 mt-1">Duration: {log.repairTime}</div>}
                                        </div>
                                    )) : <div className="text-center py-4 text-slate-400 italic text-sm border border-dashed rounded">No repair history found.</div>}
                                </div>
                            </div>
                        </div>
                        <div className="p-4 border-t bg-slate-50 flex justify-end">
                             <Button onClick={onClose} variant="secondary">Close</Button>
                        </div>
                    </div>
                 </div>
            )
        }

        const QRScanner = ({ onScan, onClose, title }) => {
            useEffect(() => {
                const onScanSuccess = (decodedText) => {
                    html5QrcodeScanner.clear().then(() => {
                        onScan(decodedText);
                    }).catch(err => console.error("Failed to clear scanner", err));
                };
                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, (error) => {});
                return () => { try { html5QrcodeScanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title || "Scan QR Code"}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        const useFactoryData = () => {
            const [data, setData] = useState({ buildings: [], sections: [], modules: [], machines: [], users: [], logs: [], archived_machines: [] });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                const endpoints = ['buildings', 'sections', 'modules', 'machines', 'users', 'logs', 'archived_machines'];
                const unsubscribers = endpoints.map(endpoint => {
                    return onValue(ref(db, endpoint), (snapshot) => {
                        const val = snapshot.val();
                        const list = val ? Object.keys(val).map(key => ({id: key, ...val[key]})) : [];
                        setData(prev => ({ ...prev, [endpoint]: list }));
                        if(endpoint === 'machines') setLoading(false);
                    });
                });
                return () => unsubscribers.forEach(unsub => unsub());
            }, []);

            const maps = useMemo(() => ({
                sectionsMap: data.sections.reduce((acc, s) => { (acc[s.buildingId] = acc[s.buildingId] || []).push(s); return acc; }, {}),
                modulesMap: data.modules.reduce((acc, m) => { (acc[m.sectionId] = acc[m.sectionId] || []).push(m); return acc; }, {}),
                machinesMap: data.machines.reduce((acc, m) => { (acc[m.moduleId] = acc[m.moduleId] || []).push(m); return acc; }, {})
            }), [data.sections, data.modules, data.machines]);

            return { ...data, ...maps, loading };
        };

        const handlePrintQRs = (title, machinesList) => {
            if(!machinesList || machinesList.length === 0) return alert("No machines found to print.");
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>QR Codes - ${title}</title>
                    <style>
                        body { font-family: sans-serif; padding: 20px; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, 160px); gap: 15px; justify-content: center; }
                        .card { border: 2px solid #000; padding: 10px; text-align: center; page-break-inside: avoid; border-radius: 8px; width: 160px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
                        img { width: 100px; height: 100px; object-fit: contain; }
                        .name { font-weight: bold; font-size: 14px; margin-top: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
                        .id { font-size: 12px; color: #333; font-family: monospace; }
                        .meta { font-size: 10px; color: #666; margin-top: 5px; }
                        @media print { .no-print { display: none; } body { padding: 0; } }
                    </style>
                </head>
                <body>
                    <div class="no-print" style="text-align:center; margin-bottom:20px;">
                        <h1>${title}</h1>
                        <button onclick="window.print()" style="padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:5px; cursor:pointer;">Print Labels</button>
                    </div>
                    <div class="grid">
                        ${machinesList.map(m => `
                            <div class="card">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${m.id}" alt="${m.name}" />
                                <div class="name">${m.name}</div>
                                <div class="id">${m.id}</div>
                                ${m.year ? `<div class="meta">Est. ${m.year}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
        };

        const FactoryManagerApp = () => {
            const { buildings, sections, modules, machines, users, logs, archived_machines, sectionsMap, modulesMap, machinesMap, loading } = useFactoryData();
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [expandedBuildings, setExpandedBuildings] = useState({});
            const [highlightedMachine, setHighlightedMachine] = useState(null);
            
            const [adminMode, setAdminMode] = useState(false);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authError, setAuthError] = useState("");
            const [showScanner, setShowScanner] = useState(false);
            const [scannedMachineDetails, setScannedMachineDetails] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [editingMachine, setEditingMachine] = useState(null);

            const fileInputRef = useRef(null);

            const [newBuilding, setNewBuilding] = useState("");
            const [newSection, setNewSection] = useState({ name: "", buildingId: "" });
            const [newModule, setNewModule] = useState({ name: "", sectionId: "" });
            const [newMachine, setNewMachine] = useState({ name: "", brand: "", year: "", moduleId: "", model: "", serial: "", price: "", type: "Single Needle Lockstitch (SNLS)", interval: 30, lastMaintenance: "" });

            const extractDate = (iso) => iso ? iso.split('T')[0] : "";

            const totalAssetValue = machines.reduce((acc, m) => acc + (parseFloat(m.price) || 0), 0);
            const depreciatedValue = machines.reduce((acc, m) => {
                const year = parseInt(m.year);
                if (!year) return acc + (parseFloat(m.price) || 0);
                const age = new Date().getFullYear() - year;
                const val = (parseFloat(m.price) || 0) * Math.pow(0.9, age); 
                return acc + val;
            }, 0);

            useEffect(() => {
                if(buildings.length > 0 && Object.keys(expandedBuildings).length === 0) {
                    const initial = {};
                    buildings.forEach(b => initial[b.id] = true);
                    setExpandedBuildings(initial);
                }
            }, [buildings]);

            // Filter sets
            const floorMachines = machines.filter(m => m.moduleId !== 'yard');
            const yardMachines = machines.filter(m => m.moduleId === 'yard');
            const brokenMachines = floorMachines.filter(m => m.status === 'Pending' || m.status === 'In Progress');
            const brokenCount = brokenMachines.length;

            const toggleBuilding = (id) => setExpandedBuildings(prev => ({...prev, [id]: !prev[id]}));

            const onAddBuilding = () => { if(newBuilding) { push(ref(db, 'buildings'), { name: newBuilding }); setNewBuilding(""); }};
            const onAddSection = () => { if(newSection.name && newSection.buildingId) { push(ref(db, 'sections'), newSection); setNewSection({name: "", buildingId: ""}); }};
            const onAddModule = () => { if(newModule.name && newModule.sectionId) { push(ref(db, 'modules'), newModule); setNewModule({name: "", sectionId: ""}); }};
            const onAddMachine = () => { 
                if(newMachine.name && newMachine.moduleId) {
                    const submission = {...newMachine, status: newMachine.moduleId === 'yard' ? 'In Yard' : 'Running', createdAt: new Date().toISOString()};
                    if (newMachine.lastMaintenance) submission.lastMaintenance = new Date(newMachine.lastMaintenance).toISOString();
                    else delete submission.lastMaintenance;

                    push(ref(db, 'machines'), submission); 
                    setNewMachine({name: "", brand: "", year: "", moduleId: "", model: "", serial: "", price: "", type: "Single Needle Lockstitch (SNLS)", interval: 30, lastMaintenance: "" }); 
                }
            };

            const getMachinesForSection = (sId) => (modulesMap[sId] || []).flatMap(m => machinesMap[m.id] || []);
            const getMachinesForBuilding = (bId) => (sectionsMap[bId] || []).flatMap(s => getMachinesForSection(s.id));

            const checkCredentials = (u, p) => {
                const adminUser = users.find(user => user.username === u && user.password === p && user.role === 'admin');
                return adminUser || (u === 'admin' && p === '123');
            };

            const handleAuthSubmit = (u, p) => {
                if (checkCredentials(u, p)) { setAdminMode(true); setShowAuthModal(false); setAuthError(""); } 
                else setAuthError("Invalid credentials or not an Admin.");
            };

            const handleUpdateMachine = (id, updatedData) => {
                // Adjust status if moved to/from yard
                if (updatedData.moduleId === 'yard' && updatedData.status !== 'In Yard') updatedData.status = 'In Yard';
                else if (updatedData.moduleId !== 'yard' && updatedData.status === 'In Yard') updatedData.status = 'Running';

                update(ref(db, `machines/${id}`), updatedData).then(() => setEditingMachine(null)).catch(err => alert("Update failed: " + err.message));
            };

            const handleCloneMachine = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock first.");
                const countStr = prompt(`How many copies of "${machine.name}" do you want to create?`, "1");
                const count = parseInt(countStr);
                if(count > 0 && count <= 50) {
                    for(let i=1; i<=count; i++) {
                         const copy = { ...machine };
                         delete copy.id; 
                         copy.name = `${machine.name} (Copy ${i})`;
                         copy.createdAt = new Date().toISOString();
                         push(ref(db, 'machines'), copy);
                    }
                }
            };

            const handleMoveToYard = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock first.");
                if(confirm(`Move ${machine.name} off the floor and into the Machine Yard?`)) {
                    update(ref(db, `machines/${machine.id}`), { moduleId: 'yard', status: 'In Yard' });
                }
            };

            const handleArchiveMachine = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock Edit Mode first.");
                const reason = prompt(`Why are you archiving ${machine.name}?`);
                if(reason === null) return;
                
                const archiveData = { ...machine, archivedAt: new Date().toISOString(), deletionReason: reason || "No reason provided", deletedBy: "Admin" };
                set(ref(db, `archived_machines/${machine.id}`), archiveData)
                    .then(() => remove(ref(db, `machines/${machine.id}`)))
                    .catch(err => alert("Error archiving: " + err.message));
            };

            const handleDelete = (e, path, name) => {
                e.stopPropagation(); e.preventDefault();
                if(!adminMode) return alert("Unlock Edit Mode first.");
                if(confirm(`⚠️ PERMANENT DELETE\n\nDelete ${name}? Data inside will be lost.`)) remove(ref(db, path)).catch(err => alert("Delete Error: " + err.message));
            };

            const handleRestore = (machine) => {
                const restoreData = { ...machine };
                delete restoreData.archivedAt; delete restoreData.deletionReason; delete restoreData.deletedBy;
                // Default to yard when restored to prevent breaking floor UI
                restoreData.moduleId = 'yard';
                restoreData.status = 'In Yard';
                set(ref(db, `machines/${machine.id}`), restoreData)
                    .then(() => remove(ref(db, `archived_machines/${machine.id}`)))
                    .catch(err => alert("Error restoring: " + err.message));
            };

            const handleExportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Type,Brand,Plant,Section,Module,Machine ID,Name,Model,Serial,Year,Price,Interval,Status,Last Maintenance\n";

                const appendRow = (bName, sName, modName, m) => {
                    const row = [ m.type || "N/A", m.brand || "-", bName, sName, modName, m.id, m.name, m.model || "-", m.serial || "-", m.year || "-", m.price || "0", m.interval || "30", m.status, m.lastMaintenance ? new Date(m.lastMaintenance).toLocaleDateString() : "-" ].map(item => `"${item}"`).join(",");
                    csvContent += row + "\n";
                };

                buildings.forEach(b => {
                    (sectionsMap[b.id] || []).forEach(s => {
                        (modulesMap[s.id] || []).forEach(mod => {
                            (machinesMap[mod.id] || []).forEach(m => appendRow(b.name, s.name, mod.name, m));
                        });
                    });
                });

                yardMachines.forEach(m => appendRow("YARD", "YARD", "YARD", m));

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `factory_inventory_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleImportCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const rows = e.target.result.split('\n').slice(1);
                    const bMap = {}; buildings.forEach(b => bMap[b.name] = b.id);
                    const sMap = {}; sections.forEach(s => sMap[`${s.buildingId}_${s.name}`] = s.id);
                    const modMap = {}; modules.forEach(mod => modMap[`${mod.sectionId}_${mod.name}`] = mod.id);

                    let count = 0;
                    for (let row of rows) {
                        if (!row.trim()) continue;
                        const cols = row.split(',').map(c => c.replace(/"/g, '').trim());
                        const [mType, mBrand, bName, sName, modName, mId, mName, mModel, mSerial, mYear, mPrice, mInterval, mStatus, mLastMaint] = cols;

                        if (!mName) continue;

                        let modId = 'yard'; // default to yard if no location
                        if (bName && bName.toUpperCase() !== 'YARD' && sName && modName) {
                            let bId = bMap[bName] || (await push(ref(db, 'buildings'), { name: bName })).key; bMap[bName] = bId;
                            let sId = sMap[`${bId}_${sName}`] || (await push(ref(db, 'sections'), { name: sName, buildingId: bId })).key; sMap[`${bId}_${sName}`] = sId;
                            modId = modMap[`${sId}_${modName}`] || (await push(ref(db, 'modules'), { name: modName, sectionId: sId })).key; modMap[`${sId}_${modName}`] = modId;
                        }

                        const newMac = {
                            name: mName, brand: mBrand || "", moduleId: modId, type: mType || "Single Needle Lockstitch (SNLS)", model: mModel || "",
                            serial: mSerial || "", year: mYear || "", price: mPrice || "0", interval: mInterval || "30",
                            status: modId === 'yard' ? 'In Yard' : 'Running', createdAt: new Date().toISOString()
                        };
                        if (mLastMaint && mLastMaint !== '-') newMac.lastMaintenance = new Date(mLastMaint).toISOString();

                        await push(ref(db, 'machines'), newMac);
                        count++;
                    }
                    alert(`Imported ${count} machines!`);
                    fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };

            const findAndScrollToMachine = (query) => {
                const machine = machines.find(m => m.id.toLowerCase() === query.toLowerCase() || m.name.toLowerCase().includes(query.toLowerCase()));
                if (machine) {
                    if (machine.moduleId === 'yard') {
                        setHighlightedMachine(machine.id);
                        setTimeout(() => document.getElementById(`machine-${machine.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                        setTimeout(() => setHighlightedMachine(null), 5000);
                        return machine;
                    }

                    const mod = modules.find(m => m.id === machine.moduleId);
                    const section = sections.find(s => s.id === mod?.sectionId);
                    const building = buildings.find(b => b.id === section?.buildingId);
                    
                    if (building) {
                        setExpandedBuildings(prev => ({ ...prev, [building.id]: true }));
                        setHighlightedMachine(machine.id);
                        setTimeout(() => document.getElementById(`machine-${machine.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                        setTimeout(() => setHighlightedMachine(null), 5000);
                        return machine; 
                    }
                }
                return null; 
            };

            const handleSearchSubmit = (e) => {
                e.preventDefault();
                if(searchTerm) {
                    const machine = findAndScrollToMachine(searchTerm);
                    if(machine) setScannedMachineDetails(machine); 
                    else alert("Machine not found.");
                }
            };

            const handleScanFind = (data) => {
                const machine = findAndScrollToMachine(data);
                if (machine) setScannedMachineDetails(machine); else alert("Machine not found.");
                setShowScanner(false);
            };

            const [initialCreds, setInitialCreds] = useState({u: '', p: ''});
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <Card className="w-full max-w-md p-8">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Factory className="w-8 h-8 text-indigo-600" /></div>
                                <h1 className="text-2xl font-bold text-slate-800">Factory Manager</h1>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault(); if(checkCredentials(initialCreds.u, initialCreds.p)) setIsAuthenticated(true); else alert("Invalid credentials."); }} className="space-y-4">
                                <input className="w-full p-3 border rounded-lg" placeholder="Username" value={initialCreds.u} onChange={e => setInitialCreds({...initialCreds, u: e.target.value})} />
                                <input className="w-full p-3 border rounded-lg" type="password" placeholder="Password" value={initialCreds.p} onChange={e => setInitialCreds({...initialCreds, p: e.target.value})} />
                                <Button className="w-full">Access Tool</Button>
                            </form>
                        </Card>
                    </div>
                );
            }

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="w-10 h-10 animate-spin text-indigo-600" /></div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <AuthModal isOpen={showAuthModal} onClose={() => { setShowAuthModal(false); setAuthError(""); }} onConfirm={handleAuthSubmit} error={authError} />
                    <MachineDetailsModal machine={scannedMachineDetails} logs={logs} onClose={() => setScannedMachineDetails(null)} />
                    <EditMachineModal machine={editingMachine} modulesMap={modulesMap} sections={sections} buildings={buildings} onClose={() => setEditingMachine(null)} onSave={handleUpdateMachine} />
                    {showScanner && <QRScanner onScan={handleScanFind} onClose={() => setShowScanner(false)} title="Scan to Find Machine" />}

                    {/* --- SIDEBAR FORMS --- */}
                    {adminMode && (
                        <div className="w-full md:w-80 bg-white border-r border-slate-200 h-auto md:h-screen md:sticky md:top-0 md:overflow-y-auto flex-shrink-0 flex flex-col animate-in slide-in-from-left-10 duration-300">
                            <div className="p-4 bg-slate-900 text-white flex justify-between items-center sticky top-0 z-10 shrink-0">
                                 <h1 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5" /> Setup Console</h1>
                            </div>
                            
                            <div className="p-4 space-y-6 flex-1 overflow-y-auto">
                                <div className="bg-indigo-50 border border-indigo-100 p-3 rounded text-xs text-indigo-800 mb-4 flex items-center gap-2">
                                    <Edit3 className="w-4 h-4" /> Mode: Editing Enabled
                                </div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-sm text-slate-500 uppercase flex items-center gap-2"><Building className="w-4 h-4"/> 1. Add Building</h3>
                                    <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Building Name" value={newBuilding} onChange={e => setNewBuilding(e.target.value)} />
                                    <Button onClick={onAddBuilding} className="w-full py-1 text-sm">Create Building</Button>
                                </div>
                                <div className="border-t"></div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-sm text-slate-500 uppercase flex items-center gap-2"><Layers className="w-4 h-4"/> 2. Add Section</h3>
                                    <select className="w-full p-2 text-sm border rounded bg-slate-50" value={newSection.buildingId} onChange={e => setNewSection({...newSection, buildingId: e.target.value})}>
                                        <option value="">Select Building...</option>
                                        {buildings.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                                    </select>
                                    <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Section Name" value={newSection.name} onChange={e => setNewSection({...newSection, name: e.target.value})} />
                                    <Button onClick={onAddSection} className="w-full py-1 text-sm">Create Section</Button>
                                </div>
                                <div className="border-t"></div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-sm text-slate-500 uppercase flex items-center gap-2"><Zap className="w-4 h-4"/> 3. Add Module</h3>
                                    <select className="w-full p-2 text-sm border rounded bg-slate-50" value={newModule.sectionId} onChange={e => setNewModule({...newModule, sectionId: e.target.value})}>
                                        <option value="">Select Section...</option>
                                        {Object.keys(sectionsMap).map(bId => (
                                            <optgroup key={bId} label={buildings.find(b=>b.id===bId)?.name}>
                                                {sectionsMap[bId].map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Module Name" value={newModule.name} onChange={e => setNewModule({...newModule, name: e.target.value})} />
                                    <Button onClick={onAddModule} className="w-full py-1 text-sm">Create Module</Button>
                                </div>
                                <div className="border-t"></div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-sm text-slate-500 uppercase flex items-center gap-2"><Factory className="w-4 h-4"/> 4. Add Machine</h3>
                                    <select className="w-full p-2 text-sm border rounded bg-slate-50" value={newMachine.moduleId} onChange={e => setNewMachine({...newMachine, moduleId: e.target.value})}>
                                        <option value="">-- Floor Module --</option>
                                        <option value="yard">Warehouse / Machine Yard</option>
                                        {Object.keys(modulesMap).map(sId => (
                                            <optgroup key={sId} label={sections.find(s => s.id === sId)?.name || 'Unknown Section'}>
                                                {modulesMap[sId].map(mod => <option key={mod.id} value={mod.id}>{mod.name}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="space-y-2">
                                        <div className="grid grid-cols-2 gap-2">
                                            <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Machine Name/ID" value={newMachine.name} onChange={e => setNewMachine({...newMachine, name: e.target.value})} />
                                            <select className="w-full p-2 text-sm border rounded bg-slate-50" value={newMachine.type} onChange={e => setNewMachine({...newMachine, type: e.target.value})}>
                                                {MACHINE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Brand" value={newMachine.brand} onChange={e => setNewMachine({...newMachine, brand: e.target.value})} />
                                            <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Model No." value={newMachine.model} onChange={e => setNewMachine({...newMachine, model: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Serial No." value={newMachine.serial} onChange={e => setNewMachine({...newMachine, serial: e.target.value})} />
                                            <input type="number" className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Year" value={newMachine.year} onChange={e => setNewMachine({...newMachine, year: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="Price ($)" value={newMachine.price} onChange={e => setNewMachine({...newMachine, price: e.target.value})} />
                                            <input type="number" className="w-full p-2 text-sm border rounded bg-slate-50" placeholder="PM Int. (Days)" value={newMachine.interval} onChange={e => setNewMachine({...newMachine, interval: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-slate-400">Last Service Date</label>
                                            <input type="date" className="w-full p-2 text-sm border rounded bg-slate-50" value={extractDate(newMachine.lastMaintenance)} onChange={e => setNewMachine({...newMachine, lastMaintenance: e.target.value})} />
                                        </div>
                                    </div>
                                    <Button onClick={onAddMachine} className="w-full py-1 text-sm">Create Machine</Button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MAIN CONTENT --- */}
                    <div className="flex-1 bg-slate-100 h-screen overflow-y-auto">
                        <div className="p-8 max-w-7xl mx-auto space-y-8">
                            
                            {/* 1. Stats Directory */}
                            <div>
                                <div className="flex justify-between items-end mb-4 flex-wrap gap-4">
                                    <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><LayoutDashboard className="text-indigo-600"/> Factory Directory</h2>
                                    
                                    <div className="flex items-center gap-3">
                                        <form onSubmit={handleSearchSubmit} className="relative group">
                                            <Search className="absolute left-3 top-2.5 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500" />
                                            <input type="text" placeholder="Search Machine..." className="pl-9 pr-4 py-2 border rounded-lg text-sm w-64 focus:ring-1 focus:ring-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                        </form>

                                        <button onClick={() => setShowScanner(true)} className="bg-white border px-3 py-2 rounded-lg hover:bg-slate-50 shadow-sm" title="Scan QR"><ScanLine className="w-4 h-4" /></button>
                                        
                                        <div className="flex bg-white rounded-lg border overflow-hidden shadow-sm">
                                            <input type="file" accept=".csv" ref={fileInputRef} className="hidden" onChange={handleImportCSV} />
                                            <button onClick={() => fileInputRef.current.click()} className="px-3 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50 border-r flex items-center gap-2"><Upload className="w-4 h-4"/> Import</button>
                                            <button onClick={handleExportCSV} className="px-3 py-2 text-sm font-bold text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><FileSpreadsheet className="w-4 h-4" /> Export</button>
                                        </div>

                                        {!adminMode ? (
                                            <button onClick={() => setShowAuthModal(true)} className="bg-white border px-4 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-slate-50 shadow-sm"><Lock className="w-4 h-4" /> Unlock Edit Mode</button>
                                        ) : (
                                            <button onClick={() => setAdminMode(false)} className="bg-indigo-100 text-indigo-700 border px-4 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-indigo-200 shadow-inner"><Unlock className="w-4 h-4" /> Lock Console</button>
                                        )}

                                        <button onClick={() => setIsAuthenticated(false)} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex gap-2 hover:bg-slate-300"><LogOut className="w-4 h-4"/> Logout</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-6 gap-4">
                                    <StatCard label="Plants" value={buildings.length} icon={Building} color="indigo" />
                                    <StatCard label="Sections" value={sections.length} icon={Layers} color="blue" />
                                    <StatCard label="Modules" value={modules.length} icon={Zap} color="purple" />
                                    <StatCard label="Active Floor" value={floorMachines.length} icon={Factory} color="slate" />
                                    <StatCard label="Yard Spares" value={yardMachines.length} icon={Warehouse} color="indigo" />
                                    <StatCard label="Breakdowns" value={brokenCount} icon={AlertTriangle} color="red" />
                                </div>
                            </div>

                            {/* 2. ACTIVE BREAKDOWNS */}
                            {brokenCount > 0 && (
                                <div className="animate-fade-in">
                                    <h3 className="text-xl font-bold text-red-700 mb-4 flex items-center gap-2"><AlertCircle className="w-6 h-6" /> Active Breakdowns ({brokenCount})</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {brokenMachines.map(m => (
                                            <div key={m.id} className="bg-red-50 border border-red-200 p-4 rounded-xl flex justify-between items-start shadow-sm group">
                                                <div>
                                                    <div className="font-bold text-red-900">{m.name}</div>
                                                    <div className="text-xs text-red-700 font-mono mt-1">{m.ticketId}</div>
                                                    <div className="text-sm text-red-800 mt-2">{m.issue}</div>
                                                </div>
                                                <div className="flex flex-col items-end gap-2">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${m.status === 'Pending' ? 'bg-red-200 text-red-800' : 'bg-yellow-200 text-yellow-800'}`}>{m.status}</span>
                                                    {adminMode && <button onClick={(e) => handleMoveToYard(e, m)} className="text-indigo-500 hover:text-indigo-700 bg-white p-1 rounded border hover:bg-indigo-50 transition-colors" title="Move to Yard"><Warehouse className="w-4 h-4"/></button>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 3. Facility Overview */}
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 mb-4">Facility Overview</h3>
                                <div className="space-y-4">
                                    {buildings.length === 0 && <div className="p-8 text-center text-slate-400 bg-white rounded-xl border border-dashed">Start by unlocking Edit Mode and adding a building.</div>}
                                    
                                    {buildings.map(b => (
                                        <div key={b.id} className={`border rounded-xl bg-white shadow-sm overflow-hidden transition-all ${adminMode ? 'border-indigo-200 ring-2 ring-indigo-50' : 'border-slate-200'}`}>
                                            <div className="flex justify-between items-center p-4 bg-white cursor-pointer hover:bg-slate-50" onClick={() => toggleBuilding(b.id)}>
                                                <div className="flex items-center gap-3">
                                                    {expandedBuildings[b.id] ? <ChevronDown className="w-5 h-5 text-slate-400"/> : <ChevronRight className="w-5 h-5 text-slate-400"/>}
                                                    <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Building className="w-5 h-5 text-indigo-600" /> {b.name}</h4>
                                                    <span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">{(sectionsMap[b.id] || []).length} Sections</span>
                                                </div>
                                                <div className="flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                                                    <Button variant="secondary" onClick={() => handlePrintQRs(b.name, getMachinesForBuilding(b.id))} className="text-xs py-1 h-8"><Printer className="w-3 h-3"/> Plant QRs</Button>
                                                    {adminMode && <button onClick={(e) => handleDelete(e, `buildings/${b.id}`, b.name)} className="p-2 bg-red-50 text-red-500 hover:text-white hover:bg-red-600 rounded border border-red-200 shadow-sm" title="Delete Building"><Trash2 className="w-4 h-4"/></button>}
                                                </div>
                                            </div>
                                            
                                            {expandedBuildings[b.id] && (
                                                <div className="p-6 border-t border-slate-100 bg-slate-50/50 space-y-6 animate-in slide-in-from-top-2 duration-200">
                                                    {(sectionsMap[b.id] || []).length === 0 && <p className="text-sm text-slate-400 italic pl-8">No sections added yet.</p>}
                                                    
                                                    {(sectionsMap[b.id] || []).map(section => (
                                                        <div key={section.id} className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                                                            <div className="flex items-center justify-between mb-4">
                                                                <h5 className="font-bold text-md text-slate-700 flex items-center gap-2"><Layers className="w-4 h-4 text-slate-400" /> {section.name}</h5>
                                                                <div className="flex items-center gap-2">
                                                                    <button onClick={() => handlePrintQRs(`${b.name} - ${section.name}`, getMachinesForSection(section.id))} className="text-xs text-indigo-600 hover:underline">Print Section QRs</button>
                                                                    {adminMode && <button onClick={(e) => handleDelete(e, `sections/${section.id}`, section.name)} className="text-red-300 hover:text-red-600 ml-2" title="Delete Section"><Trash2 className="w-4 h-4"/></button>}
                                                                </div>
                                                            </div>
                                                            
                                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                                                {(modulesMap[section.id] || []).map(mod => (
                                                                    <div key={mod.id} className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                                        <div className="flex justify-between items-center mb-3">
                                                                            <h5 className="font-bold text-slate-800 text-sm">{mod.name}</h5>
                                                                            <div className="flex items-center gap-1">
                                                                                <button onClick={() => handlePrintQRs(`${section.name} - ${mod.name}`, machinesMap[mod.id] || [])} className="p-1 hover:bg-slate-200 rounded"><Printer className="w-3 h-3 text-slate-400"/></button>
                                                                                {adminMode && <button onClick={(e) => handleDelete(e, `modules/${mod.id}`, mod.name)} className="p-1 hover:bg-red-50 rounded text-red-300 hover:text-red-600" title="Delete Module"><Trash2 className="w-3 h-3"/></button>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="space-y-1 max-h-48 overflow-y-auto">
                                                                            {(machinesMap[mod.id] || []).map(machine => (
                                                                                <div key={machine.id} id={`machine-${machine.id}`} className={`flex justify-between items-center p-2 rounded border text-xs shadow-sm transition-all duration-500 ${highlightedMachine === machine.id ? 'bg-yellow-100 border-yellow-400 ring-2 ring-yellow-300' : 'bg-white border-slate-100 hover:border-indigo-200'}`}>
                                                                                    <div>
                                                                                        <div className="flex items-center gap-2 truncate">
                                                                                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${machine.status === 'Running' ? 'bg-green-500' : machine.status === 'Pending' ? 'bg-red-500 animate-pulse' : 'bg-yellow-500'}`} title={machine.status}></div>
                                                                                            <div className="flex flex-col">
                                                                                                <span className="font-medium truncate text-slate-700">{machine.name} {machine.brand && <span className="font-normal italic text-[10px]">({machine.brand})</span>}</span>
                                                                                                {machine.model && <span className="text-[9px] text-slate-400">{machine.model}</span>}
                                                                                            </div>
                                                                                        </div>
                                                                                    </div>
                                                                                    <div className="flex items-center gap-1">
                                                                                        <button onClick={() => handlePrintQRs(machine.name, [machine])} title="Print QR" className="text-slate-300 hover:text-indigo-600"><QrCode className="w-3 h-3"/></button>
                                                                                        {adminMode && (
                                                                                            <>
                                                                                             <button onClick={(e) => handleMoveToYard(e, machine)} className="text-slate-400 hover:text-indigo-600" title="Move to Yard"><Warehouse className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => { e.stopPropagation(); setEditingMachine(machine); }} className="text-slate-400 hover:text-indigo-600" title="Edit Machine"><Edit3 className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => handleCloneMachine(e, machine)} className="text-slate-400 hover:text-blue-600" title="Clone Machine"><Copy className="w-3 h-3"/></button>
                                                                                             <button onClick={(e) => handleArchiveMachine(e, machine)} className="text-red-300 hover:text-red-600" title="Archive Machine"><Trash2 className="w-3 h-3"/></button>
                                                                                            </>
                                                                                        )}
                                                                                    </div>
                                                                                </div>
                                                                            ))}
                                                                            {(machinesMap[mod.id] || []).length === 0 && <p className="text-xs text-slate-400 italic">Empty module.</p>}
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                            {(modulesMap[section.id] || []).length === 0 && <p className="text-sm text-slate-400 italic">No modules in this section.</p>}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 4. MACHINE YARD (SPARES) */}
                            <div className="pt-8 border-t border-slate-200">
                                <h3 className="text-xl font-bold text-slate-700 mb-4 flex items-center gap-2"><Warehouse className="w-6 h-6 text-indigo-500"/> Machine Yard / Spares ({yardMachines.length})</h3>
                                <div className="bg-indigo-50/50 rounded-xl p-6 border border-indigo-100 max-h-80 overflow-y-auto">
                                    {yardMachines.length > 0 ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {yardMachines.map(m => (
                                                <div key={m.id} id={`machine-${m.id}`} className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col gap-2">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <div className="font-bold text-slate-800">{m.name}</div>
                                                            <div className="text-xs text-slate-400">{m.type} {m.brand && `• ${m.brand}`}</div>
                                                        </div>
                                                        <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold uppercase">{m.status}</span>
                                                    </div>
                                                    {adminMode && (
                                                        <div className="flex gap-2 mt-2 pt-2 border-t border-slate-100">
                                                            <button onClick={() => setEditingMachine(m)} className="flex-1 text-xs bg-indigo-50 text-indigo-700 py-1.5 rounded font-bold hover:bg-indigo-100 flex justify-center items-center gap-1"><ArrowRightLeft className="w-3 h-3"/> Reassign</button>
                                                            <button onClick={(e) => handleArchiveMachine(e, m)} className="px-2 text-xs bg-red-50 text-red-600 rounded hover:bg-red-100"><Trash2 className="w-3 h-3"/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center text-slate-400 py-4 italic">No machines currently in the yard.</div>
                                    )}
                                </div>
                            </div>

                            {/* 5. DELETED MACHINES (ARCHIVE) */}
                            {adminMode && (
                                <div className="pt-8 border-t border-slate-200">
                                    <h3 className="text-xl font-bold text-slate-600 mb-4 flex items-center gap-2"><Archive className="w-5 h-5"/> Recycle Bin / Archives ({archived_machines.length})</h3>
                                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 max-h-60 overflow-y-auto">
                                        {archived_machines.length > 0 ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {archived_machines.map(m => (
                                                    <div key={m.id} className="bg-white p-3 rounded border border-slate-200 text-sm shadow-sm flex flex-col gap-2">
                                                        <div className="flex justify-between items-start">
                                                            <div className="font-bold text-slate-800">{m.name}</div>
                                                            <div className="text-xs text-slate-400 font-mono">{new Date(m.archivedAt).toLocaleDateString()}</div>
                                                        </div>
                                                        <div className="text-xs text-red-600 bg-red-50 p-1 rounded">Reason: {m.archiveReason || m.deletionReason}</div>
                                                        <button onClick={() => handleRestore(m)} className="text-xs flex items-center gap-1 text-indigo-600 hover:text-indigo-800 self-end mt-auto font-bold"><RefreshCw className="w-3 h-3"/> Restore to Yard</button>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-center text-slate-400 py-4 italic">No archived machines.</div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<FactoryManagerApp />);
    </script>
</body>
</html>
