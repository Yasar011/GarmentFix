        const MachineDetailsModal = ({ machine, logs, onClose }) => {
            // Hooks must run on every render regardless of `machine`, so they're declared
            // before the early-return guard below.
            const [histFrom, setHistFrom] = useState("");
            const [histTo, setHistTo] = useState("");

            if (!machine) return null;

            const intervalDays = parseInt(machine.interval) || 30;
            const lastPM = machine.lastMaintenance ? new Date(machine.lastMaintenance) : null;
            const daysSincePM = lastPM ? Math.floor((new Date() - lastPM) / (1000 * 60 * 60 * 24)) : 999;
            const isPmValid = daysSincePM <= intervalDays;
            const pmStatus = isPmValid ? "Valid" : "Expired / Due";

            const history = logs.filter(l => l.machineId === machine.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            // "Any machine's data — just pick a time range, download, and send."
            const downloadHistoryCSV = () => {
                let rows = history;
                if (histFrom) rows = rows.filter(l => l.timestamp && l.timestamp.slice(0,10) >= histFrom);
                if (histTo) rows = rows.filter(l => l.timestamp && l.timestamp.slice(0,10) <= histTo);
                if (rows.length === 0) return alert("No history records in that date range.");
                const esc = (v) => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
                const header = ['Date', 'Time', 'Action', 'Details', 'Repair Time', 'Department', 'Worker'];
                const csvRows = rows.map(l => {
                    const d = new Date(l.timestamp);
                    return [d.toLocaleDateString(), d.toLocaleTimeString(), l.action || '-', l.details || '-', l.repairTime || '-', l.department || '-', l.userName || l.userId || '-'].map(esc).join(',');
                });
                const csv = [header.map(esc).join(','), ...csvRows].join('\r\n');
                const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${machine.name || machine.id}_history_${histFrom || 'all'}_to_${histTo || new Date().toISOString().slice(0,10)}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (

                                    <span className="font-medium text-slate-800">{machine.brand || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Model</span>
                                    <span className="font-medium text-slate-800">{machine.model || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Serial No.</span>
                                    <span className="font-medium text-slate-800">{machine.serial || "-"}</span>
                                </div>
                                <div className="p-3 bg-slate-50 rounded border text-sm">
                                    <span className="block text-xs text-slate-500 uppercase font-bold">Install Year</span>
                                    <span className="font-medium text-slate-800">{machine.year || "-"}</span>
                                </div>
                            </div>

                            {/* ASSET REGISTRY — the fields from the company's real machine-inventory sheet */}
                            <div>
                                <h4 className="font-bold text-slate-800 mb-2 border-b pb-2 flex items-center gap-2"><Tag className="w-4 h-4 text-indigo-600"/> Asset Registry</h4>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-3 bg-slate-50 rounded border text-sm">

        const QRScanner = ({ onScan, onClose, title }) => {
            useEffect(() => {
                const onScanSuccess = (decodedText) => {
                    html5QrcodeScanner.clear().then(() => {
                        onScan(decodedText);
                    }).catch(err => console.error("Failed to clear scanner", err));
                };
                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, (error) => {});
                return () => { try { html5QrcodeScanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title || "Scan QR Code"}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        const useFactoryData = () => {
            const [data, setData] = useState({ buildings: [], sections: [], modules: [], machines: [], users: [], logs: [], archived_machines: [], machineTransfers: [], machineBookings: [] });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                const endpoints = ['buildings', 'sections', 'modules', 'machines', 'users', 'logs', 'archived_machines', 'machineTransfers', 'machineBookings'];
                const unsubscribers = endpoints.map(endpoint => {
                    return onValue(ref(db, endpoint), (snapshot) => {
                        const val = snapshot.val();
                        const list = val ? Object.keys(val).map(key => ({id: key, ...val[key]})) : [];
                        setData(prev => ({ ...prev, [endpoint]: list }));
                        if(endpoint === 'machines') setLoading(false);
                    });
                });
                return () => unsubscribers.forEach(unsub => unsub());
            }, []);

            const maps = useMemo(() => ({
                sectionsMap: data.sections.reduce((acc, s) => { (acc[s.buildingId] = acc[s.buildingId] || []).push(s); return acc; }, {}),
                modulesMap: data.modules.reduce((acc, m) => { (acc[m.sectionId] = acc[m.sectionId] || []).push(m); return acc; }, {}),
                machinesMap: data.machines.reduce((acc, m) => { (acc[m.moduleId] = acc[m.moduleId] || []).push(m); return acc; }, {})
            }), [data.sections, data.modules, data.machines]);

            return { ...data, ...maps, loading };
        };

        const handlePrintQRs = (title, machinesList, resolveLocation) => {
            if(!machinesList || machinesList.length === 0) return alert("No machines found to print.");
            const locOf = (m) => (typeof resolveLocation === 'function' ? resolveLocation(m) : (m.moduleId === 'yard' ? 'Machine Yard / Spare' : '-'));

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Asset Labels - ${title}</title>
                    <style>
                        body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, 200px); gap: 20px; justify-content: center; }
                        .card { background: white; border: 2px solid #0f172a; padding: 14px; page-break-inside: avoid; border-radius: 8px; width: 180px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
                        img { width: 128px; height: 128px; object-fit: contain; margin-bottom: 10px; border: 1px solid #cbd5e1; padding: 4px; border-radius: 4px; }
                        .details { width: 100%; font-size: 11px; line-height: 1.5; color: #334155; }
                        .row { display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding: 3px 0; gap: 8px; }
                        .lbl { font-weight: 700; color: #64748b; white-space: nowrap; }
                        .val { text-align: right; font-weight: 600; color: #0f172a; word-break: break-word; }
                        @media print { .no-print { display: none; } body { padding: 0; background: white; } .card { box-shadow: none; border: 1px solid #000; } }
                    </style>
                </head>
                <body>
                    <div class="no-print" style="text-align:center; margin-bottom:20px;">
                        <h1>${title} Labels</h1>
                        <p style="color: #64748b; margin-bottom: 15px;">Print these cards or save as PDF to download them.</p>
                        <button onclick="window.print()" style="padding:12px 24px; background:#4f46e5; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px;">Print / Download Labels</button>
                    </div>
                    <div class="grid">
                        ${machinesList.map(m => `
                            <div class="card">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(m.id)}" alt="${m.name}" />
                                <div class="details">
                                    <div class="row"><span class="lbl">Model:</span><span class="val">${m.model || '-'}</span></div>
                                    <div class="row"><span class="lbl">Serial No:</span><span class="val">${m.serial || '-'}</span></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
        };

        const FactoryManagerApp = () => {
            const { buildings, sections, modules, machines, users, logs, archived_machines, machineTransfers, machineBookings, sectionsMap, modulesMap, machinesMap, loading } = useFactoryData();
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            // WHO is logged in and what they're allowed to do. Management can edit everything
            // (buildings/sections/modules/machines, transfers, CSV import, users); Planning,
            // Sampling and Technical can see all of it but only manage the Booking board.
            const [currentFactoryUser, setCurrentFactoryUser] = useState(null);
            const FACTORY_ROLES = ['Management', 'Planning', 'Sampling', 'Technical'];
            const canManageAll = currentFactoryUser?.factoryRole === 'Management';
            const [expandedBuildings, setExpandedBuildings] = useState({});
            const [highlightedMachine, setHighlightedMachine] = useState(null);
            
            const [adminMode, setAdminMode] = useState(false);
            const [adminName, setAdminName] = useState("Factory Admin");
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authError, setAuthError] = useState("");
            const [showScanner, setShowScanner] = useState(false);
            const [scannedMachineDetails, setScannedMachineDetails] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [editingMachine, setEditingMachine] = useState(null);
            const [showBreakdownsPanel, setShowBreakdownsPanel] = useState(false);

            // MACHINE BOOKING — production tells engineering, ahead of a style change: which
            // line (or "not decided yet"), what machine types/quantities they'll need, which of
            // the machines already on that line need to be swapped, and by when.
            const [showBookingsPanel, setShowBookingsPanel] = useState(false);
            const [showBookingModal, setShowBookingModal] = useState(false);
            const emptyBooking = { styleNumber: "", changeDate: "", moduleId: "", neededMachines: [], machinesToChange: {}, notes: "" };
            const [bookingForm, setBookingForm] = useState(emptyBooking);
            const [bookingTypeSel, setBookingTypeSel] = useState(MACHINE_TYPES[0]);
            const [bookingQtySel, setBookingQtySel] = useState(1);

            // GLOBAL FILTER BAR — narrows the Facility Overview tree AND the Yard at once.
            // With 1500+ machines loaded, browsing without filters is impractical.
            const [filterText, setFilterText] = useState("");
            const [filterSection, setFilterSection] = useState("");
            const [filterCondition, setFilterCondition] = useState("");
            const [filterStatus, setFilterStatus] = useState("");
            const filtersActive = !!(filterText.trim() || filterSection || filterCondition || filterStatus);
            const clearFilters = () => { setFilterText(""); setFilterSection(""); setFilterCondition(""); setFilterStatus(""); };

            const fileInputRef = useRef(null);

            const [newBuilding, setNewBuilding] = useState("");
            const [newSection, setNewSection] = useState({ name: "", buildingId: "" });
            const [newModule, setNewModule] = useState({ name: "", sectionId: "" });
            const [newMachine, setNewMachine] = useState({ name: "", brand: "", year: "", moduleId: "", model: "", serial: "", price: "", type: "Single Needle Lockstitch (SNLS)", interval: 30, lastMaintenance: "" });
            const [newFactoryUser, setNewFactoryUser] = useState({ name: "", username: "", password: "", factoryRole: "Planning" });
            const [editingFactoryUserId, setEditingFactoryUserId] = useState(null);

            const extractDate = (iso) => iso ? iso.split('T')[0] : "";

            const totalAssetValue = machines.reduce((acc, m) => acc + (parseFloat(m.price) || 0), 0);
            const depreciatedValue = machines.reduce((acc, m) => {
                const year = parseInt(m.year);
                if (!year) return acc + (parseFloat(m.price) || 0);
                const age = new Date().getFullYear() - year;
                const val = (parseFloat(m.price) || 0) * Math.pow(0.9, age); 
                return acc + val;
            }, 0);

            useEffect(() => {
                if(buildings.length > 0 && Object.keys(expandedBuildings).length === 0) {
                    const initial = {};
                    buildings.forEach(b => initial[b.id] = true);
                    setExpandedBuildings(initial);
                }
            }, [buildings]);

            // Filter sets
            const floorMachines = machines.filter(m => m.moduleId !== 'yard');
            const yardMachines = machines.filter(m => m.moduleId === 'yard');
            const brokenMachines = floorMachines.filter(m => m.status === 'Pending' || m.status === 'In Progress');
            const brokenCount = brokenMachines.length;

            const moduleById = useMemo(() => { const map = {}; modules.forEach(x => map[x.id] = x); return map; }, [modules]);

            // ORPHANED machines — moduleId points at a module that no longer exists, OR at a
            // module whose parent section/building was deleted. Either way they render nowhere
            // in the tree and aren't in the yard, so without this panel they'd be invisible.
            const knownModuleIds = useMemo(() => {
                // A module only "exists" if its whole chain is alive: module -> section -> building.
                const bldIds = new Set(buildings.map(b => b.id));
                const liveSecIds = new Set(sections.filter(s => bldIds.has(s.buildingId)).map(s => s.id));
                return new Set(modules.filter(m => liveSecIds.has(m.sectionId)).map(m => m.id));
            }, [modules, sections, buildings]);
            const orphanMachines = machines.filter(m => m.moduleId && m.moduleId !== 'yard' && !knownModuleIds.has(m.moduleId));
            const rescueOrphan = (m) => {
                if (!adminMode) return alert("Unlock Edit Mode first.");
                if (!isValidMachineId(m.id)) return alert("Corrupted record — delete it instead.");
                update(ref(db, `machines/${m.id}`), { moduleId: 'yard', status: 'In Yard' });
            };

            // One matcher shared by the tree, the yard, and the match counter.
            const machineMatches = (m) => {
                const q = filterText.trim().toLowerCase();
                if (q && !(`${m.name || ''} ${m.model || ''} ${m.serial || ''} ${m.barcode || ''} ${m.serviceBarcode || ''} ${m.farCode || ''} ${m.brand || ''}`.toLowerCase().includes(q))) return false;
                if (filterCondition && (m.condition || 'Working') !== filterCondition) return false;
                if (filterStatus) {
                    if (filterStatus === 'Breakdown') { if (m.status !== 'Pending' && m.status !== 'In Progress') return false; }
                    else if ((m.status || 'Running') !== filterStatus) return false;
                }
                if (filterSection) {
                    if (filterSection === 'yard') { if (m.moduleId !== 'yard') return false; }
                    else { const mod = moduleById[m.moduleId]; if (!mod || mod.sectionId !== filterSection) return false; }
                }
                return true;
            };
            const fMachinesFor = (modId) => (machinesMap[modId] || []).filter(machineMatches);
            const fYardMachines = yardMachines.filter(machineMatches);
            const totalMatches = machines.filter(machineMatches).length;

            const toggleBuilding = (id) => setExpandedBuildings(prev => ({...prev, [id]: !prev[id]}));

            const onAddBuilding = () => { if(newBuilding) { push(ref(db, 'buildings'), { name: newBuilding }); setNewBuilding(""); }};
            const onAddSection = () => { if(newSection.name && newSection.buildingId) { push(ref(db, 'sections'), newSection); setNewSection({name: "", buildingId: ""}); }};
            const onAddModule = () => { if(newModule.name && newModule.sectionId) { push(ref(db, 'modules'), newModule); setNewModule({name: "", sectionId: ""}); }};
            const onAddMachine = () => { 
                if(newMachine.name && newMachine.moduleId) {
                    const submission = {...newMachine, status: newMachine.moduleId === 'yard' ? 'In Yard' : 'Running', createdAt: new Date().toISOString()};
                    if (newMachine.lastMaintenance) submission.lastMaintenance = new Date(newMachine.lastMaintenance).toISOString();
                    else delete submission.lastMaintenance;

                    push(ref(db, 'machines'), submission);
                    setNewMachine({name: "", brand: "", year: "", moduleId: "", model: "", serial: "", price: "", type: "Single Needle Lockstitch (SNLS)", interval: 30, lastMaintenance: "" });
                }
            };

            // USER MANAGEMENT — Management-only. Grants/revokes Factory Manager access and role
            // (Management / Planning / Sampling / Technical) on top of the shared `users`
            // collection, without touching the AMMS-specific `role`/`department` fields on it.
            const factoryUsers = users.filter(u => !!u.factoryRole);
            const onSaveFactoryUser = () => {
                if (!newFactoryUser.name.trim() || !newFactoryUser.username.trim() || !newFactoryUser.password.trim()) {
                    return alert("Name, username, and password are all required.");
                }
                if (editingFactoryUserId) {
                    update(ref(db, `users/${editingFactoryUserId}`), { ...newFactoryUser });
                    setEditingFactoryUserId(null);
                } else {
                    if (users.some(u => u.username === newFactoryUser.username)) return alert("That username is already taken.");
                    push(ref(db, 'users'), { ...newFactoryUser });
                }
                setNewFactoryUser({ name: "", username: "", password: "", factoryRole: "Planning" });
            };
            const onEditFactoryUser = (u) => {
                setNewFactoryUser({ name: u.name || "", username: u.username || "", password: u.password || "", factoryRole: u.factoryRole });
                setEditingFactoryUserId(u.id);
            };
            const onDeleteFactoryUser = (u) => {
                if (!confirm(`Remove ${u.name}'s Factory Manager access? (Deletes the account entirely if it has no other role.)`)) return;
                if (u.role || u.department) update(ref(db, `users/${u.id}`), { factoryRole: null });
                else remove(ref(db, `users/${u.id}`));
            };

            const getMachinesForSection = (sId) => (modulesMap[sId] || []).flatMap(m => machinesMap[m.id] || []);
            const getMachinesForBuilding = (bId) => (sectionsMap[bId] || []).flatMap(s => getMachinesForSection(s.id));

            // Resolve a machine's printable location (Building > Section > Module) for QR labels.
            const resolveLocation = (m) => {
                if (!m || !m.moduleId || m.moduleId === 'yard') return 'Machine Yard / Spare';
                const mod = modules.find(x => x.id === m.moduleId);
                const sec = mod ? sections.find(s => s.id === mod.sectionId) : null;
                const bld = sec ? buildings.find(b => b.id === sec.buildingId) : null;
                return [bld && bld.name, sec && sec.name, mod && mod.name].filter(Boolean).join(' > ') || '-';
            };

            // Master override (admin/123) always logs in as Management; everyone else needs a
            // real user record with a factoryRole assigned (via User Management, Management-only).
            const checkCredentials = (u, p) => {
                if (u === 'admin' && p === '123') return { name: 'Factory Admin', username: 'admin', factoryRole: 'Management' };
                const match = users.find(user => user.username === u && user.password === p && user.factoryRole);
                return match || null;
            };

            // "Unlock Edit Mode" is a second, deliberate confirmation before structural changes
            // are allowed — kept as-is, but only reachable at all for Management (the button
            // that opens this modal is hidden for every other role).
            const handleAuthSubmit = (u, p) => {
                const result = checkCredentials(u, p);
                if (result && result.factoryRole === 'Management') { setAdminMode(true); setAdminName(result.name || u); setShowAuthModal(false); setAuthError(""); }
                else setAuthError("Invalid credentials, or this account isn't Management.");
            };

            // Worker-requested moves (from worker.html's "Request Transfer") wait here for
            // approval — Factory Manager is the only tool with the power to authorize a move.
            // Approving does NOT touch the machine yet — the worker must scan it on the floor
            // to actually finalize the move (machine.moduleId only changes at that point), so
            // a machine never silently teleports just because admin clicked a button.
            const pendingTransfers = machineTransfers.filter(t => t.status === 'Pending');
            const approveTransfer = (t) => {
                update(ref(db, `machineTransfers/${t.id}`), { status: 'Approved', approvedBy: adminName, approvedByName: adminName, approvedAt: new Date().toISOString() });
            };
            const rejectTransfer = (t) => {
                const reason = window.prompt("Reason for rejecting this move?") || '';
                update(ref(db, `machineTransfers/${t.id}`), { status: 'Rejected', approvedBy: adminName, approvedByName: adminName, approvedAt: new Date().toISOString(), rejectReason: reason });
            };

            // MACHINE BOOKING (style-change requests) — production books what they need for an
            // upcoming style ahead of time so engineering can plan the swap instead of
            // scrambling on changeover day.
            const bookingLineLabel = (moduleId) => {
                if (!moduleId) return 'Not decided yet';
                const mod = modules.find(x => x.id === moduleId);
                const sec = mod ? sections.find(s => s.id === mod.sectionId) : null;
                const bld = sec ? buildings.find(b => b.id === sec.buildingId) : null;
                return [bld && bld.name, sec && sec.name, mod && mod.name].filter(Boolean).join(' > ') || 'Unknown line';
            };
            // Machines currently sitting on the booking's chosen line, so production can check
            // off exactly which ones they think need to change (and to what/why).
            const bookingLineMachines = bookingForm.moduleId ? (machinesMap[bookingForm.moduleId] || []) : [];

            const addNeededMachine = () => {
                if (!bookingTypeSel || bookingQtySel < 1) return;
                setBookingForm(prev => {
                    const existing = prev.neededMachines.find(n => n.type === bookingTypeSel);
                    const neededMachines = existing
                        ? prev.neededMachines.map(n => n.type === bookingTypeSel ? { ...n, qty: n.qty + bookingQtySel } : n)
                        : [...prev.neededMachines, { type: bookingTypeSel, qty: bookingQtySel }];
                    return { ...prev, neededMachines };
                });
                setBookingQtySel(1);
            };
            const removeNeededMachine = (type) => setBookingForm(prev => ({ ...prev, neededMachines: prev.neededMachines.filter(n => n.type !== type) }));
            const toggleMachineToChange = (machine) => {
                setBookingForm(prev => {
                    const machinesToChange = { ...prev.machinesToChange };
                    if (machinesToChange[machine.id]) delete machinesToChange[machine.id];
                    else machinesToChange[machine.id] = { machineLabel: `${machine.machineName || machine.name || 'Unnamed machine'} (${machine.model || '-'} · SN ${machine.serial || '-'})`, changeNote: '' };
                    return { ...prev, machinesToChange };
                });
            };
            const setChangeNote = (machineId, note) => setBookingForm(prev => ({ ...prev, machinesToChange: { ...prev.machinesToChange, [machineId]: { ...prev.machinesToChange[machineId], changeNote: note } } }));

            const submitBooking = () => {
                if (!bookingForm.styleNumber.trim()) return alert("Style number is required.");
                if (!bookingForm.changeDate) return alert("Pick the date this change is needed by.");
                if (bookingForm.neededMachines.length === 0 && Object.keys(bookingForm.machinesToChange).length === 0) {
                    return alert("Add at least one needed machine type, or mark a machine that needs to change.");
                }
                push(ref(db, 'machineBookings'), {
                    styleNumber: bookingForm.styleNumber.trim(),
                    changeDate: bookingForm.changeDate,
                    moduleId: bookingForm.moduleId || null,
                    lineLabel: bookingLineLabel(bookingForm.moduleId),
                    neededMachines: bookingForm.neededMachines,
                    machinesToChange: Object.entries(bookingForm.machinesToChange).map(([machineId, v]) => ({ machineId, ...v })),
                    notes: bookingForm.notes.trim(),
                    status: 'Pending',
                    requestedBy: currentFactoryUser?.name || 'Production',
                    requestedByRole: currentFactoryUser?.factoryRole || null,
                    requestedAt: new Date().toISOString()
                });
                setBookingForm(emptyBooking);
                setShowBookingModal(false);
                alert("Booking sent to the engineering team.");
            };
            const updateBookingStatus = (b, status) => update(ref(db, `machineBookings/${b.id}`), { status, [`${status.toLowerCase()}At`]: new Date().toISOString(), [`${status.toLowerCase()}By`]: currentFactoryUser?.name || 'Unknown' });
            const deleteBooking = (b) => { if (confirm(`Delete the booking for style ${b.styleNumber}?`)) remove(ref(db, `machineBookings/${b.id}`)); };
            const bookingsSorted = machineBookings.slice().sort((a, b) => new Date(a.changeDate) - new Date(b.changeDate));

            // A machine object missing a real Firebase key (id undefined, or the literal
            // string "undefined" from a previously-corrupted record) must never be written
            // to `machines/${id}` — that silently creates/re-creates a garbage node with no
            // name/model/serial that then shows up blank everywhere. Refuse and tell the user
            // to delete the broken row instead of trying to edit it.
            const isValidMachineId = (id) => !!id && id !== 'undefined' && id !== 'null';

            const handleUpdateMachine = (id, updatedData) => {
                if (!isValidMachineId(id)) return alert("This machine record has no valid ID (it's corrupted) — delete it instead of editing it.");
                // Adjust status if moved to/from yard
                if (updatedData.moduleId === 'yard' && updatedData.status !== 'In Yard') updatedData.status = 'In Yard';
                else if (updatedData.moduleId !== 'yard' && updatedData.status === 'In Yard') updatedData.status = 'Running';

                update(ref(db, `machines/${id}`), updatedData).then(() => setEditingMachine(null)).catch(err => alert("Update failed: " + err.message));
            };

            const handleCloneMachine = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock first.");
                const countStr = prompt(`How many copies of "${machine.name}" do you want to create?`, "1");
                const count = parseInt(countStr);
                if(count > 0 && count <= 50) {
                    for(let i=1; i<=count; i++) {
                         const copy = { ...machine };
                         delete copy.id; 
                         copy.name = `${machine.name} (Copy ${i})`;
                         copy.createdAt = new Date().toISOString();
                         push(ref(db, 'machines'), copy);
                    }
                }
            };

            const handleMoveToYard = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock first.");
                if (!isValidMachineId(machine.id)) return alert("This machine record is corrupted (no valid ID) — delete it instead.");
                if(confirm(`Move ${machine.name} off the floor and into the Machine Yard?`)) {
                    update(ref(db, `machines/${machine.id}`), { moduleId: 'yard', status: 'In Yard' });
                }
            };

            const handleArchiveMachine = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock Edit Mode first.");
                if (!isValidMachineId(machine.id)) return alert("This machine record is corrupted (no valid ID) — use Permanent Delete instead.");
                const reason = prompt(`Why are you archiving ${machine.name}?`);
                if(reason === null) return;

                const archiveData = { ...machine, archivedAt: new Date().toISOString(), deletionReason: reason || "No reason provided", deletedBy: "Admin" };
                set(ref(db, `archived_machines/${machine.id}`), archiveData)
                    .then(() => remove(ref(db, `machines/${machine.id}`)))
                    .catch(err => alert("Error archiving: " + err.message));
            };

            const handlePermanentDeleteMachine = (e, machine) => {
                e.stopPropagation();
                if(!adminMode) return alert("Unlock Edit Mode first.");
                // Corrupted records (no valid id) still need to be deletable — fall back to the
                // literal "undefined" path so a broken row can always be cleaned up.
                const targetId = isValidMachineId(machine.id) ? machine.id : 'undefined';
                if(confirm(`⚠️ PERMANENT DELETE\n\nAre you sure you want to permanently delete "${machine.name || '(corrupted record)'}" from the database? This cannot be undone.`)) {
                    remove(ref(db, `machines/${targetId}`)).catch(err => console.error(err));
                    remove(ref(db, `archived_machines/${targetId}`)).catch(err => console.error(err));
                }
            };

            const handleDelete = (e, path, name) => {
                e.stopPropagation(); e.preventDefault();
                if(!adminMode) return alert("Unlock Edit Mode first.");
                if(confirm(`⚠️ PERMANENT DELETE\n\nDelete ${name}? Data inside will be lost.`)) remove(ref(db, path)).catch(err => alert("Delete Error: " + err.message));
            };

            const handleRestore = (machine) => {
                const restoreData = { ...machine };
                delete restoreData.archivedAt; delete restoreData.deletionReason; delete restoreData.deletedBy;
                // Default to yard when restored to prevent breaking floor UI
                restoreData.moduleId = 'yard';
                restoreData.status = 'In Yard';
                set(ref(db, `machines/${machine.id}`), restoreData)
                    .then(() => remove(ref(db, `archived_machines/${machine.id}`)))
                    .catch(err => alert("Error restoring: " + err.message));
            };

            // Header order mirrors the company's real machine-inventory export exactly (Group
            // Name ... FAR Code), with the app's own hierarchy/operational columns appended
            // after — so this file round-trips through Excel and re-imports cleanly.
            const CSV_HEADERS = [
                'Group Name','Owned Company','Machine Type','Machine Name','Barcode','Serial No','Model',
                'Owned Factory','Current Factory','Building','Section','Module','Last Scanned On','In-Transit',
                'Machine Age','Ownership Status','Condition','Service Barcode','FAR Code',
                'Machine ID','Name','Brand','Year','Price','PM Interval (Days)','Operational Status','Last Maintenance'
            ];

            const handleExportCSV = () => {
                const esc = (v) => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
                const rows = [CSV_HEADERS.map(esc).join(',')];

                const appendRow = (bName, sName, modName, m) => {
                    rows.push([
                        m.groupName || '', m.ownedCompany || '', m.assetCategory || '', m.machineName || '', m.barcode || '',
                        m.serial || '', m.model || '', m.ownedFactory || '', m.currentFactory || '',
                        bName, sName, modName,
                        m.lastScannedOn ? new Date(m.lastScannedOn).toLocaleDateString() : '',
                        m.inTransit ? 'In-Transit' : 'Not In-Transit',
                        m.machineAge || '', m.ownershipStatus || 'Own', m.condition || 'Working',
                        m.serviceBarcode || m.id, m.farCode || '',
                        m.id, m.name || '', m.brand || '', m.year || '', m.price || '0', m.interval || '30',
                        m.status || '', m.lastMaintenance ? new Date(m.lastMaintenance).toLocaleDateString() : ''
                    ].map(esc).join(','));
                };

                buildings.forEach(b => {
                    (sectionsMap[b.id] || []).forEach(s => {
                        (modulesMap[s.id] || []).forEach(mod => {
                            (machinesMap[mod.id] || []).forEach(m => appendRow(b.name, s.name, mod.name, m));
                        });
                    });
                });

                yardMachines.forEach(m => appendRow(m.currentFactory || 'YARD', 'Yard', 'Machine Yard', m));

                const csv = rows.join('\r\n');
                const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.setAttribute("download", `factory_inventory_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            // Full-text, quote-aware CSV parser. Must scan the WHOLE file (not split by line
            // first) because real exports from the asset-registry system sometimes contain a
            // quoted cell with a literal embedded line break (e.g. a wrapped column header like
            // "Owned\nFactory") — a naive `text.split(/\r?\n/)` would chop that single logical
            // row into two, corrupting every column after it.
            const parseCSV = (text) => {
                const rows = [];
                let row = [], cur = '', inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (inQuotes) {
                        if (ch === '"' && text[i + 1] === '"') { cur += '"'; i++; }
                        else if (ch === '"') inQuotes = false;
                        else cur += ch;
                    } else {
                        if (ch === '"') inQuotes = true;
                        else if (ch === ',') { row.push(cur); cur = ''; }
                        else if (ch === '\r') { /* ignore, \n (or EOF) ends the row */ }
                        else if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
                        else cur += ch;
                    }
                }
                if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
                return rows.map(r => r.map(c => c.trim()));
            };

            // Collapse embedded newlines/whitespace runs in a header cell so a wrapped column
            // header (e.g. "Owned\nFactory") still matches the plain "Owned Factory" lookup name.
            const normalizeHeader = (h) => String(h || '').replace(/\s+/g, ' ').trim().toLowerCase();

            // Splits their real "Line Name" path (e.g. "BEL-BEAI3-BEAI3-Production-Line 10")
            // into building/section/module. Segment 3 is the section, everything after is the
            // module name (module names can themselves contain dashes, e.g. none in practice but
            // safe either way). A "Yard" section maps to the app's special 'yard' sentinel
            // instead of a real module, so it stays compatible with the rest of the app's
            // yard/spare handling.
            const parseLineName = (lineName, fallbackFactory) => {
                const segs = lineName.split('-').map(s => s.trim()).filter(Boolean);
                const building = fallbackFactory || segs[2] || segs[0] || 'Unknown Plant';
                const section = segs[3] || '';
                const module = segs.slice(4).join('-').trim();
                return { building, section, module };
            };

            // Excel sometimes exports date cells as raw serial numbers if the sheet cell wasn't
            // formatted as text/date before saving to CSV — tolerate that alongside normal dates.
            const parseMaybeDate = (v) => {
                if (!v) return null;
                if (/^\d+(\.\d+)?$/.test(v)) {
                    const serial = parseFloat(v);
                    return new Date(Math.round((serial - 25569) * 86400 * 1000));
                }
                const d = new Date(v);
                return isNaN(d.getTime()) ? null : d;
            };

            // A machine mid-repair must never have its location/status silently overwritten by a
            // CSV re-sync — only these "idle" statuses are safe to touch.
            const IDLE_STATUSES = ['Running', 'In Yard', undefined, null, ''];

            const handleImportCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!adminMode) { alert("Unlock Edit Mode first — importing can move existing machines."); fileInputRef.current.value = ""; return; }

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result.replace(/^﻿/, '');
                    const allRows = parseCSV(text).filter(r => r.some(c => c.trim() !== ''));
                    if (allRows.length < 2) { alert("No data rows found in the file."); fileInputRef.current.value = ""; return; }

                    // Real exports from the asset-registry system have several blank/title rows
                    // (report name, generated-on date, etc.) before the actual header — find the
                    // row that actually looks like a header instead of assuming row 0.
                    let headerRowIdx = allRows.findIndex(r => r.some(c => normalizeHeader(c) === 'machine name'));
                    if (headerRowIdx === -1) headerRowIdx = 0;
                    const headers = allRows[headerRowIdx];
                    const dataRows = allRows.slice(headerRowIdx + 1);

                    const idx = (name) => headers.findIndex(h => normalizeHeader(h) === normalizeHeader(name));
                    const get = (cols, name) => { const i = idx(name); return i >= 0 ? (cols[i] || '').trim() : ''; };
                    const norm = (v) => String(v || '').trim().toLowerCase();

                    // Re-importing an updated snapshot of the same fleet (machines that moved
                    // module, moved to/from the yard, changed condition, etc.) must UPDATE the
                    // existing record, not create a duplicate. Match by Barcode first (the asset
                    // tag), then Service Barcode, then Serial No — whichever the sheet actually
                    // has filled in for that row.
                    const byBarcode = {}, byService = {}, bySerial = {};
                    machines.forEach(m => {
                        if (m.barcode) byBarcode[norm(m.barcode)] = m.id;
                        if (m.serviceBarcode) byService[norm(m.serviceBarcode)] = m.id;
                        if (m.serial) bySerial[norm(m.serial)] = m.id;
                    });
                    const machineById = {}; machines.forEach(m => { machineById[m.id] = m; });
                    const findExisting = (cols) => {
                        const barcode = norm(get(cols, 'Barcode'));
                        const svc = norm(get(cols, 'Service Barcode'));
                        const serial = norm(get(cols, 'Serial No') || get(cols, 'Serial'));
                        if (barcode && byBarcode[barcode]) return byBarcode[barcode];
                        if (svc && byService[svc]) return byService[svc];
                        if (serial && bySerial[serial]) return bySerial[serial];
                        return null;
                    };

                    // PASS 1 — figure out the Building/Section/Module (or Yard) each row needs,
                    // and whether it matches an existing machine. Nothing is written yet.
                    const planned = [];
                    let skipped = 0;
                    for (const cols of dataRows) {
                        const mName = get(cols, 'Name') || get(cols, 'Machine Name');
                        if (!mName) { skipped++; continue; }

                        let bName = get(cols, 'Building'), sName = get(cols, 'Section'), modName = get(cols, 'Module');
                        const currentFactory = get(cols, 'Current Factory');
                        if (!bName && get(cols, 'Line Name')) {
                            const parsed = parseLineName(get(cols, 'Line Name'), currentFactory);
                            bName = parsed.building; sName = parsed.section; modName = parsed.module;
                        }
                        bName = bName || currentFactory || 'Unknown Plant';

                        planned.push({ cols, mName, bName, sName, modName, currentFactory, existingId: findExisting(cols) });
                    }

                    // PASS 2 — resolve/create the (small number of distinct) Building > Section >
                    // Module combos up front, sequentially, so two rows needing the same new
                    // module don't race and create it twice.
                    const bMap = {}; buildings.forEach(b => bMap[b.name] = b.id);
                    const sMap = {}; sections.forEach(s => sMap[`${s.buildingId}_${s.name}`] = s.id);
                    const modMap = {}; modules.forEach(mod => modMap[`${mod.sectionId}_${mod.name}`] = mod.id);
                    const moduleIdFor = {}; // keyed by `${bName}|${sName}|${modName}` -> resolved moduleId

                    for (const p of planned) {
                        const isYard = !p.sName || p.sName.toLowerCase() === 'yard' || !p.modName;
                        const key = isYard ? '__yard__' : `${p.bName}|${p.sName}|${p.modName}`;
                        if (moduleIdFor[key] !== undefined) continue;
                        if (isYard) { moduleIdFor[key] = 'yard'; continue; }

                        let bId = bMap[p.bName] || (await push(ref(db, 'buildings'), { name: p.bName })).key; bMap[p.bName] = bId;
                        let sId = sMap[`${bId}_${p.sName}`] || (await push(ref(db, 'sections'), { name: p.sName, buildingId: bId })).key; sMap[`${bId}_${p.sName}`] = sId;
                        let modId = modMap[`${sId}_${p.modName}`] || (await push(ref(db, 'modules'), { name: p.modName, sectionId: sId })).key; modMap[`${sId}_${p.modName}`] = modId;
                        moduleIdFor[key] = modId;
                    }

                    // PASS 3 — every hierarchy node now exists, so the machine writes themselves
                    // are independent and can go out in parallel instead of one round-trip at a time.
                    let created = 0, updated = 0, locationSkipped = 0;
                    const writes = planned.map(p => {
                        const isYard = !p.sName || p.sName.toLowerCase() === 'yard' || !p.modName;
                        const key = isYard ? '__yard__' : `${p.bName}|${p.sName}|${p.modName}`;
                        const modId = moduleIdFor[key];
                        const cols = p.cols;

                        const lastScanned = parseMaybeDate(get(cols, 'Last Scanned On') || get(cols, 'Last Scaned On'));
                        const lastMaint = parseMaybeDate(get(cols, 'Last Maintenance'));
                        const inTransitRaw = (get(cols, 'In-Transit') || '').toLowerCase();

                        // Fields that come straight from the sheet, shared by create and update.
                        const fields = {
                            name: p.mName,
                            groupName: get(cols, 'Group Name') || 'Brandix',
                            ownedCompany: get(cols, 'Owned Company'),
                            assetCategory: get(cols, 'Machine Type'),
                            machineName: get(cols, 'Machine Name'),
                            barcode: get(cols, 'Barcode'),
                            serial: get(cols, 'Serial No') || get(cols, 'Serial'),
                            model: get(cols, 'Model'),
                            ownedFactory: get(cols, 'Owned Factory'),
                            currentFactory: p.currentFactory,
                            type: get(cols, 'Machine Type') || 'Other',
                            inTransit: inTransitRaw.includes('not') ? false : !!inTransitRaw,
                            machineAge: get(cols, 'Machine Age'),
                            ownershipStatus: get(cols, 'Ownership Status') || get(cols, 'Status') || 'Own',
                            condition: get(cols, 'Condition') || 'Working',
                            serviceBarcode: get(cols, 'Service Barcode'),
                            farCode: get(cols, 'FAR Code')
                        };
                        if (get(cols, 'Brand')) fields.brand = get(cols, 'Brand');
                        if (get(cols, 'Year')) fields.year = get(cols, 'Year');
                        if (get(cols, 'Price')) fields.price = get(cols, 'Price');
                        if (get(cols, 'PM Interval (Days)')) fields.interval = get(cols, 'PM Interval (Days)');
                        if (lastScanned) fields.lastScannedOn = lastScanned.toISOString();
                        if (lastMaint) fields.lastMaintenance = lastMaint.toISOString();

                        if (p.existingId) {
                            // UPDATE — never overwrite fields not listed here (assignedTo, issue,
                            // ticketId, department, etc. all stay untouched via a partial update).
                            const existing = machineById[p.existingId];
                            if (existing.moduleId !== modId) {
                                if (IDLE_STATUSES.includes(existing.status)) {
                                    fields.moduleId = modId;
                                    fields.status = modId === 'yard' ? 'In Yard' : 'Running';
                                    push(ref(db, 'logs'), {
                                        machineId: p.existingId, action: 'Moved (CSV Sync)', department: null,
                                        userId: 'import', userName: adminName || 'CSV Import',
                                        details: `Location updated from registry sync (${p.mName}).`,
                                        timestamp: new Date().toISOString()
                                    });
                                } else {
                                    locationSkipped++; // machine has an active ticket — location left alone
                                }
                            }
                            updated++;
                            return update(ref(db, `machines/${p.existingId}`), fields);
                        }

                        // CREATE — brand new asset not seen before.
                        fields.moduleId = modId;
                        fields.price = fields.price || '0';
                        fields.interval = fields.interval || '30';
                        fields.status = modId === 'yard' ? 'In Yard' : 'Running';
                        fields.createdAt = new Date().toISOString();
                        created++;
                        return push(ref(db, 'machines'), fields);
                    });

                    await Promise.all(writes);
                    alert(`Synced ${writes.length} machines — ${created} new, ${updated} updated.${locationSkipped ? ` ${locationSkipped} location change(s) held back (machine has an active ticket).` : ''}${skipped ? ` ${skipped} row(s) skipped — missing a name.` : ''}`);
                    fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };

            const findAndScrollToMachine = (query) => {
                // Exact matches on the unique identifiers first (ID / barcode / service barcode /
                // serial), then fuzzy on name/model — and never crash on records missing a field.
                const q = String(query || '').trim().toLowerCase();
                if (!q) return null;
                const lc = (v) => String(v || '').toLowerCase();
                const machine =
                    machines.find(m => lc(m.id) === q || lc(m.barcode) === q || lc(m.serviceBarcode) === q || lc(m.serial) === q) ||
                    machines.find(m => lc(m.name).includes(q) || lc(m.model).includes(q) || lc(m.serial).includes(q) || lc(m.barcode).includes(q));
                if (machine) {
                    if (machine.moduleId === 'yard') {
                        setHighlightedMachine(machine.id);
                        setTimeout(() => document.getElementById(`machine-${machine.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                        setTimeout(() => setHighlightedMachine(null), 5000);
                        return machine;
                    }

                    const mod = modules.find(m => m.id === machine.moduleId);
                    const section = sections.find(s => s.id === mod?.sectionId);
                    const building = buildings.find(b => b.id === section?.buildingId);
                    
                    if (building) {
                        setExpandedBuildings(prev => ({ ...prev, [building.id]: true }));
                        setHighlightedMachine(machine.id);
                        setTimeout(() => document.getElementById(`machine-${machine.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                        setTimeout(() => setHighlightedMachine(null), 5000);
                        return machine; 
                    }
                }
                return null; 
            };

            const handleSearchSubmit = (e) => {
                e.preventDefault();
                if(searchTerm) {
                    const machine = findAndScrollToMachine(searchTerm);
                    if(machine) setScannedMachineDetails(machine); 
                    else alert("Machine not found.");
                }
            };

            const handleScanFind = (data) => {
                const machine = findAndScrollToMachine(data);
                if (machine) setScannedMachineDetails(machine); else alert("Machine not found.");
                setShowScanner(false);
            };

            const [initialCreds, setInitialCreds] = useState({u: '', p: ''});
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <Card className="w-full max-w-md p-8">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Factory className="w-8 h-8 text-indigo-600" /></div>
                                <h1 className="text-2xl font-bold text-slate-800">Factory Manager</h1>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault(); const result = checkCredentials(initialCreds.u, initialCreds.p); if (result) { setCurrentFactoryUser(result); setIsAuthenticated(true); } else alert("Invalid credentials, or this account has no Factory Manager role assigned yet — ask Management to add you."); }} className="space-y-4">
                                <input className="w-full p-3 border rounded-lg" placeholder="Username" value={initialCreds.u} onChange={e => setInitialCreds({...initialCreds, u: e.target.value})} />
                                <input className="w-full p-3 border rounded-lg" type="password" placeholder="Password" value={initialCreds.p} onChange={e => setInitialCreds({...initialCreds, p: e.target.value})} />
                                <Button className="w-full">Access Tool</Button>
                            </form>
                        </Card>
                    </div>
                );
            }

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="w-10 h-10 animate-spin text-indigo-600" /></div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <AuthModal isOpen={showAuthModal} onClose={() => { setShowAuthModal(false); setAuthError(""); }} onConfirm={handleAuthSubmit} error={authError} />
                    <MachineDetailsModal machine={scannedMachineDetails} logs={logs} onClose={() => setScannedMachineDetails(null)} />
                    <EditMachineModal machine={editingMachine} modulesMap={modulesMap} sections={sections} buildings={buildings} onClose={() => setEditingMachine(null)} onSave={handleUpdateMachine} />
                    {showScanner && <QRScanner onScan={handleScanFind} onClose={() => setShowScanner(false)} title="Scan to Find Machine" />}

                    {/* ACTIVE BREAKDOWNS — moved off the main page into a slide-over so it
                        doesn't push the whole Facility Overview down; opened from the stat card. */}
                    {showBreakdownsPanel && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/50" onClick={() => setShowBreakdownsPanel(false)}></div>
                            <div className="relative w-full max-w-md bg-slate-50 h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-200">
                                <div className="p-4 bg-red-600 text-white flex justify-between items-center shrink-0">
                                    <h3 className="font-bold text-lg flex items-center gap-2"><AlertCircle className="w-5 h-5"/> Active Breakdowns ({brokenCount})</h3>
                                    <button onClick={() => setShowBreakdownsPanel(false)}><X className="w-5 h-5"/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                    {brokenMachines.length === 0 && <p className="text-center text-slate-400 italic py-8">No active breakdowns.</p>}
                                    {brokenMachines.map(m => (
                                        <div key={m.id} className="bg-white border border-red-200 p-4 rounded-xl shadow-sm">
                                            <div className="flex justify-between items-start gap-2">
                                                <div className="min-w-0">
                                                    <div className="font-bold text-red-900 truncate">{m.machineName || m.name || 'Unnamed machine'}</div>
                                                    <div className="text-[10px] text-red-400 truncate">{m.model || '-'} · SN {m.serial || '-'}</div>
                                                    <div className="text-xs text-red-700 font-mono mt-1">{m.ticketId} · {resolveLocation(m)}</div>
                                                </div>
