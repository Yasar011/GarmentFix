<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMS - Mechanical Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sticky-col {
            position: sticky;
            left: 0;
            background-color: #f8fafc;
            z-index: 10;
            border-right: 2px solid #e2e8f0;
        }

        @media print {
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print\:bg-white { background: white !important; }
            .print\:border-none { border: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Users, Wrench, AlertTriangle, History, Zap, CheckCircle, 
            Clock, PlusCircle, Trash2, Factory, LogOut, Activity, BarChart2,
            Lock, LogIn, User, Edit, ScanLine, Camera, CheckSquare, X, ClipboardList, Timer,
            Calendar, Search, Package, MessageSquare, ShieldAlert, Check, FileText, Printer
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, push, update, remove } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MACHINE_TYPES = ['Flatlock', 'Zigzag', 'Flatseam', 'Single needle', 'Overlock', 'Bartack'];

        const KPIBox = ({ title, value, unit, color }) => (
            <div className={`bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between`}>
                <div className="text-[10px] font-bold uppercase text-slate-500 tracking-wider mb-2">{title}</div>
                <div className="flex items-baseline gap-1">
                    <div className={`text-4xl font-bold text-${color}-600`}>{value}</div>
                    <span className="text-sm font-medium text-slate-400">{unit}</span>
                </div>
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", disabled = false, size = "md", fullWidth = false }) => {
            const variants = {
                primary: "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-50 text-red-600 hover:bg-red-100",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                outline: "border border-slate-300 text-slate-700 hover:bg-slate-50"
            };
            const sizes = { sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            return (
                <button onClick={onClick} disabled={disabled} className={`rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${variants[variant]} ${sizes[size]} ${fullWidth ? 'w-full' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ status }) => {
            const styles = {
                "Pending": "bg-red-100 text-red-800 border-red-200 animate-pulse",
                "In Progress": "bg-yellow-100 text-yellow-800 border-yellow-200",
                "Available": "bg-emerald-100 text-emerald-800 border-emerald-200",
                "Offline": "bg-slate-100 text-slate-500 border-slate-200",
                "Critical": "bg-red-600 text-white font-bold shadow-sm"
            };
            return <span className={`px-2 py-1 rounded text-[10px] font-bold border uppercase tracking-wide ${styles[status] || 'bg-slate-100 text-slate-800'}`}>{status}</span>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>
                {children}
            </div>
        );

        const QRScanner = ({ onScan, onClose, title }) => {
            useEffect(() => {
                const onScanSuccess = (decodedText) => {
                    html5QrcodeScanner.clear().then(() => {
                        onScan(decodedText);
                    }).catch(err => console.error("Failed to clear scanner", err));
                };

                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, (error) => {});

                return () => { try { html5QrcodeScanner.clear(); } catch(e) {} };
            }, [onScan]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-xl w-full max-w-md overflow-hidden relative">
                        <div className="p-3 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><ScanLine className="w-5 h-5"/> {title || "Scan QR Code"}</h3>
                            <button onClick={onClose}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-4 bg-black"><div id="reader" className="w-full"></div></div>
                        <div className="p-4 text-center text-sm text-slate-500">Point camera at machine QR code</div>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="p-4 border-b flex justify-between items-center bg-slate-50 shrink-0">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-slate-500" /></button>
                        </div>
                        <div className="p-4 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        const MaintenanceDashboard = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginError, setLoginError] = useState("");
            const [creds, setCreds] = useState({ username: "", password: "" });

            const [activeTab, setActiveTab] = useState('tickets'); 
            const [tickets, setTickets] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [machines, setMachines] = useState({}); 
            
            const [showScanner, setShowScanner] = useState(false);
            const [scanTargetTicket, setScanTargetTicket] = useState(null);
            const [signOffTicket, setSignOffTicket] = useState(null);
            const [signOffData, setSignOffData] = useState({ operatorId: "", remarks: "" });

            const [editingWorkerId, setEditingWorkerId] = useState(null);
            const [newWorker, setNewWorker] = useState({ 
                name: "", username: "", password: "", department: "Mechanical", role: "technician", 
                status: "Offline", mechanicType: "Jr Mechanic", section: "Section A", assignedLines: "", idNumber: "", shift: "Shift 1",
                skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
            });

            const [partRequests, setPartRequests] = useState([]);
            const [shiftNotes, setShiftNotes] = useState([]);
            const [healthSearch, setHealthSearch] = useState("");
            const [selectedHealthMachine, setSelectedHealthMachine] = useState(null);
            const [newShiftNote, setNewShiftNote] = useState("");

            // REPORTING STATE
            const [reportType, setReportType] = useState('daily');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [reportMachine, setReportMachine] = useState("");
            const [reportShift, setReportShift] = useState("all");

            const mechanicalWorkers = allUsers.filter(u => u.department === 'Mechanical' || u.role === 'admin');

            useEffect(() => {
                onValue(ref(db, 'department_tickets/mechanical'), (snap) => setTickets(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'users'), (snap) => setAllUsers(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'logs'), (snap) => setLogs(snap.val() ? Object.values(snap.val()) : []));
                onValue(ref(db, 'machines'), (snap) => setMachines(snap.val() || {}));
                onValue(ref(db, 'partRequests'), (snap) => setPartRequests(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'shiftNotes'), (snap) => setShiftNotes(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
            }, []);

            const getMachineName = (id) => machines[id]?.name || id;

            const formatDuration = (ms) => {
                if(!ms || ms < 0) return "0m";
                const minutes = Math.floor(ms / 60000);
                const hours = Math.floor(minutes / 60);
                if (hours > 0) return `${hours}h ${minutes % 60}m`;
                return `${minutes}m`;
            };

            const calculateAverage = (skillsObj) => {
                if (!skillsObj) return 0;
                let total = 0;
                MACHINE_TYPES.forEach(type => { total += (parseInt(skillsObj[type]) || 0); });
                return Math.round(total / MACHINE_TYPES.length) || 0;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const user = allUsers.find(u => u.username === creds.username && u.password === creds.password);
                if (user) {
                    if (user.department === 'Mechanical' || user.role === 'admin') {
                        setCurrentUser(user);
                        setLoginError("");
                        if(user.role !== 'admin') setActiveTab('my_tasks'); 
                    } else {
                        setLoginError("Access Denied: This hub is restricted to Mechanical Department staff only.");
                    }
                } else if (creds.username === 'admin' && creds.password === '123') {
                    setCurrentUser({ id: 'admin', name: 'System Admin', role: 'admin', department: 'Mechanical' });
                } else {
                    setLoginError("Invalid username or password.");
                }
            };

            const handleDeleteWorker = (id) => {
                if(window.confirm("Remove this mechanic from the database?")) {
                    remove(ref(db, `users/${id}`));
                }
            };

            const handleSkillChange = (machine, value) => {
                let val = parseInt(value) || 0;
                if(val > 100) val = 100;
                if(val < 0) val = 0;
                setNewWorker({ ...newWorker, skills: { ...newWorker.skills, [machine]: val } });
            };

            const handleSaveWorker = () => {
                if(newWorker.name && newWorker.username && newWorker.password) {
                    if (editingWorkerId) {
                        update(ref(db, `users/${editingWorkerId}`), newWorker);
                        setEditingWorkerId(null);
                    } else {
                        push(ref(db, 'users'), newWorker);
                    }
                    setNewWorker({ 
                        name: "", username: "", password: "", department: "Mechanical", role: "technician", 
                        status: "Offline", mechanicType: "Jr Mechanic", section: "Section A", assignedLines: "", idNumber: "", shift: "Shift 1",
                        skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                    });
                } else {
                    alert("Please fill name, username, and password");
                }
            };

            const handleEditWorker = (worker) => {
                setNewWorker({
                    name: worker.name || "", username: worker.username || "", password: worker.password || "",
                    department: worker.department || "Mechanical", role: worker.role || "technician", status: worker.status || "Offline",
                    mechanicType: worker.mechanicType || "Jr Mechanic", section: worker.section || "Section A", assignedLines: worker.assignedLines || "",
                    idNumber: worker.idNumber || "", shift: worker.shift || "Shift 1",
                    skills: worker.skills || { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                });
                setEditingWorkerId(worker.id);
                document.getElementById('worker-form-section')?.scrollIntoView({ behavior: 'smooth' });
            };

            const handleAssignToMe = (ticket) => {
                update(ref(db, `department_tickets/mechanical/${ticket.id}`), {
                    assignedTo: currentUser.id,
                    assignedAt: new Date().toISOString()
                });
            };

            const handleScanVerify = (decodedText) => {
                if (decodedText === scanTargetTicket.machineId || machines[decodedText]?.name === scanTargetTicket.machineId) {
                    update(ref(db, `department_tickets/mechanical/${scanTargetTicket.id}`), {
                        status: 'In Progress',
                        startedAt: new Date().toISOString()
                    });
                    update(ref(db, `machines/${scanTargetTicket.machineId}`), { status: 'In Progress' });
                    setShowScanner(false);
                    setScanTargetTicket(null);
                } else {
                    alert(`Wrong Machine! You scanned ${decodedText}, but expected ${scanTargetTicket.machineId}`);
                    setShowScanner(false);
                }
            };

            const handleSignOffSubmit = () => {
                if(!signOffData.operatorId) return alert("Operator ID is required for sign-off.");
                
                const now = new Date();
                const startedAt = new Date(signOffTicket.startedAt);
                const assignedAt = signOffTicket.assignedAt ? new Date(signOffTicket.assignedAt) : new Date(signOffTicket.timestamp);
                const reportedAt = new Date(signOffTicket.timestamp);

                const responseMs = startedAt - assignedAt;
                const repairMs = now - startedAt;
                const downtimeMs = now - reportedAt;

                push(ref(db, 'logs'), {
                    machineId: signOffTicket.machineId,
                    action: 'Fixed',
                    userId: currentUser.id,
                    userName: currentUser.name,
                    operatorSignOff: signOffData.operatorId,
                    details: signOffData.remarks,
                    timestamp: now.toISOString(),
                    repairTime: formatDuration(repairMs),
                    metrics: { responseMs, repairMs, downtimeMs }
                });

                remove(ref(db, `department_tickets/mechanical/${signOffTicket.id}`));
                update(ref(db, `machines/${signOffTicket.machineId}`), {
                    status: 'Running', assignedTo: null, issue: null
                });

                setSignOffTicket(null);
                setSignOffData({ operatorId: "", remarks: "" });
            };

            const filteredReportLogs = useMemo(() => {
                return logs.filter(log => {
                    if (log.action !== 'Fixed' && log.action !== 'PM Completed') return false; 

                    const logDateObj = new Date(log.timestamp);
                    const logDate = logDateObj.toISOString().split('T')[0];
                    const logHour = logDateObj.getHours();

                    let dateMatch = true;
                    if (reportType === 'daily') dateMatch = logDate === startDate;
                    if (reportType === 'weekly') {
                        const s = new Date(startDate);
                        const e = new Date(startDate);
                        e.setDate(e.getDate() + 7);
                        dateMatch = logDateObj >= s && logDateObj <= e;
                    }
                    if (reportType === 'monthly') dateMatch = logDate.slice(0, 7) === startDate.slice(0, 7);
                    if (reportType === 'custom') dateMatch = logDate >= startDate && logDate <= endDate;

                    let shiftMatch = true;
                    if (reportShift === 'shift1') shiftMatch = logHour >= 6 && logHour < 14;
                    if (reportShift === 'shift2') shiftMatch = logHour >= 14 && logHour < 22;

                    let machineMatch = true;
                    if (reportMachine) {
                        const mName = getMachineName(log.machineId);
                        machineMatch = mName.toLowerCase().includes(reportMachine.toLowerCase()) || log.machineId.toLowerCase().includes(reportMachine.toLowerCase());
                    }

                    return dateMatch && shiftMatch && machineMatch;
                }).reverse();
            }, [logs, reportType, startDate, endDate, reportMachine, reportShift, machines]);

            const reportStats = useMemo(() => {
                const total = filteredReportLogs.length;
                const totalResponseMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.responseMs || 0), 0);
                const totalRepairMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                const totalDowntimeMs = filteredReportLogs.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);

                return {
                    total,
                    avgResponse: total ? formatDuration(totalResponseMs / total) : "0m",
                    avgRepair: total ? formatDuration(totalRepairMs / total) : "0m",
                    totalDowntime: formatDuration(totalDowntimeMs)
                };
            }, [filteredReportLogs]);

            const stats = useMemo(() => {
                const fixes = logs.filter(l => l.action === 'Fixed');
                const totalFixes = fixes.length;
                const totalDowntime = fixes.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);
                const totalRepair = fixes.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                
                return {
                    mtbf: totalFixes ? (totalDowntime / totalFixes / 3600000).toFixed(1) : "8392.4",
                    mttrRepair: totalFixes ? (totalRepair / totalFixes / 60000).toFixed(0) : "0",
                    mttrRecovery: totalFixes ? (totalDowntime / totalFixes / 60000).toFixed(0) : "0",
                    repairs: totalFixes
                };
            }, [logs]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border-t-8 border-indigo-600 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><Wrench className="w-32 h-32" /></div>
                            <div className="text-center mb-8 relative z-10">
                                <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Lock className="w-8 h-8 text-indigo-600" />
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800">Mechanical Hub</h1>
                                <p className="text-slate-500 font-medium">Authorized Personnel Only</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded mb-6 text-sm font-bold border border-red-200 text-center">{loginError}</div>}
                            
                            <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Username / ID</label>
                                    <input type="text" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="e.g. prasad.274" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                    <input type="password" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="••••••••" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                                </div>
                                <Button fullWidth size="lg" className="mt-4"><LogIn className="w-5 h-5"/> Secure Login</Button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 font-sans">
                    <div className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10 shrink-0 print:hidden">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <Wrench className="w-8 h-8 text-indigo-400" />
                            <span className="text-xl font-bold tracking-tight">Mechanical Hub</span>
                        </div>
                        
                        <div className="p-6 bg-slate-800/50 mb-4 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-lg text-white">
                                {currentUser.name.charAt(0)}
                            </div>
                            <div>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">{currentUser.mechanicType || currentUser.role}</p>
                                <p className="font-bold text-sm tracking-wide truncate">{currentUser.name}</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 overflow-y-auto pb-4">
                            {currentUser.role !== 'admin' && (
                                <button onClick={() => setActiveTab('my_tasks')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'my_tasks' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                    <ClipboardList className="w-5 h-5" /> My Tasks
                                </button>
                            )}
                            {currentUser.role === 'admin' && (
                                <button onClick={() => setActiveTab('tickets')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'tickets' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                    <AlertTriangle className="w-5 h-5" /> All Pending Tickets
                                </button>
                            )}
                            <button onClick={() => setActiveTab('analytics')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'analytics' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <BarChart2 className="w-5 h-5" /> Reliability Analytics
                            </button>
                            <button onClick={() => setActiveTab('mechanic_downtime')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'mechanic_downtime' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <Timer className="w-5 h-5" /> Mechanic Downtime
                            </button>
                            <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'reports' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <FileText className="w-5 h-5" /> Reporting & Export
                            </button>
                            <button onClick={() => setActiveTab('pm_schedule')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'pm_schedule' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <Calendar className="w-5 h-5" /> PM Scheduler
                            </button>
                            <button onClick={() => setActiveTab('parts')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'parts' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <Package className="w-5 h-5" /> Part Approvals 
                                {partRequests.filter(r => r.status==='Pending').length > 0 && <span className="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">{partRequests.filter(r => r.status==='Pending').length}</span>}
                            </button>
                            <button onClick={() => setActiveTab('handover')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'handover' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                <MessageSquare className="w-5 h-5" /> Shift Handover
                            </button>

                                                    <th className="p-3 border-r border-slate-200">Role/Type</th>
                                                    <th className="p-3 border-r border-slate-200">Total Jobs Completed</th>
                                                    <th className="p-3 border-r border-slate-200 text-orange-600">Total Response Time</th>
                                                    <th className="p-3 border-r border-slate-200 text-indigo-600">Total Repair Time (Wrench Time)</th>
                                                    <th className="p-3 text-red-600 font-bold">Total Downtime Contribution</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-200">
                                                {mechanicalWorkers.map(w => {
                                                    const workerLogs = logs.filter(l => l.userId === w.id && l.action === 'Fixed');
                                                    const totalJobs = workerLogs.length;
                                                    
                                                    const totalResponseMs = workerLogs.reduce((acc, l) => acc + (l.metrics?.responseMs || 0), 0);
                                                    const totalRepairMs = workerLogs.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                                                    const totalDowntimeMs = workerLogs.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);

                                                    const toHours = (ms) => (ms / (1000 * 60 * 60)).toFixed(2);

                                                    if(totalJobs === 0) return null;

                                                    return (
                                                        <tr key={w.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-3 border-r border-slate-200 font-bold text-slate-600 text-center">{w.section || "-"}</td>
                                                            <td className="p-3 border-r border-slate-200 font-bold text-slate-800 text-left">{w.name}</td>
                                                            <td className="p-3 border-r border-slate-200 font-bold text-slate-600 text-center">{w.assignedLines || "-"}</td>
                                                            <td className="p-3 border-r border-slate-200 text-xs text-slate-500">{w.mechanicType || w.role}</td>
                                                            <td className="p-3 border-r border-slate-200 font-bold">{totalJobs}</td>
                                                            <td className="p-3 border-r border-slate-200 text-orange-600 font-mono">{toHours(totalResponseMs)}h</td>
                                                            <td className="p-3 border-r border-slate-200 text-indigo-600 font-mono">{toHours(totalRepairMs)}h</td>
                                                            <td className="p-3 text-red-600 font-bold font-mono bg-red-50/30">{toHours(totalDowntimeMs)}h</td>
                                                        </tr>
                                                    )
                                                })}
                                                {logs.length === 0 && <tr><td colSpan="8" className="p-8 text-slate-400 italic">No historical data available to generate downtime details.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SKILL MATRIX TAB */}
                        {activeTab === 'workers' && (
                            <div className="max-w-[1400px] mx-auto animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Users className="text-indigo-600"/> Machine Wise Mechanic Skill Percentage</h2>
                                </div>
                                
                                {/* SKILL MATRIX PIVOT TABLE */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-300 overflow-hidden mb-8 relative">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-center text-sm border-collapse min-w-max">
                                            <thead className="bg-slate-100 text-slate-800 uppercase text-[11px] font-bold tracking-wider border-b-2 border-slate-300">
                                                <tr>
                                                    <th className="p-3 border-r-2 border-slate-300 sticky-col font-bold">Machine type</th>
                                                    {mechanicalWorkers.map(w => (
                                                        <th key={w.id} className="p-3 border-r border-slate-200 writing-vertical" style={{ minWidth: '100px' }}>
                                                            <div className="flex justify-between items-center w-full group">
                                                                <span className="truncate" title={w.name}>{w.name}</span>
                                                                <div className="flex opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => handleEditWorker(w)} className="text-blue-400 hover:text-blue-600 mx-1" title="Edit Mechanic"><Edit className="w-3 h-3"/></button>
                                                                    <button onClick={() => handleDeleteWorker(w.id)} className="text-red-400 hover:text-red-600" title="Delete Mechanic"><Trash2 className="w-3 h-3"/></button>
                                                                </div>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-200">
                                                {MACHINE_TYPES.map(type => (
                                                    <tr key={type} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-3 font-bold text-slate-700 bg-slate-50 sticky-col text-left border-r-2 border-slate-300 shadow-[1px_0_5px_rgba(0,0,0,0.05)]">{type}</td>
                                                        {mechanicalWorkers.map(w => (
                                                            <td key={`${w.id}-${type}`} className="p-3 border-r border-slate-200 font-medium">
                                                                {w.skills?.[type] || 0}%
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                                {/* AVERAGE ROW */}
                                                <tr className="bg-slate-100 border-t-2 border-slate-300 font-bold">
                                                    <td className="p-3 text-slate-800 sticky-col text-left border-r-2 border-slate-300">Average</td>
                                                    {mechanicalWorkers.map(w => (
                                                        <td key={`${w.id}-avg`} className="p-3 border-r border-slate-200 text-indigo-700">
                                                            {calculateAverage(w.skills)}%
                                                        </td>
                                                    ))}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    {mechanicalWorkers.length === 0 && (
                                        <div className="p-8 text-center text-slate-500 italic border-t border-slate-200">
                                            No mechanics found. Add staff below to build the skill matrix.
                                        </div>
                                    )}
                                </div>

                                {/* ADD/EDIT MECHANIC FORM */}
                                <div id="worker-form-section" className="bg-white rounded-xl shadow-sm border border-slate-300 p-6">
                                    <h3 className="font-bold text-lg mb-6 flex items-center gap-2 border-b pb-4">
                                        {editingWorkerId ? <Edit className="w-5 h-5 text-blue-600"/> : <PlusCircle className="w-5 h-5 text-indigo-600"/>} 
                                        {editingWorkerId ? "Edit Mechanic Profile" : "Onboard New Mechanic"}
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {/* Basic Info */}
                                        <div className="space-y-4">
                                            <h4 className="text-sm font-bold text-slate-700 uppercase">Basic Info</h4>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Full Name</label>
                                                    <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="e.g. Prasad" value={newWorker.name} onChange={e => setNewWorker({...newWorker, name: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">ID Number</label>
                                                    <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="e.g. EMP-1234" value={newWorker.idNumber} onChange={e => setNewWorker({...newWorker, idNumber: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Type</label>
                                                    <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" value={newWorker.mechanicType} onChange={e => setNewWorker({...newWorker, mechanicType: e.target.value})}>
                                                        <option>Jr Mechanic</option>
                                                        <option>Sr Mechanic</option>
                                                        <option>Mechanical Admin</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Section</label>
                                                    <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" value={newWorker.section} onChange={e => setNewWorker({...newWorker, section: e.target.value})}>
                                                        <option value="Section A">Section A</option>
                                                        <option value="Section B">Section B</option>
                                                        <option value="Both">Both (A & B)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Shift</label>
                                                    <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" value={newWorker.shift} onChange={e => setNewWorker({...newWorker, shift: e.target.value})}>
                                                        <option value="Shift 1">Shift 1 (6 AM - 2 PM)</option>
                                                        <option value="Shift 2">Shift 2 (2 PM - 10 PM)</option>
                                                        <option value="Both">Both / General Shift</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Assigned Line(s)</label>
                                                <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Line 1, 2" value={newWorker.assignedLines} onChange={e => setNewWorker({...newWorker, assignedLines: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Login ID / Username</label>
                                                <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="e.g. prasad-274" value={newWorker.username} onChange={e => setNewWorker({...newWorker, username: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                                <input type="password" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="••••••••" value={newWorker.password} onChange={e => setNewWorker({...newWorker, password: e.target.value})} />
                                            </div>
                                        </div>

                                        {/* Skill Percentages */}
                                        <div className="md:col-span-2">
                                            <h4 className="text-sm font-bold text-slate-700 uppercase mb-4 flex justify-between items-center">
                                                Machine Skill Profile (%)
                                                <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold">Avg: {calculateAverage(newWorker.skills)}%</span>
                                            </h4>
                                            <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                {MACHINE_TYPES.map(type => (
                                                    <div key={type}>
                                                        <label className="block text-xs font-bold text-slate-500 tracking-wide mb-1">{type}</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="number" 
                                                                min="0" max="100"
                                                                className="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all pr-8 font-bold text-indigo-700" 
                                                                value={newWorker.skills[type]} 
                                                                onChange={e => handleSkillChange(type, e.target.value)} 
                                                            />
                                                            <span className="absolute right-3 top-2.5 text-slate-400 font-bold">%</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-6 flex justify-end gap-3">
                                                {editingWorkerId && (
                                                    <Button size="lg" variant="secondary" onClick={() => {
                                                        setEditingWorkerId(null);
                                                        setNewWorker({ 
                                                            name: "", username: "", password: "", department: "Mechanical", role: "technician", status: "Offline",
                                                            mechanicType: "Jr Mechanic", section: "Section A", assignedLines: "", idNumber: "", shift: "Shift 1",
                                                            skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                                                        });
                                                    }}>Cancel Edit</Button>
                                                )}
                                                <Button size="lg" onClick={handleSaveWorker} className="px-8">
                                                    <CheckCircle className="w-5 h-5"/> 
                                                    {editingWorkerId ? "Update Mechanic" : "Save Mechanic to Matrix"}
                                                </Button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PM SCHEDULER TAB */}
                        {activeTab === 'pm_schedule' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Calendar className="text-indigo-600"/> Preventive Maintenance Scheduler</h2>
                                <Card className="p-6">
                                    <div className="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-xl mb-6 flex items-start gap-3">
                                        <ShieldAlert className="w-5 h-5 shrink-0 mt-0.5" />
                                        <p className="text-sm">Machines are recommended for preventive service every 30 days. Clicking "Trigger PM" generates an AI-routed ticket for the mechanical team to inspect and oil the machine before a critical failure occurs.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {Object.values(machines).slice(0,20).map(m => (
                                            <div key={m.id} className="flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-indigo-300 transition-colors">
                                                <div>
                                                    <div className="font-bold text-slate-800 text-lg">{m.name}</div>
                                                    <div className="text-xs text-slate-500 flex items-center gap-1 mt-1">
                                                        <Clock className="w-3 h-3"/> Last Serviced: <span className="font-bold text-slate-700">{m.lastMaintenance ? new Date(m.lastMaintenance).toLocaleDateString() : 'Never'}</span>
                                                    </div>
                                                </div>
                                                <Button size="sm" variant="outline" onClick={() => {
                                                    const ticketId = `#PM-${Math.floor(1000 + Math.random() * 9000)}`;
                                                    push(ref(db, 'department_tickets/mechanical'), {
                                                        machineId: m.id,
                                                        issueDescription: "Scheduled Preventive Maintenance",
                                                        priority: "Normal",
                                                        status: "Pending",
                                                        timestamp: new Date().toISOString(),
                                                        ticketId: ticketId,
                                                        isPM: true
                                                    });
                                                    alert(`PM Ticket created for ${m.name}`);
                                                }}>Trigger PM</Button>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* PARTS APPROVAL TAB */}
                        {activeTab === 'parts' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Package className="text-indigo-600"/> Spare Parts Requisition</h2>
                                <Card className="p-6">
                                    {partRequests.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400 border-2 border-dashed rounded-xl">
                                            <Package className="w-12 h-12 mx-auto mb-3 opacity-50"/>
                                            <p>No pending part requests from the floor.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {partRequests.filter(r => r.status === 'Pending').map(req => (
                                                <div key={req.id} className="flex justify-between items-center p-5 bg-orange-50 border-l-4 border-l-orange-500 border border-orange-200 rounded-xl shadow-sm">
                                                    <div>
                                                        <div className="font-bold text-orange-900 text-xl">{req.partName}</div>
                                                        <div className="text-sm text-orange-800 mt-1">Requested by: <span className="font-bold">{req.techName}</span></div>
                                                        <div className="text-xs bg-white border border-orange-100 inline-block px-2 py-1 rounded text-orange-600 mt-2 font-mono">Machine: {getMachineName(req.machineId)}</div>
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        <Button size="md" variant="success" onClick={() => update(ref(db, `partRequests/${req.id}`), { status: 'Approved' })}><Check className="w-4 h-4"/> Approve Request</Button>
                                                        <Button size="sm" variant="danger" className="bg-white" onClick={() => remove(ref(db, `partRequests/${req.id}`))}>Reject</Button>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {partRequests.filter(r => r.status === 'Approved').length > 0 && (
                                                <>
                                                    <h3 className="font-bold text-sm text-slate-400 uppercase mt-8 mb-2 border-b pb-2">Recently Approved</h3>
                                                    <div className="space-y-2">
                                                        {partRequests.filter(r => r.status === 'Approved').map(req => (
                                                            <div key={req.id} className="flex justify-between items-center p-3 bg-slate-50 border border-slate-200 rounded-lg opacity-75">
                                                                <div>
                                                                    <span className="font-bold text-slate-700">{req.partName}</span>
                                                                    <span className="text-xs text-slate-500 ml-2">({req.techName})</span>
                                                                </div>
                                                                <span className="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded font-bold uppercase tracking-wide">Approved</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </Card>
                            </div>
                        )}

                        {/* SHIFT HANDOVER TAB */}
                        {activeTab === 'handover' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><MessageSquare className="text-indigo-600"/> Shift Handover Log</h2>
                                <Card className="p-6 mb-8 bg-gradient-to-r from-indigo-50 to-blue-50 border-indigo-100 shadow-inner">
                                    <h3 className="font-bold text-indigo-900 mb-3">Leave a note for the incoming shift manager</h3>
                                    <textarea 
                                        className="w-full p-4 border border-indigo-200 rounded-xl bg-white h-28 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none resize-none shadow-sm text-sm" 
                                        placeholder="e.g., Machine 42 is waiting for a motor from stores. Leave it offline until A-Shift arrives." 
                                        value={newShiftNote} 
                                        onChange={e => setNewShiftNote(e.target.value)}>
                                    </textarea>
                                    <div className="flex justify-end">
                                        <Button size="lg" onClick={() => {
                                            if(!newShiftNote) return;
                                            push(ref(db, 'shiftNotes'), {
                                                author: currentUser.name,
                                                note: newShiftNote,
                                                timestamp: new Date().toISOString()
                                            });
                                            setNewShiftNote("");
                                        }}><CheckCircle className="w-5 h-5"/> Post Handover Note</Button>
                                    </div>
                                </Card>
                                <div className="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                                    {shiftNotes.slice().reverse().map((note, idx) => (
                                        <div key={note.id} className={`relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active`}>
                                            <div className="flex items-center justify-center w-10 h-10 rounded-full border border-white bg-slate-200 text-slate-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                                <MessageSquare className="w-4 h-4" />
                                            </div>
                                            <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                                <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                                                    <span className="font-bold text-slate-800 text-sm">{note.author}</span>
                                                    <span className="text-xs text-slate-400 font-mono bg-slate-50 px-2 py-0.5 rounded">{new Date(note.timestamp).toLocaleString()}</span>
                                                </div>
                                                <p className="text-slate-600 text-sm whitespace-pre-wrap">{note.note}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {shiftNotes.length === 0 && <p className="text-center text-slate-400 italic mt-8 relative z-10 bg-slate-50 py-2 w-48 mx-auto rounded-full">No handover notes logged.</p>}
                                </div>
                            </div>
                        )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MaintenanceDashboard />);
    </script>
</body>
</html>
