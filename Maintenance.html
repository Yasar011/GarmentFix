<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMMS - Mechanical Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
    <style>
        /* Custom scrollbar for the skill matrix */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sticky-col {
            position: sticky;
            left: 0;
            background-color: #f8fafc;
            z-index: 10;
            border-right: 2px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Users, Wrench, AlertTriangle, History, Zap, CheckCircle, 
            Clock, PlusCircle, Trash2, Factory, LogOut, Activity, BarChart2,
            Lock, LogIn, User, Edit
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, push, update, remove } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MACHINE_TYPES = ['Flatlock', 'Zigzag', 'Flatseam', 'Single needle', 'Overlock', 'Bartack'];

        const KPIBox = ({ title, value, unit, color }) => (
            <div className={`bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between`}>
                <div className="text-[10px] font-bold uppercase text-slate-500 tracking-wider mb-2">{title}</div>
                <div className="flex items-baseline gap-1">
                    <div className={`text-4xl font-bold text-${color}-600`}>{value}</div>
                    <span className="text-sm font-medium text-slate-400">{unit}</span>
                </div>
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", disabled = false, size = "md", fullWidth = false }) => {
            const variants = {
                primary: "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-red-50 text-red-600 hover:bg-red-100",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                outline: "border border-slate-300 text-slate-700 hover:bg-slate-50"
            };
            const sizes = { sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            return (
                <button onClick={onClick} disabled={disabled} className={`rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${variants[variant]} ${sizes[size]} ${fullWidth ? 'w-full' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ status }) => {
            const styles = {
                "Pending": "bg-red-100 text-red-800 border-red-200 animate-pulse",
                "In Progress": "bg-yellow-100 text-yellow-800 border-yellow-200",
                "Available": "bg-emerald-100 text-emerald-800 border-emerald-200",
                "Offline": "bg-slate-100 text-slate-500 border-slate-200",
                "Critical": "bg-red-600 text-white font-bold shadow-sm"
            };
            return <span className={`px-2 py-1 rounded text-[10px] font-bold border uppercase tracking-wide ${styles[status] || 'bg-slate-100 text-slate-800'}`}>{status}</span>;
        };

        const MaintenanceDashboard = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginError, setLoginError] = useState("");
            const [creds, setCreds] = useState({ username: "", password: "" });

            const [activeTab, setActiveTab] = useState('tickets'); // tickets, workers, analytics
            const [tickets, setTickets] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [machines, setMachines] = useState({}); // Store machines to translate IDs to Names
            
            // Worker Form State
            const [editingWorkerId, setEditingWorkerId] = useState(null);
            const [newWorker, setNewWorker] = useState({ 
                name: "", username: "", password: "", department: "Mechanical", role: "technician", status: "Offline",
                skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
            });

            // Only show Mechanical department workers in this hub
            const mechanicalWorkers = allUsers.filter(u => u.department === 'Mechanical' || u.role === 'admin');

            useEffect(() => {
                onValue(ref(db, 'department_tickets/mechanical'), (snap) => setTickets(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'users'), (snap) => setAllUsers(snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : []));
                onValue(ref(db, 'logs'), (snap) => setLogs(snap.val() ? Object.values(snap.val()) : []));
                onValue(ref(db, 'machines'), (snap) => setMachines(snap.val() || {}));
            }, []);

            // Helper to translate ugly Firebase ID to readable Machine Name
            const getMachineName = (id) => machines[id]?.name || id;

            const handleLogin = (e) => {
                e.preventDefault();
                const user = allUsers.find(u => u.username === creds.username && u.password === creds.password);
                if (user) {
                    if (user.department === 'Mechanical' || user.role === 'admin') {
                        setCurrentUser(user);
                        setLoginError("");
                    } else {
                        setLoginError("Access Denied: This hub is restricted to Mechanical Department staff only.");
                    }
                } else if (creds.username === 'admin' && creds.password === '123') {
                    setCurrentUser({ id: 'admin', name: 'System Admin', role: 'admin', department: 'Mechanical' });
                } else {
                    setLoginError("Invalid username or password.");
                }
            };

            const stats = useMemo(() => {
                const fixes = logs.filter(l => l.action === 'Fixed');
                const totalFixes = fixes.length;
                const totalDowntime = fixes.reduce((acc, l) => acc + (l.metrics?.downtimeMs || 0), 0);
                const totalRepair = fixes.reduce((acc, l) => acc + (l.metrics?.repairMs || 0), 0);
                
                return {
                    mtbf: totalFixes ? (totalDowntime / totalFixes / 3600000).toFixed(1) : "8392.4",
                    mttrRepair: totalFixes ? (totalRepair / totalFixes / 60000).toFixed(0) : "0",
                    mttrRecovery: totalFixes ? (totalDowntime / totalFixes / 60000).toFixed(0) : "0",
                    repairs: totalFixes
                };
            }, [logs]);

            const handleSkillChange = (machine, value) => {
                let val = parseInt(value) || 0;
                if(val > 100) val = 100;
                if(val < 0) val = 0;
                setNewWorker({
                    ...newWorker,
                    skills: { ...newWorker.skills, [machine]: val }
                });
            };

            const handleSaveWorker = () => {
                if(newWorker.name && newWorker.username && newWorker.password) {
                    if (editingWorkerId) {
                        // Update existing worker
                        update(ref(db, `users/${editingWorkerId}`), newWorker);
                        setEditingWorkerId(null);
                    } else {
                        // Create new worker
                        push(ref(db, 'users'), newWorker);
                    }
                    
                    // Reset Form
                    setNewWorker({ 
                        name: "", username: "", password: "", department: "Mechanical", role: "technician", status: "Offline",
                        skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                    });
                } else {
                    alert("Please fill name, username, and password");
                }
            };

            const handleEditWorker = (worker) => {
                setNewWorker({
                    name: worker.name || "", username: worker.username || "", password: worker.password || "",
                    department: worker.department || "Mechanical", role: worker.role || "technician", status: worker.status || "Offline",
                    skills: worker.skills || { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                });
                setEditingWorkerId(worker.id);
                document.getElementById('worker-form-section')?.scrollIntoView({ behavior: 'smooth' });
            };

            const handleDeleteWorker = (id) => {
                if(confirm("Delete this mechanic?")) {
                    remove(ref(db, `users/${id}`));
                }
            };

            // Calculate average skill for a single worker
            const calculateAverage = (skillsObj) => {
                if (!skillsObj) return 0;
                let total = 0;
                MACHINE_TYPES.forEach(type => { total += (skillsObj[type] || 0); });
                return Math.round(total / MACHINE_TYPES.length);
            };

            // --- LOGIN VIEW ---
            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border-t-8 border-indigo-600 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><Wrench className="w-32 h-32" /></div>
                            <div className="text-center mb-8 relative z-10">
                                <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Lock className="w-8 h-8 text-indigo-600" />
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800">Mechanical Hub</h1>
                                <p className="text-slate-500 font-medium">Authorized Personnel Only</p>
                            </div>
                            
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded mb-6 text-sm font-bold border border-red-200 text-center">{loginError}</div>}
                            
                            <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Username / ID</label>
                                    <input type="text" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="e.g. prasad.274" value={creds.username} onChange={e => setCreds({...creds, username: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                    <input type="password" className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50" placeholder="••••••••" value={creds.password} onChange={e => setCreds({...creds, password: e.target.value})} />
                                </div>
                                <Button fullWidth size="lg" className="mt-4"><LogIn className="w-5 h-5"/> Secure Login</Button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- MAIN DASHBOARD VIEW ---
            return (
                <div className="flex h-screen bg-slate-50 font-sans">
                    {/* SIDEBAR NAVIGATION */}
                    <div className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10 shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <Wrench className="w-8 h-8 text-indigo-400" />
                            <span className="text-xl font-bold tracking-tight">Mechanical Hub</span>
                        </div>
                        
                        <div className="p-6 bg-slate-800/50 mb-4 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-lg text-white">
                                {currentUser.name.charAt(0)}
                            </div>
                            <div>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Logged in as</p>
                                <p className="font-bold text-sm tracking-wide truncate">{currentUser.name}</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2">
                            <button 
                                onClick={() => setActiveTab('tickets')} 
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'tickets' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
                            >
                                <AlertTriangle className="w-5 h-5" /> Pending Tickets
                            </button>
                            <button 
                                onClick={() => setActiveTab('analytics')} 
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'analytics' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
                            >
                                <BarChart2 className="w-5 h-5" /> Reliability Analytics
                            </button>
                            <button 
                                onClick={() => setActiveTab('workers')} 
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'workers' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
                            >
                                <Users className="w-5 h-5" /> Skill Matrix (Staff)
                            </button>
                        </nav>

                        <div className="p-4 border-t border-slate-800">
                            <button onClick={() => setCurrentUser(null)} className="flex items-center gap-3 text-slate-400 hover:text-white transition-colors w-full px-4 py-2 text-sm font-medium">
                                <LogOut className="w-4 h-4" /> Logout
                            </button>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 overflow-y-auto p-8">
                        
                        {/* TICKETS TAB */}
                        {activeTab === 'tickets' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in duration-300">
                                <div className="flex justify-between items-end mb-8">
                                    <div>
                                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Wrench className="text-indigo-600"/> Mechanical Queue</h2>
                                        <p className="text-slate-500 text-sm mt-1">Live AI-routed breakdown tickets.</p>
                                    </div>
                                    <div className="bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm font-bold text-indigo-700 flex items-center gap-2">
                                        Total Pending: <span className="bg-indigo-100 px-2 py-0.5 rounded text-indigo-900">{tickets.length}</span>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {tickets.length === 0 && (
                                        <div className="text-center py-20 bg-white border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 flex flex-col items-center">
                                            <CheckCircle className="w-12 h-12 mb-3 text-slate-300" />
                                            <p className="font-medium">No mechanical issues reported.</p>
                                        </div>
                                    )}
                                    {tickets.map(t => (
                                        <div key={t.id} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center group hover:border-indigo-300 transition-colors">
                                            <div>
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="font-bold text-lg text-slate-800">{getMachineName(t.machineId)}</span>
                                                    {t.priority && <Badge status={t.priority} />}
                                                </div>
                                                <div className="text-sm font-medium text-red-600 bg-red-50 inline-block px-3 py-1 rounded-md border border-red-100">{t.issueDescription}</div>
                                                {t.aiDiagnostic && <div className="mt-2 text-sm text-indigo-700 font-medium italic border-l-2 border-indigo-400 pl-2">AI Diagnostic: {t.aiDiagnostic}</div>}
                                                <div className="text-xs text-slate-400 mt-3 flex items-center gap-2">
                                                    <Clock className="w-3 h-3"/> Reported: {new Date(t.timestamp).toLocaleString()}
                                                </div>
                                            </div>
                                            <Button size="md" variant="primary" className="opacity-0 group-hover:opacity-100 transition-opacity">Assign Tech</Button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ANALYTICS TAB */}
                        {activeTab === 'analytics' && (
                            <div className="max-w-6xl mx-auto animate-in fade-in duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-8 flex items-center gap-2"><BarChart2 className="text-indigo-600"/> Reliability Engineering</h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                    <KPIBox title="MTBF (Reliability)" value={stats.mtbf} unit="h" color="emerald" />
                                    <KPIBox title="MTTA (Response)" value={stats.mttrRepair} unit="m" color="orange" />
                                    <KPIBox title="MTTR (Repair)" value={stats.mttrRepair} unit="m" color="blue" />
                                    <KPIBox title="MTTR (Recovery)" value={stats.mttrRecovery} unit="m" color="indigo" />
                                </div>

                                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                    <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><History className="w-5 h-5 text-slate-400"/> Recent Repair Logs</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-bold tracking-wider">
                                                <tr>
                                                    <th className="p-4">Date</th>
                                                    <th className="p-4">Machine</th>
                                                    <th className="p-4">Action</th>
                                                    <th className="p-4">Repair Time</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {logs.slice().reverse().slice(0, 10).map((log, i) => (
                                                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 text-slate-500">{new Date(log.timestamp).toLocaleDateString()}</td>
                                                        <td className="p-4 font-bold text-slate-800">{getMachineName(log.machineId)}</td>
                                                        <td className="p-4"><span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">{log.action}</span></td>
                                                        <td className="p-4 text-slate-600 font-medium">{log.repairTime || "-"}</td>
                                                    </tr>
                                                ))}
                                                {logs.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400 italic">No repair logs found.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SKILL MATRIX TAB */}
                        {activeTab === 'workers' && (
                            <div className="max-w-[1400px] mx-auto animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Users className="text-indigo-600"/> Machine Wise Mechanic Skill Percentage</h2>
                                </div>
                                
                                {/* SKILL MATRIX PIVOT TABLE */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-300 overflow-hidden mb-8 relative">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-center text-sm border-collapse min-w-max">
                                            <thead className="bg-slate-100 text-slate-800 uppercase text-[11px] font-bold tracking-wider border-b-2 border-slate-300">
                                                <tr>
                                                    <th className="p-3 border-r-2 border-slate-300 sticky-col font-bold">Machine type</th>
                                                    {mechanicalWorkers.map(w => (
                                                        <th key={w.id} className="p-3 border-r border-slate-200 writing-vertical" style={{ minWidth: '100px' }}>
                                                            <div className="flex justify-between items-center w-full group">
                                                                <span className="truncate" title={w.name}>{w.name}</span>
                                                                <div className="flex opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => handleEditWorker(w)} className="text-blue-400 hover:text-blue-600 mx-1" title="Edit Mechanic"><Edit className="w-3 h-3"/></button>
                                                                    <button onClick={() => handleDeleteWorker(w.id)} className="text-red-400 hover:text-red-600" title="Delete Mechanic"><Trash2 className="w-3 h-3"/></button>
                                                                </div>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-200">
                                                {MACHINE_TYPES.map(type => (
                                                    <tr key={type} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-3 font-bold text-slate-700 bg-slate-50 sticky-col text-left border-r-2 border-slate-300 shadow-[1px_0_5px_rgba(0,0,0,0.05)]">{type}</td>
                                                        {mechanicalWorkers.map(w => (
                                                            <td key={`${w.id}-${type}`} className="p-3 border-r border-slate-200 font-medium">
                                                                {w.skills?.[type] || 0}%
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                                {/* AVERAGE ROW */}
                                                <tr className="bg-slate-100 border-t-2 border-slate-300 font-bold">
                                                    <td className="p-3 text-slate-800 sticky-col text-left border-r-2 border-slate-300">Average</td>
                                                    {mechanicalWorkers.map(w => (
                                                        <td key={`${w.id}-avg`} className="p-3 border-r border-slate-200 text-indigo-700">
                                                            {calculateAverage(w.skills)}%
                                                        </td>
                                                    ))}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    {mechanicalWorkers.length === 0 && (
                                        <div className="p-8 text-center text-slate-500 italic border-t border-slate-200">
                                            No mechanics found. Add staff below to build the skill matrix.
                                        </div>
                                    )}
                                </div>

                                {/* ADD/EDIT MECHANIC FORM */}
                                <div id="worker-form-section" className="bg-white rounded-xl shadow-sm border border-slate-300 p-6">
                                    <h3 className="font-bold text-lg mb-6 flex items-center gap-2 border-b pb-4">
                                        {editingWorkerId ? <Edit className="w-5 h-5 text-blue-600"/> : <PlusCircle className="w-5 h-5 text-indigo-600"/>} 
                                        {editingWorkerId ? "Edit Mechanic Profile" : "Onboard New Mechanic"}
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {/* Basic Info */}
                                        <div className="space-y-4">
                                            <h4 className="text-sm font-bold text-slate-700 uppercase">Basic Info</h4>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Full Name</label>
                                                <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="e.g. Prasad" value={newWorker.name} onChange={e => setNewWorker({...newWorker, name: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Login ID / Username</label>
                                                <input className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="e.g. prasad-274" value={newWorker.username} onChange={e => setNewWorker({...newWorker, username: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Password</label>
                                                <input type="password" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="••••••••" value={newWorker.password} onChange={e => setNewWorker({...newWorker, password: e.target.value})} />
                                            </div>
                                        </div>

                                        {/* Skill Percentages */}
                                        <div className="md:col-span-2">
                                            <h4 className="text-sm font-bold text-slate-700 uppercase mb-4 flex justify-between items-center">
                                                Machine Skill Profile (%)
                                                <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold">Avg: {calculateAverage(newWorker.skills)}%</span>
                                            </h4>
                                            <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                {MACHINE_TYPES.map(type => (
                                                    <div key={type}>
                                                        <label className="block text-xs font-bold text-slate-500 tracking-wide mb-1">{type}</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="number" 
                                                                min="0" max="100"
                                                                className="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all pr-8 font-bold text-indigo-700" 
                                                                value={newWorker.skills[type]} 
                                                                onChange={e => handleSkillChange(type, e.target.value)} 
                                                            />
                                                            <span className="absolute right-3 top-2.5 text-slate-400 font-bold">%</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-6 flex justify-end gap-3">
                                                {editingWorkerId && (
                                                    <Button size="lg" variant="secondary" onClick={() => {
                                                        setEditingWorkerId(null);
                                                        setNewWorker({ 
                                                            name: "", username: "", password: "", department: "Mechanical", role: "technician", status: "Offline",
                                                            skills: { Flatlock: 0, Zigzag: 0, Flatseam: 0, "Single needle": 0, Overlock: 0, Bartack: 0 }
                                                        });
                                                    }}>Cancel Edit</Button>
                                                )}
                                                <Button size="lg" onClick={handleSaveWorker} className="px-8">
                                                    <CheckCircle className="w-5 h-5"/> 
                                                    {editingWorkerId ? "Update Mechanic" : "Save Mechanic to Matrix"}
                                                </Button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<MaintenanceDashboard />);
    </script>
</body>
</html>
