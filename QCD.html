<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyA-aIRjMPFkK0hQKWY8-rpcA_5TfMhbRM4",
    authDomain: "qc--brandex.firebaseapp.com",
    databaseURL: "https://qc--brandex-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qc--brandex",
    storageBucket: "qc--brandex.firebasestorage.app",
    messagingSenderId: "109990871136",
    appId: "1:109990871136:web:c0dfa5f0ba78bed77c8305"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(e => console.error("Anon Auth Error:", e));

  window._db = db; window._ref = ref; window._set = set; window._get = get;
  window._push = push; window._onValue = onValue; window._remove = remove; window._update = update;

  // Second Firebase app — Factory Manager (read-only sync)
  const fmApp = initializeApp({
    apiKey: "AIzaSyBUbE6WtnWnHQsCul_5bDDPHz78jlaHCxs",
    authDomain: "apparel-maintenance.firebaseapp.com",
    databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com",
    projectId: "apparel-maintenance"
  }, 'fm');
  import { getDatabase as getDB2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth as getAuth2, signInAnonymously as anonSign2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const fmDb = getDB2(fmApp);
  anonSign2(getAuth2(fmApp)).catch(()=>{});
  window._fmDb = fmDb;

  // DB-based login
  window.dbLogin = async function(username, password) {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) throw new Error('No users found. Seed data first.');
    const users = snap.val();
    for (const [key, u] of Object.entries(users)) {
      if ((u.username === username || u.email === username) && u.password === password) {
        return { fbKey: key, ...u };
      }
    }
    throw new Error('Invalid username or password');
  };

  window.loadAll = function() {
    onValue(ref(db,'inspections'), s => { window.D.inspections = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['dashboard','inspections','supervisor','ai-analysis','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'modules'), s => { window.D.modules = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='modules') window.render(); });
    onValue(ref(db,'styles'), s => { window.D.styles = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['styles','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'users'), s => { window.D.users = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='users') window.render(); });
    onValue(ref(db,'alerts'), s => { window.D.alerts = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; window.D.notifs = window.D.alerts.filter(a=>!a.read).length; if(['alerts','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'operations'), s => { window.D.operations = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='operations') window.render(); });
    onValue(ref(db,'defects'), s => { window.D.defects = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='defects') window.render(); });
    onValue(ref(db,'rosters'), s => { window.D.rosters = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='supervisor') window.render(); });
    onValue(ref(db,'machines'), s => { window.D.machines = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='machines') window.render(); });
    onValue(ref(db,'machineEvents'), s => { window.D.machineEvents = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['machines','supervisor'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'aiTickets'), s => { window.D.aiTickets = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='supervisor') window.render(); });
  };

  window.fbAdd = async (p,d) => { const r=push(ref(db,p));await set(r,{...d,createdAt:new Date().toISOString()});return r.key; };
  window.fbUpd = async (p,k,d) => { await update(ref(db,`${p}/${k}`),{...d,updatedAt:new Date().toISOString()}); };
  window.fbDel = async (p,k) => { await remove(ref(db,`${p}/${k}`)); };
  window.approveChange = async function(userId) {
    if(!confirm('Approve this module change?')) return;
    try {
      await window._update(window._ref(window._db, 'users/' + userId), { changeRequest: false, activeModule: null });
      toast('Request Approved!');
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  };
  window._dbReady = true;

  setTimeout(() => { if(window.D.page==='loading'){window.D.page='login';window.render();} }, 2000);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--bg4:#22262f;--border:#2a2e38;--border2:#363c48;--text:#e8eaf0;--text2:#9097a8;--text3:#5c6478;--accent:#00d4a8;--accent2:#0099d4;--red:#e05555;--yellow:#d4a800;--green:#00d4a8;--blue:#4488ff;--purple:#9966ff;--radius:8px;--radius2:12px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.collapsed{width:60px}.sidebar.collapsed .hide-c{display:none}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:13px;flex-shrink:0}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:10px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--text2);font-size:13px;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:rgba(0,212,168,.08);border-left-color:var(--accent);color:var(--accent)}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);cursor:pointer}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#000;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.page-title{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:600}.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-danger{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;border:none}.btn-icon:hover{background:var(--bg3);color:var(--text)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:500;color:var(--text2)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.metric-val{font-size:28px;font-weight:600;font-family:var(--mono)}.metric-label{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(0,212,168,.15);color:var(--green)}.badge-red{background:rgba(224,85,85,.15);color:var(--red)}.badge-yellow{background:rgba(212,168,0,.15);color:var(--yellow)}.badge-blue{background:rgba(68,136,255,.15);color:var(--blue)}.badge-purple{background:rgba(153,102,255,.15);color:var(--purple)}.badge-gray{background:rgba(92,100,120,.15);color:var(--text3)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.module-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.02)}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.1)}.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert-card{padding:14px 18px;border-radius:var(--radius);border-left:3px solid;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-critical{background:rgba(224,85,85,.08);border-color:var(--red)}.alert-high{background:rgba(212,168,0,.08);border-color:var(--yellow)}.alert-medium{background:rgba(68,136,255,.08);border-color:var(--blue)}.alert-low{background:rgba(0,212,168,.08);border-color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.modal-title{font-size:18px;font-weight:600}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.chart-wrap{position:relative;width:100%;height:220px}
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.sep{height:1px;background:var(--border);margin:16px 0}
.fb{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(255,148,36,.08);border:1px solid rgba(255,148,36,.2);border-radius:20px;font-size:10px;color:#ff9424;font-family:var(--mono)}
.notif-btn{position:relative;background:transparent;color:var(--text2);padding:6px;border-radius:6px;cursor:pointer;border:none}.notif-btn:hover{background:var(--bg3)}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:2px;right:2px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-red{background:var(--red)}
.search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:13px;width:220px}.search-input:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:var(--radius);font-size:13px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:rgba(0,212,168,.95);color:#000}.toast-error{background:rgba(224,85,85,.95);color:#fff}
.ai-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(153,102,255,.12);border:1px solid rgba(153,102,255,.25);border-radius:20px;font-size:11px;color:var(--purple)}
.ai-finding{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.ai-bar{background:var(--bg4);height:6px;border-radius:3px;overflow:hidden;margin:6px 0}.ai-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--accent2))}
.qr-container{background:#fff;padding:16px;border-radius:12px;display:inline-block;margin:12px 0}
.report-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;text-align:center}.report-card:hover{border-color:var(--accent);transform:translateY(-2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(0,212,168,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.sidebar{width:60px}.sidebar .hide-c{display:none}.form-row{grid-template-columns:1fr}}
</style>
</head>

function ini(n){if(!n)return'BX';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fd(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function ft(d){return fd(d)+' '+((d&&new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}))||'');}
function ta(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}
function dhu(a){const c=a.reduce((s,i)=>s+(parseInt(i.checkedQty)||0),0),d=a.reduce((s,i)=>s+(parseInt(i.defectQty)||0),0);return c?((d/c)*100).toFixed(1):'0.0';}
function toast(m,t='success'){document.querySelectorAll('.toast').forEach(e=>e.remove());const d=document.createElement('div');d.className=`toast toast-${t}`;d.innerHTML=`${ic(t==='success'?'check':'warning',16)} ${m}`;document.body.appendChild(d);setTimeout(()=>d.remove(),3500);}
function kpi(v,l,s,c='var(--accent)'){return`<div class="card card-sm"><div class="metric-val" style="color:${c}">${v}</div><div class="metric-label">${l}</div>${s?`<div style="font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)">${s}</div>`:''}</div>`;}

// Create first admin user if none exist or reset password
window.seedFirstUser = async function(){
  try{
    const snap = await window._get(window._ref(window._db, 'users'));
    if(snap.exists()){
      let updated = false;
      for(const [key, u] of Object.entries(snap.val())) {
        if (u.username === 'admin' || u.role === 'Admin' || u.email === 'admin@brandix.com') {
          await window._update(window._ref(window._db, 'users/' + key), { password: 'admin123', username: 'admin' });
          updated = true;
        }
      }
      if (updated) {
        toast('Admin password reset to admin123! Try logging in now.');
      } else {
        await window.fbAdd('users',{username:'admin',password:'admin123',name:'Admin',role:'Admin',dept:'Quality',email:'admin@brandix.com',status:'Active'});
        toast('Admin user created! Username: admin / Password: admin123');
      }
      return;
    }
    await window.fbAdd('users',{username:'admin',password:'admin123',name:'Admin',role:'Admin',dept:'Quality',email:'admin@brandix.com',status:'Active'});
    toast('Admin user created! Username: admin / Password: admin123');
  }catch(e){toast('Error: '+e.message,'error');}
};

function bindLogin(){
  const btn=document.getElementById('lbtn');if(!btn)return;
  const go=async()=>{
    const u=document.getElementById('lu')?.value.trim(),p=document.getElementById('lp')?.value;
    const err=document.getElementById('lerr');
    if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
    err.style.display='none';D.loginLoading=true;render();
    try{
      const user=await window.dbLogin(u,p);
      D.user=user;D.page='dashboard';D.loginLoading=false;render();window.loadAll();toast('Welcome, '+user.name);
    }catch(e){D.loginLoading=false;render();const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent=e.message;}}
  };
  btn.onclick=go;
  document.getElementById('lu')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
  document.getElementById('lp')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
}

div style="text-align:center;padding:32px;color:var(--text3)">No data</div>':`<div class="table-wrap"><table><thead><tr><th>Type</th><th>Module</th><th>Defects</th><th>Time</th></tr></thead><tbody>${ins.slice(-6).reverse().map(i=>`<tr><td><span class="badge badge-${i.type==='inline'?'blue':'purple'}">${i.type||''}</span></td><td>${i.module||''}</td><td style="font-family:var(--mono);color:${(parseInt(i.defectQty)||0)>0?'var(--red)':'var(--green)'}">${i.defectQty||0}</td><td style="font-size:11px;color:var(--text3)">${ta(i.createdAt)}</td></tr>`).join('')}</tbody></table></div>`}</div><div class="card"><div class="card-header"><span class="card-title">Alerts</span></div>${D.alerts.slice(-4).reverse().map(a=>`<div class="alert-card alert-${a.level||'medium'}">${ic('warning',14)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${a.title||''}</div><div style="font-size:11px;color:var(--text3)">${ta(a.createdAt)}</div></div></div>`).join('')||'<div style="color:var(--text3);padding:12px;text-align:center">No alerts</div>'}</div></div></div>`;

// ============ PDF REPORTS ============
function makePDF(title,headers,rows,summary){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.setFontSize(18);doc.setTextColor(0,100,80);doc.text('Brandix QMS',14,20);
  doc.setFontSize(12);doc.setTextColor(60,60,60);doc.text(title,14,28);
  doc.setFontSize(9);doc.setTextColor(120,120,120);doc.text('Generated: '+new Date().toLocaleString('en-GB'),14,34);
  if(summary){doc.setFontSize(10);doc.setTextColor(40,40,40);let y=42;summary.forEach(s=>{doc.text(s,14,y);y+=5;});}
  doc.autoTable({head:[headers],body:rows,startY:summary?42+summary.length*5+4:40,theme:'grid',styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,180,140],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},margin:{left:14,right:14}});
  doc.save(title.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.pdf');
  toast('PDF downloaded');
}

function makeExcel(title,headers,rows){
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,title.slice(0,31));
  XLSX.writeFile(wb,title.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
  toast('Excel downloaded');
}

window.rptAllInsp=function(fmt){
  const ins=D.inspections;if(!ins.length){toast('No data','error');return;}
  const hdr=['Type','Date','Module','Operator','Operation','Checked','Defects','DHU%','Defect Type','Inspector'];
  const rows=ins.map(i=>{const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;return[i.type,i.date||fd(i.createdAt),i.module,i.operatorId,i.operation,c,d,c?((d/c)*100).toFixed(1):'0',i.defectType,i.inspector||i.submittedBy];});
  const tc=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0),td=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const summary=[`Total Inspections: ${ins.length}`,`Total Checked: ${tc}`,`Total Defects: ${td}`,`Overall DHU: ${tc?((td/tc)*100).toFixed(1):0}%`];
  if(fmt==='pdf')makePDF('All Inspections Report',hdr,rows,summary);
  else makeExcel('All Inspections',hdr,rows);
};

window.rptDefects=function(fmt){
  const dm={};D.inspections.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});
  const sorted=Object.entries(dm).sort((a,b)=>b[1]-a[1]);const total=sorted.reduce((a,[_,c])=>a+c,0);
  const hdr=['Defect Type','Count','Percentage'];
  const rows=sorted.map(([n,c])=>[n,c,((c/total)*100).toFixed(1)+'%']);
  const summary=[`Total Defect Types: ${sorted.length}`,`Total Defects: ${total}`,`Top Defect: ${sorted[0]?sorted[0][0]:'-'}`];
  if(fmt==='pdf')makePDF('Defect Summary Report',hdr,rows,summary);
  else makeExcel('Defect Summary',hdr,rows);
};

window.rptModules=function(fmt){
  const mm={};D.inspections.forEach(i=>{if(i.module){if(!mm[i.module])mm[i.module]={c:0,d:0,n:0};mm[i.module].c+=parseInt(i.checkedQty)||0;mm[i.module].d+=parseInt(i.defectQty)||0;mm[i.module].n++;}});
  const hdr=['Module','Inspections','Checked','Defects','DHU%','Status'];
  const rows=Object.entries(mm).map(([m,d])=>{const v=d.c?((d.d/d.c)*100).toFixed(1):0;return[m,d.n,d.c,d.d,v+'%',v>5?'Critical':v>3?'Warning':'Good'];});
  if(fmt==='pdf')makePDF('Module Performance Report',hdr,rows);
  else makeExcel('Module Performance',hdr,rows);
};

window.rptOperator=function(fmt){
  const om={};D.inspections.forEach(i=>{if(i.operatorId){if(!om[i.operatorId])om[i.operatorId]={c:0,d:0,n:0,ops:new Set()};om[i.operatorId].c+=parseInt(i.checkedQty)||0;om[i.operatorId].d+=parseInt(i.defectQty)||0;om[i.operatorId].n++;if(i.operation)om[i.operatorId].ops.add(i.operation);}});
  const hdr=['Operator','Inspections','Checked','Defects','Avg Defects','DHU%','Operations','Risk'];
  const rows=Object.entries(om).sort((a,b)=>b[1].d-a[1].d).map(([o,d])=>{const avg=(d.d/d.n).toFixed(1);const v=d.c?((d.d/d.c)*100).toFixed(1):0;return[o,d.n,d.c,d.d,avg,v+'%',[...d.ops].join(', '),avg>3?'High':avg>1?'Medium':'Low'];});
  const summary=[`Total Operators: ${rows.length}`,`High Risk: ${rows.filter(r=>r[7]==='High').length}`,`Medium Risk: ${rows.filter(r=>r[7]==='Medium').length}`];
  if(fmt==='pdf')makePDF('Operator Analysis Report',hdr,rows,summary);
  else makeExcel('Operator Analysis',hdr,rows);
};

window.rptCompleted=function(fmt){
  const completed=D.styles.filter(s=>s.status==='Completed');
  if(!completed.length){toast('No completed styles','error');return;}
  const hdr=['Style ID','Name','Buyer','Color','Target DHU','Completed Date','Total Inspections','Total Checked','Total Defects','Final DHU%'];
  const rows=completed.map(s=>{
    const sIns=D.inspections.filter(i=>i.style&&(i.style.includes(s.name)||i.style.includes(s.styleId)));

    return[s.styleId,s.name,s.buyer,s.color,s.targetDhu+'%',fd(s.completedDate),sIns.length,tc,td,tc?((td/tc)*100).toFixed(1)+'%':'0%'];
  });
  const summary=[`Completed Styles: ${completed.length}`,`Total Inspections: ${rows.reduce((a,r)=>a+r[6],0)}`];
  if(fmt==='pdf')makePDF('Completed Styles Report',hdr,rows,summary);
  else makeExcel('Completed Styles',hdr,rows);
};

function pgMachines(){
  const machines = D.machines||[];
  const events   = D.machineEvents||[];
  const qmsMods  = D.modules||[];
  const fmMods   = D.fmModules||[];

  function resolveModuleName(m){
    if(m.moduleName) return m.moduleName;
    if(m.lineName)   return m.lineName;
    const qms = qmsMods.find(x=>x.fbKey===m.moduleId);
    if(qms) return qms.name;
    const fm  = fmMods.find(x=>x.fbKey===m.moduleId);
    if(fm) return fm.name;
    if(m.moduleId==='yard') return 'Machine Yard';
    return m.moduleId||'—';
  }
  function resolveLocation(m){
    const parts=[];
    if(m.buildingName) parts.push(m.buildingName);
    if(m.sectionName)  parts.push(m.sectionName);
    const mod=resolveModuleName(m);
    if(mod&&mod!=='—') parts.push(mod);
    return parts.join(' › ');
  }

  const groups={};
  machines.forEach(m=>{
    const loc=resolveLocation(m)||'Unassigned';
    if(!groups[loc])groups[loc]=[];
    groups[loc].push(m);
  });

  const recentEvents = events.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);

      :`<div class="card" style="padding:0;overflow:hidden">

          <div class="table-wrap"><table><thead><tr><th>#</th><th>Machine Name</th><th>Type</th><th>Module</th><th>Location</th><th>Last Event</th><th></th></tr></thead>
          <tbody>${Object.entries(groups).map(([loc,ms])=>`
            <tr style="background:var(--bg,#f8fafc)"><td colspan="7" style="padding:5px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">&#128205; ${loc} <span style="font-weight:400;color:var(--text3)">(${ms.length})</span></td></tr>
            ${ms.map((m,i)=>{
              const lastEv=events.filter(e=>e.machineId===m.fbKey).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
              const modName=resolveModuleName(m);
              return`<tr><td style="font-size:11px;color:var(--text3)">${i+1}</td><td style="font-weight:600">${m.name||'—'}</td><td style="font-size:11px;color:var(--text2)">${m.type||'—'}</td><td><span class="badge badge-blue">${modName}</span></td><td style="font-size:11px;color:var(--text3)">${m.sectionName||''}${m.buildingName?' • '+m.buildingName:''}</td><td style="font-size:11px;color:var(--text3)">${lastEv?lastEv.type+' — '+ta(lastEv.createdAt):'No events'}</td><td><div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="showModal('editMachine',${JSON.stringify(m).replace(/"/g,'&quot;')})">${ic('edit',14)}</button><button class="btn-icon" style="color:var(--red)" onclick="del('machines','${m.fbKey}')">${ic('trash',14)}</button></div></td></tr>`;
            }).join('')}
          `).join('')}

    ${recentEvents.length>0?`<div class="card"><div class="card-header"><span class="card-title">Recent Machine Events</span></div><div class="table-wrap"><table><thead><tr><th>Event</th><th>Machine</th><th>Module</th><th>Details</th><th>By</th><th>Time</th></tr></thead><tbody>${recentEvents.map(e=>{
      const mach=machines.find(m=>m.fbKey===e.machineId);

    }).join('')}</tbody></table></div></div>`:''}
  </div>`;
}

window.syncMachines = async function(){
  const btn = document.querySelector('[onclick="syncMachines()"]');
  if(btn){btn.disabled=true;btn.textContent='⟳ Syncing...';}
  try {
    const fmDb = window._fmDb;
    if(!fmDb){toast('Factory app not connected','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}
    const { ref:fmRef, get:fmGet } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');

    // Factory Manager schema: buildings → sections (buildingId) → modules (sectionId) → machines (moduleId)
    const [mSnap, modSnap, secSnap, bSnap] = await Promise.all([
      fmGet(fmRef(fmDb,'machines')),
      fmGet(fmRef(fmDb,'modules')),
      fmGet(fmRef(fmDb,'sections')),
      fmGet(fmRef(fmDb,'buildings'))
    ]);

    if(!mSnap.exists()){toast('No machines in Factory App. Add them in Factory Manager first.','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}

    // Build lookup maps
    const fmModules  = modSnap.exists() ? Object.entries(modSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmSections = secSnap.exists() ? Object.entries(secSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmBuildings= bSnap.exists()   ? Object.entries(bSnap.val()).map(([k,v])=>({id:k,...v})) : [];

    const fmMachines = Object.entries(mSnap.val()).map(([k,v])=>({id:k,...v}));

    // Sync: write each machine into QMS machines collection using the FM machine key as the record key
    // This ensures QR codes (which encode FM machine ID) match perfectly
    let count=0;
    for(const fm of fmMachines){
      const fmMod     = fmModules.find(m=>m.id===fm.moduleId);
      const fmSection = fmSections.find(s=>s.id===fmMod?.sectionId);
      const fmBuilding= fmBuildings.find(b=>b.id===fmSection?.buildingId);

      const machData = {
        name:         fm.name           || 'Unknown Machine',
        type:         fm.type           || '',
        brand:        fm.brand          || '',
        model:        fm.model          || '',
        serial:       fm.serial         || '',
        year:         fm.year           || '',
        price:        fm.price          || '',
        status:       fm.status         || 'Running',
        moduleId:     fm.moduleId       || 'yard',          // FM module key — used for matching worker scans
        moduleName:   fmMod?.name       || '',              // Friendly name
        sectionName:  fmSection?.name   || '',
        buildingName: fmBuilding?.name  || '',
        lineName:     fmMod?.name       || '',              // alias for worker.html compatibility
        pmInterval:   fm.interval       || 30,
        lastPM:       fm.lastMaintenance|| null,
        syncedFrom:   'factory-manager',
        syncedAt:     new Date().toISOString()
      };

      // Use FM machine ID as the key so QR codes match
      await window._set(window._ref(window._db, 'machines/'+fm.id), machData);
      count++;
    }

    // Also sync modules so QMS module screen shows line names matching FM
    for(const mod of fmModules){
      const sec = fmSections.find(s=>s.id===mod.sectionId);
      const bld = fmBuildings.find(b=>b.id===sec?.buildingId);
      await window._set(window._ref(window._db,'fmModules/'+mod.id),{
        fbKey:mod.id, name:mod.name, sectionId:mod.sectionId, sectionName:sec?.name||'',
        buildingId:sec?.buildingId||'', buildingName:bld?.name||'', syncedAt:new Date().toISOString()
      });
    }

    toast(`✓ Synced ${count} machines from Factory App!`);
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }catch(e){
    toast('Sync error: '+e.message,'error');
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }
};

window.runAIAnalysis = async function(){
  const ins = D.inspections;
  if(ins.length < 3) return;
  const tickets = D.aiTickets||[];
  const existingIds = new Set(tickets.map(t=>t.refId));
  const today = new Date().toISOString().split('T')[0];
  const omMap={};
  ins.filter(i=>i.machineId&&i.operatorId).forEach(i=>{
    const key=`${i.operatorId}_${i.machineId}`;
    if(!omMap[key])omMap[key]=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)omMap[key].push((d/c)*100);
  });
  for(const [key,dhus] of Object.entries(omMap)){
    if(dhus.length>=3 && dhus.slice(-3).every(d=>d>5)){
      const [opId,machId]=key.split('_');
      const refId=`op_risk_${key}_${today}`;
      if(!existingIds.has(refId)){
        const mach = (D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'OperatorRisk',level:'high',status:'Open',operatorId:opId,machineId:machId,machineName:mach?.name||machId,title:`High DHU: Operator ${opId} on ${mach?.name||machId}`,description:`Operator ${opId} has exceeded 5% DHU for 3+ consecutive inspections on machine ${mach?.name||machId}. Consider retraining.`,autoGenerated:true});
      }
    }
  }
  const machMap={};
  ins.filter(i=>i.machineId).forEach(i=>{
    if(!machMap[i.machineId])machMap[i.machineId]={};
    if(!machMap[i.machineId][i.operatorId||'?'])machMap[i.machineId][i.operatorId||'?']=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)machMap[i.machineId][i.operatorId||'?'].push((d/c)*100);
  });
  for(const [machId,opData] of Object.entries(machMap)){
    const ops=Object.keys(opData);
    if(ops.length>=2&&ops.every(op=>opData[op].length>0&&(opData[op].reduce((a,b)=>a+b,0)/opData[op].length)>5)){
      const refId=`mach_risk_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'MachineRisk',level:'high',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Machine Issue: ${mach?.name||machId} — All Operators Affected`,description:`Multiple operators on machine ${mach?.name||machId} are all showing DHU>5%. The machine itself likely needs servicing.`,autoGenerated:true});
      }
    }
  }
  const swaps=(D.machineEvents||[]).filter(e=>e.type==='Swap'&&(e.createdAt||'').startsWith(today));
  const swapCount={};
  swaps.forEach(s=>{swapCount[s.machineId]=(swapCount[s.machineId]||0)+1;});
  for(const [machId,cnt] of Object.entries(swapCount)){
    if(cnt>=2){
      const refId=`swap_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'FrequentSwap',level:'medium',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Unstable Machine: ${mach?.name||machId} swapped ${cnt}x today`,description:`Machine ${mach?.name||machId} has been swapped ${cnt} times today. Investigate machine reliability.`,autoGenerated:true});
      }
    }
  }
};

// ======================== CSV IMPORT ========================
function csvToArray(str) {
  const lines = str.trim().split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  const results = [];
  for(let i=1; i<lines.length; i++) {
    const obj = {};
    const currentline = lines[i].split(',').map(v=>v.trim());
    if(currentline.length <= 1) continue;
    headers.forEach((h, j) => { obj[h] = currentline[j] || ''; });
    results.push(obj);
  }
  return results;
}

window.csvType = '';
window.triggerCSV = function(type) {
  window.csvType = type;
  document.getElementById('csv-file').click();
};

window.handleCSV = function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt) {
    const text = evt.target.result;
    const data = csvToArray(text);
    if(data.length === 0) { toast('CSV is empty or invalid','error'); return; }
    
    let count = 0;
    try {
      if(window.csvType === 'styles') {
        for(let d of data) {
          if(!d.name && !d.styleid) continue;
          const match = D.styles.find(s => s.styleId === d.styleid || s.name === d.name);
          const p = { styleId: d.styleid||d.name, name: d.name||d.styleid, buyer: d.buyer||'', color: d.color||'', status: d.status||'Running' };
          if(match) await window.fbUpd('styles', match.fbKey, p);
          else await window.fbAdd('styles', p);
          count++;
        }
      } else if(window.csvType === 'operations') {
        for(let d of data) {
          if(!d.name) continue;
          const match = D.operations.find(o => o.name.toLowerCase() === d.name.toLowerCase());
          if(!match) { await window.fbAdd('operations', {name: d.name}); count++; }
        }
      } else if(window.csvType === 'defects') {
        for(let d of data) {
          if(!d.name && !d.defectid) continue;
          const match = D.defects.find(x => x.defectId === d.defectid || x.name === d.name);
          const p = { defectId: d.defectid||'', name: d.name||d.defectid, type: d.type||'Both' };
          if(match) await window.fbUpd('defects', match.fbKey, p);
          else await window.fbAdd('defects', p);
          count++;
        }
      }
      toast(`Successfully imported ${count} items!`, 'success');
    } catch(err) {
      toast('Import error: '+err.message, 'error');
    }
    e.target.value = ''; // reset input
  };
  reader.readAsText(file);
};

  // ch2 - defects donut
  const e2=document.getElementById('ch2');
  if(e2&&ins.length){const dm={};ins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);charts.c2=new Chart(e2,{type:'doughnut',data:{labels:t.map(([n])=>n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9097a8',font:{size:10},boxWidth:12}}},cutout:'65%'}});}
  // ch3 - type split
  const e3=document.getElementById('ch3');
  if(e3){charts.c3=new Chart(e3,{type:'doughnut',data:{labels:['Inline','End Line'],datasets:[{data:[ins.filter(i=>i.type==='inline').length,ins.filter(i=>i.type==='endline').length],backgroundColor:['#4488ff','#9966ff'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9097a8'}}},cutout:'65%'}});}
  // ch4 - top defects bar
  const e4=document.getElementById('ch4');
  if(e4){const dm={};ins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);charts.c4=new Chart(e4,{type:'bar',data:{labels:t.map(([n])=>n.length>12?n.slice(0,12)+'…':n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderRadius:4}]},options:{...chOpts,indexAxis:'y'}});}
  // ch5 - DHU trend
  const e5=document.getElementById('ch5');
  if(e5&&ins.length){const dm={};ins.forEach(i=>{const d=(i.date||(i.createdAt||'').split('T')[0])||'?';if(!dm[d])dm[d]={c:0,d:0};dm[d].c+=parseInt(i.checkedQty)||0;dm[d].d+=parseInt(i.defectQty)||0;});const s=Object.entries(dm).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);charts.c5=new Chart(e5,{type:'line',data:{labels:s.map(([d])=>d.slice(5)),datasets:[{label:'DHU %',data:s.map(([_,d])=>d.c?((d.d/d.c)*100).toFixed(1):0),borderColor:'#00d4a8',backgroundColor:'rgba(0,212,168,.1)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#00d4a8'},{label:'Target',data:s.map(()=>2.5),borderColor:'#e05555',borderDash:[4,4],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9097a8'}}},scales:{y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#9097a8'},suggestedMin:0},x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#9097a8',font:{size:10}}}}}});}
}

function renderQR(){
  const el=document.getElementById('qr-el'),de=document.getElementById('qr-d');
  if(el&&de){el.innerHTML='';try{new QRCode(el,{text:de.getAttribute('data-v'),width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){el.innerHTML='<div style="color:red">QR failed</div>';}}
}

function afterRender(){
  bindSsel();bindSeed();
  requestAnimationFrame(()=>{renderCharts();renderQR();});
  document.onkeydown=e=>{if(e.key==='Escape'&&D.showModal)closeModal();};
}

render();
</script>
</body>
</html>
