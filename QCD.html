// ======================== STYLE REPORT PAGE ========================
function pgStyleReport(){
  const styles=D.styles;
  const key=D.styleReportKey||'';
  const sel=styles.find(s=>s.fbKey===key);

  const selector=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <select class="form-control" style="min-width:260px" onchange="D.styleReportKey=this.value;render()">
      <option value="">— Select a Style —</option>
      ${styles.map(s=>`<option value="${s.fbKey}" ${key===s.fbKey?'selected':''}>${s.styleId} — ${s.name}${s.buyer?' ('+s.buyer+')':''}</option>`).join('')}
    </select>
    ${sel?`<div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="rptStyleReport('excel')">${ic('download',14)} Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="rptStyleReport('pdf')">${ic('pdf',14)} PDF</button>
    </div>`:''}
  </div>`;

  if(!sel) return`<div style="display:flex;flex-direction:column;gap:20px">${selector}
    <div class="card" style="padding:48px;text-align:center;color:var(--text3)">Select a style above to view its full report.</div>
  </div>`;

  // All inspections for this style. Prefer the Style ID stamped at check time
  // (the refcode) so a style change mid-day attributes each piece correctly;
  // fall back to the legacy style-name match for older records with no styleId.
  const matchStyle=i=>(i.styleId&&sel.styleId&&i.styleId===sel.styleId)||(i.style&&(i.style===sel.name||i.style===sel.styleId||i.style.includes(sel.name)||i.style.includes(sel.styleId)));
  const ins=D.inspections.filter(matchStyle);
  const rovIns=(D.rovingInspections||[]).filter(matchStyle);

  // Totals
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  const aql=parseFloat(dhu)<=2.5?'PASS':'REVIEW';

  // Dates
  const allDates=[...new Set(ins.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort();
  const startDate=allDates[0]||'—';
  const endDate=allDates[allDates.length-1]||'—';
  const daysActive=allDates.length;

  // Linked modules
  const linkedMods=[...new Set(ins.map(i=>i.module).filter(Boolean))];

  // --- KPI cards ---
  const kpis=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
    ${[
      ['Total Inspections',ins.length,'var(--accent)'],
      ['Checked',totChk,'var(--blue)'],
      ['Defects',totDef,'var(--red)'],
      ['DHU',dhu+'%',parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'],
      ['AQL',aql,aql==='PASS'?'var(--green)':'var(--red)'],
    ].map(([l,v,c])=>`<div class="card" style="padding:14px;text-align:center;border-color:${c}22">
      <div style="font-size:22px;font-weight:700;font-family:var(--mono);color:${c}">${v}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${l}</div>
    </div>`).join('')}
  </div>`;

  // --- Style info header ---
  const infoCard=`<div class="card" style="border-color:var(--accent)22">
    <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--text3)">STYLE ID</div>
        <div style="font-size:20px;font-weight:700;font-family:var(--mono)">${sel.styleId||'—'}</div>
        <div style="font-size:14px;font-weight:600;margin-top:2px">${sel.name||'—'}</div>
        <div style="font-size:12px;color:var(--text2)">${sel.buyer||''} ${sel.color?'• '+sel.color:''}</div>
      </div>
      <div style="text-align:right">
        <span class="badge badge-${sel.status==='Running'?'green':sel.status==='Completed'?'blue':'yellow'}" style="font-size:13px">${sel.status||''}</span>
        <div style="font-size:12px;color:var(--text2);margin-top:8px">Target DHU: <b>${sel.targetDhu||'—'}%</b></div>
        <div style="font-size:12px;color:var(--text2)">Start: ${startDate} &nbsp;→&nbsp; End: ${endDate}</div>
        <div style="font-size:12px;color:var(--text2)">${daysActive} day${daysActive!==1?'s':''} active • ${linkedMods.length} module${linkedMods.length!==1?'s':''}</div>
      </div>
    </div>
  </div>`;

  // --- Style change history for this style (who switched it in/out, and when) ---
  const myChanges=(D.styleChanges||[]).filter(c=>c.fromStyleId===sel.styleId||c.toStyleId===sel.styleId||c.fromStyleName===sel.name||c.toStyleName===sel.name).sort((a,b)=>(b.at||'').localeCompare(a.at||''));
  const changeCard=myChanges.length?`<div class="card" style="padding:0;overflow:hidden;border-color:var(--yellow)">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border);color:var(--yellow)">⚡ Style Change History (${myChanges.length}) — who switched the line, and when</div>
    <div class="table-wrap"><table><thead><tr><th>When</th><th>Line</th><th>Change</th><th>By</th></tr></thead><tbody>${myChanges.map(c=>{const into=c.toStyleId===sel.styleId||c.toStyleName===sel.name;return`<tr><td style="font-size:12px">${ft(c.at)}</td><td style="font-weight:500">${c.module||c.moduleId||'—'}</td><td style="font-size:12px"><span style="color:var(--text3)">${c.fromStyleId||c.fromStyleName||'—'}</span> → <b style="color:${into?'var(--green)':'var(--red)'}">${c.toStyleId||c.toStyleName||'—'}</b> <span class="badge badge-${into?'green':'red'}" style="font-size:9px">${into?'switched IN':'switched OUT'}</span></td><td style="font-size:12px">${c.byName||c.by||'—'}</td></tr>`;}).join('')}</tbody></table></div>
  </div>`:'';

  // --- Daily / Weekly / Monthly breakdown (toggle) ---
  const grain=D.styleRptGrain||'daily';
  const periodOf=d=>{if(!d)return '';if(grain==='monthly')return d.slice(0,7);if(grain==='weekly'){const dt=new Date(d+'T00:00:00');const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);return dt.toISOString().split('T')[0];}return d;};
  const periodLabel=k=>{if(grain==='monthly'){const p=k.split('-');return new Date(+p[0],+p[1]-1,1).toLocaleString('en',{month:'short',year:'numeric'});}if(grain==='weekly')return 'Week of '+fd(k);return fd(k);};
  const byDate={};
  ins.forEach(i=>{
    const d0=i.date||(i.createdAt||'').split('T')[0];if(!d0)return;
    const d=periodOf(d0);const sh=i.shift||'A';
    if(!byDate[d])byDate[d]={chk:0,def:0,A:{chk:0,def:0},B:{chk:0,def:0}};
    const c=parseInt(i.checkedQty)||0,df=parseInt(i.defectQty)||0;
    byDate[d].chk+=c;byDate[d].def+=df;
    if(!byDate[d][sh])byDate[d][sh]={chk:0,def:0};
    byDate[d][sh].chk+=c;byDate[d][sh].def+=df;
  });
  const dailyRows=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,g])=>{
    const dhu2=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    const color=parseFloat(dhu2)>5?'var(--red)':parseFloat(dhu2)>3?'var(--yellow)':'var(--green)';
    return`<tr>
      <td style="font-size:12px">${periodLabel(date)}</td>
      <td style="font-family:var(--mono)">${g.chk}</td>
      <td style="font-family:var(--mono);color:${g.def>0?'var(--red)':'inherit'}">${g.def}</td>
      <td style="font-family:var(--mono);color:${color};font-weight:600">${dhu2}%</td>
      ${['A','B'].map(sh=>{const s=g[sh]||{chk:0,def:0};return`<td style="font-size:11px;text-align:center;color:var(--text3)">${s.chk?s.chk+'/<span style="color:var(--red)">'+s.def+'</span>':'—'}</td>`;}).join('')}
    </tr>`;
  }).join('');
  const grainTog=['daily','weekly','monthly'].map(g=>`<button class="btn btn-sm ${grain===g?'btn-primary':'btn-ghost'}" style="border:none" onclick="setStyleGrain('${g}')">${g[0].toUpperCase()+g.slice(1)}</button>`).join('');
  const dailyTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:11px 16px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span>${grain==='monthly'?'Monthly':grain==='weekly'?'Weekly':'Daily'} Breakdown</span><div style="display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px">${grainTog}</div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>${grain==='monthly'?'Month':grain==='weekly'?'Week':'Date'}</th><th>Checked</th><th>Defects</th><th>DHU%</th><th>Team A</th><th>Team B</th></tr></thead>
      <tbody>${dailyRows||'<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">No data</td></tr>'}</tbody>
    </table></div>
  </div>`;

  // --- Shift summary ---
  const byShift={A:{chk:0,def:0},B:{chk:0,def:0}};
  ins.forEach(i=>{const sh=i.shift||'A';if(!byShift[sh])byShift[sh]={chk:0,def:0};byShift[sh].chk+=parseInt(i.checkedQty)||0;byShift[sh].def+=parseInt(i.defectQty)||0;});
  const shiftCards=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
    ${['A','B'].map(sh=>{
      const g=byShift[sh];const d=g.chk?((g.def/g.chk)*100).toFixed(1):'—';
      const c=g.chk?(parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)'):'var(--text3)';
      return`<div class="card" style="padding:14px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px">Team ${sh}</div>
        <div style="font-size:18px;font-weight:700;font-family:var(--mono)">${g.chk}</div>
        <div style="font-size:11px;color:var(--text3)">Checked</div>
        <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${c};margin-top:4px">${d}${g.chk?'%':''}</div>
        <div style="font-size:11px;color:var(--text3)">DHU</div>
      </div>`;
    }).join('')}
  </div>`;

  // --- Module performance ---
  const byMod={};
  ins.forEach(i=>{const m=i.module||'—';if(!byMod[m])byMod[m]={chk:0,def:0};byMod[m].chk+=parseInt(i.checkedQty)||0;byMod[m].def+=parseInt(i.defectQty)||0;});
  const modRows=Object.entries(byMod).sort((a,b)=>b[1].chk-a[1].chk).map(([mod,g])=>{
    const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    return`<tr><td style="font-weight:500">${mod}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)'}">${d}%</td></tr>`;
  }).join('');
  const modTable=modRows?`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Module Performance</div>
    <div class="table-wrap"><table><thead><tr><th>Module</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead><tbody>${modRows}</tbody></table></div>
  </div>`:'';

  // --- Top defects ---
  const defMap={};
  ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0){defMap[i.defectType]=(defMap[i.defectType]||0)+(parseInt(i.defectQty)||0);}});
  const top5=Object.entries(defMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totTopDef=Object.values(defMap).reduce((a,v)=>a+v,0);
  const defCard=top5.length?`<div class="card">
    <div style="font-weight:600;margin-bottom:12px">Top Defects</div>
    ${top5.map(([name,cnt])=>{const pct=totTopDef?((cnt/totTopDef)*100).toFixed(0):0;return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${name}</span><span style="font-family:var(--mono);color:var(--red)">${cnt} (${pct}%)</span></div>
      <div style="height:6px;background:var(--bg3);border-radius:4px"><div style="height:100%;border-radius:4px;background:var(--red);width:${pct}%"></div></div>
    </div>`;}).join('')}
  </div>`:'';

  // --- Line-wise breakdown (one card per module/line running this style) ---
  // Combines End Line / Inline (checkedQty/defectQty) with Roving (sp/dc) per line.
  const byLine={};
  const lb=ln=>byLine[ln]||(byLine[ln]={elChk:0,elDef:0,rovChk:0,rovDef:0});
  ins.forEach(i=>{const b=lb(i.module||'—');if(i.type==='inline'){b.rovChk+=parseInt(i.checkedQty)||0;b.rovDef+=parseInt(i.defectQty)||0;}else{b.elChk+=parseInt(i.checkedQty)||0;b.elDef+=parseInt(i.defectQty)||0;}});
  rovIns.forEach(i=>{const b=lb(i.module||'—');b.rovChk+=parseInt(i.sp)||0;b.rovDef+=parseInt(i.dc)||0;});
  const lineKeys=Object.keys(byLine).sort();
  const lineHint=lineKeys.length<=1?`<div style="font-size:12px;color:var(--text3);padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px dashed var(--border)">💡 Only ${lineKeys.length} line found for this style. To compare two lines here (e.g. MODULE-10 and 10.1), assign the <b>same style</b> to both modules on the Modules page — they'll then appear side by side automatically.</div>`:'';
  const lineCards=(lineKeys.length?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
    ${lineKeys.map(ln=>{
      const g=byLine[ln];const d=g.elChk?((g.elDef/g.elChk)*100).toFixed(1):'—';
      const c=g.elChk?(parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)'):'var(--text3)';
      const rd=g.rovChk?((g.rovDef/g.rovChk)*100).toFixed(1):'—';
      return`<div class="card" style="padding:16px;border-left:3px solid ${c}">
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">${ln}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">End Line · output</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px"><span>Output</span><span style="font-family:var(--mono);color:var(--text)">${g.elChk}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px"><span>Good</span><span style="font-family:var(--mono);color:var(--green)">${g.elChk-g.elDef}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px"><span>Defects</span><span style="font-family:var(--mono);color:var(--red)">${g.elDef}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-top:4px"><span>DHU</span><span style="font-family:var(--mono);color:${c}">${d}${g.elChk?'%':''}</span></div>
        <div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Roving · separate</div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px"><span>Sampled</span><span style="font-family:var(--mono)">${g.rovChk}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2)"><span>DHU</span><span style="font-family:var(--mono)">${g.rovChk?rd+'%':'—'}</span></div>
        </div>
      </div>`;
    }).join('')}
  </div>`:`<div class="card" style="padding:24px;text-align:center;color:var(--text3)">No inspection data for this style yet.</div>`)+lineHint;

  // --- Colour-wise breakdown (uses the colour QC selected at End Line) ---
  const byColor={};
  ins.forEach(i=>{const c=(i.color||'').trim();if(!c)return;if(!byColor[c])byColor[c]={chk:0,def:0};byColor[c].chk+=parseInt(i.checkedQty)||0;byColor[c].def+=parseInt(i.defectQty)||0;});
  const colorRows=Object.entries(byColor).sort((a,b)=>b[1].chk-a[1].chk).map(([color,g])=>{
    const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    const col=parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)';
    return`<tr><td style="font-weight:500">${color}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d}%</td></tr>`;
  }).join('');
  const colorTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Colour-wise DHU</div>
    <div class="table-wrap"><table><thead><tr><th>Colour</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead>
    <tbody>${colorRows||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">No colour data — QC must pick a colour at End Line, and the style needs colours defined</td></tr>'}</tbody></table></div>
  </div>`;

  // --- Size-wise breakdown (uses the size QC selected at End Line) ---
  const bySize={};
  ins.forEach(i=>{const z=(i.size||'').trim();if(!z)return;if(!bySize[z])bySize[z]={chk:0,def:0};bySize[z].chk+=parseInt(i.checkedQty)||0;bySize[z].def+=parseInt(i.defectQty)||0;});
  // Order sizes naturally (XS,S,M,L,XL...) where possible, else by volume
  const sizeOrder=['XXS','XS','S','M','L','XL','XXL','XXXL','3XL','4XL'];
  const sizeRows=Object.entries(bySize).sort((a,b)=>{
    const ia=sizeOrder.indexOf(a[0].toUpperCase()),ib=sizeOrder.indexOf(b[0].toUpperCase());
    if(ia>=0&&ib>=0)return ia-ib;return b[1].chk-a[1].chk;
  }).map(([size,g])=>{
    const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    const col=parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)';
    return`<tr><td style="font-weight:500">${size}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d}%</td></tr>`;
  }).join('');
  const sizeTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Size-wise DHU</div>
    <div class="table-wrap"><table><thead><tr><th>Size</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead>
    <tbody>${sizeRows||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">No size data yet for this style</td></tr>'}</tbody></table></div>
  </div>`;

  return`<div style="display:flex;flex-direction:column;gap:16px">
    ${selector}${infoCard}${kpis}${changeCard}
    <div style="font-weight:600;color:var(--text2);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Lines Running This Style (${lineKeys.length})</div>
    ${lineCards}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${defCard}${modTable}</div>
    <div style="font-weight:600;color:var(--text2);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Colour &amp; Size Analysis</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colorTable}${sizeTable}</div>
    <div style="font-weight:600;color:var(--text2);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Team Summary</div>
    ${shiftCards}
    ${dailyTable}
  </div>`;
}

function rptStyleReport(fmt){
  const sel=D.styles.find(s=>s.fbKey===D.styleReportKey);
  if(!sel){toast('Select a style first','error');return;}
  const ins=D.inspections.filter(i=>i.style&&(i.style===sel.name||i.style===sel.styleId||i.style.includes(sel.name)||i.style.includes(sel.styleId)));
  if(!ins.length){toast('No inspection data for this style','error');return;}
  if(fmt==='excel')return styleReportExcel(sel,ins);
  styleReportPDF(sel,ins);
}

function styleReportPDF(sel,ins){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  pdfHeader(doc,'Style Report — '+sel.styleId+' '+sel.name,`Buyer: ${sel.buyer||'—'}  |  Colour: ${sel.color||'—'}  |  Status: ${sel.status}  |  Target DHU: ${sel.targetDhu||'—'}%`,`Generated: ${new Date().toLocaleString()}`);
  // Totals
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  doc.setFontSize(9);doc.setTextColor(40,40,40);
  doc.text(`Total Checked: ${totChk}   Total Defects: ${totDef}   DHU: ${dhu}%   AQL: ${parseFloat(dhu)<=2.5?'PASS':'REVIEW'}`,148,37,{align:'center'});
  // Daily table
  const byDate={};
  ins.forEach(i=>{const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;const sh=i.shift||'A';if(!byDate[d])byDate[d]={chk:0,def:0,A:0,B:0};byDate[d].chk+=parseInt(i.checkedQty)||0;byDate[d].def+=parseInt(i.defectQty)||0;byDate[d][sh]=(byDate[d][sh]||0)+(parseInt(i.defectQty)||0);});
  const body=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,g])=>[date,g.chk,g.def,g.chk?((g.def/g.chk)*100).toFixed(1)+'%':'—',g.A||'',g.B||'']);
  doc.autoTable({startY:41,head:[['Date','Checked','Defects','DHU%','Team A def','Team B def']],body,styles:{fontSize:8,cellPadding:2,textColor:[40,40,40]},headStyles:{fillColor:[0,150,120],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},theme:'grid'});
  // Defect summary
  const defMap={};ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)defMap[i.defectType]=(defMap[i.defectType]||0)+(parseInt(i.defectQty)||0);});
  const defRows=Object.entries(defMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[n,c,totDef?((c/totDef)*100).toFixed(1)+'%':'—']);
  if(defRows.length){let y=doc.lastAutoTable.finalY+6;if(y>170){doc.addPage('a4','landscape');y=14;}doc.setFontSize(10);doc.setTextColor(0,150,120);doc.text('Top Defects',14,y);doc.autoTable({startY:y+2,head:[['Defect Type','Count','% of Total']],body:defRows,styles:{fontSize:8,cellPadding:2,textColor:[40,40,40]},headStyles:{fillColor:[120,60,140],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},theme:'grid',margin:{left:14,right:180}});}
  pdfStamp(doc);
  doc.save(`Style_Report_${sel.styleId}_${new Date().toISOString().slice(0,10)}.pdf`);toast('Style Report PDF downloaded');
}

function styleReportExcel(sel,ins){
  const aoa=[];
  aoa.push([factoryName()+' — STYLE REPORT']);
  aoa.push([`Style: ${sel.styleId} — ${sel.name}`,`Buyer: ${sel.buyer||'—'}`,`Colour: ${sel.color||'—'}`,`Status: ${sel.status}`,`Target DHU: ${sel.targetDhu||'—'}%`]);
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  aoa.push([`Total Checked: ${totChk}`,`Total Defects: ${totDef}`,`DHU: ${dhu}%`,`AQL: ${parseFloat(dhu)<=2.5?'PASS':'REVIEW'}`]);
  aoa.push([]);
  // Daily sheet
  aoa.push(['Date','Checked','Defects','DHU%','Team A Def','Team B Def']);
  const byDate={};
  ins.forEach(i=>{const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;const sh=i.shift||'A';if(!byDate[d])byDate[d]={chk:0,def:0,A:0,B:0};byDate[d].chk+=parseInt(i.checkedQty)||0;byDate[d].def+=parseInt(i.defectQty)||0;byDate[d][sh]=(byDate[d][sh]||0)+(parseInt(i.defectQty)||0);});
  Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,g])=>aoa.push([date,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0,g.A||0,g.B||0]));
  aoa.push([]);
  // Shift summary
  aoa.push(['TEAM SUMMARY']);
  aoa.push(['Team','Checked','Defects','DHU%']);
  const byShift={A:{chk:0,def:0},B:{chk:0,def:0}};
  ins.forEach(i=>{const sh=i.shift||'A';if(!byShift[sh])byShift[sh]={chk:0,def:0};byShift[sh].chk+=parseInt(i.checkedQty)||0;byShift[sh].def+=parseInt(i.defectQty)||0;});
  ['A','B'].forEach(sh=>{const g=byShift[sh];aoa.push([`Team ${sh}`,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0]);});
  aoa.push([]);
  // Colour-wise
  aoa.push(['COLOUR-WISE']);
  aoa.push(['Colour','Checked','Defects','DHU%']);
  const byColorX={};
  ins.forEach(i=>{const c=(i.color||'').trim();if(!c)return;if(!byColorX[c])byColorX[c]={chk:0,def:0};byColorX[c].chk+=parseInt(i.checkedQty)||0;byColorX[c].def+=parseInt(i.defectQty)||0;});
  Object.entries(byColorX).sort((a,b)=>b[1].chk-a[1].chk).forEach(([c,g])=>aoa.push([c,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0]));
  if(!Object.keys(byColorX).length)aoa.push(['(no colour data)']);
  aoa.push([]);
  // Size-wise
  aoa.push(['SIZE-WISE']);
  aoa.push(['Size','Checked','Defects','DHU%']);
  const bySizeX={};
  ins.forEach(i=>{const z=(i.size||'').trim();if(!z)return;if(!bySizeX[z])bySizeX[z]={chk:0,def:0};bySizeX[z].chk+=parseInt(i.checkedQty)||0;bySizeX[z].def+=parseInt(i.defectQty)||0;});
  Object.entries(bySizeX).sort((a,b)=>b[1].chk-a[1].chk).forEach(([z,g])=>aoa.push([z,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0]));
  if(!Object.keys(bySizeX).length)aoa.push(['(no size data)']);
  aoa.push([]);
  // All inspections raw
  aoa.push(['ALL INSPECTIONS']);
  aoa.push(['Date','Time','Type','Module','Operator','Operation','Team','Size','Colour','Checked','Defects','DHU%','Defect Type','Inspector']);
  ins.forEach(i=>{const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;aoa.push([i.date,i.time||'',i.type||'',i.module||'',i.operatorId||'',i.operation||'',i.shift||'',i.size||'',i.color||'',c,d,c?parseFloat(((d/c)*100).toFixed(2)):0,i.defectType||'',i.inspector||i.submittedBy||'']);});
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:8},{wch:8},{wch:12},{wch:10},{wch:10},{wch:8},{wch:20},{wch:14}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Style Report');
  XLSX.writeFile(wb,`Style_Report_${sel.styleId}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Style Report Excel downloaded');
}

// ======================== MODULE / LINE REPORT ========================
// Per-line analysis: pick a module and see its DHU, daily/shift trend,
// colour & size split, top defects and operator-wise breakdown.
function pgModuleReport(){
  const mods=D.modules;
  const key=D.moduleReportKey||'';
  const sel=mods.find(m=>m.fbKey===key);

  const selector=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <select class="form-control" style="min-width:260px" onchange="D.moduleReportKey=this.value;render()">
      <option value="">— Select a Module / Line —</option>
      ${mods.map(m=>`<option value="${m.fbKey}" ${key===m.fbKey?'selected':''}>${m.name}${m.styleName?' — '+m.styleName:''}</option>`).join('')}
    </select>
    ${sel?`<div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="rptModuleReport('excel')">${ic('download',14)} Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="rptModuleReport('pdf')">${ic('pdf',14)} PDF</button>
    </div>`:''}
  </div>`;

  if(!sel) return`<div style="display:flex;flex-direction:column;gap:20px">${selector}
    <div class="card" style="padding:48px;text-align:center;color:var(--text3)">Select a module above to view its full report.</div>
  </div>`;

  // All inspections + roving for this module (match by module name)
  const ins=D.inspections.filter(i=>i.module===sel.name);
  const rovIns=(D.rovingInspections||[]).filter(i=>i.module===sel.name);

  // End Line = the line's output (good garments). Roving/Inline = separate in-process checks.
  const elRows=ins.filter(i=>i.type!=='inline'), inlineRows=ins.filter(i=>i.type==='inline');
  const elChk=sumChk(elRows), elDef=sumDef(elRows), elGood=elChk-elDef;
  const rovChk=rovIns.reduce((a,i)=>a+(parseInt(i.sp)||0),0)+sumChk(inlineRows);
  const rovDef=rovIns.reduce((a,i)=>a+(parseInt(i.dc)||0),0)+sumDef(inlineRows);
  const totChk=elChk,totDef=elDef;          // headline reflects End Line output only
  const dhu=elChk?((elDef/elChk)*100).toFixed(2):'0.00';
  const rovDhu=rovChk?((rovDef/rovChk)*100).toFixed(2):'0.00';
  const aql=parseFloat(dhu)<=2.5?'PASS':'REVIEW';
  const allDates=[...new Set(ins.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort();

  const infoCard=`<div class="card" style="border-color:var(--accent)22">
    <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--text3)">MODULE / LINE</div>
        <div style="font-size:20px;font-weight:700;font-family:var(--mono)">${sel.name||'—'}</div>
        <div style="font-size:13px;color:var(--accent);margin-top:2px">${sel.styleName||'— No style assigned —'}</div>
        <div style="font-size:12px;color:var(--text2)">${sel.buyer||''} ${sel.moduleId?'• '+sel.moduleId:''}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text2)">Team: <b>${sel.shift||'—'}</b></div>
        <div style="font-size:12px;color:var(--text2)">${allDates.length} day${allDates.length!==1?'s':''} active</div>
        <div style="font-size:12px;color:var(--text2)">${ins.length} end/inline • ${rovIns.length} roving</div>
      </div>
    </div>
  </div>`;

  const kpiBox=([l,v,c])=>`<div class="card" style="padding:14px;text-align:center;border-color:${c}22">
      <div style="font-size:22px;font-weight:700;font-family:var(--mono);color:${c}">${v}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${l}</div>
    </div>`;
  const kpis=`<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">End Line — line output of the day</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
    ${[
      ['Line Output',elChk,'var(--accent)'],
      ['Good Garments',elGood,'var(--green)'],
      ['Defects',elDef,'var(--red)'],
      ['DHU',dhu+'%',parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'],
      ['AQL',aql,aql==='PASS'?'var(--green)':'var(--red)'],
    ].map(kpiBox).join('')}
  </div>
  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:6px">Roving — separate in-process check</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    ${[
      ['Roving Sampled',rovChk,'var(--blue)'],
      ['Roving Defects',rovDef,'var(--red)'],
      ['Roving DHU',rovDhu+'%','var(--purple)'],
    ].map(kpiBox).join('')}
  </div>`;

  // Daily breakdown with A/B shift split
  const byDate={};
  ins.forEach(i=>{const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;const sh=i.shift||'A';if(!byDate[d])byDate[d]={chk:0,def:0,A:{chk:0,def:0},B:{chk:0,def:0}};const c=parseInt(i.checkedQty)||0,df=parseInt(i.defectQty)||0;byDate[d].chk+=c;byDate[d].def+=df;if(!byDate[d][sh])byDate[d][sh]={chk:0,def:0};byDate[d][sh].chk+=c;byDate[d][sh].def+=df;});
  const dailyRows=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,g])=>{
    const d2=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';const col=parseFloat(d2)>5?'var(--red)':parseFloat(d2)>3?'var(--yellow)':'var(--green)';
    return`<tr><td style="font-size:12px">${date}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:${g.def>0?'var(--red)':'inherit'}">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d2}%</td>${['A','B'].map(sh=>{const s=g[sh]||{chk:0,def:0};return`<td style="font-size:11px;text-align:center;color:var(--text3)">${s.chk?s.chk+'/<span style="color:var(--red)">'+s.def+'</span>':'—'}</td>`;}).join('')}</tr>`;
  }).join('');
  const dailyTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Daily Breakdown</div>
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Checked</th><th>Defects</th><th>DHU%</th><th>Team A</th><th>Team B</th></tr></thead>
    <tbody>${dailyRows||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">No data</td></tr>'}</tbody></table></div>
  </div>`;

  // Operator-wise (this matters most at line level)
  const byOp={};
  ins.forEach(i=>{const op=i.operatorId||'';if(!op)return;if(!byOp[op])byOp[op]={chk:0,def:0,operation:i.operation||''};byOp[op].chk+=parseInt(i.checkedQty)||0;byOp[op].def+=parseInt(i.defectQty)||0;});
  rovIns.forEach(i=>{const op=i.operatorId||'';if(!op)return;if(!byOp[op])byOp[op]={chk:0,def:0,operation:i.operation||''};byOp[op].chk+=parseInt(i.sp)||0;byOp[op].def+=parseInt(i.dc)||0;});
  const opRows=Object.entries(byOp).sort((a,b)=>{const da=a[1].chk?a[1].def/a[1].chk:0,db=b[1].chk?b[1].def/b[1].chk:0;return db-da;}).map(([op,g])=>{
    const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';const col=parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)';
    return`<tr><td style="font-family:var(--mono);font-weight:500">${op}</td><td style="font-size:12px">${g.operation||'—'}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d}%</td></tr>`;
  }).join('');
  const opTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Operator-wise DHU <span style="font-size:11px;color:var(--text3);font-weight:400">(worst first)</span></div>
    <div class="table-wrap"><table><thead><tr><th>Operator</th><th>Operation</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead>
    <tbody>${opRows||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:24px">No operator data</td></tr>'}</tbody></table></div>
  </div>`;

  // Colour & size
  const byColor={};ins.forEach(i=>{const c=(i.color||'').trim();if(!c)return;if(!byColor[c])byColor[c]={chk:0,def:0};byColor[c].chk+=parseInt(i.checkedQty)||0;byColor[c].def+=parseInt(i.defectQty)||0;});
  const colorRows=Object.entries(byColor).sort((a,b)=>b[1].chk-a[1].chk).map(([c,g])=>{const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';const col=parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)';return`<tr><td style="font-weight:500">${c}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d}%</td></tr>`;}).join('');
  const colorTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Colour-wise DHU</div><div class="table-wrap"><table><thead><tr><th>Colour</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead><tbody>${colorRows||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">No colour data</td></tr>'}</tbody></table></div></div>`;
  const bySize={};ins.forEach(i=>{const z=(i.size||'').trim();if(!z)return;if(!bySize[z])bySize[z]={chk:0,def:0};bySize[z].chk+=parseInt(i.checkedQty)||0;bySize[z].def+=parseInt(i.defectQty)||0;});
  const sizeOrder=['XXS','XS','S','M','L','XL','XXL','XXXL','3XL','4XL'];
  const sizeRows=Object.entries(bySize).sort((a,b)=>{const ia=sizeOrder.indexOf(a[0].toUpperCase()),ib=sizeOrder.indexOf(b[0].toUpperCase());if(ia>=0&&ib>=0)return ia-ib;return b[1].chk-a[1].chk;}).map(([z,g])=>{const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';const col=parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)';return`<tr><td style="font-weight:500">${z}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${col};font-weight:600">${d}%</td></tr>`;}).join('');
  const sizeTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Size-wise DHU</div><div class="table-wrap"><table><thead><tr><th>Size</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead><tbody>${sizeRows||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">No size data</td></tr>'}</tbody></table></div></div>`;

  // Top defects
  const defMap={};ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)defMap[i.defectType]=(defMap[i.defectType]||0)+(parseInt(i.defectQty)||0);});
  const top5=Object.entries(defMap).sort((a,b)=>b[1]-a[1]).slice(0,5);const totTopDef=Object.values(defMap).reduce((a,v)=>a+v,0);
  const defCard=top5.length?`<div class="card"><div style="font-weight:600;margin-bottom:12px">Top Defects</div>${top5.map(([name,cnt])=>{const pct=totTopDef?((cnt/totTopDef)*100).toFixed(0):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${name}</span><span style="font-family:var(--mono);color:var(--red)">${cnt} (${pct}%)</span></div><div style="height:6px;background:var(--bg3);border-radius:4px"><div style="height:100%;border-radius:4px;background:var(--red);width:${pct}%"></div></div></div>`;}).join('')}</div>`:'<div class="card" style="text-align:center;color:var(--text3);padding:24px">No defects logged</div>';

  return`<div style="display:flex;flex-direction:column;gap:16px">
    ${selector}${infoCard}${kpis}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${defCard}${colorTable}</div>
    ${opTable}
    <div style="font-weight:600;color:var(--text2);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Size Analysis</div>
    ${sizeTable}
    ${dailyTable}
  </div>`;
}

function rptModuleReport(fmt){
  const sel=D.modules.find(m=>m.fbKey===D.moduleReportKey);
  if(!sel){toast('Select a module first','error');return;}
  const ins=D.inspections.filter(i=>i.module===sel.name);
  const rov=(D.rovingInspections||[]).filter(i=>i.module===sel.name);
  if(!ins.length&&!rov.length){toast('No data for this module','error');return;}
  if(fmt==='excel')return moduleReportExcel(sel,ins,rov);
  moduleReportPDF(sel,ins,rov);
}

// This report spans every date the module has data for, so it can touch many sheets
// (one per date+shift+type). Summarize rather than list them all: count + most recent ID.
function sheetSummary(type,module,rows){
  const pairs=[...new Set(rows.map(r=>(r.shift||'?')+'_'+(r.date||(r.createdAt||'').split('T')[0]||'?')))];
  if(pairs.length===0)return'—';
  const sorted=pairs.sort().reverse();
  const [shift,date]=sorted[0].split('_');
  const latest=sheetIdFor(type,module,shift,date);
  return pairs.length===1?latest:(pairs.length+' sheets — latest: '+latest);
}
function moduleReportPDF(sel,ins,rov){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const elRows=ins.filter(i=>i.type!=='inline'), inlineRows=ins.filter(i=>i.type==='inline');
  const elChk=elRows.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const elDef=elRows.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const rovChk=rov.reduce((a,i)=>a+(parseInt(i.sp)||0),0)+inlineRows.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const rovDef=rov.reduce((a,i)=>a+(parseInt(i.dc)||0),0)+inlineRows.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=elChk?((elDef/elChk)*100).toFixed(2):'0.00';
  const rovDhu=rovChk?((rovDef/rovChk)*100).toFixed(2):'0.00';
  pdfHeader(doc,'Module Report — '+(sel.name||'')+(sel.styleName?'  ('+sel.styleName+')':''),`End Line output: ${elChk}   Good: ${elChk-elDef}   Defects: ${elDef}   DHU: ${dhu}%   AQL: ${parseFloat(dhu)<=2.5?'PASS':'REVIEW'}   |   Roving: ${rovChk} sampled · ${rovDef} def · ${rovDhu}%`,`Generated: ${new Date().toLocaleString()}`);
  doc.setFontSize(7.5);doc.setTextColor(100,100,100);
  doc.text(`End Line Sheet: ${sheetSummary('endline',sel.name,elRows)}     Roving Sheet: ${sheetSummary('roving',sel.name,rov)}`,14,34);
  // Operator table
  const byOp={};ins.forEach(i=>{const op=i.operatorId||'';if(!op)return;if(!byOp[op])byOp[op]={chk:0,def:0,operation:i.operation||''};byOp[op].chk+=parseInt(i.checkedQty)||0;byOp[op].def+=parseInt(i.defectQty)||0;});
  rov.forEach(i=>{const op=i.operatorId||'';if(!op)return;if(!byOp[op])byOp[op]={chk:0,def:0,operation:i.operation||''};byOp[op].chk+=parseInt(i.sp)||0;byOp[op].def+=parseInt(i.dc)||0;});
  const body=Object.entries(byOp).sort((a,b)=>{const da=a[1].chk?a[1].def/a[1].chk:0,db=b[1].chk?b[1].def/b[1].chk:0;return db-da;}).map(([op,g])=>[op,g.operation||'',g.chk,g.def,g.chk?((g.def/g.chk)*100).toFixed(1)+'%':'—']);
  doc.autoTable({startY:38,head:[['Operator','Operation','Checked','Defects','DHU%']],body,styles:{fontSize:8,cellPadding:2,textColor:[40,40,40]},headStyles:{fillColor:[0,150,120],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},theme:'grid'});
  pdfStamp(doc);
  doc.save(`Module_Report_${(sel.name||'module').replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('Module Report PDF downloaded');
}

  const ws=XLSX.utils.aoa_to_sheet(aoa);

window.completeStyle = async function(key){
  const s=D.styles.find(x=>x.fbKey===key);
  if(!confirm(`Mark "${s?.name||'this style'}" as completed?`))return;
  await window.fbUpd('styles',key,{status:'Completed',completedDate:new Date().toISOString()});
  // Clear style from any linked modules so they're ready for a new style
  const linked=D.modules.filter(m=>m.styleName===s?.name||m.styleId===s?.styleId);
  for(const m of linked){
    await window.fbUpd('modules',m.fbKey,{styleName:'',styleId:'',styleKey:'',buyer:''});
  }
  const msg=linked.length>0
    ?`Style completed. ${linked.length} module(s) cleared — assign a new style to them.`
    :'Style completed! Find it in Reports.';
  toast(msg,'success');
};

// Shared branding: a faded credit line on EVERY page of EVERY report.
const PDF_CREDIT='Developed by Yasar, Anirudra — NIFT Jodhpur';
function pdfStamp(doc){
  try{
    const n=doc.internal.getNumberOfPages();
    const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
    for(let p=1;p<=n;p++){
      doc.setPage(p);
      doc.setFontSize(7);doc.setTextColor(165,165,165);
      doc.text(PDF_CREDIT,W/2,H-5,{align:'center'});
    }
  }catch(e){}
}
// Standard light-theme branded header for a landscape report.
function pdfHeader(doc,title,subtitle,extra){
  const W=doc.internal.pageSize.getWidth();
  doc.setFontSize(15);doc.setTextColor(0,150,120);doc.text(factoryName(),W/2,13,{align:'center'});
  doc.setFontSize(12);doc.setTextColor(40,40,40);doc.text(title,W/2,20,{align:'center'});
  if(subtitle){doc.setFontSize(9);doc.setTextColor(110,110,110);doc.text(subtitle,W/2,26,{align:'center'});}

function makePDF(title,headers,rows,summary){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.setFontSize(18);doc.setTextColor(0,100,80);doc.text(factoryName(),14,20);
  doc.setFontSize(12);doc.setTextColor(60,60,60);doc.text(title,14,28);
  doc.setFontSize(9);doc.setTextColor(120,120,120);doc.text('Generated: '+new Date().toLocaleString('en-GB'),14,34);
  if(summary){doc.setFontSize(10);doc.setTextColor(40,40,40);let y=42;summary.forEach(s=>{doc.text(s,14,y);y+=5;});}
  doc.autoTable({head:[headers],body:rows,startY:summary?42+summary.length*5+4:40,theme:'grid',styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,180,140],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},margin:{left:14,right:14}});
  pdfStamp(doc);
  doc.save(title.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.pdf');
  toast('PDF downloaded');
}

function makeExcel(title,headers,rows){
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);

window.rptDefects=function(fmt){

// ======================== END LINE REPORT (hourly — paper format) ========================
function elHourOf(i){
  const t=(i.time||'').slice(0,2);
  if(/^\d{2}$/.test(t))return parseInt(t,10);
  const ca=i.createdAt?new Date(i.createdAt):null;
  return ca?ca.getHours():0;
}
function elLabel(h){return (h<10?'0'+h:''+h)+':00';}
function buildEndLine(){
  const all=D.inspections.filter(i=>i.type==='endline');
  const dates=[...new Set(all.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort();
  const styleMode=D.elStyle&&D.elStyle!=='__all';
  const date=D.elDate||dates[dates.length-1]||new Date().toISOString().split('T')[0];
  // Always filter by the selected date; when a style is also chosen, narrow to that style too.
  // (A module can run two styles in one day — picking the style separates them cleanly.)
  let rows=all.filter(i=>(i.date||(i.createdAt||'').split('T')[0])===date);
  if(styleMode)rows=rows.filter(i=>(i.style||'')===D.elStyle);
  if(D.elModule&&D.elModule!=='__all')rows=rows.filter(i=>i.module===D.elModule);
  if(D.elShift&&D.elShift!=='__all')rows=rows.filter(i=>(i.shift||'')===D.elShift);
  if(D.elSize&&D.elSize!=='__all')rows=rows.filter(i=>(i.size||'')===D.elSize);
  if(D.elColor&&D.elColor!=='__all')rows=rows.filter(i=>(i.color||'')===D.elColor);
  if(D.elInspector&&D.elInspector!=='__all')rows=rows.filter(i=>(i.inspector||i.submittedBy||'')===D.elInspector);
  const hours=[...new Set(rows.map(elHourOf))].sort((a,b)=>a-b);
  // operation rows (one per operator+operation; appears even with zero defects)
  const gm={};
  rows.forEach(i=>{
    const key=(i.operatorId||'?')+'|'+(i.operation||'—');
    if(!gm[key])gm[key]={operatorId:i.operatorId||'',operation:i.operation||'',cells:{},total:0};
    const h=elHourOf(i),dq=parseInt(i.defectQty)||0;
    if(dq>0&&i.defectType){
      const code=elResolveCode(i.defectType)||(i.defectType||'').toString().slice(0,6);
      if(!gm[key].cells[h])gm[key].cells[h]={};
      gm[key].cells[h][code]=(gm[key].cells[h][code]||0)+dq;
      gm[key].total+=dq;
    }
  });
  const groups=Object.values(gm).sort((a,b)=>(a.operation||'').localeCompare(b.operation||''));
  // category × hour matrix
  const cat={};EL_CAT_ORDER.forEach(c=>{cat[c]={total:0};hours.forEach(h=>cat[c][h]=0);});
  rows.forEach(i=>{const dq=parseInt(i.defectQty)||0;if(dq<=0||!i.defectType)return;const code=elResolveCode(i.defectType);const k=elCategory(code,i.defectType);const h=elHourOf(i);if(!cat[k])cat[k]={total:0};cat[k][h]=(cat[k][h]||0)+dq;cat[k].total+=dq;});
  // per-hour calcs
  const perHour={};let totInsp=0,totDef=0;
  rows.forEach(i=>{const h=elHourOf(i),c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;if(!perHour[h])perHour[h]={insp:0,def:0};perHour[h].insp+=c;perHour[h].def+=d;totInsp+=c;totDef+=d;});
  hours.forEach(h=>{const p=perHour[h]||(perHour[h]={insp:0,def:0});p.good=p.insp-p.def;p.pct=p.insp?(p.def/p.insp)*100:0;});
  const overallDhu=totInsp?(totDef/totInsp)*100:0;
  // Pieces reworked at End Shift (matched by the same module+date+team as the rows in
  // scope) — subtracted from raw defects to get the FINAL net result after rework.
  const rowKeys=new Set(rows.map(i=>`${i.module}|${i.date||(i.createdAt||'').split('T')[0]}|${i.shift||''}`));
  const reworked=(D.elRework||[]).filter(r=>rowKeys.has(`${r.module}|${r.date}|${r.shift}`)).reduce((a,r)=>a+(parseInt(r.reworkedQty)||0),0);
  const netDef=Math.max(0,totDef-reworked);
  const netDhu=totInsp?(netDef/totInsp)*100:0;
  // meta
  const modName=(D.elModule&&D.elModule!=='__all')?D.elModule:(rows[0]?.module||'');
  const mod=D.modules.find(m=>m.name===modName);
  const styleName=styleMode?D.elStyle:(mod?.styleName||rows[0]?.style||'');
  const sObj=D.styles.find(s=>s.name===styleName||s.styleId===styleName);
  const colour=sObj?.color||sObj?.colors?.split(',')[0]?.trim()||'';
  const styleId=sObj?.styleId||mod?.styleId||'';
  const shift=(D.elShift&&D.elShift!=='__all')?D.elShift:(rows[0]?.shift||'');
  const qcNames=[...new Set(rows.map(i=>i.inspector||i.submittedBy).filter(Boolean))].join(', ');
  const size=(D.elSize&&D.elSize!=='__all')?D.elSize:[...new Set(rows.map(i=>i.size||'').filter(Boolean))].join(', ')||'';
  const colorFilter=(D.elColor&&D.elColor!=='__all')?D.elColor:'';
  const inspectorFilter=(D.elInspector&&D.elInspector!=='__all')?D.elInspector:'';
  const dateRange=styleMode?([...new Set(rows.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort().join(' → ')||'All dates'):'';
  return {date,hours,groups,cat,perHour,totInsp,totDef,overallDhu,reworked,netDef,netDhu,styleName,styleId,colour,size,colorFilter,inspectorFilter,team:modName||'All',shift,qcNames,count:rows.length,styleMode,dateRange};
}

window.rptEndLine=function(fmt){

window.seedEndlineDefects=async function(){
  if(!confirm('Add the full defect code list (S/L/M/D/E/F, '+EL_DEFECTS.length+' codes) to Defects? Existing codes are skipped.\n\nTagged as "Both" so Roving and End Line QCs see the same codes.'))return;
  const existing=new Set((D.defects||[]).map(d=>(d.defectId||'').toUpperCase()));
  let n=0;
  for(const d of EL_DEFECTS){if(existing.has(d.code))continue;await window.fbAdd('defects',{defectId:d.code,name:d.name,type:'Both'});n++;}
  toast('Added '+n+' defect codes (Both)');
};
// Fix for codes that were seeded before this change (tagged "Endline" only, invisible to
// Roving's dropdown). One click flips them to "Both" so Roving QCs see the same codes.
window.fixDefectVisibility=async function(){
  const stuck=(D.defects||[]).filter(d=>d.type==='Endline');
  if(stuck.length===0){toast('No defect codes need fixing — all already visible to Roving');return;}
  if(!confirm('Make '+stuck.length+' existing defect code(s) visible to Roving too? (Changes their type from "Endline" to "Both")'))return;
  for(const d of stuck){await window.fbUpd('defects',d.fbKey,{type:'Both'});}
  toast('✅ '+stuck.length+' defect code(s) now visible in Roving');
};

  const infoBar=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">

    <div class="card" style="padding:12px 14px"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">STYLE / COLOUR / SIZE</div><div style="font-weight:600">${R.styleName||'—'}</div><div style="font-size:11px;color:var(--text2)">${R.styleId?R.styleId+' • ':''} ${R.colorFilter||R.colour||'—'}${R.size?' • Size: '+R.size:''}</div></div>
    <div class="card" style="padding:12px 14px"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">QC INSPECTOR</div><div style="font-weight:600;font-size:12px">${R.qcNames||'—'}</div><div style="font-size:11px;color:var(--text2)">Dept: Quality</div></div>
    <div class="card" style="padding:12px 14px;border-color:${aql==='PASS'?'var(--green)':'var(--red)'}"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">INSPECTED / DHU</div><div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'}">${dhu}%</div><div style="font-size:11px;color:var(--text2)">${R.totInsp} checked • AQL: <b style="color:${aql==='PASS'?'var(--green)':'var(--red)'}">${aql}</b></div></div>
  </div>`;

  // Column header row
  const colHdrs=`<tr>
    <th style="${thStyle}">OPE Emp #</th>
    <th style="${thStyle};text-align:left;min-width:140px">OPERATION</th>
    ${HOURS.map(h=>`<th style="${thStyle};${hasData.has(h)?'':'opacity:.4;'}">${h}</th>`).join('')}
    <th style="${thStyle}">TTL</th>
  </tr>`;

  // Operator rows
  const opRows=R.groups.map(g=>`<tr>
    <td style="${tdL};font-family:var(--mono);font-size:11px">${g.operatorId}</td>
    <td style="${tdL}">${g.operation}</td>
    ${HOURS.map(h=>{const cc=g.cells[h];const txt=cc?Object.entries(cc).map(([code,n])=>code+(n>1?'×'+n:'')).join(' '):'';return`<td style="${tdStyle(hasData.has(h),txt.length>0)}">${txt}</td>`;}).join('')}
    <td style="${tdStyle(true,g.total>0)};font-weight:600">${g.total||''}</td>
  </tr>`).join('');

  // Category rows
  const catRows=EL_CAT_ORDER.map(c=>{
    const row=R.cat[c]||{total:0};
    return`<tr style="background:rgba(0,0,0,.2)">
      <td colspan="2" style="${tdLB}">${c}</td>
      ${HOURS.map(h=>`<td style="${tdStyle(hasData.has(h),(row[h]||0)>0)}">${row[h]||''}</td>`).join('')}
      <td style="${tdStyle(true,(row.total||0)>0)};font-weight:600">${row.total||''}</td>
    </tr>`;
  }).join('');

  // Summary rows — the TTL (rightmost) cell is the FINAL number: if pieces were reworked,
  // Defect Qty's total is net (raw − reworked) and Good Qty's total absorbs those reworked
  // pieces back in. The hour-by-hour cells stay raw (rework isn't tied to one specific hour —
  // it's logged once at End Shift), only the grand total reflects the after-rework result.
  const finalGoodTot=R.reworked>0?(R.totInsp-R.netDef):(R.totInsp-R.totDef);
  const finalDefTot=R.reworked>0?R.netDef:R.totDef;
  const finalDhuTot=R.reworked>0?R.netDhu:R.overallDhu;
  const summaryRows=[
    {label:'INSPECTED',    vals:HOURS.map(h=>(R.perHour[h]?.insp||'')),   tot:R.totInsp,   color:''},
    {label:'GOOD QTY',     vals:HOURS.map(h=>(R.perHour[h]?.good||'')),   tot:finalGoodTot, color:'var(--green)'},
    {label:'DEFECT QTY',   vals:HOURS.map(h=>(R.perHour[h]?.def||'')),    tot:finalDefTot,    color:'var(--red)'},
    {label:'DEFECTS %',    vals:HOURS.map(h=>R.perHour[h]?.insp?(R.perHour[h].pct.toFixed(1)+'%'):''), tot:finalDhuTot.toFixed(1)+'%', color:finalDhuTot>5?'var(--red)':finalDhuTot>3?'var(--yellow)':'var(--green)'},
  ].map(r=>`<tr style="background:rgba(0,212,168,.04)">
    <td colspan="2" style="${tdLB};color:${r.color||'var(--text)'}">${r.label}</td>
    ${HOURS.map((h,i)=>`<td style="${tdStyle(hasData.has(h),false)};color:${r.color||'inherit'}">${r.vals[i]||''}</td>`).join('')}
    <td style="${tdStyle(true,true)};font-weight:700;color:${r.color||'inherit'}">${r.tot}</td>
  </tr>`).join('');

  // Footnote — explains why the TTL above differs from the raw hour-by-hour sum.
  const reworkRow=R.reworked>0?`<tr style="background:rgba(0,212,168,.1)">
    <td colspan="2" style="${tdLB};color:var(--accent)">REWORKED</td>
    <td colspan="${HOURS.length}" style="${tdStyle(true,false)};text-align:left;padding-left:10px;font-weight:600;font-size:10px">
      ${R.reworked} piece(s) fixed at End Shift — already subtracted from Defect Qty TTL and added back into Good Qty TTL above. Raw (pre-rework) was ${R.totDef} defects / ${R.overallDhu.toFixed(1)}% DHU. AQL: ${R.netDhu<=2.5?'PASS':'REVIEW'}
    </td>
    <td style="${tdStyle(true,false)}"></td>
  </tr>`:'';

  // COR. ADJUSTMENTS + signature rows
  const footRows=`${reworkRow}<tr style="background:rgba(0,0,0,.3)">
    <td colspan="2" style="${tdLB}">COR. ADJUSTMENTS</td>
    ${HOURS.map(()=>`<td style="${tdStyle(false,false)}"></td>`).join('')}<td style="${tdStyle(false,false)}"></td>
  </tr>
  <tr><td colspan="2" style="${tdLB}">QC SUP</td>${HOURS.map(()=>`<td style="${tdStyle(false,false)}"></td>`).join('')}<td style="${tdStyle(false,false)}"></td></tr>
  <tr><td colspan="2" style="${tdLB}">PROD SUP</td>${HOURS.map(()=>`<td style="${tdStyle(false,false)}"></td>`).join('')}<td style="${tdStyle(false,false)}"></td></tr>`;

  // Defect codes legend
  const legend=EL_DEFECTS.map(d=>`<span style="font-size:10px;white-space:nowrap;padding:2px 6px;margin:2px;background:rgba(255,255,255,.04);border-radius:4px;border:1px solid rgba(255,255,255,.08)"><b style="color:var(--accent)">${d.code}</b> ${d.name}</span>`).join('');

  const table=`<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:900px">
      <thead>${colHdrs}</thead>
      <tbody>${opRows}${catRows}${summaryRows}${footRows}</tbody>
    </table>
  </div>`;

  return`<div style="display:flex;flex-direction:column;gap:16px">
    ${filters}
    ${infoBar}
    <div class="card" style="padding:0;overflow:hidden">${table}</div>
    <div class="card" style="padding:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.05em">DEFECT CODES</div>
      <div style="display:flex;flex-wrap:wrap">${legend}</div>
    </div>
  </div>`;
}

// ======================== ROVING INSPECTION PAGE ========================
// Renders one roving report table block for a single style (a module can run several styles a day).

  const opMap={};
  rows.forEach(r=>{const key=(r.operatorId||'?')+'|'+(r.operation||'—');if(!opMap[key])opMap[key]={operatorId:r.operatorId||'',operation:r.operation||'',visits:{}};opMap[key].visits[parseInt(r.visitNum)||1]=r;});
  const operators=Object.values(opMap).sort((a,b)=>a.operation.localeCompare(b.operation));
  const totalSP=rows.reduce((a,r)=>a+(parseInt(r.sp)||0),0);
  const totalDC=rows.reduce((a,r)=>a+(parseInt(r.dc)||0),0);
  const defPct=totalSP?((totalDC/totalSP)*100).toFixed(1):0;
  return `
    <div class="card" style="padding:0;overflow:hidden;${multi?'border-color:rgba(153,102,255,.4)':''}">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:center${multi?';background:rgba(153,102,255,.06)':''}">
        <div style="font-size:13px;font-weight:600">Team: ${team} &nbsp;|&nbsp; Style: ${multi?`<span style="color:#c4a5ff">${style}</span>`:style} &nbsp;|&nbsp; Date: ${dateLabel}</div>
        <div style="display:flex;gap:16px;font-family:var(--mono);font-size:13px">
          <span>Insp: <b>${totalSP}</b></span><span style="color:var(--red)">Def: <b>${totalDC}</b></span>
          <span style="color:${parseFloat(defPct)>5?'var(--red)':parseFloat(defPct)>3?'var(--yellow)':'var(--green)'}">Def%: <b>${defPct}%</b></span>
        </div>
      </div>
      <div class="table-wrap"><table>
        <thead>
          <tr>
            <th rowspan="2" style="min-width:80px">Operator</th>
            <th rowspan="2" style="min-width:120px">Operation</th>
            ${[1,2,3,4].map(v=>`<th colspan="5" style="text-align:center;border-left:2px solid var(--border2)">${v===1?'1st':v===2?'2nd':v===3?'3rd':'4th'} Visit</th>`).join('')}
            <th style="border-left:2px solid var(--border2)">INSP</th><th>DEF</th>
          </tr>
          <tr>
            ${[1,2,3,4].map(v=>`<th style="${v>1?'border-left:2px solid var(--border2)':''}">TR</th><th>SP</th><th>D/C</th><th>CPA</th><th>AB</th>`).join('')}
            <th style="border-left:2px solid var(--border2)"></th><th></th>
          </tr>
        </thead>
        <tbody>
          ${operators.map(op=>{
            const totalOpSP=[1,2,3,4].reduce((a,v)=>a+(parseInt(op.visits[v]?.sp)||0),0);
            const totalOpDC=[1,2,3,4].reduce((a,v)=>a+(parseInt(op.visits[v]?.dc)||0),0);
            return`<tr>
              <td style="font-family:var(--mono);font-size:12px;font-weight:600">${op.operatorId}</td>
              <td style="font-size:12px">${op.operation}</td>
              ${[1,2,3,4].map(v=>{
                const vi=op.visits[v];
                const bl=v>1?'border-left:2px solid var(--border2)':'';
                return vi
                  ?(vi.skipped
                    ?`<td colspan="5" style="${bl}text-align:center;font-size:10px;color:var(--text3);font-style:italic">— skipped (not critical) —</td>`
                    :`<td style="${bl}">${vi.trim==='pass'?'<span class="badge badge-green" style="font-size:10px;padding:1px 5px">✓</span>':'<span class="badge badge-red" style="font-size:10px;padding:1px 5px">✗</span>'}</td>
                    <td style="font-family:var(--mono);font-size:12px">${vi.sp||''}</td>
                    <td style="font-family:var(--mono);font-size:12px;color:${(parseInt(vi.dc)||0)>0?'var(--red)':'var(--green)'}" title="${vi.defectType||''}">${vi.dc||0}${(parseInt(vi.dc)||0)>0&&vi.defectType?`<div style="font-size:9px;font-weight:400;color:var(--text3);white-space:nowrap">${vi.defectType.length>10?vi.defectType.slice(0,10)+'…':vi.defectType}</div>`:''}</td>
                    <td style="font-size:11px">${vi.capRequired?`<span style="color:var(--red);font-weight:700">⚠</span>`:`<span style="color:var(--text3)">—</span>`}</td>
                    <td style="font-size:11px;color:${(vi.ab||vi.cpa)?'var(--yellow)':'var(--text2)'};font-weight:${(vi.ab||vi.cpa)?'700':'400'}">${vi.absent?`<span style="color:var(--text3);font-weight:400">Abs</span>`:vi.ab||vi.cpa||'—'}</td>`)
                  :`<td style="${bl}"></td><td></td><td></td><td></td><td></td>`;
              }).join('')}
              <td style="font-family:var(--mono);font-weight:600;border-left:2px solid var(--border2)">${totalOpSP}</td>
              <td style="font-family:var(--mono);font-weight:600;color:${totalOpDC>0?'var(--red)':'var(--green)'}">${totalOpDC}</td>
            </tr>`;
          }).join('')}
          <tr style="background:var(--bg3);font-weight:700">
            <td colspan="2">TOTAL</td>
            ${[1,2,3,4].map(v=>{const vR=rows.filter(r=>parseInt(r.visitNum)===v);const vSP=vR.reduce((a,r)=>a+(parseInt(r.sp)||0),0);const vDC=vR.reduce((a,r)=>a+(parseInt(r.dc)||0),0);return`<td style="${v>1?'border-left:2px solid var(--border2)':''}"></td><td style="font-family:var(--mono)">${vSP}</td><td style="font-family:var(--mono);color:var(--red)">${vDC}</td><td></td><td></td>`;}).join('')}
            <td style="font-family:var(--mono);border-left:2px solid var(--border2)">${totalSP}</td>
            <td style="font-family:var(--mono);color:var(--red)">${totalDC}</td>
          </tr>
          <tr style="background:var(--bg3)">
            <td colspan="2" style="font-weight:700">%</td>
            ${[1,2,3,4].map(v=>{const vR=rows.filter(r=>parseInt(r.visitNum)===v);const vSP=vR.reduce((a,r)=>a+(parseInt(r.sp)||0),0);const vDC=vR.reduce((a,r)=>a+(parseInt(r.dc)||0),0);const pct=vSP?((vDC/vSP)*100).toFixed(1)+'%':'—';return`<td style="${v>1?'border-left:2px solid var(--border2)':''}"></td><td></td><td style="font-family:var(--mono)">${pct}</td><td></td><td></td>`;}).join('')}
            <td style="font-family:var(--mono);border-left:2px solid var(--border2)">${totalSP}</td>
            <td style="font-family:var(--mono);color:${parseFloat(defPct)>5?'var(--red)':parseFloat(defPct)>3?'var(--yellow)':'var(--green)'}">${defPct}%</td>
          </tr>
        </tbody>
      </table></div>
      <div style="margin-top:14px;padding:12px 14px;background:rgba(224,85,85,.05);border:1px solid rgba(224,85,85,.25);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.7">
        <div style="font-weight:700;color:var(--red);margin-bottom:6px">⚠ = Corrective &amp; Preventive Action (CPA) required</div>
        <div><b>(a)</b> If 1 defect found → check another 7 pieces.</div>
        <div><b>(b)</b> If no defects found in those 7 pieces → allow the operator to continue (no CPA).</div>
        <div><b>(c)</b> If 1 or more defects found in those 7 pieces → stop the operation; operator checks all stitched garments, repairs defects, completes CPA before resuming.</div>
        <div><b>(d)</b> If 2 or more defects found in the original sample → immediate CPA required (no 7-piece check needed).</div>
      </div>
    </div>`;
}

function pgRoving(){
  const rovIns=D.rovingInspections||[];
  const dates=[...new Set(rovIns.map(i=>i.date||'').filter(Boolean))].sort().reverse();
  const curDate=D.rovingDate||dates[0]||new Date().toISOString().split('T')[0];
  const mods=[...new Set(rovIns.map(i=>i.module).filter(Boolean))];
  const shiftsForDate=[...new Set(rovIns.filter(i=>i.date===curDate).map(i=>i.shift||'').filter(Boolean))].sort();
  let rows=rovIns.filter(i=>i.date===curDate);
  if(D.rovingShift&&D.rovingShift!=='__all') rows=rows.filter(i=>i.shift===D.rovingShift);
  if(D.rovingModule&&D.rovingModule!=='__all') rows=rows.filter(i=>i.module===D.rovingModule);
  const team=D.rovingModule&&D.rovingModule!=='__all'?D.rovingModule:(rows[0]?.module||'—');
  // A module may run more than one style in a day (e.g. Style A for 3 hours, then Style B).
  // Group rows by style so the report shows one block per style, each with its own DHU.
  const styleGroups={};
  rows.forEach(r=>{const st=(r.style||'—');(styleGroups[st]=styleGroups[st]||[]).push(r);});
  const styleKeys=Object.keys(styleGroups).sort();
  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div class="card" style="border-color:var(--red)">
      <div class="card-header"><span class="card-title" style="color:var(--red)">🏃 Roving Inspection Report — standard paper format</span><span class="fb">🔥 ${rovIns.length} records</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px">
        <div class="form-group" style="margin:0"><label class="form-label">Date</label>
          <select class="form-input" onchange="D.rovingDate=this.value;D.rovingShift='__all';render()">${dates.length?dates.map(d=>`<option value="${d}" ${d===curDate?'selected':''}>${fd(d)}</option>`).join(''):'<option>No data yet</option>'}</select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Team</label>
          <select class="form-input" onchange="D.rovingShift=this.value;render()">
            <option value="__all" ${(!D.rovingShift||D.rovingShift==='__all')?'selected':''}>All teams</option>
            ${shiftsForDate.map(s=>`<option value="${s}" ${D.rovingShift===s?'selected':''}>Team ${s}</option>`).join('')}
          </select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Module / Team</label>
          <select class="form-input" onchange="D.rovingModule=this.value;render()">
            <option value="__all" ${(!D.rovingModule||D.rovingModule==='__all')?'selected':''}>All modules</option>
            ${mods.map(m=>`<option value="${m}" ${D.rovingModule===m?'selected':''}>${m}</option>`).join('')}
          </select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Download</label>
          <div style="display:flex;gap:8px;margin-top:2px">
            <button class="btn btn-primary" onclick="rptRoving('pdf')">${ic('pdf',14)} PDF</button>
            <button class="btn btn-ghost" onclick="rptRoving('excel')">${ic('excel',14)} Excel</button>
          </div></div>
        <div class="form-group" style="margin:0"><label class="form-label" style="color:var(--red)">⏰ ${shiftLabel()}</label>
          <button class="btn" onclick="endShiftRoving()" style="width:100%;background:rgba(255,80,80,.15);color:var(--red);border:1px solid rgba(255,80,80,.3);font-weight:700">🔚 End Shift & Clear</button>
        </div>
      </div>
    </div>
    ${rows.length===0?`<div class="card" style="text-align:center;padding:48px;color:var(--text3)">No roving data for selected filters.<br><span style="font-size:12px;margin-top:8px;display:block">Workers with <b>QC Roving Inspector</b> role submit data from the worker portal.</span></div>`:styleKeys.map(st=>rovingStyleBlock(styleGroups[st],team,st,fd(curDate),styleKeys.length>1)).join('')}
    <div class="card" style="font-size:12px;color:var(--text2);line-height:1.8">
      <div style="font-weight:600;margin-bottom:6px;color:var(--text)">Corrective and Preventive Action</div>
      <div>(a) If 1 defect found → check another 7 pieces</div>
      <div>(b) If no defects found in those 7 pieces → allow the operator to continue (no CPA)</div>
      <div>(c) If 1 or more defects found in those 7 pieces → stop the operation, operator checks all stitched garments, repair defects, complete CPA before resuming</div>
      <div>(d) If 2 or more defects found in original sample → immediate CPA required (no 7-piece check needed)</div>
      <div style="margin-top:8px"><span style="font-weight:600;color:var(--text)">Action By:</span> &nbsp;A — Solved by the Inline QC &nbsp;|&nbsp; B — Solved with the help of Supervisor / Mechanic &nbsp;|&nbsp; C — Solved with the help of Senior Technician &nbsp;|&nbsp; D — Informed to Production Executive / Quality Executive</div>
    </div>
  </div>`;
}

// ======================== CORRECTIVE ACTION PLAN (CAP) ========================
// Hour-grouped sheet mirroring the paper "End Line Report / Corrective Action Plan":
// fed from worker_9.html, which auto-creates one record per module+date+hour
// whenever a Roving QC logs a defect (path: correctiveActions/{moduleId}_{date}_{hour}).
const CAP_SIGN_COLS=[{k:'operator',l:'Operator Sign.'},{k:'tech',l:'Tech Sign.'},{k:'tl',l:'T/L Sign.'},{k:'qa',l:'QA Sign.'}];
// Sign-offs each action level needs (must match the worker app): A→Operator; B/C→Operator+Tech; D→Operator+QA.
const CAP_CPA_SIGN={A:['operator'],B:['operator','tech'],C:['operator','tech'],D:['operator','qa']};
function capRequiredKeys(entry){
  const set=new Set();
  (entry?.defects||[]).forEach(d=>{(CAP_CPA_SIGN[d.cpa]||['operator']).forEach(r=>set.add(r));});
  if(set.size===0)set.add('operator');
  return set;
}

function pgCap(){
  const all=D.correctiveActions||[];
  const dates=[...new Set(all.map(e=>e.date).filter(Boolean))].sort().reverse();
  const curDate=D.capDate||dates[0]||new Date().toISOString().split('T')[0];
  const mods=[...new Set(all.map(e=>e.moduleName||e.moduleId).filter(Boolean))];
  let rows=all.filter(e=>e.date===curDate);
  if(D.capModule&&D.capModule!=='__all') rows=rows.filter(e=>(e.moduleName||e.moduleId)===D.capModule);
  if(D.capStatus&&D.capStatus!=='__all') rows=rows.filter(e=>(e.status||'open')===D.capStatus);
  rows=rows.sort((a,b)=>(a.moduleName||'').localeCompare(b.moduleName||'')||a.hour.localeCompare(b.hour));
  const openCount=all.filter(e=>e.date===curDate&&e.status!=='closed').length;
  const totalDef=rows.reduce((a,e)=>a+(e.defects||[]).reduce((s,d)=>s+(parseInt(d.qty)||0),0),0);

  const sigCell=(sig,required)=>sig
    ?`<div style="text-align:center"><img src="${sig.img}" style="height:28px;background:#fff;border-radius:4px;display:block;margin:0 auto"><div style="font-size:9px;color:var(--green)">${sig.name}</div></div>`
    :(required?'<div style="text-align:center;color:var(--text3);font-size:11px">— pending —</div>':'<div style="text-align:center;color:var(--text3);font-size:10px;opacity:.5">n/a</div>');

  const tableRows=rows.map(e=>{
    const closed=e.status==='closed';
    const reqKeys=capRequiredKeys(e);
    return`<tr>
      <td style="font-weight:600;font-family:var(--mono)">${e.hour}</td>
      <td style="font-size:11px;color:var(--text3)">${e.moduleName||e.moduleId||''}${e.lineNo?' • L'+e.lineNo:''}</td>
      <td>${(e.defects||[]).map(d=>`<span class="badge badge-red" style="margin:1px 2px 1px 0">${d.code} ×${d.qty}${d.cpa?' · '+d.cpa:''}</span>`).join('')}${(e.reasons&&e.reasons.length)?`<div style="font-size:10px;color:var(--yellow);margin-top:3px">⚠ ${e.reasons.join(' · ')}</div>`:''}</td>
      <td style="font-size:12px;max-width:220px">${e.correctiveAction||'<span style="color:var(--text3)">—</span>'}</td>
      ${CAP_SIGN_COLS.map(c=>`<td>${sigCell(e.signatures?.[c.k],reqKeys.has(c.k))}</td>`).join('')}
      <td><span class="badge badge-${closed?'green':'yellow'}">${closed?'Closed':'Open'}</span></td>
    </tr>`;
  }).join('');

  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div class="card" style="border-color:var(--red)">
      <div class="card-header"><span class="card-title" style="color:var(--red)">📝 Corrective Action Plan — Roving QC defect escalation</span><span class="fb">🔥 ${all.length} records</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
        <div class="form-group" style="margin:0"><label class="form-label">Date</label>
          <select class="form-input" onchange="D.capDate=this.value;render()">${dates.length?dates.map(d=>`<option value="${d}" ${d===curDate?'selected':''}>${fd(d)}</option>`).join(''):'<option>No data yet</option>'}</select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Module</label>
          <select class="form-input" onchange="D.capModule=this.value;render()">
            <option value="__all" ${(!D.capModule||D.capModule==='__all')?'selected':''}>All modules</option>
            ${mods.map(m=>`<option value="${m}" ${D.capModule===m?'selected':''}>${m}</option>`).join('')}
          </select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Status</label>
          <select class="form-input" onchange="D.capStatus=this.value;render()">
            <option value="__all" ${(!D.capStatus||D.capStatus==='__all')?'selected':''}>All</option>
            <option value="open" ${D.capStatus==='open'?'selected':''}>Open only</option>
            <option value="closed" ${D.capStatus==='closed'?'selected':''}>Closed only</option>
          </select></div>
        <div class="form-group" style="margin:0"><label class="form-label">Download</label>
          <div style="display:flex;gap:8px;margin-top:2px">
            <button class="btn btn-primary" onclick="rptCap('pdf')">${ic('pdf',14)} PDF</button>
            <button class="btn btn-ghost" onclick="rptCap('excel')">${ic('excel',14)} Excel</button>
          </div></div>
      </div>
    </div>
    <div class="grid-3">${kpi(rows.length,'CAP Entries (day)','','var(--accent)')}${kpi(totalDef,'Defects Logged','','var(--red)')}${kpi(openCount,'Open — Pending Sign-off','','var(--yellow)')}</div>
    ${rows.length===0?`<div class="card" style="text-align:center;padding:48px;color:var(--text3)">No CAP entries for this filter.<br><span style="font-size:12px;margin-top:8px;display:block">Entries appear automatically when Roving QC logs a defect from the worker portal.</span></div>`:`
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap"><table>
        <thead><tr><th>Hour</th><th>Module</th><th>Defects</th><th>Corrective Action</th>${CAP_SIGN_COLS.map(c=>`<th>${c.l}</th>`).join('')}<th>Status</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
    </div>`}
  </div>`;
}

function rptCap(fmt){
  const all=D.correctiveActions||[];
  let rows=all;
  if(D.capDate) rows=rows.filter(e=>e.date===D.capDate);
  if(D.capModule&&D.capModule!=='__all') rows=rows.filter(e=>(e.moduleName||e.moduleId)===D.capModule);
  if(D.capStatus&&D.capStatus!=='__all') rows=rows.filter(e=>(e.status||'open')===D.capStatus);
  if(!rows.length){toast('No CAP entries for this filter','error');return;}
  rows=rows.sort((a,b)=>(a.moduleName||'').localeCompare(b.moduleName||'')||a.hour.localeCompare(b.hour));
  if(fmt==='excel')return capExcel(rows);
  capPDF(rows);
}

function capPDF(rows){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  pdfHeader(doc,'Roving QC — Corrective Action Plan',null,`Generated: ${new Date().toLocaleString()}`);
  const sigText=(sig)=>sig?`Y — ${sig.name}`:'Pending';
  const body=rows.map(e=>[
    e.hour,
    e.moduleName||e.moduleId||'',
    (e.defects||[]).map(d=>d.code+' x'+d.qty+(d.cpa?' ('+d.cpa+')':'')).join(', '),
    e.correctiveAction||'—',
    sigText(e.signatures?.operator),sigText(e.signatures?.tech),sigText(e.signatures?.tl),sigText(e.signatures?.qa),
    e.status==='closed'?'Closed':'Open'
  ]);
  doc.autoTable({startY:37,head:[['Hour','Module','Defects','Corrective Action','Operator','Tech','T/L','QA','Status']],body,
    styles:{fontSize:7,cellPadding:2,textColor:[40,40,40]},
    headStyles:{fillColor:[0,150,120],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,245,245]},theme:'grid',
    columnStyles:{2:{cellWidth:50},3:{cellWidth:55}}});
  pdfStamp(doc);
  doc.save(`Corrective_Action_Plan_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('Corrective Action Plan PDF downloaded');
}
