// ======================== CSV IMPORT ========================
function csvToArray(str) {
  const lines = str.trim().split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  const results = [];
  for(let i=1; i<lines.length; i++) {
    const obj = {};
    const currentline = lines[i].split(',').map(v=>v.trim());
    if(currentline.length <= 1) continue;
    headers.forEach((h, j) => { obj[h] = currentline[j] || ''; });
    results.push(obj);
  }
  return results;
}

window.csvType = '';
window.triggerCSV = function(type) {
  window.csvType = type;
  document.getElementById('csv-file').click();
};

window.handleCSV = function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt) {
    const text = evt.target.result;
    const data = csvToArray(text);
    if(data.length === 0) { toast('CSV is empty or invalid','error'); return; }
    
    let count = 0;
    try {
      if(window.csvType === 'styles') {
        for(let d of data) {
          if(!d.name && !d.styleid) continue;
          const match = D.styles.find(s => s.styleId === d.styleid || s.name === d.name);
          const p = { styleId: d.styleid||d.name, name: d.name||d.styleid, buyer: d.buyer||'', color: d.color||'', status: d.status||'Running' };
          if(match) await window.fbUpd('styles', match.fbKey, p);
          else await window.fbAdd('styles', p);
          count++;
        }
      } else if(window.csvType === 'operations') {
        for(let d of data) {
          if(!d.name) continue;
          const match = D.operations.find(o => o.name.toLowerCase() === d.name.toLowerCase());
          if(!match) { await window.fbAdd('operations', {name: d.name}); count++; }
        }
      } else if(window.csvType === 'defects') {
        for(let d of data) {
          if(!d.name && !d.defectid) continue;
          const match = D.defects.find(x => x.defectId === d.defectid || x.name === d.name);
          const p = { defectId: d.defectid||'', name: d.name||d.defectid, type: d.type||'Both' };
          if(match) await window.fbUpd('defects', match.fbKey, p);
          else await window.fbAdd('defects', p);
          count++;
        }
      }
      toast(`Successfully imported ${count} items!`, 'success');
    } catch(err) {
      toast('Import error: '+err.message, 'error');
    }
    e.target.value = ''; // reset input
  };
  reader.readAsText(file);
};

// Charts
function renderCharts(){
  const ins=allInspections();const colors=['#e5484d','#e2a200','#3b7ff5','#7c5cff','#0ea98f','#ff8a3d'];
  const GRID='rgba(15,23,42,.07)',TICK='#5b6678';
  // KPI sparklines (tiny axis-less area lines inside the top KPI cards)
  const sp=window.D._spark||{};
  const spark=(id,data,color)=>{const e=document.getElementById(id);if(!e||!data||!data.length)return;charts['s_'+id]=new Chart(e,{type:'line',data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:color,backgroundColor:color+'22',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,beginAtZero:true}}}});};
  spark('spkChk',sp.sChk,'#0ea98f');spark('spkGood',sp.sGood,'#0a9d82');spark('spkDef',sp.sDef,'#e5484d');spark('spkDhu',sp.sDhu,'#2f72e6');
  // Defect Analytics (Power BI–style) charts: green % bars + navy defect-% trend lines w/ 2.5% target
  const pb=window.D._pbi;
  if(pb){
    const pinsp=pb.insp||1, pctOf=c=>+((c/pinsp)*100).toFixed(2), cut=n=>n.length>16?n.slice(0,16)+'…':n;
    const pctTip={callbacks:{label:ctx=>ctx.parsed.y+'%'}};
    const pctY={grid:{color:GRID},ticks:{color:TICK,callback:v=>v+'%'},beginAtZero:true};
    const barO=rot=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:pctTip},scales:{y:pctY,x:{grid:{display:false},ticks:{color:TICK,font:{size:9},maxRotation:rot,minRotation:rot}}}});
    const lineO={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:pctTip},scales:{y:pctY,x:{grid:{display:false},ticks:{color:TICK,font:{size:9}}}}};
    const mkBar=(id,arr,color)=>{const e=document.getElementById(id);if(!e||!arr||!arr.length)return;charts['c_'+id]=new Chart(e,{type:'bar',data:{labels:arr.map(([n])=>cut(n)),datasets:[{data:arr.map(([,c])=>pctOf(c)),backgroundColor:color,borderRadius:3}]},options:barO(50)});};
    const mkLine=(id,pts,short)=>{const e=document.getElementById(id);if(!e||!pts||!pts.length)return;charts['c_'+id]=new Chart(e,{type:'line',data:{labels:pts.map(p=>pb.hourly?p.d:(short?fd(p.d).slice(0,6):fd(p.d))),datasets:[{data:pts.map(p=>+p.pct.toFixed(2)),borderColor:'#283593',backgroundColor:'rgba(40,53,147,.08)',fill:true,tension:.3,pointRadius:short?2:3,pointBackgroundColor:'#283593'},{data:pts.map(()=>2.5),borderColor:'#e5484d',borderDash:[5,5],pointRadius:0,fill:false}]},options:lineO});};
    mkBar('chTopDef',pb.topDef,'#2e7d32');
    mkBar('chTopOp',pb.topOp,'#388e3c');
    mkLine('chWk',pb.weekly,false);
    mkLine('chDy',pb.daily,true);
  }
  // Combined 5-line chart: End Line Output/Defects + 3rd Party Offer/Pass/Reject.
  // Pieces (Output/Offer/Pass) share the LEFT axis; Defects (End Line Def / 3rd Party
  // Reject) share the RIGHT axis so small defect counts aren't flattened by big volumes.
  const cb=window.D._combo;
  if(cb&&cb.days&&cb.days.length){
    const eCombo=document.getElementById('chCombo');
    if(eCombo)charts.cCombo=new Chart(eCombo,{type:'line',data:{
      labels:cb.hourly?cb.days:cb.days.map(d=>fd(d).slice(0,6)),
      datasets:[
        {label:'End Line Output',data:cb.elOut,borderColor:'#0ea98f',backgroundColor:'rgba(14,169,143,.08)',yAxisID:'y',tension:.3,pointRadius:2,fill:false},
        {label:'End Line Defects',data:cb.elDef,borderColor:'#e5484d',backgroundColor:'rgba(229,72,77,.08)',yAxisID:'y1',tension:.3,pointRadius:2,fill:false},
        {label:'3rd Party Offer',data:cb.tpOffer,borderColor:'#3b7ff5',backgroundColor:'rgba(59,127,245,.08)',yAxisID:'y2',tension:.3,pointRadius:2,fill:false,borderDash:[4,2]},
        {label:'3rd Party Pass',data:cb.tpPass,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.08)',yAxisID:'y2',tension:.3,pointRadius:2,fill:false,borderDash:[4,2]},
        {label:'3rd Party Reject',data:cb.tpRej,borderColor:'#e2a200',backgroundColor:'rgba(226,162,0,.08)',yAxisID:'y2',tension:.3,pointRadius:2,fill:false,borderDash:[4,2]}
      ]},options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{color:TICK,boxWidth:12,font:{size:10}}}},
      scales:{
        y:{position:'left',grid:{color:GRID},ticks:{color:TICK},title:{display:true,text:'End Line Pieces',color:TICK,font:{size:10}},beginAtZero:true},
        y1:{position:'right',grid:{display:false},ticks:{color:TICK},title:{display:true,text:'End Line Defects',color:TICK,font:{size:10}},beginAtZero:true},
        // 3rd Party's own scale — Offer/Pass/Reject counts are usually much smaller than End
        // Line's (hundreds-to-thousands checked), so sharing an axis squashed them flat near
        // zero even when real data existed. Hidden (no ticks drawn) to avoid a 3rd visible
        // axis cluttering the chart, but it still gives 3rd Party its own full-height scale.
        y2:{display:false,beginAtZero:true},
        x:{grid:{display:false},ticks:{color:TICK,font:{size:9}}}
      }}});
  }
  // Operator Analysis charts: top operators by defect count + by defect %.
  // Same 3-chart set drawn for Combined, End Line, and Roving — one helper, three callers,
  // so bar charts render BEFORE each section's table (chart-first layout).
  const drawOprCharts=(op,ids)=>{
    if(!op)return;
    const catX={grid:{display:false},ticks:{color:TICK,font:{size:9},maxRotation:55,minRotation:55}};
    const tip=(arr,pct)=>({callbacks:{label:ctx=>{const x=arr[ctx.dataIndex]||{};return ' '+ctx.parsed.y+(pct?'%':'')+(x.line&&x.line!=='—'?' · '+x.line:'')+(x.operation?' · '+x.operation:'');}}});
    const ed=document.getElementById(ids.def);
    if(ed&&op.topByDef&&op.topByDef.length)charts['c_'+ids.def]=new Chart(ed,{type:'bar',data:{labels:op.topByDef.map(x=>x.o),datasets:[{data:op.topByDef.map(x=>x.def),backgroundColor:'#e2a200',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tip(op.topByDef,false)},scales:{y:{grid:{color:GRID},ticks:{color:TICK},beginAtZero:true},x:catX}}});
    const eh=document.getElementById(ids.dhu);
    if(eh&&op.topByDhu&&op.topByDhu.length)charts['c_'+ids.dhu]=new Chart(eh,{type:'bar',data:{labels:op.topByDhu.map(x=>x.o),datasets:[{data:op.topByDhu.map(x=>+x.dhu.toFixed(1)),backgroundColor:op.topByDhu.map(x=>x.dhu>5?'#e5484d':x.dhu>3?'#e2a200':'#0ea98f'),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tip(op.topByDhu,true)},scales:{y:{grid:{color:GRID},ticks:{color:TICK,callback:v=>v+'%'},beginAtZero:true},x:catX}}});

  };
  drawOprCharts(window.D._opa,{def:'chTopOprDef',dhu:'chTopOprDhu',good:'chTopOprGood'});
  drawOprCharts(window.D._opaEl,{def:'chElOprDef',dhu:'chElOprDhu',good:'chElOprGood'});
  drawOprCharts(window.D._opaRov,{def:'chRovOprDef',dhu:'chRovOprDhu',good:'chRovOprGood'});
  const chOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:GRID},ticks:{color:TICK,font:{size:11}}},x:{grid:{color:GRID},ticks:{color:TICK,font:{size:10}}}}};
  // Dashboard range filter (Today / This Week / All) — drives every dashboard chart.
  const _range=D.dashRange||'today';
  const _td=new Date().toISOString().split('T')[0];
  const _wk=new Date(Date.now()-6*86400000).toISOString().split('T')[0];
  const _dOf=i=>(i.date||(i.createdAt||'').split('T')[0])||'';
  const _inR=i=>{const d=_dOf(i);if(_range==='today')return d===_td;if(_range==='week')return d>=_wk;return true;};
  const _byDay=_range==='today';
  const dins=ins.filter(_inR);
  const delI=elInsp().filter(_inR);
  // ch1 - output volume (checked pieces) by hour today / by day for week+
  const e1=document.getElementById('ch1');
  if(e1){const dm={};delI.forEach(i=>{const key=_byDay?((i.time||'').slice(0,2)+'h'):_dOf(i);dm[key]=(dm[key]||0)+(parseInt(i.checkedQty)||0);});const s=Object.entries(dm).filter(([k])=>k&&k!=='h').sort((a,b)=>a[0].localeCompare(b[0])).slice(-16);charts.c1=new Chart(e1,{type:'bar',data:{labels:s.map(([d])=>_byDay?d:d.slice(5)),datasets:[{label:'Checked',data:s.map(([_,c])=>c),backgroundColor:'rgba(14,169,143,.78)',borderRadius:6}]},options:chOpts});}
  // ch2 - top defects donut (range-filtered)
  const e2=document.getElementById('ch2');
  if(e2){const dm={};dins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);if(t.length)charts.c2=new Chart(e2,{type:'doughnut',data:{labels:t.map(([n])=>n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#5b6678',font:{size:10},boxWidth:12}}},cutout:'65%'}});}
  // chDhu - DHU trend vs 2.5% target (range-filtered, End Line)
  const eDhu=document.getElementById('chDhu');
  if(eDhu){const dm={};delI.forEach(i=>{const key=_byDay?((i.time||'').slice(0,2)+'h'):_dOf(i);if(!dm[key])dm[key]={c:0,d:0};dm[key].c+=parseInt(i.checkedQty)||0;dm[key].d+=parseInt(i.defectQty)||0;});const s=Object.entries(dm).filter(([k])=>k&&k!=='h').sort((a,b)=>a[0].localeCompare(b[0])).slice(-16);charts.cDhu=new Chart(eDhu,{type:'line',data:{labels:s.map(([d])=>_byDay?d:d.slice(5)),datasets:[{label:'DHU %',data:s.map(([_,v])=>v.c?+((v.d/v.c)*100).toFixed(1):0),borderColor:'#0ea98f',backgroundColor:'rgba(14,169,143,.12)',tension:.4,fill:true,pointRadius:3,pointBackgroundColor:'#0ea98f'},{label:'Target 2.5%',data:s.map(()=>2.5),borderColor:'#e5484d',borderDash:[5,4],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5b6678',boxWidth:12,font:{size:10}}}},scales:{y:{grid:{color:GRID},ticks:{color:TICK},suggestedMin:0},x:{grid:{color:GRID},ticks:{color:TICK,font:{size:9}}}}}});}
  // chMod - DHU by module (horizontal bar, color-coded by severity)
  const eMod=document.getElementById('chMod');
  if(eMod){const mm={};delI.forEach(i=>{if(!i.module)return;if(!mm[i.module])mm[i.module]={c:0,d:0};mm[i.module].c+=parseInt(i.checkedQty)||0;mm[i.module].d+=parseInt(i.defectQty)||0;});const arr=Object.entries(mm).filter(([,v])=>v.c>0).map(([m,v])=>[m,+((v.d/v.c)*100).toFixed(1)]).sort((a,b)=>b[1]-a[1]).slice(0,8);if(arr.length)charts.cMod=new Chart(eMod,{type:'bar',data:{labels:arr.map(([m])=>m.length>16?m.slice(0,16)+'…':m),datasets:[{label:'DHU %',data:arr.map(([_,v])=>v),backgroundColor:arr.map(([_,v])=>v>5?'#e5484d':v>3?'#e2a200':'#0ea98f'),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.x+'%'}}},scales:{x:{grid:{color:GRID},ticks:{color:TICK,callback:v=>v+'%'},beginAtZero:true,suggestedMax:5},y:{grid:{display:false},ticks:{color:TICK,font:{size:11}}}}}});}
  // chType - End Line vs Roving split
  const eType=document.getElementById('chType');
  if(eType){const elN=dins.filter(i=>i.type==='endline').length,rvN=dins.filter(i=>i.type==='roving'||i.type==='inline').length;if(elN+rvN>0)charts.cType=new Chart(eType,{type:'doughnut',data:{labels:['End Line','Roving'],datasets:[{data:[elN,rvN],backgroundColor:['#7c5cff','#3b7ff5'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#5b6678'}}},cutout:'62%'}});}
  // ch3 - type split
  const e3=document.getElementById('ch3');
  if(e3){charts.c3=new Chart(e3,{type:'doughnut',data:{labels:['Roving','End Line'],datasets:[{data:[ins.filter(i=>i.type==='roving'||i.type==='inline').length,ins.filter(i=>i.type==='endline').length],backgroundColor:['#3b7ff5','#7c5cff'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#5b6678'}}},cutout:'65%'}});}
  // ch4 - top defects bar
  const e4=document.getElementById('ch4');
  if(e4){const dm={};ins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);charts.c4=new Chart(e4,{type:'bar',data:{labels:t.map(([n])=>n.length>12?n.slice(0,12)+'…':n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderRadius:4}]},options:{...chOpts,indexAxis:'y'}});}
  // ch5 - DHU trend
  const e5=document.getElementById('ch5');
  if(e5){const elI=elInsp();const dm={};elI.forEach(i=>{const d=(i.date||(i.createdAt||'').split('T')[0])||'?';if(!dm[d])dm[d]={c:0,d:0};dm[d].c+=parseInt(i.checkedQty)||0;dm[d].d+=parseInt(i.defectQty)||0;});const s=Object.entries(dm).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);charts.c5=new Chart(e5,{type:'line',data:{labels:s.map(([d])=>d.slice(5)),datasets:[{label:'DHU %',data:s.map(([_,d])=>d.c?((d.d/d.c)*100).toFixed(1):0),borderColor:'#0ea98f',backgroundColor:'rgba(14,169,143,.12)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#0ea98f'},{label:'Target',data:s.map(()=>2.5),borderColor:'#e5484d',borderDash:[4,4],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5b6678'}}},scales:{y:{grid:{color:'rgba(15,23,42,.07)'},ticks:{color:'#5b6678'},suggestedMin:0},x:{grid:{color:'rgba(15,23,42,.07)'},ticks:{color:'#5b6678',font:{size:10}}}}}});}
}

function renderQR(){
  const el=document.getElementById('qr-el'),de=document.getElementById('qr-d');
  if(el&&de){el.innerHTML='';try{new QRCode(el,{text:de.getAttribute('data-v'),width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){el.innerHTML='<div style="color:red">QR failed</div>';}}
}

function afterRender(){
  bindSsel();bindSeed();
  requestAnimationFrame(()=>{renderCharts();renderQR();});
  document.onkeydown=e=>{if(e.key==='Escape'&&D.showModal)closeModal();};
  // Keep the cursor in the search box across the re-render it triggers.
  if(D._searchFocus){
    const el=document.querySelector('.search-input');
    if(el){el.focus();const v=el.value;el.value='';el.value=v;}
    D._searchFocus=false;
  }
}
// Shared search handler: updates the query and re-renders, preserving focus.
window.onSearch=function(v){D.sq=v;D._searchFocus=true;render();};

render();
