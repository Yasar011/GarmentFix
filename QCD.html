<html lang="en">
<head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyA-aIRjMPFkK0hQKWY8-rpcA_5TfMhbRM4",
    authDomain: "qc--brandex.firebaseapp.com",
    databaseURL: "https://qc--brandex-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qc--brandex",
    storageBucket: "qc--brandex.firebasestorage.app",
    messagingSenderId: "109990871136",
    appId: "1:109990871136:web:c0dfa5f0ba78bed77c8305"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(e => console.error("Anon Auth Error:", e));

  window._db = db; window._ref = ref; window._set = set; window._get = get;
  window._push = push; window._onValue = onValue; window._remove = remove; window._update = update;

  // Second Firebase app — Factory Manager (read-only sync)
  const fmApp = initializeApp({
    apiKey: "AIzaSyBUbE6WtnWnHQsCul_5bDDPHz78jlaHCxs",
    authDomain: "apparel-maintenance.firebaseapp.com",
    databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com",
    projectId: "apparel-maintenance"
  }, 'fm');
  import { getDatabase as getDB2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth as getAuth2, signInAnonymously as anonSign2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const fmDb = getDB2(fmApp);
  anonSign2(getAuth2(fmApp)).catch(()=>{});
  window._fmDb = fmDb;
  // Live read-only mirror of AMMS machine statuses, so the QCM admin can show real-time
  // ticket progress (assigned worker, Pending/In Progress/Hub Review/...) without the
  // manual "Sync from Factory App" button — that button only copies machine metadata,
  // this listener tracks live status for tickets QCM itself raised.
  onValue(ref(fmDb,'machines'), s => {
    window.D && (window.D.fmMachines = s.exists()?s.val():{});
    if(window.D && ['amms-tickets','dashboard'].includes(window.D.page)) window.render && window.render();
  });

  // DB-based login
  window.dbLogin = async function(username, password) {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) throw new Error('No users found. Seed data first.');
    const users = snap.val();
    for (const [key, u] of Object.entries(users)) {
      if ((u.username === username || u.email === username) && u.password === password) {
        return { fbKey: key, ...u };
      }
    }
    throw new Error('Invalid username or password');
  };

  window.loadAll = function() {
    onValue(ref(db,'inspections'), s => { window.D.inspections = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['dashboard','inspections','supervisor','ai-analysis','reports'].includes(window.D.page)) window.render(); if(window.scheduleAI)window.scheduleAI(); });
    onValue(ref(db,'modules'), s => { window.D.modules = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='modules') window.render(); });
    onValue(ref(db,'styles'), s => { window.D.styles = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['styles','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'users'), s => { window.D.users = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='users') window.render(); });
    onValue(ref(db,'alerts'), s => { window.D.alerts = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; window.D.notifs = window.D.alerts.filter(a=>!a.read).length; if(['alerts','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'operations'), s => { window.D.operations = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='operations') window.render(); });
    onValue(ref(db,'defects'), s => { window.D.defects = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='defects') window.render(); });
    onValue(ref(db,'rosters'), s => { window.D.rosters = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','approvals'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'machineRosters'), s => { window.D.machineRosters = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','roster','approvals','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'machines'), s => { window.D.machines = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='machines') window.render(); });
    onValue(ref(db,'machineEvents'), s => { window.D.machineEvents = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['machines','supervisor'].includes(window.D.page)) window.render(); if(window.scheduleAI)window.scheduleAI(); });
    onValue(ref(db,'aiTickets'), s => { window.D.aiTickets = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','ai-analysis','approvals','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'qcmAmmsTickets'), s => { window.D.qcmAmmsTickets = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['amms-tickets','dashboard','roving_home'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'rovingInspections'), s => { window.D.rovingInspections = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['roving','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'correctiveActions'), s => { window.D.correctiveActions = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='cap') window.render(); });
    onValue(ref(db,'editRequests'), s => { window.D.editRequests = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','dashboard','approvals'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'sheetAccess'), s => { window.D.sheetAccess = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','dashboard','approvals'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'styleChanges'), s => { window.D.styleChanges = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['style-report','module-report','reports','endline','modules'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'thirdPartyAudits'), s => { window.D.thirdPartyAudits = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='third-party') window.render(); });
    onValue(ref(db,'settings/rotation'), s => { window.D.rotation = s.exists() ? s.val() : null; if(['settings','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'settings/factory'), s => { window.D.factory = s.exists() ? s.val() : null; if(['settings','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'settings/thirdParty'), s => { window.D.thirdParty = s.exists() ? s.val() : null; window.render(); });
    onValue(ref(db,'settings/aiConfig'), s => { window.D.aiConfig = s.exists() ? s.val() : null; if(window.D.page==='settings') window.render(); });
    onValue(ref(db,'elRework'), s => { window.D.elRework = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='endline') window.render(); });
  };

  window.fbAdd = async (p,d) => { const r=push(ref(db,p));await set(r,{...d,createdAt:new Date().toISOString()});return r.key; };
  window.fbUpd = async (p,k,d) => { await update(ref(db,`${p}/${k}`),{...d,updatedAt:new Date().toISOString()}); };
  window.fbDel = async (p,k) => { await remove(ref(db,`${p}/${k}`)); };
  window.approveChange = async function(userId) {
    if(!confirm('Approve this module change?')) return;
    try {
      await window._update(window._ref(window._db, 'users/' + userId), { changeRequest: false, activeModule: null });
      toast('Request Approved!');
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  };
  window._dbReady = true;

  setTimeout(() => { if(window.D.page==='loading'){window.D.page='login';window.render();} }, 2000);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#eef1f7;--bg2:#ffffff;--bg3:#f4f6fb;--bg4:#e7ebf3;--border:#e4e8f1;--border2:#d2d9e6;--text:#0f1a2e;--text2:#5b6678;--text3:#97a1b4;--accent:#0ea98f;--accent2:#2f72e6;--red:#e5484d;--yellow:#c98a00;--green:#0a9d82;--blue:#3b7ff5;--purple:#7c5cff;--radius:8px;--radius2:14px;--shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);--shadow-lg:0 12px 32px rgba(15,23,42,.10);--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
body{font-family:var(--font);background:linear-gradient(180deg,#eef1f7 0%,#e8ecf5 100%);background-attachment:fixed;color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.collapsed{width:60px}.sidebar.collapsed .hide-c{display:none}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:#ececec;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:13px;flex-shrink:0;overflow:hidden}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:10px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:linear-gradient(135deg,#7c5cff,#9d7bff);color:#fff;box-shadow:0 6px 16px rgba(124,92,255,.3)}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);cursor:pointer}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.page-title{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#7c5cff,#9d7bff);color:#fff;font-weight:600}.btn-primary:hover{opacity:.92}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-danger{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;border:none}.btn-icon:hover{background:var(--bg3);color:var(--text)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;box-shadow:var(--shadow)}.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:500;color:var(--text2)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.metric-val{font-size:28px;font-weight:600;font-family:var(--mono)}.metric-label{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(0,212,168,.15);color:var(--green)}.badge-red{background:rgba(224,85,85,.15);color:var(--red)}.badge-yellow{background:rgba(212,168,0,.15);color:var(--yellow)}.badge-blue{background:rgba(68,136,255,.15);color:var(--blue)}.badge-purple{background:rgba(153,102,255,.15);color:var(--purple)}.badge-gray{background:rgba(92,100,120,.15);color:var(--text3)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.module-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}tr:last-child td{border-bottom:none}tr:hover td{background:rgba(14,169,143,.045)}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.1)}.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert-card{padding:14px 18px;border-radius:var(--radius);border-left:3px solid;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-critical{background:rgba(224,85,85,.08);border-color:var(--red)}.alert-high{background:rgba(212,168,0,.08);border-color:var(--yellow)}.alert-medium{background:rgba(68,136,255,.08);border-color:var(--blue)}.alert-low{background:rgba(0,212,168,.08);border-color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.modal-title{font-size:18px;font-weight:600}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 20px 50px rgba(15,23,42,.14)}
.chart-wrap{position:relative;width:100%;height:220px}
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.sep{height:1px;background:var(--border);margin:16px 0}
.fb{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(255,148,36,.08);border:1px solid rgba(255,148,36,.2);border-radius:20px;font-size:10px;color:#ff9424;font-family:var(--mono)}
.notif-btn{position:relative;background:transparent;color:var(--text2);padding:6px;border-radius:6px;cursor:pointer;border:none}.notif-btn:hover{background:var(--bg3)}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:2px;right:2px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-red{background:var(--red)}
.search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:13px;width:220px}.search-input:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:var(--radius);font-size:13px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(15,23,42,.18)}
.toast-success{background:var(--accent);color:#fff}.toast-error{background:var(--red);color:#fff}
.ai-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(153,102,255,.12);border:1px solid rgba(153,102,255,.25);border-radius:20px;font-size:11px;color:var(--purple)}
.ai-finding{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.ai-bar{background:var(--bg4);height:6px;border-radius:3px;overflow:hidden;margin:6px 0}.ai-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--accent2))}
.qr-container{background:#fff;padding:16px;border-radius:12px;display:inline-block;margin:12px 0}
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 14px;cursor:pointer;transition:all .18s;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;min-height:120px}
.report-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-3px);box-shadow:0 10px 24px rgba(15,23,42,.10)}
.report-card>div:first-child{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(14,169,143,.10);transition:transform .18s}
.report-card:hover>div:first-child{transform:scale(1.08)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(0,212,168,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.sidebar{width:60px}.sidebar .hide-c{display:none}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<input type="file" id="csv-file" accept=".csv" style="display:none" onchange="window.handleCSV(event)">
<div id="app"><div class="login-wrap"><div style="text-align:center"><div class="spinner" style="width:36px;height:36px;margin:0 auto 16px"></div><div style="color:var(--text2)">Connecting...</div></div></div></div>

function elNorm(s){return (s||'').toString().toLowerCase().replace(/[^a-z0-9]/g,'');}
const EL_CODE_BY_NAME={};EL_DEFECTS.forEach(d=>{EL_CODE_BY_NAME[elNorm(d.name)]=d.code;});
function elResolveCode(defectType){
  if(!defectType)return '';
  const t=defectType.toString().trim();
  const m=t.match(/^([SLMDEF])\s*-?\s*(\d{1,2})\b/i);
  if(m)return m[1].toUpperCase()+m[2];
  return EL_CODE_BY_NAME[elNorm(t)]||'';
}
// Looks up the REAL, admin-configured defect code (D.defects, same list the worker's
// dropdown shows as "code - name") — NOT the hardcoded EL_DEFECTS taxonomy above, which is
// a fixed categorization scheme unrelated to what codes the factory actually assigned.
function resolveDefectCodeLive(defectType){
  if(!defectType)return '';
  const n=elNorm(defectType);
  const match=(D.defects||[]).find(d=>elNorm(d.name)===n);
  return match?.defectId||'';
}
function elCategory(code,name){
  const c=(code||'').toUpperCase();const n=(name||'').toLowerCase();
  if(c==='S2'||n.includes('cut damage'))return 'CUT HOLE';
  if(c==='F3'||n.includes('fabric hole')||n.includes('cut hole'))return 'CUT HOLE';
  if(c==='S28'||n.includes('untrim')||n.includes('uncut')||n.includes('loose thread'))return 'UNCUT THREAD';
  if(c==='D1'||n.includes('oil'))return 'OIL MARK';
  if(c[0]==='D'||n.includes('stain')||(n.includes('mark')&&!n.includes('bar')))return 'STAIN';
  if(c[0]==='F'||n.includes('fabric')||n.includes('slub')||n.includes('yarn')||n.includes('shading')||n.includes('crease'))return 'FABRIC';
  if(c[0]==='M'||n.includes('oot')||n.includes('measure')||(n.includes('size')&&!n.includes('label')))return 'MMT';
  return 'SEWING';
}

function ini(n){if(!n)return'GF';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function ft(d){return fd(d)+' '+((d&&new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}))||'');}
function ta(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}
function dhu(a){const c=a.reduce((s,i)=>s+(parseInt(i.checkedQty)||0),0),d=a.reduce((s,i)=>s+(parseInt(i.defectQty)||0),0);return c?((d/c)*100).toFixed(1):'0.0';}

      for(const [key, u] of Object.entries(snap.val())) {

          await window._update(window._ref(window._db, 'users/' + key), { password: 'admin123', username: 'admin' });
          updated = true;
        }
      }
      if (updated) {
        toast('Admin password reset to admin123! Try logging in now.');
      } else {
        await window.fbAdd('users',{username:'admin',password:'admin123',name:'Admin',role:'Admin',dept:'Quality',email:'admin@garmentfix.com',status:'Active'});
        toast('Admin user created! Username: admin / Password: admin123');

    await window.fbAdd('users',{username:'admin',password:'admin123',name:'Admin',role:'Admin',dept:'Quality',email:'admin@garmentfix.com',status:'Active'});
    toast('Admin user created! Username: admin / Password: admin123');

function bindLogin(){
  const btn=document.getElementById('lbtn');if(!btn)return;
  const go=async()=>{
    const u=document.getElementById('lu')?.value.trim(),p=document.getElementById('lp')?.value;
    const err=document.getElementById('lerr');
    if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
    err.style.display='none';D.loginLoading=true;render();
    try{
      const user=await window.dbLogin(u,p);
      D.user=user;D.page='dashboard';D.loginLoading=false;render();window.loadAll();toast('Welcome, '+user.name);
    }catch(e){D.loginLoading=false;render();const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent=e.message;}}
  };
  btn.onclick=go;
  document.getElementById('lu')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
  document.getElementById('lp')?.addEventListener('keydown',e=>e.key==='Enter'&&go());
}

// ======================== DASHBOARD ========================
// Roving inspections are stored in a separate table with sp (checked) / dc (defects) and
// no `type`. Roving IS the inline checking, so normalise roving rows into the inspection
// shape and merge them so the dashboard counts them everywhere (KPIs, charts, modules).
function rovAsInsp(r){return {...r,type:'roving',checkedQty:(r.sp!=null?r.sp:r.checkedQty)||0,defectQty:(r.dc!=null?r.dc:r.defectQty)||0};}
function allInspections(){return (D.inspections||[]).concat((D.rovingInspections||[]).map(rovAsInsp));}
// Keep production output (End Line) separate from in-process checks (Roving + Inline).
// End Line = the line's good-garment output for the day; Roving is a separate quality check.
function elInsp(){return (D.inspections||[]).filter(i=>i.type==='endline');}
function rovInsp(){return (D.rovingInspections||[]).map(rovAsInsp).concat((D.inspections||[]).filter(i=>i.type==='inline'));}
function sumChk(a){return a.reduce((s,i)=>s+(parseInt(i.checkedQty)||0),0);}
function sumDef(a){return a.reduce((s,i)=>s+(parseInt(i.defectQty)||0),0);}
function dhuOf(a){const c=sumChk(a),d=sumDef(a);return c?((d/c)*100).toFixed(1):'0.0';}

// Shared Today/Week/Month/All date-range presets for the Module & Style reports (each
// keeps its own state key so they don't clash). Returns {from,to,label}; empty from/to = all.
function presetRange(val){
  const today=new Date().toISOString().split('T')[0];
  const back=n=>new Date(Date.now()-n*86400000).toISOString().split('T')[0];
  if(val==='today')return{from:today,to:today,label:'Today'};
  if(val==='week') return{from:back(6),to:today,label:'This Week'};
  if(val==='month')return{from:back(29),to:today,label:'This Month'};
  return{from:'',to:'',label:'All Time'};
}
function presetToggle(cur,fn){
  const b=(v,l)=>`<button class="btn btn-sm ${(cur||'all')===v?'btn-primary':'btn-ghost'}" style="border:none" onclick="${fn}('${v}')">${l}</button>`;
  return`<div style="display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow);flex-wrap:wrap">${b('today','Today')}${b('week','This Week')}${b('month','This Month')}${b('all','All Time')}</div>`;
}
function inPreset(i,r){if(!r.from&&!r.to)return true;const d=(i.date||(i.createdAt||'').split('T')[0])||'';if(r.from&&d<r.from)return false;if(r.to&&d>r.to)return false;return true;}

// Shared by Defect Analytics + Operator Analysis (they share the same D.pbi filter state):
// turns the Today/Week/Month/Custom preset into an actual {from,to} date range. "Today"
// also flags isToday so callers can switch their trend charts to hour-by-hour buckets —
// a single day has no daily/weekly trend worth showing, but hour-by-hour does.
function pbiEffRange(f){
  const today=new Date().toISOString().split('T')[0];
  const weekAgo=new Date(Date.now()-6*86400000).toISOString().split('T')[0];
  const monthAgo=new Date(Date.now()-29*86400000).toISOString().split('T')[0];
  const range=f.range||'week';
  let from=f.from,to=f.to;
  if(range==='today'){from=today;to=today;}
  else if(range==='week'){from=weekAgo;to=today;}
  else if(range==='month'){from=monthAgo;to=today;}
  return {range,from,to,isToday:range==='today',today,weekAgo,monthAgo};
}
// The range-preset toggle + a matching date display/editor — Custom shows editable date
// pickers, the presets show a read-only summary so it's clear the typed dates are ignored.
function pbiRangeBar(f,eff){
  const tog=(v,l)=>`<button class="btn btn-sm ${eff.range===v?'btn-primary':'btn-ghost'}" style="border:none" onclick="setPbiRange('${v}')">${l}</button>`;
  const rangeTog=`<div style="display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:4px;width:fit-content">${tog('today','Today (Hourly)')}${tog('week','This Week')}${tog('month','This Month')}${tog('custom','Custom')}</div>`;
  const dateBox=(label,key,cur)=>`<div><div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${label}</div><input type="date" class="form-input" style="padding:7px 9px;font-size:12px" value="${cur||''}" onchange="setPbi('${key}',this.value)"></div>`;
  const dateSection=eff.range==='custom'
    ?`${dateBox('Date from','from',f.from)}${dateBox('Date to','to',f.to)}`
    :`<div style="grid-column:span 2"><div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">Showing</div><div style="padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text2)">${eff.range==='today'?'Today ('+fd(eff.today)+') — charts below switch to hour-by-hour':eff.range==='week'?'Last 7 days ('+fd(eff.from)+' → '+fd(eff.to)+')':'Last 30 days ('+fd(eff.from)+' → '+fd(eff.to)+')'}</div></div>`;
  return {rangeTog,dateSection};
}

// Shared by Dashboard + Defect Analytics: 3rd Party summary KPIs, plus a compare-card
// against the internal (End Line) defect rate — the whole point of an independent audit
// is checking whether it agrees with what your own QC reported. Returns '' when the
// 3rd Party Checking feature is OFF, or when there's no 3rd-party data to compare yet.
function tpCompareBlock(tpRows,refDhu,refLabel){
  if(!thirdPartyOn())return '';
  const tpChk=tpRows.reduce((a,r)=>a+(parseInt(r.checkedPcs)||0),0);
  const tpDef=tpRows.reduce((a,r)=>a+(parseInt(r.totalDefectQty)||0),0);
  const tpPass=tpRows.reduce((a,r)=>a+(parseInt(r.passPcs)||0),0);
  const tpDefPct=tpChk?(tpDef/tpChk*100):0;
  const tpPassPct=tpChk?(tpPass/tpChk*100):0;
  const tpColor=tpChk===0?'var(--text3)':(tpDefPct>5?'var(--red)':tpDefPct>3?'var(--yellow)':'var(--green)');
  const kpiC=(v,l,c)=>`<div class="card card-sm" style="text-align:center"><div class="metric-val" style="color:${c};font-size:24px">${v}</div><div class="metric-label">${l}</div></div>`;
  const tpKpis=`<div class="grid-4">${kpiC(tpChk.toLocaleString(),'3rd Party Checked','var(--accent2)')}${kpiC(tpDef.toLocaleString(),'3rd Party Defects','var(--red)')}${kpiC(tpChk?tpDefPct.toFixed(1)+'%':'—','3rd Party Defect %',tpColor)}${kpiC(tpChk?tpPassPct.toFixed(1)+'%':'—','3rd Party Pass %','var(--green)')}</div>`;
  let compareCard='';
  if(tpChk>0){
    const gap=tpDefPct-refDhu;
    const agree=Math.abs(gap)<=1;
    const gapColor=agree?'var(--green)':(gap>1?'var(--red)':'var(--yellow)');
    compareCard=`<div class="card" style="border-left:5px solid ${gapColor}">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px">🔍 Internal vs 3rd Party — Do the numbers agree?</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;text-align:center">
        <div><div style="font-size:11px;color:var(--text3)">${refLabel.toUpperCase()}</div><div style="font-size:24px;font-weight:800">${refDhu.toFixed(1)}%</div></div>
        <div><div style="font-size:11px;color:var(--text3)">3RD PARTY (INDEPENDENT)</div><div style="font-size:24px;font-weight:800;color:${tpColor}">${tpDefPct.toFixed(1)}%</div></div>
        <div><div style="font-size:11px;color:var(--text3)">GAP</div><div style="font-size:24px;font-weight:800;color:${gapColor}">${gap>0?'+':''}${gap.toFixed(1)} pts</div></div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:10px;text-align:center">${agree?'✅ Close match — internal QC and the 3rd party audit broadly agree.':gap>1?'⚠️ 3rd party found MORE defects than internal QC reported — worth investigating why internal checks are missing issues.':'ℹ️ 3rd party found fewer defects than internal QC — internal checks may be over-flagging, or the 3rd party sample is smaller.'}</div>
    </div>`;
  }
  return `<div style="font-size:12px;color:var(--text2);margin:2px 0 -6px;padding-left:2px">🧪 <b>3rd Party Quality Checking</b> — independent audit stage after End Line:</div>${tpKpis}${compareCard}`;
}
function pgDash(){
  const range=D.dashRange||'today';
  const td=new Date().toISOString().split('T')[0];
  const weekAgo=new Date(Date.now()-6*86400000).toISOString().split('T')[0];
  const dOf=i=>(i.date||(i.createdAt||'').split('T')[0])||'';
  const inRange=i=>{const d=dOf(i);if(range==='today')return d===td;if(range==='week')return d>=weekAgo;return true;};
  const rangeLabel=range==='today'?'Today':range==='week'?'This Week':'All Time';
  const el=elInsp().filter(inRange),rov=rovInsp().filter(inRange),recent=allInspections().filter(inRange);
  const elChk=sumChk(el),elDef=sumDef(el),elGood=elChk-elDef;
  const dhu=parseFloat(dhuOf(el)),dhuC=dhu>5?'var(--red)':dhu>3?'var(--yellow)':'var(--green)';
  const pend=pendApprovalCount();
  const rovChk=sumChk(rov),rovDef=sumDef(rov);
  const tog=(v,l)=>`<button class="btn btn-sm ${range===v?'btn-primary':'btn-ghost'}" onclick="setDashRange('${v}')" style="border:none">${l}</button>`;
  const toolbar=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px"><div><div style="font-size:20px;font-weight:800">Factory Quality Dashboard</div><div style="font-size:12px;color:var(--text2)">A simple view of how production quality is doing — showing <b>${rangeLabel.toLowerCase()}</b>.</div></div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="nav('analytics')">${ic('chart',13)} Analyst view (filters)</button><div style="display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow)">${tog('today','Today')}${tog('week','This Week')}${tog('all','All Time')}</div></div></div>`;
  const approvalsStrip=pend>0?`<div class="card" style="border-color:var(--yellow);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px"><div style="font-size:13px">🔔 <b style="color:var(--yellow)">${pend}</b> request${pend!==1?'s':''} from the floor ${pend!==1?'are':'is'} waiting for your approval.</div><button class="btn btn-primary btn-sm" onclick="nav('approvals')">Review now →</button></div>`:'';
  // ---- AMMS (maintenance) tickets QCM has sent — surface open ones on the dashboard too ----
  const ammsOpen=(D.qcmAmmsTickets||[]).filter(t=>!t.qcVerified);
  const ammsStrip=ammsOpen.length>0?`<div class="card" style="border-color:var(--blue);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px"><div style="font-size:13px">🔧 <b style="color:var(--blue)">${ammsOpen.length}</b> maintenance ticket${ammsOpen.length!==1?'s':''} sent to AMMS ${ammsOpen.length!==1?'are':'is'} still open.</div><button class="btn btn-ghost btn-sm" onclick="nav('amms-tickets')">View AMMS Tickets →</button></div>`:'';
  const noData=recent.length===0;
  const rangeWord=range==='today'?'today':range==='week'?'this week':'so far';

  // ---- Plain-English health summary so anyone can read the dashboard at a glance ----
  const st=noData?['var(--text3)','⏳','No data yet',`No inspections have been recorded ${rangeWord}.`]
    :dhu<=2.5?['var(--green)','✅','Good — On Target','Quality is meeting the target. Keep it up.']
    :dhu<=5?['var(--yellow)','⚠️','Watch Closely','The defect rate is a little high. Worth keeping an eye on.']
    :['var(--red)','🔴','Needs Action','The defect rate is well above target. The lines below in red need attention.'];
  const [sc,sIcon,sWord,sMsg]=st;
  const gaugePct=Math.min(100,(dhu/5)*100); // 5% = full bar; 2.5% target sits at 50%
  const hero=`<div class="card" style="border-left:5px solid ${sc};display:flex;flex-wrap:wrap;gap:24px;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:150px;text-align:center">
      <div style="font-size:46px;line-height:1">${sIcon}</div>
      <div style="font-size:18px;font-weight:800;color:${sc};margin-top:4px">${sWord}</div>
      <div style="font-size:11px;color:var(--text2)">Overall quality · ${rangeLabel}</div>
    </div>
    <div style="flex:1;min-width:280px">
      <div style="font-size:15px;line-height:1.7;color:var(--text)">${noData?sMsg:`Out of <b>${elChk}</b> garments checked ${rangeWord}, <b style="color:var(--green)">${elGood}</b> were good and <b style="color:var(--red)">${elDef}</b> had a defect. The defect rate is <b style="color:${sc}">${dhu.toFixed(1)}%</b> — ${dhu<=2.5?'<b style="color:var(--green)">below</b>':'<b style="color:var(--red)">above</b>'} the <b>2.5%</b> goal. ${sMsg}`}</div>
      ${noData?'':`<div style="margin-top:14px"><div style="position:relative;height:12px;background:var(--bg4);border-radius:8px;overflow:hidden"><div style="height:100%;width:${gaugePct}%;background:${sc};border-radius:8px;transition:width .5s"></div></div><div style="position:relative;height:16px;margin-top:2px;font-size:10px;color:var(--text3)"><span style="position:absolute;left:0">0% best</span><span style="position:absolute;left:50%;transform:translateX(-50%);color:var(--text);font-weight:600">↑ 2.5% goal</span><span style="position:absolute;right:0">5%+ high</span></div></div>`}
    </div>
  </div>`;

  // ---- KPI cards with an embedded 14-day sparkline + period-over-period trend % ----
  const spDays=[...Array(14)].map((_,i)=>new Date(Date.now()-(13-i)*86400000).toISOString().split('T')[0]);
  const elAll=elInsp();
  const daySer=metric=>spDays.map(d=>{const rows=elAll.filter(i=>(i.date||(i.createdAt||'').split('T')[0])===d);const c=sumChk(rows),df=sumDef(rows);return metric==='chk'?c:metric==='good'?c-df:metric==='def'?df:(c?+((df/c)*100).toFixed(2):0);});
  const sChk=daySer('chk'),sGood=daySer('good'),sDef=daySer('def'),sDhu=daySer('dhu');
  D._spark={sChk,sGood,sDef,sDhu};
  const sumArr=a=>a.reduce((x,y)=>x+y,0),avgArr=a=>a.length?sumArr(a)/a.length:0;
  const pctChg=(cur,prev)=>!prev?(cur?100:0):((cur-prev)/prev)*100;
  const halfDelta=(a,avg)=>{const h=Math.floor(a.length/2);const f=avg?avgArr:sumArr;return pctChg(f(a.slice(h)),f(a.slice(0,h)));};
  const dChk=halfDelta(sChk),dGood=halfDelta(sGood),dDef=halfDelta(sDef),dDhu=halfDelta(sDhu,true);
  const trendChip=(delta,invert)=>{if(delta==null||!isFinite(delta))return '';const up=delta>0.5,down=delta<-0.5,flat=!up&&!down;const good=invert?down:up;const c=flat?'var(--text3)':good?'var(--green)':'var(--red)';const arr=flat?'•':up?'▲':'▼';return `<span style="font-size:11px;font-weight:700;color:${c};background:var(--bg3);padding:2px 8px;border-radius:20px;white-space:nowrap">${arr} ${Math.abs(delta).toFixed(0)}%</span>`;};
  const kpiSpark=(v,l,sub,color,id,delta,invert)=>`<div class="card card-sm"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div class="metric-label" style="margin:0">${l}</div>${trendChip(delta,invert)}</div><div class="metric-val" style="color:${color};font-size:26px;margin-top:6px">${v}</div><div style="height:42px;margin:4px -6px -2px">${noData&&v==0?'':`<canvas id="${id}"></canvas>`}</div><div style="font-size:10px;color:var(--text3)">${sub}</div></div>`;
  const primary=`<div class="grid-4">${kpiSpark(elChk,'Pieces Checked','14-day trend','var(--accent)','spkChk',dChk,false)}${kpiSpark(elGood,'Passed ✓','no defects found','var(--green)','spkGood',dGood,false)}${kpiSpark(elDef,'Had Defects','needed rework','var(--red)','spkDef',dDef,true)}${kpiSpark(dhu.toFixed(1)+'%','Defect Rate',dhu<=2.5?'✓ within 2.5% goal':'above 2.5% goal',sc,'spkDhu',dDhu,true)}</div>`;
  const secHead=`<div style="font-size:12px;color:var(--text2);margin:-6px 0 -8px;padding-left:2px">Extra checks done <b>during</b> production (called “roving” spot-checks), plus how many lines are running:</div>`;
  const secondary=`<div class="grid-4">${kpi(rovChk,'Spot-Checked','pieces during production','var(--blue)')}${kpi(rovDef,'Issues Caught','found early','var(--red)')}${kpi(dhuOf(rov)+'%','Spot-Check Rate','defect rate in spot-checks','var(--purple)')}${kpi(D.modules.length,'Production Lines','active right now','var(--accent2)')}</div>`;
  // ---- insight KPIs: best/worst line, busiest line, top problem (End Line, ranged) ----
  const _bl={};el.forEach(i=>{const m=i.module||'—';if(!_bl[m])_bl[m]={c:0,d:0};_bl[m].c+=parseInt(i.checkedQty)||0;_bl[m].d+=parseInt(i.defectQty)||0;});
  const _ls=Object.entries(_bl).filter(([,g])=>g.c>0).map(([m,g])=>({m,chk:g.c,dhu:(g.d/g.c)*100}));
  const busiest=_ls.slice().sort((a,b)=>b.chk-a.chk)[0];
  const bestLine=_ls.slice().sort((a,b)=>a.dhu-b.dhu)[0];
  const worstLine=_ls.slice().sort((a,b)=>b.dhu-a.dhu)[0];
  const topProblem=(()=>{const dm={};el.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||0);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1])[0];return t?{n:t[0],c:t[1]}:null;})();
  const insightKpi=(v,l,sub,c)=>`<div class="card card-sm"><div class="metric-label" style="margin:0">${l}</div><div style="font-size:17px;font-weight:700;color:${c};margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v}</div><div style="font-size:10px;color:var(--text3)">${sub}</div></div>`;
  const insights=noData?'':`<div class="grid-4">${insightKpi(busiest?busiest.m:'—','🏭 Busiest Line',busiest?busiest.chk.toLocaleString()+' pcs checked':'','var(--accent2)')}${insightKpi(bestLine?bestLine.m:'—','🏆 Best Quality Line',bestLine?bestLine.dhu.toFixed(1)+'% defect rate':'','var(--green)')}${insightKpi(worstLine?worstLine.m:'—','⚠️ Needs Attention',worstLine?worstLine.dhu.toFixed(1)+'% defect rate':'','var(--red)')}${insightKpi(topProblem?topProblem.n:'—','🔧 Top Problem',topProblem?topProblem.c+' defects found':'no defects','var(--yellow)')}</div>`;
  // ---- 3rd Party Quality Checking summary + internal-vs-independent compare KPI ----
  const tpBlock=tpCompareBlock((D.thirdPartyAudits||[]).filter(inRange),dhu,'End Line (Own QC)');

  // ---- chart card with plain title + a "what am I looking at" subtitle ----
  // Optional explainQ: a question handed to the QMS Bot via a small "Explain" button, so a
  // chart the GM doesn't understand can be answered in plain English on the spot.
  const chCard=(title,desc,id,emptyMsg,h,explainQ)=>`<div class="card"><div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div style="font-size:14px;font-weight:700;color:var(--text)">${title}</div><div style="font-size:11px;color:var(--text2)">${desc}</div></div>${explainQ?`<button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="qmsBotJumpAsk('${explainQ.replace(/'/g,"\\'")}')">💬 Explain</button>`:''}</div><div class="chart-wrap"${h?` style="height:${h}px"`:''}>${noData?`<div style="text-align:center;padding:60px 0;color:var(--text3)">${emptyMsg||'No data for '+rangeLabel.toLowerCase()}</div>`:`<canvas id="${id}"></canvas>`}</div></div>`;

  // ---- "Output by Line" horizontal-bar panel (volume bar + defect-rate %) ----
  const byLine={};el.forEach(i=>{const m=i.module||'—';if(!byLine[m])byLine[m]={chk:0,def:0};byLine[m].chk+=parseInt(i.checkedQty)||0;byLine[m].def+=parseInt(i.defectQty)||0;});
  const lineArr=Object.entries(byLine).sort((a,b)=>b[1].chk-a[1].chk);
  const maxChk=Math.max(1,...lineArr.map(([_,g])=>g.chk));
  const lineBars=`<div class="card"><div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700">Output by Line</div><div style="font-size:11px;color:var(--text2)">Pieces checked per line ${rangeWord} — bar = volume, % = defect rate</div></div>${lineArr.length===0?'<div style="text-align:center;padding:34px;color:var(--text3)">No data for '+rangeLabel.toLowerCase()+'</div>':lineArr.map(([m,g])=>{const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';const col=d>5?'var(--red)':d>3?'var(--yellow)':'var(--green)';return `<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="font-weight:600">${m}</span><span style="font-family:var(--mono);color:var(--text2)">${g.chk} pcs · <span style="color:${col};font-weight:700">${d}%</span></span></div><div style="height:8px;background:var(--bg3);border-radius:6px;overflow:hidden"><div style="height:100%;width:${(g.chk/maxChk*100).toFixed(0)}%;background:${col};border-radius:6px;transition:width .5s"></div></div></div>`;}).join('')}</div>`;
  // ---- donut with a center total, like the reference ----
  const donutCard=`<div class="card"><div style="margin-bottom:8px"><div style="font-size:14px;font-weight:700;color:var(--text)">Where Checks Happened</div><div style="font-size:11px;color:var(--text2)">Final end-of-line checks vs spot-checks during production</div></div><div class="chart-wrap" style="position:relative">${noData?'<div style="text-align:center;padding:60px 0;color:var(--text3)">No data</div>':`<canvas id="chType"></canvas><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"><div style="font-size:24px;font-weight:800;color:var(--text)">${el.length+rov.length}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">checks</div></div>`}</div></div>`;
  const latest=`<div class="card"><div style="margin-bottom:8px"><div style="font-size:14px;font-weight:700;color:var(--text)">Latest Checks</div><div style="font-size:11px;color:var(--text2)">The most recent inspections sent in from the floor</div></div>${noData?'<div style="text-align:center;padding:32px;color:var(--text3)">No data for '+rangeLabel.toLowerCase()+'</div>':`<div class="table-wrap"><table><thead><tr><th>Check Type</th><th>Line</th><th>Defects</th><th>When</th></tr></thead><tbody>${recent.slice(-6).reverse().map(i=>`<tr><td><span class="badge badge-${i.type==='inline'?'blue':'purple'}">${i.type==='endline'?'End line':i.type==='inline'?'Spot-check':(i.type||'')}</span></td><td>${i.module||''}</td><td style="font-family:var(--mono);color:${(parseInt(i.defectQty)||0)>0?'var(--red)':'var(--green)'}">${i.defectQty||0}</td><td style="font-size:11px;color:var(--text3)">${ta(i.createdAt)}</td></tr>`).join('')}</tbody></table></div>`}</div>`;
  const charts=`<div class="grid-2">${chCard(range==='today'?'Pieces Checked by Hour':'Pieces Checked by Day','How busy the lines were — taller bars mean more garments inspected','ch1')}${chCard('Defect Rate Over Time','Each point is the defect rate. Keep the green line below the red target line (2.5%)','chDhu',null,null,'Explain our DHU trend this week — is it improving or getting worse, and why?')}</div>
  <div class="grid-2">${chCard('Most Common Problems','Which types of defect happen most often — focus fixes on the biggest slices','ch2','No defects 🎉')}${chCard('Defect Rate by Line','Which production line has the most defects — <b style="color:var(--red)">red</b> needs attention, <b style="color:var(--green)">green</b> is healthy','chMod',null,null,'Which module has the highest defect rate right now, and what should we do about it?')}</div>
  <div class="grid-2">${donutCard}${lineBars}</div>`;

  // ---- alerts + a plain-language glossary for first-time viewers ----
  const alerts=`<div class="card"><div style="margin-bottom:8px"><div style="font-size:14px;font-weight:700;color:var(--text)">Things to Look At</div><div style="font-size:11px;color:var(--text2)">Automatic warnings raised when something looks off</div></div>${D.alerts.slice(-4).reverse().map(a=>`<div class="alert-card alert-${a.level||'medium'}">${ic('warning',14)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${a.title||''}</div><div style="font-size:11px;color:var(--text3)">${ta(a.createdAt)}</div></div></div>`).join('')||'<div style="color:var(--text3);padding:16px;text-align:center">Nothing needs attention 👍</div>'}</div>`;
  const term=(t,d)=>`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-weight:700;font-size:13px;color:var(--text)">${t}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${d}</div></div>`;
  const glossary=`<div class="card"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">📖 New here? What these words mean</div><div class="grid-2" style="gap:0 28px">${term('Pieces Checked (End Line)','Finished garments inspected at the end of the production line — the final quality gate before packing.')}${term('Spot-Check (Roving)','Random checks done while garments are still being made, to catch problems early.')}${term('Defect Rate (DHU)','Out of every 100 pieces checked, how many had a defect. Lower is better. The goal is under 2.5%.')}${term('Line / Module','One production line — a team and its machines making a style of garment.')}${term('Passed / Good','Pieces inspected with zero defects found.')}${term('Had Defects','Pieces that needed rework before they could pass.')}</div></div>`;

  return`<div style="display:flex;flex-direction:column;gap:20px">${toolbar}${approvalsStrip}${ammsStrip}${hero}${primary}${insights}${secHead}${secondary}${tpBlock}${charts}<div class="grid-2">${latest}${alerts}</div>${glossary}</div>`;
}

// ======================== DEFECT ANALYTICS (Power BI–style) ========================
// A slicer/filter-bar analytical view modelled on the factory's Power BI report:
// top filter bar + Top-N toggle + Top Defects / Top Defective Operations bars +
// defect-category table + weekly & daily defect-% trend lines.
function pgAnalytics(){
  const f=D.pbi||(D.pbi={from:'',to:'',range:'week',line:'__all',buyer:'__all',style:'__all',operation:'__all',cat:'__all',defect:'__all',topN:15});
  if(!f.topN)f.topN=15;
  const eff=pbiEffRange(f);
  const styleBuyer={};(D.styles||[]).forEach(s=>{if(s.name)styleBuyer[s.name]=s.buyer||'';if(s.styleId)styleBuyer[s.styleId]=s.buyer||'';});
  const enrich=i=>{const code=elResolveCode(i.defectType);return {...i,_cat:i.defectType?elCategory(code,i.defectType):'',_buyer:styleBuyer[i.style]||styleBuyer[i.styleId]||'',_date:(i.date||(i.createdAt||'').split('T')[0])||''};};
  const all=allInspections().map(enrich);
  const uniq=k=>[...new Set(all.map(x=>x[k]).filter(Boolean))].sort();
  const lines=uniq('module'),styles=uniq('style'),ops=uniq('operation'),buyers=uniq('_buyer'),defects=uniq('defectType');
  const F=all.filter(i=>{
    if(eff.from&&i._date<eff.from)return false;
    if(eff.to&&i._date>eff.to)return false;
    if(f.line!=='__all'&&i.module!==f.line)return false;
    if(f.buyer!=='__all'&&i._buyer!==f.buyer)return false;
    if(f.style!=='__all'&&i.style!==f.style)return false;
    if(f.operation!=='__all'&&i.operation!==f.operation)return false;
    if(f.cat!=='__all'&&i._cat!==f.cat)return false;
    if(f.defect!=='__all'&&i.defectType!==f.defect)return false;
    return true;
  });
  const insp=F.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const defTot=F.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const defPct=insp?(defTot/insp)*100:0;
  const byDef={};F.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)byDef[i.defectType]=(byDef[i.defectType]||0)+(parseInt(i.defectQty)||0);});
  const topDef=Object.entries(byDef).sort((a,b)=>b[1]-a[1]).slice(0,f.topN);
  const byOp={};F.forEach(i=>{if(i.operation&&parseInt(i.defectQty)>0)byOp[i.operation]=(byOp[i.operation]||0)+(parseInt(i.defectQty)||0);});
  const topOp=Object.entries(byOp).sort((a,b)=>b[1]-a[1]).slice(0,f.topN);
  const byCat={};EL_CAT_ORDER.forEach(c=>byCat[c]=0);F.forEach(i=>{const dq=parseInt(i.defectQty)||0;if(dq>0&&i._cat)byCat[i._cat]=(byCat[i._cat]||0)+dq;});
  // Trend granularity: a single day has no daily/weekly trend worth plotting, so "Today"
  // switches this to an hour-by-hour breakdown instead.
  let daily,weekly;
  if(eff.isToday){
    const byHour={};F.forEach(i=>{const h=(i.time||'').slice(0,2);if(!h)return;if(!byHour[h])byHour[h]={c:0,df:0};byHour[h].c+=parseInt(i.checkedQty)||0;byHour[h].df+=parseInt(i.defectQty)||0;});
    const hourKeys=Object.keys(byHour).sort();
    daily=hourKeys.map(h=>({d:h+':00',pct:byHour[h].c?(byHour[h].df/byHour[h].c)*100:0}));
    weekly=[];
  }else{
    const byDay={};F.forEach(i=>{const d=i._date;if(!d)return;if(!byDay[d])byDay[d]={c:0,df:0};byDay[d].c+=parseInt(i.checkedQty)||0;byDay[d].df+=parseInt(i.defectQty)||0;});
    const dayKeys=Object.keys(byDay).sort();
    daily=dayKeys.map(d=>({d,pct:byDay[d].c?(byDay[d].df/byDay[d].c)*100:0}));
    const byWk={};dayKeys.forEach(d=>{const dt=new Date(d+'T00:00:00');const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);const wk=dt.toISOString().split('T')[0];if(!byWk[wk])byWk[wk]={c:0,df:0};byWk[wk].c+=byDay[d].c;byWk[wk].df+=byDay[d].df;});
    const wkKeys=Object.keys(byWk).sort();
    weekly=wkKeys.map(w=>({d:w,pct:byWk[w].c?(byWk[w].df/byWk[w].c)*100:0}));
  }
  D._pbi={topDef,topOp,insp,daily,weekly,hourly:eff.isToday};

  const noData=F.length===0;
  // --- filter bar ---
  const slicer=(label,key,opts,cur)=>`<div style="min-width:0"><div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${label}</div><select class="form-input" style="padding:7px 9px;font-size:12px" onchange="setPbi('${key}',this.value)"><option value="__all" ${cur==='__all'?'selected':''}>All</option>${opts.map(o=>`<option value="${o.replace(/"/g,'&quot;')}" ${cur===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  const {rangeTog,dateSection}=pbiRangeBar(f,eff);
  const filterBar=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div style="font-size:15px;font-weight:700">🔎 Filters</div><button class="btn btn-ghost btn-sm" onclick="resetPbi()">${ic('refresh',12)} Reset all</button></div><div style="margin-bottom:12px">${rangeTog}</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">${dateSection}${slicer('Section / Line','line',lines,f.line)}${slicer('Buyer','buyer',buyers,f.buyer)}${slicer('Style','style',styles,f.style)}${slicer('Operation','operation',ops,f.operation)}${slicer('Defect Category','cat',EL_CAT_ORDER,f.cat)}${slicer('Defect Name','defect',defects,f.defect)}</div></div>`;
  // --- top N toggle ---
  const topTog=[3,5,10,15].map(n=>`<button class="btn btn-sm ${f.topN===n?'btn-primary':'btn-ghost'}" style="border:none" onclick="setPbiTopN(${n})">Top ${n}</button>`).join('');
  // --- KPI strip ---
  const kpiC=(v,l,c)=>`<div class="card card-sm" style="text-align:center"><div class="metric-val" style="color:${c};font-size:26px">${v}</div><div class="metric-label">${l}</div></div>`;
  const kpis=`<div class="grid-4">${kpiC(insp.toLocaleString(),'Inspected Qty','var(--accent2)')}${kpiC(defTot.toLocaleString(),'Total Defects','var(--red)')}${kpiC(defPct.toFixed(2)+'%','Overall Defect %',defPct>2.5?'var(--red)':'var(--green)')}${kpiC(F.length.toLocaleString(),'Records','var(--purple)')}</div>`;
  // --- 3rd Party compare, scoped to the same date/line/style filters selected above ---
  const tpF=(D.thirdPartyAudits||[]).filter(r=>{
    if(eff.from&&r.date<eff.from)return false;
    if(eff.to&&r.date>eff.to)return false;
    if(f.line!=='__all'&&r.module!==f.line)return false;
    if(f.style!=='__all'&&r.style!==f.style)return false;
    return true;
  });
  const tpBlock=tpCompareBlock(tpF,defPct,'Internal (this filtered view)');
  // --- Combined "everything in one view" chart: End Line Output/Defects + 3rd Party
  // Offer/Pass/Reject, all 5 lines on one graph, all driven by the SAME filters above.
  // On "Today" this buckets by HOUR instead of by date — a single day's worth of dots
  // isn't a trend, but hour-by-hour is.
  const elF=F.filter(i=>i.type==='endline');
  const elBucket=eff.isToday?(i=>{const h=(i.time||'').slice(0,2);return h?h+':00':'';}):(i=>i._date);
  const tpBucket=eff.isToday?(r=>{const h=(r.time||'').slice(0,2);return h?h+':00':'';}):(r=>r.date);
  const elByDay={};elF.forEach(i=>{const k=elBucket(i);if(!k)return;if(!elByDay[k])elByDay[k]={c:0,df:0};elByDay[k].c+=parseInt(i.checkedQty)||0;elByDay[k].df+=parseInt(i.defectQty)||0;});
  const tpByDay={};tpF.forEach(r=>{const k=tpBucket(r);if(!k)return;if(!tpByDay[k])tpByDay[k]={offer:0,pass:0,rej:0};tpByDay[k].offer+=parseInt(r.offerPcs)||0;tpByDay[k].pass+=parseInt(r.passPcs)||0;tpByDay[k].rej+=parseInt(r.totalDefectQty)||0;});
  const comboDays=[...new Set([...Object.keys(elByDay),...Object.keys(tpByDay)])].sort();
  D._combo={days:comboDays,hourly:eff.isToday,
    elOut:comboDays.map(d=>elByDay[d]?.c||0),
    elDef:comboDays.map(d=>elByDay[d]?.df||0),
    tpOffer:comboDays.map(d=>tpByDay[d]?.offer||0),
    tpPass:comboDays.map(d=>tpByDay[d]?.pass||0),
    tpRej:comboDays.map(d=>tpByDay[d]?.rej||0)};
  const comboCard=`<div class="card"><div style="margin-bottom:8px"><div style="font-size:15px;font-weight:800">📈 End Line vs 3rd Party — Everything in One View</div><div style="font-size:11px;color:var(--text2)">End Line Output &amp; Defects, plus 3rd Party Offer / Pass / Reject — all 5 lines update together as you change the filters above${eff.isToday?' <b>(hour-by-hour for Today)</b>':''}</div></div><div class="chart-wrap" style="height:320px">${comboDays.length===0?'<div style="text-align:center;padding:110px 0;color:var(--text3)">No data for the current filters</div>':'<canvas id="chCombo"></canvas>'}</div></div>`;
  // --- defect-category table ---
  const catTot=Object.values(byCat).reduce((a,v)=>a+v,0);
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<tr><td style="font-weight:500">${c}</td><td style="font-family:var(--mono);text-align:right">${n.toLocaleString()}</td><td style="font-family:var(--mono);text-align:right;color:var(--text2)">${insp?((n/insp)*100).toFixed(2):'0.00'}%</td></tr>`).join('');
  const catTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:12px 16px;font-weight:700;border-bottom:1px solid var(--border)">Defects by Category</div><div class="table-wrap"><table><thead><tr><th>Defect</th><th style="text-align:right">No of Defects</th><th style="text-align:right">Defect %</th></tr></thead><tbody>${catRows||'<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:24px">No data</td></tr>'}<tr style="background:var(--bg3);font-weight:700"><td>Total</td><td style="font-family:var(--mono);text-align:right">${defTot.toLocaleString()}</td><td style="font-family:var(--mono);text-align:right">${defPct.toFixed(2)}%</td></tr></tbody></table></div></div>`;
  // --- chart cards ---
  const cc=(title,id,h,explainQ)=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px"><div style="font-size:14px;font-weight:700">${title}</div>${explainQ?`<button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="qmsBotJumpAsk('${explainQ.replace(/'/g,"\\'")}')">💬 Explain</button>`:''}</div><div class="chart-wrap" style="height:${h||260}px">${noData?'<div style="text-align:center;padding:70px 0;color:var(--text3)">No data for the current filters</div>':`<canvas id="${id}"></canvas>`}</div></div>`;

  return`<div style="display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><div style="font-size:20px;font-weight:800">Defect Analytics</div><div style="font-size:12px;color:var(--text2)">Power BI–style view — slice by line, buyer, style, operation, defect. All charts update together.</div></div><div style="display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow)">${topTog}</div></div>
    ${filterBar}
    ${comboCard}
    ${kpis}
    <div class="grid-2">${cc('Top Defects','chTopDef',null,'What\'s causing our top defect right now, and how do we fix it?')}${cc('Top Defective Operations','chTopOp')}</div>
    ${eff.isToday?cc('Hourly Defect Trend — Today','chDy',260):`<div class="grid-2">${cc('Weekly Defect Trend','chWk',240)}${cc('Daily Defect Trend','chDy',240)}</div>`}
    ${catTable}
    ${tpBlock}

}

// ======================== OPERATOR ANALYSIS (Power BI–style) ========================
// Same filter bar / slicers as Defect Analytics, but ranks OPERATORS: who has the most
// defects and the highest defect rate, plus a full operator-wise table.
// Groups a set of (already-filtered) inspection rows by operator, tracking their
// dominant line and single most-common defect type alongside checked/defect totals.
// Shared by End Line, Roving, and Combined breakdowns on the Operator Analysis page.
function oprStatsFrom(rows){
  const byOpr={};
  rows.forEach(i=>{
    const o=i.operatorId;if(!o)return;
    if(!byOpr[o])byOpr[o]={chk:0,def:0,operation:i.operation||'',lines:{},defects:{}};
    const g=byOpr[o];
    g.chk+=parseInt(i.checkedQty)||0;g.def+=parseInt(i.defectQty)||0;
    if(i.module)g.lines[i.module]=(g.lines[i.module]||0)+(parseInt(i.checkedQty)||0)+1;
    if(i.defectType&&parseInt(i.defectQty)>0)g.defects[i.defectType]=(g.defects[i.defectType]||0)+(parseInt(i.defectQty)||0);
  });
  const top1=obj=>{const e=Object.entries(obj||{}).sort((a,b)=>b[1]-a[1])[0];return e?e[0]:'—';};
  return Object.entries(byOpr).map(([o,g])=>({o,operation:g.operation,line:top1(g.lines),topDefect:top1(g.defects),chk:g.chk,def:g.def,dhu:g.chk?(g.def/g.chk)*100:0}));
}
// "Red Operator" (Roving-specific rule): flags an operator who repeats the SAME defect
// type across 2+ SEPARATE roving visits — not a one-off slip, the same mistake showing up
// again on a later visit (visit 1 mistake, visit 2 clean, visit 3 same mistake = red).
// A single visit with several instances of a defect does NOT count — it must recur across
// distinct visit records.
function computeRedOperators(rovRows){
  const byKey={};
  rovRows.forEach(r=>{
    const o=r.operatorId,dt=r.defectType,dq=parseInt(r.defectQty)||0;
    if(!o||!dt||dq<=0)return;
    const key=o+'||'+dt;
    if(!byKey[key])byKey[key]={o,defectType:dt,visits:0,qty:0,lines:{}};
    byKey[key].visits++;byKey[key].qty+=dq;
    if(r.module)byKey[key].lines[r.module]=(byKey[key].lines[r.module]||0)+1;
  });
  const top1=obj=>{const e=Object.entries(obj||{}).sort((a,b)=>b[1]-a[1])[0];return e?e[0]:'—';};
  const repeats=Object.values(byKey).filter(x=>x.visits>=2).map(x=>({...x,line:top1(x.lines)}));
  // an operator can repeat more than one defect type — keep their most-repeated one for the headline row
  const byOpr={};
  repeats.forEach(r=>{if(!byOpr[r.o]||byOpr[r.o].visits<r.visits)byOpr[r.o]=r;});
  return Object.values(byOpr).sort((a,b)=>b.visits-a.visits);
}
// Shared "Biggest Risk Right Now" sentence-builder — used by pgAI() (scoped to whatever D.pbi
// filter is active) and pgQmsBot() (always all-time) so the two pages never disagree on wording.
function riskPartsFrom(modStats,topOps,topDef,totDef){
  const worstMod=modStats.filter(m=>m.chk>=20)[0]||null;
  const worstOp=topOps.filter(([,d])=>d.n>=3).sort((a,b)=>(b[1].d/b[1].n)-(a[1].d/a[1].n))[0]||null;
  const topProblem=topDef[0]||null;
  const parts=[];
  if(worstMod&&parseFloat(worstMod.dhu)>2.5)parts.push(`<b>${worstMod.n}</b> is running at <b style="color:var(--red)">${worstMod.dhu}%</b> defect rate — the worst line right now`);
  if(worstOp)parts.push(`operator <b>${worstOp[0]}</b> is averaging <b style="color:var(--red)">${(worstOp[1].d/worstOp[1].n).toFixed(1)}</b> defects per check`);
  if(topProblem)parts.push(`<b>${topProblem[0]}</b> is the most common defect (${topProblem[1]} found, ${totDef?((topProblem[1]/totDef)*100).toFixed(0):0}% of all defects)`);
  return parts;
}
function riskCardHtml(parts,subtitle){
  if(!parts.length)return '';
  return `<div class="card" style="border-color:var(--red);border-width:2px;background:rgba(229,72,77,.04)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:20px">🎯</span><span style="font-size:15px;font-weight:800">Biggest Risk Right Now</span><span style="font-size:10px;color:var(--text3);margin-left:auto">${subtitle||'computed live — no external AI needed'}</span></div>
    <div style="font-size:14px;line-height:1.7;color:var(--text)">${parts.join('. ')}.</div>
  </div>`;
}
function oprTops(arr,n){
  return {
    byDef:arr.slice().sort((a,b)=>b.def-a.def).slice(0,n),
    worst:arr.filter(x=>x.chk>=20).sort((a,b)=>b.dhu-a.dhu).slice(0,n),
    good:arr.filter(x=>x.chk>=20).sort((a,b)=>a.dhu-b.dhu).slice(0,n)
  };
}
function pgOperatorAnalysis(){

  if(!f.topN)f.topN=15;

  const enrich=i=>{const code=elResolveCode(i.defectType);return {...i,_cat:i.defectType?elCategory(code,i.defectType):'',_buyer:styleBuyer[i.style]||styleBuyer[i.styleId]||'',_date:(i.date||(i.createdAt||'').split('T')[0])||''};};

  // ---- Separate full breakdowns: End Line only, Roving only ----
  const elKpis=`<div class="grid-4">${kpiC(elOpr.length,'End Line Operators','var(--purple)')}${kpiC(sumChk(elF).toLocaleString(),'Checked','var(--accent)')}${kpiC(sumDef(elF).toLocaleString(),'Defects','var(--red)')}${kpiC(dhuOf(elF)+'%','Defect %',parseFloat(dhuOf(elF))>2.5?'var(--red)':'var(--green)')}</div>`;

  const all=D.thirdPartyAudits||[];
  const fx=D.tpFilter||(D.tpFilter={from:'',to:'',module:'__all',style:'__all',checker:'__all'});
  const uniq=k=>[...new Set(all.map(x=>x[k]).filter(Boolean))].sort();
  const modules=uniq('module'),stylesL=uniq('style'),checkers=uniq('checkerName');
  const F=all.filter(r=>{
    if(fx.from&&r.date<fx.from)return false;
    if(fx.to&&r.date>fx.to)return false;
    if(fx.module!=='__all'&&r.module!==fx.module)return false;
    if(fx.style!=='__all'&&r.style!==fx.style)return false;
    if(fx.checker!=='__all'&&r.checkerName!==fx.checker)return false;
    return true;
  }).sort((a,b)=>(b.date+(b.time||'')).localeCompare(a.date+(a.time||'')));

  const totChecked=F.reduce((a,r)=>a+(parseInt(r.checkedPcs)||0),0);
  const totPass=F.reduce((a,r)=>a+(parseInt(r.passPcs)||0),0);
  const totDef=F.reduce((a,r)=>a+(parseInt(r.totalDefectQty)||0),0);
  const defPct=totChecked?(totDef/totChecked*100):0;
  const passPct=totChecked?(totPass/totChecked*100):0;

  const slicer=(label,key,opts,cur)=>`<div style="min-width:0"><div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${label}</div><select class="form-input" style="padding:7px 9px;font-size:12px" onchange="setTpFilter('${key}',this.value)"><option value="__all" ${cur==='__all'?'selected':''}>All</option>${opts.map(o=>`<option value="${o.replace(/"/g,'&quot;')}" ${cur===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  const dateBox=(label,key,cur)=>`<div><div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${label}</div><input type="date" class="form-input" style="padding:7px 9px;font-size:12px" value="${cur||''}" onchange="setTpFilter('${key}',this.value)"></div>`;
  const filterBar=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div style="font-size:15px;font-weight:700">🔎 Filters</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="resetTpFilter()">${ic('refresh',12)} Reset</button><button class="btn btn-ghost btn-sm" onclick="tpExportExcel()">${ic('excel',12)} Excel (records)</button><button class="btn btn-ghost btn-sm" onclick="tpExportPDF()">${ic('pdf',12)} PDF (records)</button></div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">${dateBox('Date from','from',fx.from)}${dateBox('Date to','to',fx.to)}${slicer('Module / Line','module',modules,fx.module)}${slicer('Style','style',stylesL,fx.style)}${slicer('Checker','checker',checkers,fx.checker)}</div></div>`;

  const kpiC=(v,l,c)=>`<div class="card card-sm" style="text-align:center"><div class="metric-val" style="color:${c};font-size:24px">${v}</div><div class="metric-label">${l}</div></div>`;
  const kpis=`<div class="grid-4">${kpiC(totChecked.toLocaleString(),'Total Checked','var(--accent2)')}${kpiC(totDef.toLocaleString(),'Total Defects','var(--red)')}${kpiC(defPct.toFixed(2)+'%','Defect %',defPct>2.5?'var(--red)':'var(--green)')}${kpiC(passPct.toFixed(2)+'%','Pass %','var(--green)')}</div>`;

  // ---- Shift End Summary — the exact on-screen format that Excel/PDF also download,
  // so what's on screen always matches the file (same rows, same grouping, same filters). ----
  const shiftRows=buildTpShiftRows();
  const shiftBody=shiftRows.map(g=>{
    const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
    const col=parseFloat(endPer)>5?'var(--red)':parseFloat(endPer)>3?'var(--yellow)':'var(--green)';
    const top3=Object.entries(g.defectTypes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([dt,n])=>`${dt}(${n})`).join(', ')||'—';
    return `<tr><td style="font-size:12px">${fd(g.date)}</td><td style="font-weight:500">${g.module}</td><td><span class="badge badge-purple">${g.shift}</span></td><td style="font-family:var(--mono);text-align:right">${g.offerQty}</td><td style="font-family:var(--mono);text-align:right">${g.checkQty}</td><td style="font-family:var(--mono);text-align:right;color:var(--green)">${g.passQty}</td><td style="font-family:var(--mono);text-align:right;color:var(--red)">${g.defectQty}</td><td style="font-family:var(--mono);text-align:right;color:${col};font-weight:700">${endPer}%</td><td style="font-family:var(--mono);text-align:right">${g.defectQty}</td><td style="font-size:11px">${top3}</td></tr>`;
  }).join('');
  const shiftSummaryTable=`<div class="card" style="padding:0;overflow:hidden;border-color:var(--accent)">
    <div style="padding:12px 16px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span>📋 Shift End Summary Report <span style="font-size:11px;color:var(--text3);font-weight:400">(same format as the paper sheet, grouped by date/line/team)</span></span>
      <div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="rptTpShiftSummary('excel')">${ic('excel',12)} Excel</button><button class="btn btn-ghost btn-sm" onclick="rptTpShiftSummary('pdf')">${ic('pdf',12)} PDF</button></div>
    </div>
    <div class="table-wrap" style="max-height:420px;overflow:auto"><table><thead><tr><th>Date</th><th>Line/Zone</th><th>Team</th><th style="text-align:right">Offer Qty</th><th style="text-align:right">Check Qty</th><th style="text-align:right">Pass Qty</th><th style="text-align:right">Defect Qty</th><th style="text-align:right">End %</th><th style="text-align:right">No of Rejections</th><th>Top 3 Defects</th></tr></thead>
    <tbody>${shiftBody||'<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:24px">No 3rd party audits for the current filters</td></tr>'}</tbody></table></div>
  </div>`;

  // Defects by part-code (which garment area fails most)
  const byPart={};F.forEach(r=>(r.defects||[]).forEach(d=>{const k=d.part+' — '+(d.partName||tpPartName(d.part));byPart[k]=(byPart[k]||0)+(parseInt(d.qty)||0);}));
  const partRows=Object.entries(byPart).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<tr><td style="font-weight:500">${k}</td><td style="font-family:var(--mono);text-align:right">${n}</td><td style="font-family:var(--mono);text-align:right;color:var(--text2)">${totDef?((n/totDef)*100).toFixed(1):'0.0'}%</td></tr>`).join('');
  const partTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:12px 16px;font-weight:700;border-bottom:1px solid var(--border)">Defects by Part / Operation Code</div><div class="table-wrap" style="max-height:340px;overflow:auto"><table><thead><tr><th>Part</th><th style="text-align:right">Defects</th><th style="text-align:right">%</th></tr></thead><tbody>${partRows||'<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px">No data</td></tr>'}</tbody></table></div></div>`;

  // Defects by type (which defect happens most)
  const byType={};F.forEach(r=>(r.defects||[]).forEach(d=>{byType[d.type]=(byType[d.type]||0)+(parseInt(d.qty)||0);}));
  const typeRows=Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<tr><td style="font-weight:500">${k}</td><td style="font-family:var(--mono);text-align:right">${n}</td><td style="font-family:var(--mono);text-align:right;color:var(--text2)">${totDef?((n/totDef)*100).toFixed(1):'0.0'}%</td></tr>`).join('');
  const typeTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:12px 16px;font-weight:700;border-bottom:1px solid var(--border)">Defects by Type</div><div class="table-wrap" style="max-height:340px;overflow:auto"><table><thead><tr><th>Defect</th><th style="text-align:right">Count</th><th style="text-align:right">%</th></tr></thead><tbody>${typeRows||'<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px">No data</td></tr>'}</tbody></table></div></div>`;

  // Records table — one row per submitted audit round
  const recRows=F.map(r=>{const dp=parseInt(r.checkedPcs)?((parseInt(r.totalDefectQty)||0)/parseInt(r.checkedPcs)*100):0;const col=dp>5?'var(--red)':dp>3?'var(--yellow)':'var(--green)';return `<tr><td style="font-size:12px">${fd(r.date)} ${r.time||''}</td><td style="font-weight:500">${r.module||''}</td><td style="font-size:12px">${r.style||'—'}</td><td style="font-size:12px">${r.leaderName||'—'}</td><td style="font-size:12px">${r.checkerName||'—'}</td><td style="font-family:var(--mono);text-align:right">${r.offerPcs||0}</td><td style="font-family:var(--mono);text-align:right">${r.checkedPcs||0}</td><td style="font-family:var(--mono);text-align:right;color:var(--green)">${r.passPcs||0}</td><td style="font-family:var(--mono);text-align:right;color:var(--red)">${r.totalDefectQty||0}</td><td style="font-family:var(--mono);text-align:right;color:${col};font-weight:700">${dp.toFixed(1)}%</td></tr>`;}).join('');
  const recTable=`<div class="card" style="padding:0;overflow:hidden"><div style="padding:12px 16px;font-weight:700;border-bottom:1px solid var(--border)">Audit Rounds (${F.length})</div><div class="table-wrap" style="max-height:460px;overflow:auto"><table><thead><tr><th>Date / Time</th><th>Module</th><th>Style</th><th>Leader</th><th>Checker</th><th style="text-align:right">Offer</th><th style="text-align:right">Checked</th><th style="text-align:right">Pass</th><th style="text-align:right">Defects</th><th style="text-align:right">Defect %</th></tr></thead><tbody>${recRows||'<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:24px">No 3rd party audits recorded yet</td></tr>'}</tbody></table></div></div>`;

  D._tpExport=F;
  return`<div style="display:flex;flex-direction:column;gap:16px">
    <div><div style="font-size:20px;font-weight:800">3rd Party Quality Checking</div><div style="font-size:12px;color:var(--text2)">The independent audit stage after End Line — modelled on the paper Hourly Audit Report.</div></div>
    ${offBanner}
    ${filterBar}
    ${kpis}
    ${shiftSummaryTable}
    <div class="grid-2">${partTable}${typeTable}</div>
    ${recTable}
  </div>`;
}
window.setTpFilter=function(k,v){D.tpFilter=D.tpFilter||{};D.tpFilter[k]=v;render();};

// ---- 3rd Party "Shift End Summary" — same paper-sheet format as End Line's Shift Summary,
// minus the Red Operator columns (3rd Party audits have no per-operator ID, only Leader/
// Checker names and which body Part failed — confirmed with user to drop those columns
// rather than misuse Leader/Checker as a stand-in "operator"). Grouped by date+module+shift,
// respects the same date/module filters as the on-screen 3rd Party page.
// Shared by the on-screen table AND the downloads, so what you SEE always matches what
// you DOWNLOAD exactly — same grouping, same filters, same numbers.
function buildTpShiftRows(){
  const all=D.thirdPartyAudits||[];
  const map={};
  all.forEach(r=>{
    const dateKey=r.date;if(!dateKey)return;
    const shift=r.shift||'A',module=r.module||'—';
    const key=`${dateKey}__${module}__${shift}`;
    if(!map[key])map[key]={date:dateKey,module,shift,offerQty:0,checkQty:0,passQty:0,defectQty:0,defectTypes:{}};
    const g=map[key];
    g.offerQty+=parseInt(r.offerPcs)||0;g.checkQty+=parseInt(r.checkedPcs)||0;
    g.passQty+=parseInt(r.passPcs)||0;g.defectQty+=parseInt(r.totalDefectQty)||0;
    (r.defects||[]).forEach(d=>{if(d.type&&(parseInt(d.qty)||0)>0)g.defectTypes[d.type]=(g.defectTypes[d.type]||0)+(parseInt(d.qty)||0);});
  });
  const fx=D.tpFilter||{};
  return Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)||a.module.localeCompare(b.module))
    .filter(r=>(!fx.from||r.date>=fx.from)&&(!fx.to||r.date<=fx.to)&&(!fx.module||fx.module==='__all'||r.module===fx.module));
}
window.rptTpShiftSummary=function(fmt){
  const rows=buildTpShiftRows();
  if(!rows.length){toast('No 3rd Party data for the current filters','error');return;}
  if(fmt==='pdf')tpShiftSummaryPDF(rows);else tpShiftSummaryExcel(rows);
};
function tpShiftRow(g){
  const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
  const top3=Object.entries(g.defectTypes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([dt,n])=>`${dt}(${n})`).join(', ')||'—';
  return[fd(g.date),g.module,g.shift,g.offerQty,g.checkQty,g.passQty,g.defectQty,endPer+'%',g.defectQty,top3];
}
const TP_SHIFT_HEAD=['Date','Line/Zone','Team','Offer Qty','Check Qty','Pass Qty','Defect Qty','End Per %','No of Rejections','Top 3 Defects'];
function tpShiftSummaryPDF(rows){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  pdfHeader(doc,'3rd Party — Shift End Summary Report',null,`Generated: ${new Date().toLocaleString()}`);

function tpShiftSummaryExcel(rows){

  XLSX.writeFile(wb,`ThirdParty_ShiftEndSummary_${new Date().toISOString().slice(0,10)}.xlsx`);
