// ======================== CSV IMPORT ========================
function csvToArray(str) {
  const lines = str.trim().split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  const results = [];
  for(let i=1; i<lines.length; i++) {
    const obj = {};
    const currentline = lines[i].split(',').map(v=>v.trim());
    if(currentline.length <= 1) continue;
    headers.forEach((h, j) => { obj[h] = currentline[j] || ''; });
    results.push(obj);
  }
  return results;
}

window.csvType = '';
window.triggerCSV = function(type) {
  window.csvType = type;
  document.getElementById('csv-file').click();
};

window.handleCSV = function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt) {
    const text = evt.target.result;
    const data = csvToArray(text);
    if(data.length === 0) { toast('CSV is empty or invalid','error'); return; }
    
    let count = 0;
    try {
      if(window.csvType === 'styles') {
        for(let d of data) {
          if(!d.name && !d.styleid) continue;
          const match = D.styles.find(s => s.styleId === d.styleid || s.name === d.name);
          const p = { styleId: d.styleid||d.name, name: d.name||d.styleid, buyer: d.buyer||'', color: d.color||'', status: d.status||'Running' };
          if(match) await window.fbUpd('styles', match.fbKey, p);
          else await window.fbAdd('styles', p);
          count++;
        }
      } else if(window.csvType === 'operations') {
        for(let d of data) {
          if(!d.name) continue;
          const match = D.operations.find(o => o.name.toLowerCase() === d.name.toLowerCase());
          if(!match) { await window.fbAdd('operations', {name: d.name}); count++; }
        }
      } else if(window.csvType === 'defects') {
        for(let d of data) {
          if(!d.name && !d.defectid) continue;
          const match = D.defects.find(x => x.defectId === d.defectid || x.name === d.name);
          const p = { defectId: d.defectid||'', name: d.name||d.defectid, type: d.type||'Both' };
          if(match) await window.fbUpd('defects', match.fbKey, p);
          else await window.fbAdd('defects', p);
          count++;
        }
      }
      toast(`Successfully imported ${count} items!`, 'success');
    } catch(err) {
      toast('Import error: '+err.message, 'error');
    }
    e.target.value = ''; // reset input
  };
  reader.readAsText(file);
};

  // ch2 - defects donut
  const e2=document.getElementById('ch2');
  if(e2&&ins.length){const dm={};ins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);charts.c2=new Chart(e2,{type:'doughnut',data:{labels:t.map(([n])=>n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9097a8',font:{size:10},boxWidth:12}}},cutout:'65%'}});}
  // ch3 - type split
  const e3=document.getElementById('ch3');
  if(e3){charts.c3=new Chart(e3,{type:'doughnut',data:{labels:['Inline','End Line'],datasets:[{data:[ins.filter(i=>i.type==='inline').length,ins.filter(i=>i.type==='endline').length],backgroundColor:['#4488ff','#9966ff'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9097a8'}}},cutout:'65%'}});}
  // ch4 - top defects bar
  const e4=document.getElementById('ch4');
  if(e4){const dm={};ins.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});const t=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,6);charts.c4=new Chart(e4,{type:'bar',data:{labels:t.map(([n])=>n.length>12?n.slice(0,12)+'…':n),datasets:[{data:t.map(([_,c])=>c),backgroundColor:colors,borderRadius:4}]},options:{...chOpts,indexAxis:'y'}});}
  // ch5 - DHU trend
  const e5=document.getElementById('ch5');
  if(e5&&ins.length){const dm={};ins.forEach(i=>{const d=(i.date||(i.createdAt||'').split('T')[0])||'?';if(!dm[d])dm[d]={c:0,d:0};dm[d].c+=parseInt(i.checkedQty)||0;dm[d].d+=parseInt(i.defectQty)||0;});const s=Object.entries(dm).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);charts.c5=new Chart(e5,{type:'line',data:{labels:s.map(([d])=>d.slice(5)),datasets:[{label:'DHU %',data:s.map(([_,d])=>d.c?((d.d/d.c)*100).toFixed(1):0),borderColor:'#00d4a8',backgroundColor:'rgba(0,212,168,.1)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#00d4a8'},{label:'Target',data:s.map(()=>2.5),borderColor:'#e05555',borderDash:[4,4],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9097a8'}}},scales:{y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#9097a8'},suggestedMin:0},x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#9097a8',font:{size:10}}}}}});}
}

function renderQR(){
  const el=document.getElementById('qr-el'),de=document.getElementById('qr-d');
  if(el&&de){el.innerHTML='';try{new QRCode(el,{text:de.getAttribute('data-v'),width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){el.innerHTML='<div style="color:red">QR failed</div>';}}
}

function afterRender(){
  bindSsel();bindSeed();
  requestAnimationFrame(()=>{renderCharts();renderQR();});
  document.onkeydown=e=>{if(e.key==='Escape'&&D.showModal)closeModal();};
}

render();
</script>
</body>
</html>
