}

window.rptRoving=function(fmt){
  const rovIns=D.rovingInspections||[];
  const curDate=D.rovingDate||new Date().toISOString().split('T')[0];
  let rows=rovIns.filter(i=>i.date===curDate);
  if(D.rovingShift&&D.rovingShift!=='__all') rows=rows.filter(i=>i.shift===D.rovingShift);
  if(D.rovingModule&&D.rovingModule!=='__all') rows=rows.filter(i=>i.module===D.rovingModule);
  if(rows.length===0){toast('No roving data for selected filters','error');return;}
  if(fmt==='excel') return rovingExcel(rows,curDate);
  return rovingPDF(rows,curDate);
};

function rovingPDF(rows,date){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const team=D.rovingModule&&D.rovingModule!=='__all'?D.rovingModule:(rows[0]?.module||'—');
  doc.setFontSize(14);doc.setTextColor(0,100,80);doc.text(factoryName(),14,12);
  doc.setFontSize(11);doc.setTextColor(40,40,40);doc.text('Roving Inspection Report',14,18);
  // A module can run several styles a day — emit one table per style.
  const styleGroups={};
  rows.forEach(r=>{const st=(r.style||'—');(styleGroups[st]=styleGroups[st]||[]).push(r);});
  const styleKeys=Object.keys(styleGroups).sort();
  const head=[['Operator','Operation','TR','SP','D/C','CPA','AB','TR','SP','D/C','CPA','AB','TR','SP','D/C','CPA','AB','TR','SP','D/C','CPA','AB','INSP','DEF']];
  let y=24;
  styleKeys.forEach(st=>{
    const grp=styleGroups[st];
    const opMap={};
    grp.forEach(r=>{const key=(r.operatorId||'?')+'|'+(r.operation||'—');if(!opMap[key])opMap[key]={operatorId:r.operatorId||'',operation:r.operation||'',visits:{}};opMap[key].visits[parseInt(r.visitNum)||1]=r;});
    const operators=Object.values(opMap).sort((a,b)=>a.operation.localeCompare(b.operation));
    const body=operators.map(op=>{
      const row=[op.operatorId,op.operation];
      [1,2,3,4].forEach(v=>{const vi=op.visits[v];
        if(vi&&vi.skipped){
          row.push({content:'skipped (not critical)',colSpan:5,styles:{halign:'center',fontStyle:'italic',textColor:[140,140,140]}});
          return;
        }
        row.push(vi?(vi.trim==='pass'?'P':'F'):'');           // jsPDF default font can't render ✓/✗ — use ASCII P/F
        row.push(vi?vi.sp||'':'');
        const dcN=vi?(parseInt(vi.dc)||0):0;
        const code=vi&&dcN>0?resolveDefectCodeLive(vi.defectType):'';
        row.push(vi?(code?dcN+' '+code:String(dcN)):'');        // real admin-configured code next to the count, e.g. "2 S18"
        row.push(vi?(vi.capRule||(vi.capRequired?'!':'-')):''); // manually-chosen rule letter, else ⚠->ASCII !
        row.push(vi?(vi.absent?'Abs':vi.ab||vi.cpa||'-'):'');
      });
      const tSP=[1,2,3,4].reduce((a,v)=>a+(parseInt(op.visits[v]?.sp)||0),0);
      const tDC=[1,2,3,4].reduce((a,v)=>a+(parseInt(op.visits[v]?.dc)||0),0);
      row.push(tSP,tDC);return row;
    });
    const totSP=grp.reduce((a,r)=>a+(parseInt(r.sp)||0),0);
    const totDC=grp.reduce((a,r)=>a+(parseInt(r.dc)||0),0);
    const totRow=['TOTAL',''];
    [1,2,3,4].forEach(v=>{const vR=grp.filter(r=>parseInt(r.visitNum)===v);const vSP=vR.reduce((a,r)=>a+(parseInt(r.sp)||0),0);const vDC=vR.reduce((a,r)=>a+(parseInt(r.dc)||0),0);totRow.push('',vSP,vDC,'','');});
    totRow.push(totSP,totDC);body.push(totRow);
    const pctRow=['%',''];
    [1,2,3,4].forEach(v=>{const vR=grp.filter(r=>parseInt(r.visitNum)===v);const vSP=vR.reduce((a,r)=>a+(parseInt(r.sp)||0),0);const vDC=vR.reduce((a,r)=>a+(parseInt(r.dc)||0),0);pctRow.push('','',vSP?((vDC/vSP)*100).toFixed(1)+'%':'—','','');});
    pctRow.push(totSP,totSP?((totDC/totSP)*100).toFixed(1)+'%':'—');body.push(pctRow);
    doc.setFontSize(9);doc.setTextColor(60,60,60);
    doc.text(`Style: ${st}     Team: ${team}     Date: ${fd(date)}     Insp: ${totSP}   Def: ${totDC}   Def%: ${totSP?((totDC/totSP)*100).toFixed(1):0}%`,14,y);
    y+=4.5;
    // A roving report's rows can span both shifts if "All shifts" was selected — show one
    // Sheet ID per shift present, since each shift is its own sheet on the floor.
    const grpShifts=[...new Set(grp.map(r=>r.shift).filter(Boolean))];
    doc.setFontSize(7.5);doc.setTextColor(100,100,100);
    doc.text('Sheet ID: '+(grpShifts.length?grpShifts.map(sh=>sheetIdFor('roving',team,sh,date)).join('   |   '):'—'),14,y);
    y+=2.5;
    // Tint each visit's 5 columns a different pastel colour so Visit 1 / 2 / 3 / 4 are visually
    // distinct at a glance, instead of one solid block of 20+ columns.
    const visitTints=[[219,234,254],[220,252,231],[254,249,195],[243,232,255]];
    doc.autoTable({head,body,startY:y+2,theme:'grid',styles:{fontSize:7,cellPadding:1.3,halign:'center'},columnStyles:{0:{halign:'left',cellWidth:14},1:{halign:'left',cellWidth:26}},headStyles:{fillColor:[180,30,30],textColor:255,fontSize:7},margin:{left:8,right:8},
      didParseCell:function(data){
        if(data.column.index>=2&&data.column.index<=21){
          const vIdx=Math.floor((data.column.index-2)/5);
          if(data.section==='body')data.cell.styles.fillColor=visitTints[vIdx];
        }
      }
    });
    y=doc.lastAutoTable.finalY+8;
  });
  doc.setFontSize(7.5);doc.setTextColor(60,60,60);
  doc.text('(a) 1 defect found -> check another 7 pieces  (b) No defects in those 7 -> allow operator to continue (no CPA)',14,y);y+=4;
  doc.text('(c) 1+ defects in those 7 -> stop operation, check all stitched garments, repair defects, complete CPA before resuming',14,y);y+=4;
  doc.text('(d) 2+ defects in original sample -> immediate CPA required (no 7-piece check needed)',14,y);y+=5;
  doc.text('A=Inline QC  B=Supervisor/Mechanic  C=Senior Technician  D=Production/Quality Executive',14,y);y+=7;
  doc.text('Technician: ____________________________      QA.Exe: ____________________________',14,y);
  pdfStamp(doc);
  const fname=styleKeys.length===1?styleKeys[0]:team;
  doc.save(`Roving_Report_${(fname||'report').toString().replace(/\s/g,'_')}_${date}.pdf`);
  toast('Roving Report PDF downloaded');
}

function rovingExcel(rows,date){
  const team=D.rovingModule&&D.rovingModule!=='__all'?D.rovingModule:(rows[0]?.module||'—');
  // A module can run several styles a day — emit one section per style.
  const styleGroups={};
  rows.forEach(r=>{const st=(r.style||'—');(styleGroups[st]=styleGroups[st]||[]).push(r);});
  const styleKeys=Object.keys(styleGroups).sort();
  const aoa=[];
  aoa.push([factoryName()]);
  aoa.push(['Roving Inspection Report']);
  aoa.push([]);
  styleKeys.forEach(st=>{

    const operators=Object.values(opMap).sort((a,b)=>a.operation.localeCompare(b.operation));
    aoa.push(['Style',st,'Team',team,'Date',date]);

    aoa.push(['Operator','Operation','1V-TR','1V-SP','1V-DC','1V-CPA','1V-AB','2V-TR','2V-SP','2V-DC','2V-CPA','2V-AB','3V-TR','3V-SP','3V-DC','3V-CPA','3V-AB','4V-TR','4V-SP','4V-DC','4V-CPA','4V-AB','INSP','DEF']);
    operators.forEach(op=>{
      const row=[op.operatorId,op.operation];
      [1,2,3,4].forEach(v=>{const vi=op.visits[v];
        if(vi&&vi.skipped){row.push('SKIPPED','(not critical)','','','');return;}
        row.push(vi?vi.trim==='pass'?'PASS':'FAIL':'');row.push(vi?parseInt(vi.sp)||0:'');row.push(vi?parseInt(vi.dc)||0:'');row.push(vi?(vi.capRule||(vi.capRequired?'YES':'—')):'');row.push(vi?(vi.absent?'Abs':vi.ab||vi.cpa||'—'):'');
      });
      const tSP=[1,2,3,4].reduce((a,v)=>a+(parseInt(op.visits[v]?.sp)||0),0);

      row.push(tSP,tDC);aoa.push(row);
    });
    const totSP=grp.reduce((a,r)=>a+(parseInt(r.sp)||0),0);
    const totDC=grp.reduce((a,r)=>a+(parseInt(r.dc)||0),0);
    aoa.push(['TOTAL','','','','','','','','','','','','','','','','','','','','','',totSP,totDC]);
    aoa.push(['%','','','','','','','','','','','','','','','','','','','','','',totSP?((totDC/totSP)*100).toFixed(1)+'%':'0%','']);
    aoa.push([]);
  });
  aoa.push(['Corrective and Preventive Action']);
  aoa.push(['(a) If 1 defect found → check another 7 pieces']);
  aoa.push(['(b) If no defects found in those 7 pieces → allow the operator to continue (no CPA)']);
  aoa.push(['(c) If 1 or more defects found in those 7 pieces → stop the operation, operator checks all stitched garments, repair defects, complete CPA before resuming']);
  aoa.push(['(d) If 2 or more defects found in original sample → immediate CPA required (no 7-piece check needed)']);
  aoa.push(['A = Inline QC   B = Supervisor / Mechanic   C = Senior Technician   D = Production / Quality Executive']);
  const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:12},{wch:24},...Array(22).fill({wch:7})];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Roving Report');
  const fname=styleKeys.length===1?styleKeys[0]:team;
  XLSX.writeFile(wb,`Roving_Report_${(fname||'report').toString().replace(/\s/g,'_')}_${date}.xlsx`);
  toast('Roving Report Excel downloaded');
}

// ======================== SHIFT END SUMMARY PAGE ========================
function pgShiftSummary(){
  const ins=D.inspections||[];
  // Build summary rows grouped by date + module + shift
  const map={};
  ins.forEach(r=>{
    const dateKey=r.date||(r.createdAt?new Date(r.createdAt).toISOString().slice(0,10):'');
    if(!dateKey)return;
    const shift=r.shift||'A';
    const module=r.module||'—';
    const key=`${dateKey}__${module}__${shift}`;
    if(!map[key])map[key]={date:dateKey,module,shift,checkQty:0,defectQty:0,operatorDHU:{},defectTypes:{},rejections:0};
    const g=map[key];
    const chk=parseInt(r.checkedQty)||0;
    const def=parseInt(r.defectQty)||0;
    g.checkQty+=chk;g.defectQty+=def;g.rejections+=def;
    // Track per-operator DHU for red-operator detection
    const opId=r.operatorId||r.machineId||'?';
    if(!g.operatorDHU[opId])g.operatorDHU[opId]={name:r.operatorId||opId,chk:0,def:0,topDef:{}};
    g.operatorDHU[opId].chk+=chk;g.operatorDHU[opId].def+=def;
    if(r.defectType&&def>0){const dt=r.defectType;g.operatorDHU[opId].topDef[dt]=(g.operatorDHU[opId].topDef[dt]||0)+def;}
    // Track overall defect types for top-3
    if(r.defectType&&def>0){const dt=r.defectType;g.defectTypes[dt]=(g.defectTypes[dt]||0)+def;}
  });
  // Aggregate operator repeat-red across dates
  const redByOp={};
  Object.values(map).forEach(g=>{
    Object.entries(g.operatorDHU).forEach(([opId,od])=>{
      const dhu=od.chk?((od.def/od.chk)*100):0;
      if(dhu>5){redByOp[opId]=(redByOp[opId]||0)+1;}
    });
  });
  const rows=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)||a.module.localeCompare(b.module));

  // Filters
  const allDates=[...new Set(rows.map(r=>r.date))].sort().reverse();
  const allMods=[...new Set(rows.map(r=>r.module))].sort();
  const fDate=D.ssDate||'';const fMod=D.ssMod||'__all';
  const vis=rows.filter(r=>(!fDate||r.date===fDate)&&(fMod==='__all'||r.module===fMod));

  const tableRows=vis.map(g=>{
    const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
    const redOps=Object.entries(g.operatorDHU).filter(([,od])=>od.chk&&(od.def/od.chk)*100>5);
    // Show only the worst 3 in each list column (worst first, by defect rate) — the true
    // count still shows in "# Red" so nothing is silently hidden, just decluttered.
    const redOpsSorted=redOps.slice().sort((a,b)=>((b[1].def/b[1].chk)-(a[1].def/a[1].chk)));
    const top3Red=redOpsSorted.slice(0,3);
    const noRed=redOps.length;
    const repRedAll=redOpsSorted.filter(([opId])=>(redByOp[opId]||0)>1);
    const repRed=(repRedAll.slice(0,3).map(([opId])=>opId).join(', ')||'—')+(repRedAll.length>3?` +${repRedAll.length-3} more`:'');
    const redReasons=(top3Red.map(([opId,od])=>{
      const top=Object.entries(od.topDef).sort((a,b)=>b[1]-a[1])[0];
      return top?`${opId}:${top[0]}`:'';
    }).filter(Boolean).join('; ')||'—')+(noRed>3?` +${noRed-3} more`:'');
    const redOpsList=(top3Red.map(([opId])=>opId).join(', ')||'—')+(noRed>3?` +${noRed-3} more`:'');
    const top3=Object.entries(g.defectTypes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([dt,n])=>`${dt}(${n})`).join(', ')||'—';
    return`<tr>
      <td>${g.date}</td>
      <td>${g.module}</td>
      <td style="font-family:var(--mono)">${g.checkQty}</td>
      <td style="font-family:var(--mono);color:${g.defectQty>0?'var(--red)':'inherit'}">${g.defectQty}</td>
      <td style="font-family:var(--mono);color:${parseFloat(endPer)>5?'var(--red)':parseFloat(endPer)>3?'var(--yellow)':'var(--green)'}">${endPer}%</td>
      <td style="font-size:11px;color:var(--text2)">${redOpsList}</td>
      <td style="font-family:var(--mono);color:${noRed>0?'var(--red)':'inherit'}">${noRed}</td>
      <td style="font-size:11px">${repRed}</td>
      <td style="font-size:11px;color:var(--text3)">${redReasons}</td>
      <td>${g.module}</td>
      <td style="font-family:var(--mono)">${g.rejections}</td>
      <td style="font-size:11px">${top3}</td>
      <td>${g.shift}</td>
    </tr>`;
  }).join('');

  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
      <select class="form-control" style="width:160px" onchange="D.ssDate=this.value;render()">
        <option value="">All Dates</option>
        ${allDates.map(d=>`<option value="${d}" ${fDate===d?'selected':''}>${d}</option>`).join('')}
      </select>
      <select class="form-control" style="width:160px" onchange="D.ssMod=this.value;render()">
        <option value="__all">All Modules</option>
        ${allMods.map(m=>`<option value="${m}" ${fMod===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="rptShiftSummary('excel')">${ic('download',14)} Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="rptShiftSummary('pdf')">${ic('pdf',14)} PDF</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${vis.length===0?'<div style="padding:48px;text-align:center;color:var(--text3)">No data for selected filters</div>':`
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Date</th><th>Line/Zone</th><th>Check Qty</th><th>Defect Qty</th><th>End %</th>
          <th>Red Operators</th><th># Red</th><th>Repeated Red</th><th>Reasons</th>
          <th>Zone</th><th>Rejections</th><th>Top 3 Defects</th><th>Team</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>`}
    </div>
  </div>`;
}

function rptShiftSummary(fmt){
  const ins=D.inspections||[];
  const map={};
  ins.forEach(r=>{
    const dateKey=r.date||(r.createdAt?new Date(r.createdAt).toISOString().slice(0,10):'');
    if(!dateKey)return;
    const shift=r.shift||'A';const module=r.module||'—';
    const key=`${dateKey}__${module}__${shift}`;
    if(!map[key])map[key]={date:dateKey,module,shift,checkQty:0,defectQty:0,operatorDHU:{},defectTypes:{},rejections:0};
    const g=map[key];const chk=parseInt(r.checkedQty)||0;const def=parseInt(r.defectQty)||0;
    g.checkQty+=chk;g.defectQty+=def;g.rejections+=def;
    const opId=r.operatorId||r.machineId||'?';
    if(!g.operatorDHU[opId])g.operatorDHU[opId]={name:opId,chk:0,def:0,topDef:{}};
    g.operatorDHU[opId].chk+=chk;g.operatorDHU[opId].def+=def;
    if(r.defectType&&def>0){const dt=r.defectType;g.operatorDHU[opId].topDef[dt]=(g.operatorDHU[opId].topDef[dt]||0)+def;}
    if(r.defectType&&def>0){const dt=r.defectType;g.defectTypes[dt]=(g.defectTypes[dt]||0)+def;}
  });
  const redByOp={};
  Object.values(map).forEach(g=>{Object.entries(g.operatorDHU).forEach(([opId,od])=>{const dhu=od.chk?((od.def/od.chk)*100):0;if(dhu>5)redByOp[opId]=(redByOp[opId]||0)+1;});});
  const fDate=D.ssDate||'';const fMod=D.ssMod||'__all';
  const rows=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)||a.module.localeCompare(b.module))
    .filter(r=>(!fDate||r.date===fDate)&&(fMod==='__all'||r.module===fMod));
  if(fmt==='pdf')shiftSummaryPDF(rows);else shiftSummaryExcel(rows);
}

// ======================== DEFECT CATEGORY REPORT ========================
// Automated breakdown by category (Sewing / Uncut Thread / MMT / Oil Mark / Stain / Fabric /
// Cut Hole) over a chosen Day / Week / Month — built straight from inspection records, no
// manual compiling. Same elCategory() taxonomy already used by the End Line report.
function dcDateRange(){
  const mode=D.dcMode||'day';
  const anchor=D.dcDate||new Date().toISOString().split('T')[0];
  if(mode==='day')return[anchor,anchor];
  if(mode==='week'){
    const end=new Date(anchor);const start=new Date(anchor);start.setDate(start.getDate()-6);
    return[start.toISOString().split('T')[0],end.toISOString().split('T')[0]];
  }
  // month: anchor is 'YYYY-MM'
  const [y,m]=(D.dcMonth||anchor.slice(0,7)).split('-').map(Number);
  const start=new Date(y,m-1,1),end=new Date(y,m,0);
  return[start.toISOString().split('T')[0],end.toISOString().split('T')[0]];
}
function buildDefectCategory(){
  const[from,to]=dcDateRange();
  const mod=D.dcModule&&D.dcModule!=='__all'?D.dcModule:null;
  let rows=(D.inspections||[]).filter(i=>i.type==='endline'&&(i.date||(i.createdAt||'').split('T')[0])>=from&&(i.date||(i.createdAt||'').split('T')[0])<=to);
  if(mod)rows=rows.filter(i=>i.module===mod);
  const cat={};EL_CAT_ORDER.forEach(c=>cat[c]=0);
  const byDate={};
  let totInsp=0,totDef=0;
  rows.forEach(i=>{
    const d=i.date||(i.createdAt||'').split('T')[0];
    const c=parseInt(i.checkedQty)||0,dq=parseInt(i.defectQty)||0;
    if(!byDate[d])byDate[d]=Object.fromEntries(EL_CAT_ORDER.map(c=>[c,0]).concat([['insp',0],['def',0]]));
    byDate[d].insp+=c;totInsp+=c;
    if(dq>0&&i.defectType){
      const code=elResolveCode(i.defectType);
      const k=elCategory(code,i.defectType);
      cat[k]=(cat[k]||0)+dq;
      byDate[d][k]=(byDate[d][k]||0)+dq;
      byDate[d].def+=dq;totDef+=dq;
    }
  });
  const dates=Object.keys(byDate).sort();
  const dhu=totInsp?(totDef/totInsp)*100:0;
  return{from,to,mod,cat,byDate,dates,totInsp,totDef,dhu,mode:D.dcMode||'day',rows};
}

// ---- MATRIX EXPORT: Module (rows) x Date (columns), one sheet per category & team.
// Mirrors the manual "OIL MARKS DETAILS MTD" quality-meeting sheets — automated.
function dcMatrixDates(){
  const[from,to]=dcDateRange();const out=[];
  // Date-only strings parse as UTC midnight (per spec). Appending "T00:00:00" instead makes
  // JS parse it as LOCAL midnight, which lands on the PREVIOUS day once converted back via
  // toISOString() for any positive-UTC-offset timezone (e.g. India/Sri Lanka, +5:30) — that
  // was the bug showing yesterday's date in the matrix column headers.
  let d=new Date(from);const end=new Date(to);
  while(d.getTime()<=end.getTime()){out.push(d.toISOString().split('T')[0]);d.setUTCDate(d.getUTCDate()+1);}
  return{from,to,dates:out};
}
function dcFmtDate(s){const p=s.split('-');return p[2]+'-'+p[1]+'-'+p[0];}
function dcModulesSorted(mods){
  return[...mods].sort((a,b)=>{const na=parseInt((String(a).match(/\d+/)||[])[0]),nb=parseInt((String(b).match(/\d+/)||[])[0]);
    if(!isNaN(na)&&!isNaN(nb)&&na!==nb)return na-nb;return String(a).localeCompare(String(b));});
}
// AOA for one category × team sheet.
// Breaks a category's total down by the SPECIFIC defect (e.g. within SEWING: Broken Stitch,
// Open Seam, Skip Stitch...) instead of leaving it as one aggregate number. Groups by the
// canonical name from the code (via EL_DEFECTS) so typos/variations in the typed-in
// defectType string don't fragment the same defect into separate rows.
function dcTypeBreakdown(rows,catKey){
  const byType={};
  rows.forEach(i=>{
    const dq=parseInt(i.defectQty)||0;if(dq<=0||!i.defectType)return;
    const code=elResolveCode(i.defectType);
    if(elCategory(code,i.defectType)!==catKey)return;
    const def=EL_DEFECTS.find(d=>d.code===code);
    const name=def?(def.code+' '+def.name):(i.defectType||'Unknown');
    byType[name]=(byType[name]||0)+dq;
  });
  return Object.entries(byType).sort((a,b)=>b[1]-a[1]);
}
function dcCatMatrixAOA(catKey,teamFilter,label){
  const{from,to,dates}=dcMatrixDates();
  const modFilter=D.dcModule&&D.dcModule!=='__all'?D.dcModule:null;
  let rows=(D.inspections||[]).filter(i=>i.type==='endline');
  rows=rows.filter(i=>{const d=i.date||(i.createdAt||'').split('T')[0];return d>=from&&d<=to;});
  if(teamFilter)rows=rows.filter(i=>(i.shift||'')===teamFilter);
  if(modFilter)rows=rows.filter(i=>i.module===modFilter);
  const modules=dcModulesSorted(new Set(rows.map(i=>i.module).filter(Boolean)));
  const cell={};modules.forEach(m=>{cell[m]={};dates.forEach(d=>cell[m][d]=0);});
  rows.forEach(i=>{
    const dq=parseInt(i.defectQty)||0;if(dq<=0||!i.defectType)return;
    if(elCategory(elResolveCode(i.defectType),i.defectType)!==catKey)return;
    const d=i.date||(i.createdAt||'').split('T')[0];
    if(cell[i.module]&&cell[i.module][d]!=null)cell[i.module][d]+=dq;
  });
  const aoa=[];
  aoa.push([catKey+' DETAILS — '+label]);
  aoa.push(['MODULE \\ DATE',...dates.map(dcFmtDate),'MTD TOTAL']);
  const colTot={};dates.forEach(d=>colTot[d]=0);let grand=0;
  modules.forEach(m=>{let rt=0;const r=[m];dates.forEach(d=>{const v=cell[m][d]||0;r.push(v);rt+=v;colTot[d]+=v;});r.push(rt);grand+=rt;aoa.push(r);});
  aoa.push(['TOTAL',...dates.map(d=>colTot[d]),grand]);
  // Defect-type breakdown — which SPECIFIC defects (not just the category aggregate) made up
  // this total, e.g. under SEWING: S5 Broken Stitch, S22 Skip Stitch...
  const breakdown=dcTypeBreakdown(rows,catKey);
  if(breakdown.length>0){
    aoa.push([]);
    aoa.push(['DEFECT TYPE BREAKDOWN']);
    aoa.push(['Defect','Qty','% of Category']);
    const catTot=breakdown.reduce((a,[,n])=>a+n,0);
    breakdown.forEach(([name,n])=>aoa.push([name,n,catTot?parseFloat(((n/catTot)*100).toFixed(1)):0]));
  }
  return aoa;
}

// Colour bands for the heatmap — more defects = hotter colour, matching the red/yellow/green
// convention already used everywhere else in this app for DHU.
function dcHeatColor(v){
  if(!v||v<=0)return null;
  if(v<=5)return[200,230,255];    // light blue — low
  if(v<=15)return[255,243,176];   // yellow — medium
  if(v<=30)return[255,200,150];   // orange — high
  return[255,160,160];            // red — critical
}

  return`<div style="display:flex;flex-direction:column;gap:20px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><input class="search-input" placeholder="Search module, operator, inspector..." value="${D.sq||''}" oninput="onSearch(this.value)"><div style="display:flex;gap:8px"><span class="fb">🔥 ${ins.length}</span><button class="btn btn-ghost btn-sm" onclick="rptAllInsp('excel')">${ic('download',14)} Excel</button><button class="btn btn-ghost btn-sm" onclick="rptAllInsp('pdf')">${ic('pdf',14)} PDF</button></div></div><div class="card" style="padding:0;overflow:hidden">${ins.length===0?'<div style="padding:48px;text-align:center;color:var(--text3)">No data</div>':`<div class="table-wrap"><table><thead><tr><th>Type</th><th>Date</th><th>Module</th><th>Operator</th><th>Operation</th><th>Checked</th><th>Defects</th><th>DHU</th><th>Inspector</th><th></th></tr></thead><tbody>${ins.map(i=>{const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0,v=c?((d/c)*100).toFixed(1):'0';return`<tr><td><span class="badge badge-${i.type==='endline'?'purple':i.type==='roving'?'green':'blue'}">${i.type==='roving'?'Roving':i.type==='endline'?'End Line':i.type||''}</span></td><td style="font-size:12px">${fd(i.createdAt||i.date)}</td><td title="Sheet: ${sheetIdFor(i.type==='roving'?'roving':'endline',i.module,i.shift,i.date||(i.createdAt||'').split('T')[0])}">${i.module||''}</td><td style="font-family:var(--mono);font-size:12px">${i.operatorId||''}</td><td style="font-size:12px">${i.operation||''}</td><td style="font-family:var(--mono);color:${c?'var(--text)':'var(--text3)'}">${c||'—'}</td><td style="font-family:var(--mono);color:${d>0?'var(--red)':'var(--green)'}">${d}</td><td style="font-family:var(--mono);color:${c?(v>5?'var(--red)':v>3?'var(--yellow)':'var(--green)'):'var(--text3)'}">${c?v+'%':'—'}</td><td style="font-size:12px">${i.inspector||''}</td><td><button class="btn-icon" style="color:var(--red)" onclick="del('${i.type==='roving'?'rovingInspections':'inspections'}','${i.fbKey}')">${ic('trash',14)}</button></td></tr>`;}).join('')}</tbody></table></div>`}</div></div>`;
}

// Count of everything awaiting an admin decision — drives the sidebar badge.
function pendApprovalCount(){
  // AI tickets are detections to REVIEW (on the AI Analysis page), not decisions needing
  // approval — they don't count toward the Approvals badge.
  const pr=(D.machineRosters||[]).filter(r=>r.status==='Pending Approval').length;
  const pe=(D.editRequests||[]).filter(r=>r.status==='pending').length;
  const ps=(D.sheetAccess||[]).filter(r=>r.status==='pending').length;
  const pc=(D.users||[]).filter(u=>u.changeRequest).length;
  return pr+pe+ps+pc;
}

// ======================== APPROVALS & REQUESTS ========================
// Single home for everything that needs an admin decision plus the full audit
// logs (Edit Request Log, Sheet Access Log). Pulled out of the dashboard and
// supervisor pages so those stay clean KPI views.
function pgApprovals(){
  const todayStr=new Date().toISOString().split('T')[0];
  const typeLabel=r=>((r.recordType||'').startsWith('endline')?'End Line':'Roving')+(r.recordType==='endline_add'||r.recordType==='roving_add'?' (missed entry)':'');
  const edStChip=s=>{const m=({pending:['var(--yellow)','Pending'],approved:['var(--accent)','Approved'],rejected:['var(--red)','Rejected'],done:['var(--blue)','Done']})[s]||['var(--text3)',s||'—'];return `<span style="font-size:11px;font-weight:700;border:1px solid ${m[0]};color:${m[0]};border-radius:6px;padding:2px 7px">${m[1]}</span>`;};
  const dateCell=r=>{const isBackdated=r.date&&r.date!==todayStr&&(r.recordType==='endline_add'||r.recordType==='roving_add');
    return `<td style="font-size:11px;${isBackdated?'color:var(--red);font-weight:700':'color:var(--text3)'}">${r.date||'—'}${isBackdated?' <span title="Backdated — not today">⏪</span>':''}</td>`;};

  // ---- pending roster approvals ----
  const pendingRosters = (D.machineRosters||[]).filter(r => r.status === 'Pending Approval');
  let pendingHtml = '';
  if (pendingRosters.length > 0) {
    pendingHtml = `<div class="card" style="border-color:var(--yellow)"><div class="card-header"><span class="card-title" style="color:var(--yellow)">⚠️ Pending Roster Approvals (${pendingRosters.length})</span></div><div class="table-wrap"><table><thead><tr><th>Module</th><th>Date</th><th>Shift</th><th>Machines</th><th>Submitted By</th><th>Action</th></tr></thead><tbody>${pendingRosters.map(r=>`<tr><td style="font-weight:600">${r.moduleName||r.moduleId||''}</td><td>${r.date||''}</td><td><span class="badge badge-purple">${r.shift?'Shift '+r.shift:'—'}</span></td><td>${Object.keys(r.workers||{}).length}</td><td>${r.createdBy||r.updatedBy||''}</td><td><button class="btn btn-primary btn-sm" onclick="approveShift('${r.fbKey}')">✓ Approve</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }

  // ---- module change requests (worker wants to switch module) ----
  const reqs = (D.users||[]).filter(u => u.changeRequest);
  let changeHtml='';
  if(reqs.length>0){
    changeHtml=`<div class="card" style="border-color:var(--yellow)"><div class="card-header"><span class="card-title" style="color:var(--yellow)">⚠️ Pending Module Change Requests (${reqs.length})</span></div><div style="display:flex;flex-direction:column;gap:8px">${reqs.map(u=>{let am={name:'Unknown'};try{am=JSON.parse(u.activeModule||'{}')}catch(e){}return`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px"><div><div style="font-size:14px;font-weight:600">${u.name||u.username}</div><div style="font-size:11px;color:var(--text2)">Wants to change from: ${am.name||am.moduleId||'Unknown'}</div></div><button class="btn btn-primary btn-sm" onclick="approveChange('${u.fbKey}')">Approve Unlock</button></div>`}).join('')}</div></div>`;
  }

  // AI Insights moved off Approvals — they aren't things needing an admin DECISION like edit
  // requests/sheet access, they're detections to review. They now live on the AI Analysis
  // page (pgAI) with their own Acknowledge/Resolve actions.

  // ---- worker edit requests: pending approvals + full audit log ----
  const allEdits=(D.editRequests||[]).slice().sort((a,b)=>(b.requestedAt||'').localeCompare(a.requestedAt||''));
  const pendEdits=allEdits.filter(r=>r.status==='pending');
  let editReqHtml='';
  if(pendEdits.length>0){
    editReqHtml=`<div class="card" style="border-color:var(--yellow)"><div class="card-header"><span class="card-title" style="color:var(--yellow)">✏️ Pending Edit Requests (${pendEdits.length})</span></div><div class="table-wrap"><table><thead><tr><th>Record</th><th>Type</th><th>Date</th><th>Module</th><th>Requested By</th><th>Reason</th><th>Action</th></tr></thead><tbody>${pendEdits.map(r=>`<tr><td style="font-size:12px">${r.label||''}</td><td>${typeLabel(r)}</td>${dateCell(r)}<td>${r.module||''}</td><td>${r.requestedByName||r.requestedBy||''}</td><td style="max-width:220px;font-size:12px">${r.reason||'—'}</td><td style="white-space:nowrap"><button class="btn btn-primary btn-sm" onclick="approveEditReq('${r.fbKey}')">✓ Approve</button> <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="rejectEditReq('${r.fbKey}')">✗ Reject</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }
  const auditHtml=`<div class="card"><div class="card-header"><span class="card-title">📋 Edit Request Log (${allEdits.length})</span></div>${allEdits.length===0?'<div style="padding:20px;text-align:center;color:var(--text3)">No edit requests yet.</div>':`<div class="table-wrap"><table><thead><tr><th>Record</th><th>Type</th><th>Date</th><th>By</th><th>Reason</th><th>Status</th><th>Decided By</th><th>When</th></tr></thead><tbody>${allEdits.map(r=>`<tr><td style="font-size:12px">${r.label||''}</td><td style="font-size:12px">${typeLabel(r)}</td>${dateCell(r)}<td>${r.requestedByName||r.requestedBy||''}</td><td style="max-width:200px;font-size:12px">${r.reason||'—'}</td><td>${edStChip(r.status)}</td><td style="font-size:12px">${r.approvedByName||r.approvedBy||'—'}${r.decisionNote?`<div style="font-size:10px;color:var(--text3)">${r.decisionNote}</div>`:''}</td><td style="font-size:11px;color:var(--text3)">${ft(r.approvedAt||r.requestedAt)}</td></tr>`).join('')}</tbody></table></div>`}</div>`;

  // ---- sheet access requests: one approval unlocks a whole module+shift+date+type sheet ----
  const allSA=(D.sheetAccess||[]).slice().sort((a,b)=>(b.requestedAt||'').localeCompare(a.requestedAt||''));
  const pendSA=allSA.filter(r=>r.status==='pending');
  const saRow=r=>`<tr><td style="font-size:12px"><div style="font-weight:600">${sheetLabel(r.recordType,r.module,r.shift,r.date)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">${r.sheetId||sheetIdFor(r.recordType,r.module,r.shift,r.date)}</div></td><td>${r.requestedByName||r.requestedBy||''}</td><td style="max-width:220px;font-size:12px">${r.reason||'—'}</td>`;
  let sheetAccessHtml='';
  if(pendSA.length>0){
    sheetAccessHtml=`<div class="card" style="border-color:rgba(14,169,143,.4)"><div class="card-header"><span class="card-title" style="color:var(--accent)">🔓 Pending Sheet Access (${pendSA.length})</span></div><div style="font-size:11px;color:var(--text3);padding:0 16px 10px">Approving unlocks the WHOLE sheet — the QC can then edit or add any hour/visit on it for the rest of the day without asking again.</div><div class="table-wrap"><table><thead><tr><th>Sheet</th><th>Requested By</th><th>Reason</th><th>Action</th></tr></thead><tbody>${pendSA.map(r=>saRow(r)+`<td style="white-space:nowrap"><button class="btn btn-primary btn-sm" onclick="approveSheetAccess('${r.fbKey}')">✓ Approve</button> <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="rejectSheetAccess('${r.fbKey}')">✗ Reject</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }
  const saAuditHtml=allSA.length===0?'':`<div class="card"><div class="card-header"><span class="card-title">🔓 Sheet Access Log (${allSA.length})</span></div><div class="table-wrap"><table><thead><tr><th>Sheet</th><th>By</th><th>Reason</th><th>Status</th><th>Decided By</th><th>When</th></tr></thead><tbody>${allSA.map(r=>saRow(r)+`<td>${edStChip(r.status)}</td><td style="font-size:12px">${r.approvedByName||r.approvedBy||'—'}${r.decisionNote?`<div style="font-size:10px;color:var(--text3)">${r.decisionNote}</div>`:''}</td><td style="font-size:11px;color:var(--text3)">${ft(r.approvedAt||r.requestedAt)}</td></tr>`).join('')}</tbody></table></div></div>`;

  const total=pendApprovalCount();
  const stat=(n,l,c)=>`<div class="card card-sm" style="border-left:3px solid ${c}"><div class="metric-val" style="color:${n>0?c:'var(--text3)'};font-size:22px">${n}</div><div class="metric-label">${l}</div></div>`;
  const header=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><div style="font-size:16px;font-weight:700">${total>0?`${total} item${total!==1?'s':''} need your decision`:'All caught up — nothing pending ✓'}</div><div style="font-size:12px;color:var(--text2)">Edit requests, sheet access and rosters live here so the dashboard stays clean. <a href="#" onclick="nav('ai-analysis');return false" style="color:var(--accent)">AI-detected issues are on the AI Analysis page →</a></div></div></div><div class="grid-3">${stat(pendEdits.length,'Edit Requests','var(--yellow)')}${stat(pendSA.length,'Sheet Access','var(--accent)')}${stat(pendingRosters.length+reqs.length,'Roster / Module','var(--purple)')}</div>`;
  const allClear=total===0?`<div class="card" style="text-align:center;padding:40px;color:var(--text2)"><div style="font-size:40px;margin-bottom:8px">✅</div><div style="font-weight:600;color:var(--text)">Nothing waiting for approval</div><div style="font-size:12px;margin-top:4px">New worker requests will appear here in real time.</div></div>`:'';

  return`<div style="display:flex;flex-direction:column;gap:20px">${header}${pendingHtml}${changeHtml}${sheetAccessHtml}${editReqHtml}${allClear}${saAuditHtml}${auditHtml}</div>`;
}

// ======================== SUPERVISOR (analytics) ========================
function pgSuper(){
  const el=elInsp(),rov=rovInsp();
  const elChk=sumChk(el),elDef=sumDef(el),elGood=elChk-elDef;
  const rovChk=sumChk(rov),rovDef=sumDef(rov);
  const mm={};
  const bucket=m=>mm[m]||(mm[m]={elChk:0,elDef:0,rovChk:0,rovDef:0,n:0});
  el.forEach(i=>{if(i.module){const b=bucket(i.module);b.elChk+=parseInt(i.checkedQty)||0;b.elDef+=parseInt(i.defectQty)||0;b.n++;}});
  rov.forEach(i=>{if(i.module){const b=bucket(i.module);b.rovChk+=parseInt(i.checkedQty)||0;b.rovDef+=parseInt(i.defectQty)||0;}});
  const pend=pendApprovalCount();
  const banner=pend>0?`<div class="card" style="border-color:var(--yellow);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px"><div style="font-size:13px"><b style="color:var(--yellow)">${pend}</b> request${pend!==1?'s':''} waiting for approval.</div><button class="btn btn-primary btn-sm" onclick="nav('approvals')">Go to Approvals →</button></div>`:'';

  return`<div style="display:flex;flex-direction:column;gap:20px">${banner}<div class="grid-4">${kpi(elChk,'Line Output','End Line checked','var(--accent)')}${kpi(elGood,'Good Garments','Checked − defects','var(--green)')}${kpi(elDef,'Defects','End Line','var(--red)')}${kpi(dhuOf(el)+'%','DHU','End Line','var(--yellow)')}</div><div class="grid-4">${kpi(rovChk,'Roving Sampled','pieces · separate','var(--blue)')}${kpi(rovDef,'Roving Defects','in-process','var(--red)')}${kpi(dhuOf(rov)+'%','Roving DHU','','var(--purple)')}${kpi(el.length+rov.length,'Total Records','el + roving','var(--accent2)')}</div><div class="grid-2"><div class="card"><div class="card-header"><span class="card-title">Type Split</span></div><div class="chart-wrap"><canvas id="ch3"></canvas></div></div><div class="card"><div class="card-header"><span class="card-title">Top Defects</span></div><div class="chart-wrap"><canvas id="ch4"></canvas></div></div></div><div class="card"><div class="card-header"><span class="card-title">Module Performance</span><button class="btn btn-ghost btn-sm" onclick="rptModules('pdf')">${ic('pdf',12)} PDF</button></div>${Object.keys(mm).length===0?'<div style="padding:24px;text-align:center;color:var(--text3)">No data</div>':`<div style="font-size:11px;color:var(--text3);padding:0 16px 8px">End Line = line output (good garments). Roving = separate in-process check.</div><div class="table-wrap"><table><thead><tr><th rowspan="2">Module</th><th colspan="4" style="text-align:center;border-bottom:1px solid var(--border)">End Line (output)</th><th colspan="3" style="text-align:center;border-left:2px solid var(--border2);border-bottom:1px solid var(--border)">Roving (separate)</th><th rowspan="2" style="border-left:2px solid var(--border2)">Status</th></tr><tr><th>Output</th><th>Good</th><th>Defects</th><th>DHU</th><th style="border-left:2px solid var(--border2)">Sampled</th><th>Defects</th><th>DHU</th></tr></thead><tbody>${Object.entries(mm).map(([m,d])=>{const v=d.elChk?((d.elDef/d.elChk)*100).toFixed(1):0;const rv=d.rovChk?((d.rovDef/d.rovChk)*100).toFixed(1):0;const good=d.elChk-d.elDef;return`<tr><td style="font-weight:500">${m}</td><td style="font-family:var(--mono)">${d.elChk}</td><td style="font-family:var(--mono);color:var(--green)">${good}</td><td style="font-family:var(--mono);color:var(--red)">${d.elDef}</td><td style="color:${v>5?'var(--red)':v>3?'var(--yellow)':'var(--green)'}">${d.elChk?v+'%':'—'}</td><td style="font-family:var(--mono);color:var(--text2);border-left:2px solid var(--border2)">${d.rovChk}</td><td style="font-family:var(--mono);color:var(--red)">${d.rovDef}</td><td style="color:${rv>5?'var(--red)':rv>3?'var(--yellow)':'var(--text2)'}">${d.rovChk?rv+'%':'—'}</td><td style="border-left:2px solid var(--border2)"><span class="badge badge-${v>5?'red':v>3?'yellow':'green'}">${v>5?'Critical':v>3?'Warning':'Good'}</span></td></tr>`;}).join('')}</tbody></table></div>`}</div><div class="card"><div class="card-header"><span class="card-title">DHU Trend</span></div><div class="chart-wrap" style="height:260px"><canvas id="ch5"></canvas></div></div></div>`;
}

// ======================== MACHINES ========================
function pgMachines(){
  const machines = D.machines||[];
  const events   = D.machineEvents||[];
  const qmsMods  = D.modules||[];
  const fmMods   = D.fmModules||[];

  function resolveModuleName(m){
    if(m.moduleName) return m.moduleName;
    if(m.lineName)   return m.lineName;
    const qms = qmsMods.find(x=>x.fbKey===m.moduleId);
    if(qms) return qms.name;
    const fm  = fmMods.find(x=>x.fbKey===m.moduleId);
    if(fm) return fm.name;
    if(m.moduleId==='yard') return 'Machine Yard';
    return m.moduleId||'—';
  }
  function resolveLocation(m){
    const parts=[];
    if(m.buildingName) parts.push(m.buildingName);
    if(m.sectionName)  parts.push(m.sectionName);
    const mod=resolveModuleName(m);
    if(mod&&mod!=='—') parts.push(mod);
    return parts.join(' › ');
  }

  const q=(D.sq||'').toLowerCase();
  const fmachines=q?machines.filter(m=>(m.name||'').toLowerCase().includes(q)||(m.type||'').toLowerCase().includes(q)||resolveModuleName(m).toLowerCase().includes(q)||resolveLocation(m).toLowerCase().includes(q)):machines;
  const groups={};
  fmachines.forEach(m=>{
    const loc=resolveLocation(m)||'Unassigned';
    if(!groups[loc])groups[loc]=[];
    groups[loc].push(m);
  });

  const recentEvents = events.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-primary" onclick="syncMachines()">${ic('refresh',14)} Sync from Factory App</button>
      <input class="search-input" style="width:200px" placeholder="Search machine, type, module..." value="${D.sq||''}" oninput="onSearch(this.value)">
      <span style="font-size:12px;color:var(--text3)">${fmachines.length} / ${machines.length} machines</span>
    </div>
    ${fmachines.length===0
      ?`<div class="card" style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">&#127981;</div><div style="font-weight:600">${machines.length?'No machines match':'No machines yet'}</div><div style="font-size:12px;margin-top:8px">${machines.length?'Try a different search.':'Click Sync from Factory App to import.'}</div></div>`
      :`<div class="card" style="padding:0;overflow:hidden">

window.syncMachines = async function(){
  const btn = document.querySelector('[onclick="syncMachines()"]');
  if(btn){btn.disabled=true;btn.textContent='⟳ Syncing...';}
  try {
    const fmDb = window._fmDb;
    if(!fmDb){toast('Factory app not connected','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}
    const { ref:fmRef, get:fmGet } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');

    // Factory Manager schema: buildings → sections (buildingId) → modules (sectionId) → machines (moduleId)
    const [mSnap, modSnap, secSnap, bSnap] = await Promise.all([
      fmGet(fmRef(fmDb,'machines')),
      fmGet(fmRef(fmDb,'modules')),
      fmGet(fmRef(fmDb,'sections')),
      fmGet(fmRef(fmDb,'buildings'))
    ]);

    if(!mSnap.exists()){toast('No machines in Factory App. Add them in Factory Manager first.','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}

    // Build lookup maps
    const fmModules  = modSnap.exists() ? Object.entries(modSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmSections = secSnap.exists() ? Object.entries(secSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmBuildings= bSnap.exists()   ? Object.entries(bSnap.val()).map(([k,v])=>({id:k,...v})) : [];

    const fmMachines = Object.entries(mSnap.val()).map(([k,v])=>({id:k,...v}));

    // Sync: write each machine into QMS machines collection using the FM machine key as the record key
    // This ensures QR codes (which encode FM machine ID) match perfectly
    let count=0;
    for(const fm of fmMachines){
      const fmMod     = fmModules.find(m=>m.id===fm.moduleId);
      const fmSection = fmSections.find(s=>s.id===fmMod?.sectionId);
      const fmBuilding= fmBuildings.find(b=>b.id===fmSection?.buildingId);

      const machData = {
        name:         fm.name           || 'Unknown Machine',
        type:         fm.type           || '',
        brand:        fm.brand          || '',
        model:        fm.model          || '',
        serial:       fm.serial         || '',
        year:         fm.year           || '',
        price:        fm.price          || '',
        status:       fm.status         || 'Running',
        moduleId:     fm.moduleId       || 'yard',          // FM module key — used for matching worker scans
        moduleName:   fmMod?.name       || '',              // Friendly name
        sectionName:  fmSection?.name   || '',
        buildingName: fmBuilding?.name  || '',
        lineName:     fmMod?.name       || '',              // alias for worker.html compatibility
        pmInterval:   fm.interval       || 30,
        lastPM:       fm.lastMaintenance|| null,
        syncedFrom:   'factory-manager',
        syncedAt:     new Date().toISOString()
      };

      // Use FM machine ID as the key so QR codes match
      await window._set(window._ref(window._db, 'machines/'+fm.id), machData);
      count++;
    }

    // Also sync modules so QMS module screen shows line names matching FM
    for(const mod of fmModules){
      const sec = fmSections.find(s=>s.id===mod.sectionId);
      const bld = fmBuildings.find(b=>b.id===sec?.buildingId);
      await window._set(window._ref(window._db,'fmModules/'+mod.id),{
        fbKey:mod.id, name:mod.name, sectionId:mod.sectionId, sectionName:sec?.name||'',
        buildingId:sec?.buildingId||'', buildingName:bld?.name||'', syncedAt:new Date().toISOString()
      });
    }

    toast(`✓ Synced ${count} machines from Factory App!`);
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }catch(e){
    toast('Sync error: '+e.message,'error');
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }
};

// ======================== QCM → AMMS CROSS-SYSTEM TICKET BRIDGE ========================
// AMMS retired n8n entirely — there's no more AI router watching incoming_tickets, so a
// ticket left there would now sit forever and never reach a dept hub. This writes straight
// into the machine record instead (the same direct-write shape AMMS's own Kiosk/worker/hub
// "raise ticket" flows use), with department pre-set by the QCM defect-category mapping
// below. skipDowntime:true tells AMMS not to count this against machine downtime KPIs — the
// machine kept running while QC flagged it, this isn't an actual breakdown.
window.pushAMMSTicket = async function(opts){
  const {refId,machineId,machineName,department,issueDescription,priority,reportedBy,raisedBy,operatorId} = opts;
  if(!machineId||!window._fmDb) return false;
  try{
    const machSnap = await window._get(window._ref(window._fmDb,'machines/'+machineId));
    const mach = machSnap.exists()?machSnap.val():null;
    const OPEN_STATUSES=['Pending','In Progress','Escalated','Pending Admin Approval'];
    if(mach && OPEN_STATUSES.includes(mach.status)) return false; // already has an open ticket — don't duplicate
    const ticketId = '#TKT-QCM-'+refId.replace(/[^a-zA-Z0-9]/g,'').slice(-10);
    const timestamp = new Date().toISOString();
    await window._update(window._ref(window._fmDb,'machines/'+machineId), {
      department, status: 'Pending', issue: issueDescription, priority: priority||'Normal',
      reportedAt: timestamp, reportedBy: reportedBy||'QCM AI', ticketId,
      operatorId: operatorId||null, source: 'QCM', skipDowntime: true
    });
    await window._push(window._ref(window._fmDb,'logs'), {
      machineId, action: 'Ticket Raised', department, details: issueDescription,
      source: 'QCM', skipDowntime: true, timestamp
    }).catch(()=>{});
    // Local tracking record so QCM admin + the reporting Roving QC can follow this
    // ticket's progress through AMMS without leaving QCM. raisedBy is set only for
    // tickets tied to a specific Roving QC submission (Oil Mark / Sewing pattern) —
    // only that person is allowed to do the closing verification scan.
    const qcmKey = refId.replace(/[^a-zA-Z0-9_]/g,'');
    await window._set(window._ref(window._db,'qcmAmmsTickets/'+qcmKey), {
      refId, ticketId, machineId, machineName: machineName||machineId, department, operatorId: operatorId||'',
      issueDescription, priority: priority||'Normal', reportedBy: reportedBy||'QCM AI',
      raisedBy: raisedBy||null, qcVerified:false, qcVerifiedBy:null, qcVerifiedAt:null,
      createdAt: timestamp
    }).catch(()=>{});
    return true;
  }catch(e){ console.warn('AMMS bridge error',e); return false; }
};

// ---- Real narrative AI report, called directly from the browser via Groq (no n8n needed).
// Writes a record into the SAME `aiTickets` shape the existing "Latest Analysis" card
// (pgAI's latestCard) already knows how to render — findings/rootCauses/recommendations —
// so that whole rendering path lights up with zero changes once a real report exists.
window.generateAIReport=async function(){
  const key=D.aiConfig?.apiKey;
  if(!key){toast('Add a Groq API key in Settings first','error');return;}
  const btn=document.getElementById('ai-report-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generating...';}
  try{
    // Scoped to the SAME shared filter (D.pbi) the on-screen page and Defect Analytics use —
    // whatever is filtered when this is clicked is exactly what the report analyzes.
    const {f,eff,F}=aiFilteredInspections();
    const scope=aiScopeLabel(f,eff);
    const ins=F;
    if(!ins.length){throw new Error('No inspections match the current filter — widen it and try again');}
    const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
    const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
    const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
    const dm={};ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||0);});
    const topDef=Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const modMap={};ins.forEach(i=>{const m=i.module||'—';if(!modMap[m])modMap[m]={chk:0,def:0};modMap[m].chk+=parseInt(i.checkedQty)||0;modMap[m].def+=parseInt(i.defectQty)||0;});
    const modStats=Object.entries(modMap).map(([n,s])=>({n,dhu:s.chk?((s.def/s.chk)*100).toFixed(1):'0.0',chk:s.chk,def:s.def})).sort((a,b)=>parseFloat(b.dhu)-parseFloat(a.dhu)).slice(0,10);
    const om={};ins.forEach(i=>{if(i.operatorId){if(!om[i.operatorId])om[i.operatorId]={d:0,n:0};om[i.operatorId].d+=parseInt(i.defectQty)||0;om[i.operatorId].n++;}});
    const topOps=Object.entries(om).sort((a,b)=>b[1].d-a[1].d).slice(0,8);

    const dataSummary=`Scope: ${scope}. Overall DHU: ${dhu}% (target ≤2.5%). Total inspected: ${totChk}, total defects: ${totDef}.
Top defect types (name: count): ${topDef.map(([n,c])=>`${n}: ${c}`).join(', ')||'none'}.
Module DHU (worst first): ${modStats.map(m=>`${m.n}: ${m.dhu}% (${m.chk} checked, ${m.def} defects)`).join('; ')||'none'}.
Operators with most defects: ${topOps.map(([o,d])=>`${o}: ${d.d} defects over ${d.n} checks`).join('; ')||'none'}.`;

    const sys='You are a garment factory quality analyst. Given live inspection metrics, respond with ONLY a JSON object (no markdown, no code fences) matching exactly this shape: '
      +'{"overallStatus":"Critical|High|Medium|Low","trend":"improving|stable|declining","summary":"2-3 sentence plain-English summary a factory manager would understand","findings":[{"title":"short title","module":"module name or empty","detail":"1-2 sentences","level":"Critical|High|Medium|Low"}],"rootCauses":[{"cause":"short cause","evidence":"1 sentence citing the numbers"}],"recommendations":[{"action":"concrete action","target":"who/what it targets","priority":"immediate|soon|planned"}]}. '
      +'Give 2-5 findings, 1-3 root causes, 2-5 recommendations. Base everything on the data given — do not invent modules/operators/defects not mentioned. overallStatus should reflect the overall DHU vs the 2.5% target; trend should reflect whether DHU/defect counts look concerning.';

    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        temperature:0.3,
        response_format:{type:'json_object'},
        messages:[{role:'system',content:sys},{role:'user',content:dataSummary}]
      })
    });
    if(!resp.ok){
      const errBody=await resp.text().catch(()=>'');
      if(resp.status===401)throw new Error('Groq rejected the API key — check it in Settings');
      if(resp.status===429)throw new Error('Groq rate limit hit — wait a moment and try again');
      throw new Error('Groq API error '+resp.status+(errBody?': '+errBody.slice(0,150):''));
    }
    const payload=await resp.json();
    let raw=payload?.choices?.[0]?.message?.content||'';
    raw=raw.trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim(); // in case the model wraps it anyway
    let parsed;
    try{parsed=JSON.parse(raw);}catch(e){throw new Error('Groq returned non-JSON — try again');}

    const now=new Date().toISOString();
    await window.fbAdd('aiTickets',{
      overallStatus:parsed.overallStatus||'Medium',
      trend:parsed.trend||'stable',
      summary:parsed.summary||'',
      dhu:parseFloat(dhu),totalInsp:totChk,totalDef:totDef,
      scope, // e.g. "This Week · Module 3 · H&M" — the filter that was active when generated
      findings:Array.isArray(parsed.findings)?parsed.findings.slice(0,8):[],
      rootCauses:Array.isArray(parsed.rootCauses)?parsed.rootCauses.slice(0,5):[],
      recommendations:Array.isArray(parsed.recommendations)?parsed.recommendations.slice(0,8):[],
      analysisDate:new Date().toLocaleString(),
      generatedAt:now,createdAt:now,provider:'groq',
      status:'Report' // distinct from 'Open' pattern-ticket status
    });
    toast('✅ AI report generated for '+scope);
    if(D.page==='ai-analysis')render();
  }catch(e){toast('AI report failed: '+e.message,'error');}
  if(btn){btn.disabled=false;btn.innerHTML='✨ Generate AI Report';}
};

window.runAIAnalysis = async function(){
  const ins = D.inspections;
  if(ins.length < 3) return;
  const tickets = D.aiTickets||[];
  const existingIds = new Set(tickets.map(t=>t.refId));
  const today = new Date().toISOString().split('T')[0];
  // Roving QC only — they're the ones walking the floor inspecting machines directly,
  // so they're the reliable source for equipment-condition signals (Oil Mark, Sewing/tension
  // patterns). Inline/End Line checks are garment sampling, not floor inspection — excluded.
  const allDefects = (D.rovingInspections||[])
    .filter(i=>(i.date===today||(i.createdAt||'').startsWith(today)));
  const omMap={};
  ins.filter(i=>i.machineId&&i.operatorId).forEach(i=>{
    const key=`${i.operatorId}_${i.machineId}`;
    if(!omMap[key])omMap[key]=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)omMap[key].push((d/c)*100);
  });
  for(const [key,dhus] of Object.entries(omMap)){
    if(dhus.length>=3 && dhus.slice(-3).every(d=>d>5)){
      const [opId,machId]=key.split('_');
      const refId=`op_risk_${key}_${today}`;
      if(!existingIds.has(refId)){
        const mach = (D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'OperatorRisk',level:'high',status:'Open',operatorId:opId,machineId:machId,machineName:mach?.name||machId,title:`High DHU: Operator ${opId} on ${mach?.name||machId}`,description:`Operator ${opId} has exceeded 5% DHU for 3+ consecutive inspections on machine ${mach?.name||machId}. Consider retraining.`,autoGenerated:true});
        await window.pushAMMSTicket({refId,machineId:machId,operatorId:opId,department:'IE',priority:'Low',reportedBy:'QCM AI — Operator Risk',
          issueDescription:`[QCM] Operator ${opId} exceeded 5% DHU for 3+ consecutive checks on ${mach?.name||machId}. Review technique/retraining (line-balance, ergonomics).`});
      }
    }
  }
  const machMap={};
  ins.filter(i=>i.machineId).forEach(i=>{
    if(!machMap[i.machineId])machMap[i.machineId]={};
    if(!machMap[i.machineId][i.operatorId||'?'])machMap[i.machineId][i.operatorId||'?']=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)machMap[i.machineId][i.operatorId||'?'].push((d/c)*100);
  });
  for(const [machId,opData] of Object.entries(machMap)){
    const ops=Object.keys(opData);
    if(ops.length>=2&&ops.every(op=>opData[op].length>0&&(opData[op].reduce((a,b)=>a+b,0)/opData[op].length)>5)){
      const refId=`mach_risk_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'MachineRisk',level:'high',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Machine Issue: ${mach?.name||machId} — All Operators Affected`,description:`Multiple operators on machine ${mach?.name||machId} are all showing DHU>5%. The machine itself likely needs servicing.`,autoGenerated:true});
        // Route by whichever defect category dominates today's checks on this machine —
        // an oil-mark-dominant pattern means lubrication/mechanical, otherwise it's a
        // tension/setup (Technical) issue.
        const machDefects = allDefects.filter(d=>d.machineId===machId && (parseInt(d.defectQty||d.dc)||0)>0);
        const catCounts={};
        machDefects.forEach(d=>{const cat=elCategory('',d.defectType||'');catCounts[cat]=(catCounts[cat]||0)+1;});
        const topCat=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
        const dept = QCM_CATEGORY_DEPT[topCat] || 'Technical';
        await window.pushAMMSTicket({refId,machineId:machId,department:dept,priority:'Normal',reportedBy:'QCM AI — Machine Risk',
          issueDescription:`[QCM] All operators on ${mach?.name||machId} show DHU>5% today — machine likely needs servicing.${topCat?` Dominant defect: ${topCat}.`:''}`});
      }
    }
  }
  const swaps=(D.machineEvents||[]).filter(e=>e.type==='Swap'&&(e.createdAt||'').startsWith(today));
  const swapCount={};
  swaps.forEach(s=>{swapCount[s.machineId]=(swapCount[s.machineId]||0)+1;});
  for(const [machId,cnt] of Object.entries(swapCount)){
    if(cnt>=2){
      const refId=`swap_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'FrequentSwap',level:'medium',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Unstable Machine: ${mach?.name||machId} swapped ${cnt}x today`,description:`Machine ${mach?.name||machId} has been swapped ${cnt} times today. Investigate machine reliability.`,autoGenerated:true});
        await window.pushAMMSTicket({refId,machineId:machId,department:'Technical',priority:'Normal',reportedBy:'QCM AI — Frequent Swap',
          issueDescription:`[QCM] ${mach?.name||machId} has been swapped ${cnt}x today — investigate machine reliability/setup.`});
      }
    }
  }
  // Defect-category risk: ANY of the ~50 roving defect codes (grouped into the 7 categories
  // in QCM_CATEGORY_DEPT — every category is covered, not just the equipment-obvious ones).
  // Raises a ticket the moment EITHER is true for a machine+category today:
  //   (a) 2+ of the same category logged in a SINGLE visit, or
  //   (b) the same category recurs across 2+ SEPARATE visits (even 1 each)
  // — whichever fires first. Grouped per visitNum so both conditions can be checked.
  const catByMachine={};
  allDefects.filter(d=>d.machineId&&(parseInt(d.defectQty||d.dc)||0)>0).forEach(d=>{
    const cat=elCategory('',d.defectType||'');
    if(!QCM_CATEGORY_DEPT[cat]) return;
    if(!catByMachine[d.machineId]) catByMachine[d.machineId]={};
    if(!catByMachine[d.machineId][cat]) catByMachine[d.machineId][cat]={byVisit:{},lastSubmittedBy:null,operatorId:null,lastAt:''};
    const bucket=catByMachine[d.machineId][cat];
    const visit=d.visitNum!=null?d.visitNum:0;
    bucket.byVisit[visit]=(bucket.byVisit[visit]||0)+(parseInt(d.defectQty||d.dc)||0);
    const at=d.createdAt||d.date||'';
    // Track the OPERATOR whose defect most recently pushed this bucket over the threshold —
    // separate from lastSubmittedBy (the Roving QC who logged it). AMMS/maintenance needs to
    // know which garment-line operator was on the machine, not just who inspected it.
    if(at>=bucket.lastAt){bucket.lastAt=at;bucket.lastSubmittedBy=d.submittedBy||bucket.lastSubmittedBy;bucket.operatorId=d.operatorId||bucket.operatorId;}
  });
  for(const [machId,cats] of Object.entries(catByMachine)){
    for(const [cat,bucket] of Object.entries(cats)){
      const visitCounts=Object.values(bucket.byVisit);
      const maxInOneVisit=Math.max(0,...visitCounts);
      const distinctVisits=Object.keys(bucket.byVisit).length;
      if(maxInOneVisit<2 && distinctVisits<2) continue; // neither trigger condition met
      const refId=`defcat_${cat.replace(/\s+/g,'')}_${machId}_${today}`;
      if(existingIds.has(refId)) continue;
      const mach=(D.machines||[]).find(m=>m.fbKey===machId);
      const dept=QCM_CATEGORY_DEPT[cat];
      const reason = maxInOneVisit>=2 ? `${maxInOneVisit}x in one visit` : `recurring across ${distinctVisits} visits today`;
      const isHighSeverity = cat==='OIL MARK' || cat==='CUT HOLE';
      await window.fbAdd('aiTickets',{refId,type:'DefectCategoryRisk',level:isHighSeverity?'high':'medium',status:'Open',machineId:machId,machineName:mach?.name||machId,operatorId:bucket.operatorId||'',title:`${cat}: ${reason} — ${mach?.name||machId}`,description:`"${cat}" defects (${reason}) on ${mach?.name||machId}${bucket.operatorId?' by Operator '+bucket.operatorId:''} — routed to ${dept}. Raised by ${bucket.lastSubmittedBy||'Roving QC'}.`,autoGenerated:true});
      // raisedBy = the Roving QC whose submission most recently pushed this machine/category
      // over the threshold — only they can do the closing verification scan in the worker app.
      await window.pushAMMSTicket({refId,machineId:machId,machineName:mach?.name||machId,operatorId:bucket.operatorId||'',department:dept,priority:isHighSeverity?'High':'Normal',reportedBy:'QCM AI — Defect Pattern',raisedBy:bucket.lastSubmittedBy||null,
        issueDescription:`[QCM] "${cat}" defects (${reason}) on ${mach?.name||machId}${bucket.operatorId?' by Operator '+bucket.operatorId:''}.`});
    }
  }
};

    const badgeClass=STATUS_COLOR[liveStatus]||'badge-gray';

    </tr>`;
  }).join('');
  return `

  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">

      <thead><tr style="background:rgba(255,255,255,.03);text-align:left">

        <th style="padding:10px 12px;font-size:11px;color:var(--text3);text-transform:uppercase">Operator</th>
        <th style="padding:10px 12px;font-size:11px;color:var(--text3);text-transform:uppercase">Dept</th>

// Shared by pgAI() and generateAIReport() so the on-screen page and the report it generates
// are ALWAYS scoped to the exact same filtered data — same shared D.pbi state that Defect
// Analytics / Operator Analysis use, so switching between those pages keeps the same context.
function aiFilteredInspections(){
  const f=D.pbi||(D.pbi={from:'',to:'',range:'week',line:'__all',buyer:'__all',style:'__all',operation:'__all',cat:'__all',defect:'__all',topN:15});
  const eff=pbiEffRange(f);
  const styleBuyer={};(D.styles||[]).forEach(s=>{if(s.name)styleBuyer[s.name]=s.buyer||'';if(s.styleId)styleBuyer[s.styleId]=s.buyer||'';});
  const enrich=i=>{const code=elResolveCode(i.defectType);return {...i,_cat:i.defectType?elCategory(code,i.defectType):'',_buyer:styleBuyer[i.style]||styleBuyer[i.styleId]||'',_date:(i.date||(i.createdAt||'').split('T')[0])||''};};
  const all=(D.inspections||[]).map(enrich);
  const F=all.filter(i=>{
    if(eff.from&&i._date<eff.from)return false;
    if(eff.to&&i._date>eff.to)return false;
    if(f.line!=='__all'&&i.module!==f.line)return false;
    if(f.buyer!=='__all'&&i._buyer!==f.buyer)return false;
    if(f.style!=='__all'&&i.style!==f.style)return false;
    if(f.operation!=='__all'&&i.operation!==f.operation)return false;
    if(f.cat!=='__all'&&i._cat!==f.cat)return false;
    if(f.defect!=='__all'&&i.defectType!==f.defect)return false;
    return true;
  });
  return {f,eff,all,F};
}
function aiScopeLabel(f,eff){
  const rangeLabel=eff.range==='today'?'Today':eff.range==='week'?'This Week':eff.range==='month'?'This Month':(eff.from||eff.to)?`${eff.from||'…'} → ${eff.to||'…'}`:'All Time';
  const bits=[rangeLabel];
  if(f.line&&f.line!=='__all')bits.push(f.line);
  if(f.buyer&&f.buyer!=='__all')bits.push(f.buyer);
  if(f.style&&f.style!=='__all')bits.push(f.style);
  if(f.operation&&f.operation!=='__all')bits.push(f.operation);
  if(f.defect&&f.defect!=='__all')bits.push(f.defect);
  return bits.join(' · ');
}

// ==================== QMS BOT — free-form Q&A grounded in live data ====================
// Unlike generateAIReport (one fixed shape, saved permanently as a "Report" ticket), this is
// an ephemeral, session-only chat: D.qmsBotMessages is never written to Firebase, it just
// holds the conversation while this admin is looking at the page.
// Deliberately NOT scoped to D.pbi (the Defect Analytics/AI Analysis shared filter) — the Bot
// now lives on its own page, so "what's today's data" must always be answerable without the
// admin first having to go set a filter on a different page. Always computes Today/This
// Week/All-Time straight from D.inspections.
function qmsBotStatsOf(rows){
  const chk=rows.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const def=rows.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  return {chk,def,dhu:chk?((def/chk)*100).toFixed(2):'0.00',records:rows.length};
}
function qmsBotTopDefects(rows,n){
  const dm={};rows.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||0);});
  return Object.entries(dm).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function qmsBotComputeAll(){
  const all=D.inspections||[];
  const dOf=i=>(i.date||(i.createdAt||'').split('T')[0])||'';
  const todayStr=new Date().toISOString().split('T')[0];
  const weekAgoStr=new Date(Date.now()-6*86400000).toISOString().split('T')[0];
  const prevWeekStartStr=new Date(Date.now()-13*86400000).toISOString().split('T')[0];
  const todayIns=all.filter(i=>dOf(i)===todayStr);
  const weekIns=all.filter(i=>dOf(i)>=weekAgoStr);
  const prevWeekIns=all.filter(i=>dOf(i)>=prevWeekStartStr&&dOf(i)<weekAgoStr);

  const allStats=qmsBotStatsOf(all), todayStats=qmsBotStatsOf(todayIns), weekStats=qmsBotStatsOf(weekIns), prevWeekStats=qmsBotStatsOf(prevWeekIns);
  const weekTrend=(weekStats.chk===0||prevWeekStats.chk===0)?null:(parseFloat(weekStats.dhu)<parseFloat(prevWeekStats.dhu)-0.3?'improving':parseFloat(weekStats.dhu)>parseFloat(prevWeekStats.dhu)+0.3?'declining':'stable');
  const topDefAll=qmsBotTopDefects(all,10), topDefToday=qmsBotTopDefects(todayIns,6);

  const modMap={};all.forEach(i=>{const m=i.module||'—';if(!modMap[m])modMap[m]={chk:0,def:0};modMap[m].chk+=parseInt(i.checkedQty)||0;modMap[m].def+=parseInt(i.defectQty)||0;});
  const modStats=Object.entries(modMap).map(([n,s])=>({n,dhu:s.chk?((s.def/s.chk)*100).toFixed(1):'0.0',chk:s.chk,def:s.def})).sort((a,b)=>parseFloat(b.dhu)-parseFloat(a.dhu)).slice(0,12);

  // Which style each operator was most recently seen working, so "which style is OP1 on" is answerable.
  const opLastStyle={};all.forEach(i=>{if(i.operatorId&&i.style){const t=i.createdAt||i.date||'';if(!opLastStyle[i.operatorId]||t>opLastStyle[i.operatorId]._t){opLastStyle[i.operatorId]={style:i.style,_t:t};}}});
  const om={};all.forEach(i=>{if(i.operatorId){if(!om[i.operatorId])om[i.operatorId]={d:0,n:0};om[i.operatorId].d+=parseInt(i.defectQty)||0;om[i.operatorId].n++;}});
  const topOps=Object.entries(om).sort((a,b)=>b[1].d-a[1].d).slice(0,10);
  const redOps=computeRedOperators(D.rovingInspections||[]).slice(0,10);

  // Styles currently assigned to each module — the live "what's running now" answer, sourced
  // from the Modules collection (current assignment), not from historical inspection records.
  const runningStyles=(D.modules||[]).filter(m=>m.styleName).map(m=>`${m.name||m.moduleId||'—'}: ${m.styleName}${m.buyer?' ('+m.buyer+')':''}`);

  // Style-wise DHU, same shape as the module breakdown above, so style-level quality questions
  // ("which style has the worst defect rate") are answerable, not just module-level ones.
  const styMap={};all.forEach(i=>{const s=i.style||'—';if(s==='—')return;if(!styMap[s])styMap[s]={chk:0,def:0};styMap[s].chk+=parseInt(i.checkedQty)||0;styMap[s].def+=parseInt(i.defectQty)||0;});
  const styStats=Object.entries(styMap).map(([n,s])=>({n,dhu:s.chk?((s.def/s.chk)*100).toFixed(1):'0.0',chk:s.chk,def:s.def})).sort((a,b)=>parseFloat(b.dhu)-parseFloat(a.dhu)).slice(0,12);

  let tpText='';
  if(thirdPartyOn()){
    const tpRows=D.thirdPartyAudits||[];
    const tOffer=tpRows.reduce((a,r)=>a+(parseInt(r.offerQty)||0),0);
    const tChk=tpRows.reduce((a,r)=>a+(parseInt(r.checkedQty)||0),0);
    const tDef=tpRows.reduce((a,r)=>a+(parseInt(r.defects)||[]).reduce((s,d)=>s+(parseInt(d.qty)||0),0),0);
    tpText=`\n3rd Party audits (all time): ${tpRows.length} rounds, ${tOffer} offered, ${tChk} checked, ${tDef} defects found.`;
  }

  return {todayStr,allStats,todayStats,weekStats,prevWeekStats,weekTrend,topDefAll,topDefToday,modStats,opLastStyle,topOps,redOps,runningStyles,styStats,tpText};
}
function qmsBotContext(){
  const c=qmsBotComputeAll();
  return `TODAY (${c.todayStr}): DHU ${c.todayStats.dhu}% (target ≤2.5%), inspected ${c.todayStats.chk}, defects ${c.todayStats.def}, records ${c.todayStats.records}. Today's top defects: ${c.topDefToday.map(([n,x])=>`${n}: ${x}`).join(', ')||'none logged yet today'}.
THIS WEEK (last 7 days): DHU ${c.weekStats.dhu}%, inspected ${c.weekStats.chk}, defects ${c.weekStats.def}, records ${c.weekStats.records}.
ALL TIME: DHU ${c.allStats.dhu}%, inspected ${c.allStats.chk}, defects ${c.allStats.def}, records ${c.allStats.records}.
Top defect types all-time (name: qty): ${c.topDefAll.map(([n,x])=>`${n}: ${x}`).join(', ')||'none'}.
Styles currently running (module: style, buyer): ${c.runningStyles.join('; ')||'no module currently has a style assigned'}.
Style DHU all-time, worst first (style: dhu%, checked, defects): ${c.styStats.map(s=>`${s.n}: ${s.dhu}% (${s.chk} chk, ${s.def} def)`).join('; ')||'none'}.
Module/line DHU all-time, worst first (module: dhu%, checked, defects): ${c.modStats.map(m=>`${m.n}: ${m.dhu}% (${m.chk} chk, ${m.def} def)`).join('; ')||'none'}.
Operators with most defects all-time (operatorId: total defects over N checks, current/last style): ${c.topOps.map(([o,d])=>`${o}: ${d.d} over ${d.n}${c.opLastStyle[o]?' ('+c.opLastStyle[o].style+')':''}`).join('; ')||'none'}.
Red Operators — repeating the SAME defect type across 2+ Roving visits (operatorId: defect type, times repeated, line): ${c.redOps.map(r=>`${r.o}: ${r.defectType} x${r.visits} (${r.line})`).join('; ')||'none flagged'}.${c.tpText}`;
}
// Count of "things worth a glance" — feeds the QMS Bot nav badge, same pattern as D.notifs/pendApprovalCount().
function qmsBotAlertCount(){

window.qmsBotClear=function(){ D.qmsBotMessages=[]; render(); };
window.qmsBotKeydown=function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); window.qmsBotAsk(); } };
async function qmsBotSubmit(question){
  const key=D.aiConfig?.apiKey;
  if(!key){toast('Add a Groq API key in Settings first','error');return;}
  question=(question||'').trim();
  if(!question)return;
  D.qmsBotMessages=[...(D.qmsBotMessages||[]),{role:'user',content:question}];
  D._qmsBotThinking=true;
  render();
  try{
    const sys='You are the QMS Bot, a helpful quality-analysis assistant embedded in a garment factory\'s admin dashboard. '
      +'Answer ONLY using the live data context given to you below — never invent modules, operators, or defect numbers that aren\'t in it. '
      +'If the data context doesn\'t contain enough information to answer, say so plainly and suggest widening the filters at the top of the page. '
      +'Keep answers short and direct (2-6 sentences, or a short list) — this is a factory manager on a live dashboard, not a report reader. '
      +'Live data context:\n'+qmsBotContext();
    const history=(D.qmsBotMessages||[]).slice(-10).map(m=>({role:m.role,content:m.content}));
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        temperature:0.3,
        messages:[{role:'system',content:sys},...history]
      })
    });
    if(!resp.ok){
      const errBody=await resp.text().catch(()=>'');
      if(resp.status===401)throw new Error('Groq rejected the API key — check it in Settings');
      if(resp.status===429)throw new Error('Groq rate limit hit — wait a moment and try again');
      throw new Error('Groq API error '+resp.status+(errBody?': '+errBody.slice(0,150):''));
    }
    const payload=await resp.json();
    const answer=payload?.choices?.[0]?.message?.content?.trim()||'(no answer returned)';

// Backfill defectId for records imported/added without a code, by matching their name
// against the official S/L/M/D/E/F taxonomy (case/spacing-insensitive).
window.fixMissingDefectCodes=async function(){
  const missing=(D.defects||[]).filter(d=>!d.defectId);
  if(missing.length===0){toast('No missing codes');return;}
  let fixed=0,unmatched=[];
  for(const d of missing){
    const code=EL_CODE_BY_NAME[elNorm(d.name)];
    if(code){await window.fbUpd('defects',d.fbKey,{defectId:code});fixed++;}
    else unmatched.push(d.name);
  }
  toast(fixed+' code(s) fixed'+(unmatched.length?'; '+unmatched.length+' need a manual code (name not in taxonomy)':''),fixed>0?'success':'error');
};

function roleBadge(role){
  if(!role)return'gray';
  if(role==='Admin')return'green';
  if(role==='Line Head')return'yellow';
  if(role.includes('End'))return'purple';
  if(role.includes('Roving'))return'red';
  if(role.includes('QC')||role.includes('Inspector'))return'blue';
  if(role==='Supervisor')return'blue';
  return'gray';
}

yle="width:100%;justify-content:center;padding:12px">${ic('check',14)} Save</button></form>`;

// Submit modal
window.sub=async function(type){
  const f=document.getElementById('mf');if(!f)return;const fd=new FormData(f);const data=Object.fromEntries(fd.entries());
  try{
    if(type==='addMod'){await window.fbAdd('modules',data);toast('Module added');}
    else if(type==='editMod'){
      const old=D.modalData;
      await window.fbUpd('modules',old.fbKey,data);
      // Style change is an auditable event: when the line switches style we log
      // WHO changed it and WHEN, so reports can split the day's pieces by style
      // and show "Style changed at HH:MM by [name]". Stored in `styleChanges`.
      const oSid=old?.styleId||'',nSid=data.styleId||'',oSn=old?.styleName||'',nSn=data.styleName||'';
      if((oSid||oSn)&&(oSid!==nSid||oSn!==nSn)){
        const now=new Date().toISOString();
        await window.fbAdd('styleChanges',{module:data.name||old?.name||'',moduleKey:old?.fbKey||'',moduleId:data.moduleId||old?.moduleId||'',fromStyleId:oSid,fromStyleName:oSn,toStyleId:nSid,toStyleName:nSn,at:now,by:D.user?.username||'',byName:D.user?.name||D.user?.username||''});
        await window.fbUpd('modules',old.fbKey,{styleChangedAt:now,styleChangedBy:D.user?.name||D.user?.username||''});
        toast('Style changed — logged by '+(D.user?.name||D.user?.username||'you'));
      } else { toast('Updated'); }
      // assignedLine on users is a plain name string, not a key — if the module
      // is renamed, every Line Head pointing at the old name would silently
      // "lose" their assignment, so carry it forward to the new name.
      if(old?.name&&data.name&&old.name!==data.name){
        const affected=D.users.filter(u=>u.assignedLine===old.name);
        for(const u of affected) await window.fbUpd('users',u.fbKey,{assignedLine:data.name});
      }
    }
    else if(type==='addStyle'){await window.fbAdd('styles',data);toast('Style added');}
    else if(type==='editStyle'){if(data.status==='Completed'&&D.modalData.status!=='Completed')data.completedDate=new Date().toISOString();await window.fbUpd('styles',D.modalData.fbKey,data);toast('Updated');}
    else if(type==='addOp'){await window.fbAdd('operations',data);toast('Added');}
    else if(type==='addDefect'){await window.fbAdd('defects',data);toast('Defect added');}
    else if(type==='editDefect'){await window.fbUpd('defects',D.modalData.fbKey,data);toast('Updated');}
    else if(type==='addAlert'){await window.fbAdd('alerts',{...data,read:false,createdBy:D.user?.username});toast('Alert created');}
    else if(type==='addUser'){if(!data.username||!data.password){toast('Username & password required','error');return;}await window.fbAdd('users',{...data,status:'Active'});toast('User added');}
    else if(type==='editUser'){await window.fbUpd('users',D.modalData.fbKey,data);toast('Updated');}
    closeModal();
  }catch(e){toast('Error: '+e.message,'error');}
};

// Delete helpers
window.del=async function(p,k){
  if(!confirm('Delete?'))return;
  try{
    if(p==='styles'){
      // Modules keep their own copy of styleName/styleId/buyer — clear it
      // here too, otherwise a deleted style keeps showing on its module forever.
      const s=D.styles.find(x=>x.fbKey===k);
      const linked=D.modules.filter(m=>m.styleKey===k||m.styleName===s?.name||m.styleId===s?.styleId);
      for(const m of linked) await window.fbUpd('modules',m.fbKey,{styleName:'',styleId:'',styleKey:'',buyer:''});
    }
    if(p==='modules'){
      const mod=D.modules.find(x=>x.fbKey===k);
      // assignedLine is a plain name string on users — clear it so a Line Head
      // doesn't stay silently "assigned" to a module that no longer exists.
      const affected=D.users.filter(u=>u.assignedLine===mod?.name);
      for(const u of affected) await window.fbUpd('users',u.fbKey,{assignedLine:''});
      // machineRosters are keyed "{moduleFbKey}_{date}" — remove every roster
      // that belonged to this module so it doesn't show as an orphaned record.
      const orphanRosters=D.machineRosters.filter(r=>r.fbKey.startsWith(k+'_'));
      for(const r of orphanRosters) await window.fbDel('machineRosters',r.fbKey);
    }
    await window.fbDel(p,k);
    toast('Deleted');
  }catch(e){toast('Delete failed: '+e.message,'error');}
};

// Shift auto-detection (A=06:00–14:00, B=14:00–22:00, C=22:00–06:00)
// Two-shift factory: A = 06:00–14:00, B = 14:00–22:00.
// Off-hours (22:00–06:00) fold into B, the last active shift.
// Rotation: two teams (A,B) swap shifts every 2 weeks. D.rotation.morningTeam says which
// team is on the 06–14 slot; it auto-flips each cycle (Sunday 02:00). Records are tagged by
// team so a team's history stays continuous across rotations. Defaults to A=morning.
function rotationState(){
  const r=D.rotation||{};
  const base=r.morningTeam||'A';
  const cycleDays=r.cycleDays||14;
  let morning=base,next=null;
  if(r.anchor&&r.autoRotate!==false){
    const ms=cycleDays*86400000, cycles=Math.floor((Date.now()-new Date(r.anchor).getTime())/ms);
    if(cycles>0&&cycles%2===1) morning=(base==='A'?'B':'A');
    next=new Date(new Date(r.anchor).getTime()+(Math.max(cycles,0)+1)*ms);
  }
  return {morningTeam:morning, afternoonTeam:(morning==='A'?'B':'A'), nextRotation:next};
}
function wkClockSlot(){const h=new Date().getHours();return(h>=6&&h<14)?'morning':'afternoon';}
function currentShift(){const st=rotationState();return wkClockSlot()==='morning'?st.morningTeam:st.afternoonTeam;}

// Most recent Sunday 02:00 — the canonical anchor point for rotations.
function lastSunday2am(){
  const d=new Date(); d.setHours(2,0,0,0);
  d.setDate(d.getDate()-d.getDay());   // back to Sunday of this week
  if(d.getTime()>Date.now()) d.setDate(d.getDate()-7);
  return d.toISOString();
}
