<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyA-aIRjMPFkK0hQKWY8-rpcA_5TfMhbRM4",
    authDomain: "qc--brandex.firebaseapp.com",
    databaseURL: "https://qc--brandex-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qc--brandex",
    storageBucket: "qc--brandex.firebasestorage.app",
    messagingSenderId: "109990871136",
    appId: "1:109990871136:web:c0dfa5f0ba78bed77c8305"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(e => console.error("Anon Auth Error:", e));

  window._db = db; window._ref = ref; window._set = set; window._get = get;
  window._push = push; window._onValue = onValue; window._remove = remove; window._update = update;

  // Second Firebase app — Factory Manager (read-only sync)
  const fmApp = initializeApp({
    apiKey: "AIzaSyBUbE6WtnWnHQsCul_5bDDPHz78jlaHCxs",
    authDomain: "apparel-maintenance.firebaseapp.com",
    databaseURL: "https://apparel-maintenance-default-rtdb.firebaseio.com",
    projectId: "apparel-maintenance"
  }, 'fm');
  import { getDatabase as getDB2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth as getAuth2, signInAnonymously as anonSign2 } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const fmDb = getDB2(fmApp);
  anonSign2(getAuth2(fmApp)).catch(()=>{});
  window._fmDb = fmDb;

  // DB-based login
  window.dbLogin = async function(username, password) {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) throw new Error('No users found. Seed data first.');
    const users = snap.val();
    for (const [key, u] of Object.entries(users)) {
      if ((u.username === username || u.email === username) && u.password === password) {
        return { fbKey: key, ...u };
      }
    }
    throw new Error('Invalid username or password');
  };

  window.loadAll = function() {
    onValue(ref(db,'inspections'), s => { window.D.inspections = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['dashboard','inspections','supervisor','ai-analysis','reports'].includes(window.D.page)) window.render(); if(window.scheduleAI)window.scheduleAI(); });
    onValue(ref(db,'modules'), s => { window.D.modules = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='modules') window.render(); });
    onValue(ref(db,'styles'), s => { window.D.styles = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['styles','reports'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'users'), s => { window.D.users = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='users') window.render(); });
    onValue(ref(db,'alerts'), s => { window.D.alerts = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; window.D.notifs = window.D.alerts.filter(a=>!a.read).length; if(['alerts','dashboard'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'operations'), s => { window.D.operations = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='operations') window.render(); });
    onValue(ref(db,'defects'), s => { window.D.defects = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='defects') window.render(); });
    onValue(ref(db,'rosters'), s => { window.D.rosters = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='supervisor') window.render(); });
    onValue(ref(db,'machineRosters'), s => { window.D.machineRosters = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','roster'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'machines'), s => { window.D.machines = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(window.D.page==='machines') window.render(); });
    onValue(ref(db,'machineEvents'), s => { window.D.machineEvents = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['machines','supervisor'].includes(window.D.page)) window.render(); if(window.scheduleAI)window.scheduleAI(); });
    onValue(ref(db,'aiTickets'), s => { window.D.aiTickets = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['supervisor','ai-analysis'].includes(window.D.page)) window.render(); });
    onValue(ref(db,'rovingInspections'), s => { window.D.rovingInspections = s.exists() ? Object.entries(s.val()).map(([k,v])=>({fbKey:k,...v})) : []; if(['roving','reports'].includes(window.D.page)) window.render(); });
  };

  window.fbAdd = async (p,d) => { const r=push(ref(db,p));await set(r,{...d,createdAt:new Date().toISOString()});return r.key; };
  window.fbUpd = async (p,k,d) => { await update(ref(db,`${p}/${k}`),{...d,updatedAt:new Date().toISOString()}); };
  window.fbDel = async (p,k) => { await remove(ref(db,`${p}/${k}`)); };
  window.approveChange = async function(userId) {
    if(!confirm('Approve this module change?')) return;
    try {
      await window._update(window._ref(window._db, 'users/' + userId), { changeRequest: false, activeModule: null });
      toast('Request Approved!');
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  };
  window._dbReady = true;

  setTimeout(() => { if(window.D.page==='loading'){window.D.page='login';window.render();} }, 2000);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--bg4:#22262f;--border:#2a2e38;--border2:#363c48;--text:#e8eaf0;--text2:#9097a8;--text3:#5c6478;--accent:#00d4a8;--accent2:#0099d4;--red:#e05555;--yellow:#d4a800;--green:#00d4a8;--blue:#4488ff;--purple:#9966ff;--radius:8px;--radius2:12px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.collapsed{width:60px}.sidebar.collapsed .hide-c{display:none}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:13px;flex-shrink:0}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:10px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--text2);font-size:13px;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:rgba(0,212,168,.08);border-left-color:var(--accent);color:var(--accent)}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);cursor:pointer}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#000;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.page-title{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:600}.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-danger{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;border:none}.btn-icon:hover{background:var(--bg3);color:var(--text)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:500;color:var(--text2)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.metric-val{font-size:28px;font-weight:600;font-family:var(--mono)}.metric-label{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(0,212,168,.15);color:var(--green)}.badge-red{background:rgba(224,85,85,.15);color:var(--red)}.badge-yellow{background:rgba(212,168,0,.15);color:var(--yellow)}.badge-blue{background:rgba(68,136,255,.15);color:var(--blue)}.badge-purple{background:rgba(153,102,255,.15);color:var(--purple)}.badge-gray{background:rgba(92,100,120,.15);color:var(--text3)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.module-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.02)}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.1)}.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert-card{padding:14px 18px;border-radius:var(--radius);border-left:3px solid;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-critical{background:rgba(224,85,85,.08);border-color:var(--red)}.alert-high{background:rgba(212,168,0,.08);border-color:var(--yellow)}.alert-medium{background:rgba(68,136,255,.08);border-color:var(--blue)}.alert-low{background:rgba(0,212,168,.08);border-color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.modal-title{font-size:18px;font-weight:600}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.chart-wrap{position:relative;width:100%;height:220px}
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.sep{height:1px;background:var(--border);margin:16px 0}
.fb{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(255,148,36,.08);border:1px solid rgba(255,148,36,.2);border-radius:20px;font-size:10px;color:#ff9424;font-family:var(--mono)}
.notif-btn{position:relative;background:transparent;color:var(--text2);padding:6px;border-radius:6px;cursor:pointer;border:none}.notif-btn:hover{background:var(--bg3)}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:2px;right:2px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-red{background:var(--red)}
.search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:13px;width:220px}.search-input:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:var(--radius);font-size:13px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:rgba(0,212,168,.95);color:#000}.toast-error{background:rgba(224,85,85,.95);color:#fff}
.ai-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(153,102,255,.12);border:1px solid rgba(153,102,255,.25);border-radius:20px;font-size:11px;color:var(--purple)}
.ai-finding{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.ai-bar{background:var(--bg4);height:6px;border-radius:3px;overflow:hidden;margin:6px 0}.ai-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--accent2))}
.qr-container{background:#fff;padding:16px;border-radius:12px;display:inline-block;margin:12px 0}
.report-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;text-align:center}.report-card:hover{border-color:var(--accent);transform:translateY(-2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(0,212,168,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.sidebar{width:60px}.sidebar .hide-c{display:none}.form-row{grid-template-columns:1fr}}
</style>
</head>

const EL_CODES={
  S:['Broken Stitch','Cut Damage','High-Low','Incorrect Placement','Insecure Attaching','Insecure Bar tack','Joint Stitch','Looseness','Lose Tension','Missing Bar tack','Missing Stitch','Needle Holes','Open Seam','Out of Shape','Over Tacking','Pleated','Poor Tacking','Puckering','Raw Edge','Roping','Run Off','Skip Stitch','Slanted','Tight Tension','Twisted Seam','Twisting','Unbalanced','Untrim Thread','Waviness','Uneven','Seam Mismatch','Loop Missing','Poor Pressing','Stripe Mismatch'],

  F:['Color Shading','Crease Mark','Fabric Hole','Foreign Yarn','Missing Yarn','Slubs','Fabric Runs','Fabric Stain']
};
const EL_DEFECTS=[];Object.entries(EL_CODES).forEach(([p,arr])=>arr.forEach((nm,i)=>EL_DEFECTS.push({code:p+(i+1),name:nm})));
const EL_CAT_ORDER=['SEWING','UNCUT THREAD','MMT','OIL MARK','STAIN','FABRIC','CUT HOLE'];
function elNorm(s){return (s||'').toString().toLowerCase().replace(/[^a-z0-9]/g,'');}
const EL_CODE_BY_NAME={};EL_DEFECTS.forEach(d=>{EL_CODE_BY_NAME[elNorm(d.name)]=d.code;});
function elResolveCode(defectType){
  if(!defectType)return '';
  const t=defectType.toString().trim();
  const m=t.match(/^([SLMDEF])\s*-?\s*(\d{1,2})\b/i);
  if(m)return m[1].toUpperCase()+m[2];
  return EL_CODE_BY_NAME[elNorm(t)]||'';
}
function elCategory(code,name){
  const c=(code||'').toUpperCase();const n=(name||'').toLowerCase();
  if(c==='S2'||n.includes('cut damage'))return 'CUT HOLE';
  if(c==='F3'||n.includes('fabric hole')||n.includes('cut hole'))return 'CUT HOLE';
  if(c==='S28'||n.includes('untrim')||n.includes('uncut')||n.includes('loose thread'))return 'UNCUT THREAD';
  if(c==='D1'||n.includes('oil'))return 'OIL MARK';
  if(c[0]==='D'||n.includes('stain')||(n.includes('mark')&&!n.includes('bar')))return 'STAIN';
  if(c[0]==='F'||n.includes('fabric')||n.includes('slub')||n.includes('yarn')||n.includes('shading')||n.includes('crease'))return 'FABRIC';
  if(c[0]==='M'||n.includes('oot')||n.includes('measure')||(n.includes('size')&&!n.includes('label')))return 'MMT';
  return 'SEWING';
}

function ini(n){if(!n)return'BX';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fd(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function ft(d){return fd(d)+' '+((d&&new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}))||'');}
function ta(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}
function dhu(a){const c=a.reduce((s,i)=>s+(parseInt(i.checkedQty)||0),0),d=a.reduce((s,i)=>s+(parseInt(i.defectQty)||0),0);return c?((d/c)*100).toFixed(1):'0.0';}

function bindLogin(){

  const go=async()=>{
    const u=document.getElementById('lu')?.value.trim(),p=document.getElementById('lp')?.value;

    if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
    err.style.display='none';D.loginLoading=true;render();
    try{
      const user=await window.dbLogin(u,p);
      D.user=user;D.page='dashboard';D.loginLoading=false;render();window.loadAll();toast('Welcome, '+user.name);
    }catch(e){D.loginLoading=false;render();const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent=e.message;}}

  btn.onclick=go;

  const ins=D.inspections,td=new Date().toISOString().split('T')[0];
  const ti=ins.filter(i=>(i.createdAt||i.date||'').startsWith(td));
  const comps=D.styles.filter(s=>s.status==='Completed');
  const reqs = D.users.filter(u => u.changeRequest);
  return`<div style="display:flex;flex-direction:column;gap:20px"><div class="grid-4">${kpi(ins.length,'Inspections','All time','var(--accent)')}${kpi(ti.length,"Today",'','var(--blue)')}${kpi(ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0),'Defects','Total','var(--red)')}${kpi(dhu(ins)+'%','DHU','Target 2.5%','var(--yellow)')}</div><div class="grid-4">${kpi(D.modules.length,'Modules','','var(--accent2)')}${kpi(D.styles.filter(s=>s.status==='Running').length,'Running Styles','','var(--purple)')}${kpi(comps.length,'Completed','Styles','var(--green)')}${kpi(reqs.length,'Pending Requests','','var(--yellow)')}</div>${reqs.length>0?`<div class="card" style="border-color:var(--yellow)"><div class="card-header"><span class="card-title" style="color:var(--yellow)">⚠️ Pending Module Change Requests</span></div><div style="display:flex;flex-direction:column;gap:8px">${reqs.map(u=>{let am={name:'Unknown'};try{am=JSON.parse(u.activeModule||'{}')}catch(e){}return`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px"><div><div style="font-size:14px;font-weight:600">${u.name||u.username}</div><div style="font-size:11px;color:var(--text2)">Wants to change from: ${am.name||am.moduleId||'Unknown'}</div></div><button class="btn btn-primary btn-sm" onclick="approveChange('${u.fbKey}')">Approve Unlock</button></div>`}).join('')}</div></div>`:''}<div class="grid-2"><div class="card"><div class="card-header"><span class="card-title">Timeline</span></div><div class="chart-wrap"><canvas id="ch1"></canvas></div></div><div class="card"><div class="card-header"><span class="card-title">Top Defects</span></div><div class="chart-wrap"><canvas id="ch2"></canvas></div></div></div><div class="grid-2"><div class="card"><div class="card-header"><span class="card-title">Recent Inspections</span><button class="btn btn-ghost btn-sm" onclick="nav('inspections')">All</button></div>${ins.length===0?'<div style="text-align:center;padding:32px;color:var(--text3)">No data</div>':`<div class="table-wrap"><table><thead><tr><th>Type</th><th>Module</th><th>Defects</th><th>Time</th></tr></thead><tbody>${ins.slice(-6).reverse().map(i=>`<tr><td><span class="badge badge-${i.type==='inline'?'blue':'purple'}">${i.type||''}</span></td><td>${i.module||''}</td><td style="font-family:var(--mono);color:${(parseInt(i.defectQty)||0)>0?'var(--red)':'var(--green)'}">${i.defectQty||0}</td><td style="font-size:11px;color:var(--text3)">${ta(i.createdAt)}</td></tr>`).join('')}</tbody></table></div>`}</div><div class="card"><div class="card-header"><span class="card-title">Alerts</span></div>${D.alerts.slice(-4).reverse().map(a=>`<div class="alert-card alert-${a.level||'medium'}">${ic('warning',14)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${a.title||''}</div><div style="font-size:11px;color:var(--text3)">${ta(a.createdAt)}</div></div></div>`).join('')||'<div style="color:var(--text3);padding:12px;text-align:center">No alerts</div>'}</div></div></div>`;
}

// ======================== MODULES ========================
function pgMods(){
  return`<div style="display:flex;flex-direction:column;gap:20px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><button class="btn btn-primary" onclick="showModal('addMod')">${ic('plus',14)} Add Module</button><span style="font-size:12px;color:var(--text3)">${D.modules.length} modules — click for QR</span></div>${D.modules.length===0?`<div class="card" style="text-align:center;padding:48px;color:var(--text3)">No modules. Add styles first, then create modules.</div>`:`<div class="module-grid">${D.modules.map(m=>{const d=parseFloat(m.dhu)||0;return`<div class="module-card" style="border-left:3px solid ${d>5?'var(--red)':d>3?'var(--yellow)':'var(--green)'}" onclick="showModal('modQR',${JSON.stringify(m).replace(/"/g,'&quot;')})"><span class="status-dot dot-${d>5?'red':d>3?'yellow':'green'}" style="position:absolute;top:10px;right:10px"></span><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${m.moduleId||''}</div><div style="font-size:14px;font-weight:600;margin:4px 0">${m.name||''}</div><div style="font-size:12px;color:var(--accent)">${m.styleName||'—'}</div><div style="font-size:11px;color:var(--text3)">${m.buyer||''}</div><div style="margin-top:8px;font-family:var(--mono);font-size:12px;color:${d>5?'var(--red)':d>3?'var(--yellow)':'var(--green)'}">DHU ${d}%</div><div class="progress" style="margin-top:4px"><div class="progress-fill" style="width:${Math.min(d*10,100)}%;background:${d>5?'var(--red)':d>3?'var(--yellow)':'var(--green)'}"></div></div><div style="display:flex;gap:4px;margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showModal('modQR',${JSON.stringify(m).replace(/"/g,'&quot;')})">${ic('qr',12)}</button><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showModal('editMod',${JSON.stringify(m).replace(/"/g,'&quot;')})">${ic('edit',12)}</button><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="event.stopPropagation();del('modules','${m.fbKey}')">${ic('trash',12)}</button></div></div>`;}).join('')}</div>`}</div>`;
}

// ======================== STYLES ========================
// ======================== STYLE REPORT PAGE ========================
function pgStyleReport(){
  const styles=D.styles;
  const key=D.styleReportKey||'';
  const sel=styles.find(s=>s.fbKey===key);

  const selector=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <select class="form-control" style="min-width:260px" onchange="D.styleReportKey=this.value;render()">
      <option value="">— Select a Style —</option>
      ${styles.map(s=>`<option value="${s.fbKey}" ${key===s.fbKey?'selected':''}>${s.styleId} — ${s.name}${s.buyer?' ('+s.buyer+')':''}</option>`).join('')}
    </select>
    ${sel?`<div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="rptStyleReport('excel')">${ic('download',14)} Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="rptStyleReport('pdf')">${ic('pdf',14)} PDF</button>
    </div>`:''}
  </div>`;

  if(!sel) return`<div style="display:flex;flex-direction:column;gap:20px">${selector}
    <div class="card" style="padding:48px;text-align:center;color:var(--text3)">Select a style above to view its full report.</div>
  </div>`;

  // All inspections for this style (match by name or ID)
  const ins=D.inspections.filter(i=>i.style&&(i.style===sel.name||i.style===sel.styleId||i.style.includes(sel.name)||i.style.includes(sel.styleId)));
  const rovIns=(D.rovingInspections||[]).filter(i=>i.style&&(i.style===sel.name||i.style===sel.styleId));

  // Totals
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  const aql=parseFloat(dhu)<=2.5?'PASS':'REVIEW';

  // Dates
  const allDates=[...new Set(ins.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort();
  const startDate=allDates[0]||'—';
  const endDate=allDates[allDates.length-1]||'—';
  const daysActive=allDates.length;

  // Linked modules
  const linkedMods=[...new Set(ins.map(i=>i.module).filter(Boolean))];

  // --- KPI cards ---
  const kpis=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
    ${[
      ['Total Inspections',ins.length,'var(--accent)'],
      ['Checked',totChk,'var(--blue)'],
      ['Defects',totDef,'var(--red)'],
      ['DHU',dhu+'%',parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'],
      ['AQL',aql,aql==='PASS'?'var(--green)':'var(--red)'],
    ].map(([l,v,c])=>`<div class="card" style="padding:14px;text-align:center;border-color:${c}22">
      <div style="font-size:22px;font-weight:700;font-family:var(--mono);color:${c}">${v}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${l}</div>
    </div>`).join('')}
  </div>`;

  // --- Style info header ---
  const infoCard=`<div class="card" style="border-color:var(--accent)22">
    <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--text3)">STYLE ID</div>
        <div style="font-size:20px;font-weight:700;font-family:var(--mono)">${sel.styleId||'—'}</div>
        <div style="font-size:14px;font-weight:600;margin-top:2px">${sel.name||'—'}</div>
        <div style="font-size:12px;color:var(--text2)">${sel.buyer||''} ${sel.color?'• '+sel.color:''}</div>
      </div>
      <div style="text-align:right">
        <span class="badge badge-${sel.status==='Running'?'green':sel.status==='Completed'?'blue':'yellow'}" style="font-size:13px">${sel.status||''}</span>
        <div style="font-size:12px;color:var(--text2);margin-top:8px">Target DHU: <b>${sel.targetDhu||'—'}%</b></div>
        <div style="font-size:12px;color:var(--text2)">Start: ${startDate} &nbsp;→&nbsp; End: ${endDate}</div>
        <div style="font-size:12px;color:var(--text2)">${daysActive} day${daysActive!==1?'s':''} active • ${linkedMods.length} module${linkedMods.length!==1?'s':''}</div>
      </div>
    </div>
  </div>`;

  // --- Daily breakdown ---
  const byDate={};
  ins.forEach(i=>{
    const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;
    const sh=i.shift||'A';
    if(!byDate[d])byDate[d]={chk:0,def:0,A:{chk:0,def:0},B:{chk:0,def:0},C:{chk:0,def:0},D:{chk:0,def:0}};
    const c=parseInt(i.checkedQty)||0,df=parseInt(i.defectQty)||0;
    byDate[d].chk+=c;byDate[d].def+=df;
    if(!byDate[d][sh])byDate[d][sh]={chk:0,def:0};
    byDate[d][sh].chk+=c;byDate[d][sh].def+=df;
  });
  const dailyRows=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,g])=>{
    const dhu2=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    const color=parseFloat(dhu2)>5?'var(--red)':parseFloat(dhu2)>3?'var(--yellow)':'var(--green)';
    return`<tr>
      <td style="font-size:12px">${date}</td>
      <td style="font-family:var(--mono)">${g.chk}</td>
      <td style="font-family:var(--mono);color:${g.def>0?'var(--red)':'inherit'}">${g.def}</td>
      <td style="font-family:var(--mono);color:${color};font-weight:600">${dhu2}%</td>
      ${['A','B','C','D'].map(sh=>{const s=g[sh]||{chk:0,def:0};return`<td style="font-size:11px;text-align:center;color:var(--text3)">${s.chk?s.chk+'/<span style="color:var(--red)">'+s.def+'</span>':'—'}</td>`;}).join('')}
    </tr>`;
  }).join('');

  const dailyTable=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Daily Breakdown</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Checked</th><th>Defects</th><th>DHU%</th><th>Shift A</th><th>Shift B</th><th>Shift C</th><th>Shift D</th></tr></thead>
      <tbody>${dailyRows||'<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">No data</td></tr>'}</tbody>
    </table></div>
  </div>`;

  // --- Shift summary ---
  const byShift={A:{chk:0,def:0},B:{chk:0,def:0},C:{chk:0,def:0},D:{chk:0,def:0}};
  ins.forEach(i=>{const sh=i.shift||'A';if(!byShift[sh])byShift[sh]={chk:0,def:0};byShift[sh].chk+=parseInt(i.checkedQty)||0;byShift[sh].def+=parseInt(i.defectQty)||0;});
  const shiftCards=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    ${['A','B','C','D'].map(sh=>{
      const g=byShift[sh];const d=g.chk?((g.def/g.chk)*100).toFixed(1):'—';
      const c=g.chk?(parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)'):'var(--text3)';
      return`<div class="card" style="padding:14px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px">Shift ${sh}</div>
        <div style="font-size:18px;font-weight:700;font-family:var(--mono)">${g.chk}</div>
        <div style="font-size:11px;color:var(--text3)">Checked</div>
        <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${c};margin-top:4px">${d}${g.chk?'%':''}</div>
        <div style="font-size:11px;color:var(--text3)">DHU</div>
      </div>`;
    }).join('')}
  </div>`;

  // --- Module performance ---
  const byMod={};
  ins.forEach(i=>{const m=i.module||'—';if(!byMod[m])byMod[m]={chk:0,def:0};byMod[m].chk+=parseInt(i.checkedQty)||0;byMod[m].def+=parseInt(i.defectQty)||0;});
  const modRows=Object.entries(byMod).sort((a,b)=>b[1].chk-a[1].chk).map(([mod,g])=>{
    const d=g.chk?((g.def/g.chk)*100).toFixed(1):'0.0';
    return`<tr><td style="font-weight:500">${mod}</td><td style="font-family:var(--mono)">${g.chk}</td><td style="font-family:var(--mono);color:var(--red)">${g.def}</td><td style="font-family:var(--mono);color:${parseFloat(d)>5?'var(--red)':parseFloat(d)>3?'var(--yellow)':'var(--green)'}">${d}%</td></tr>`;
  }).join('');
  const modTable=modRows?`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border)">Module Performance</div>
    <div class="table-wrap"><table><thead><tr><th>Module</th><th>Checked</th><th>Defects</th><th>DHU%</th></tr></thead><tbody>${modRows}</tbody></table></div>
  </div>`:'';

  // --- Top defects ---
  const defMap={};
  ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0){defMap[i.defectType]=(defMap[i.defectType]||0)+(parseInt(i.defectQty)||0);}});
  const top5=Object.entries(defMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totTopDef=Object.values(defMap).reduce((a,v)=>a+v,0);
  const defCard=top5.length?`<div class="card">
    <div style="font-weight:600;margin-bottom:12px">Top Defects</div>
    ${top5.map(([name,cnt])=>{const pct=totTopDef?((cnt/totTopDef)*100).toFixed(0):0;return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${name}</span><span style="font-family:var(--mono);color:var(--red)">${cnt} (${pct}%)</span></div>
      <div style="height:6px;background:var(--bg3);border-radius:4px"><div style="height:100%;border-radius:4px;background:var(--red);width:${pct}%"></div></div>
    </div>`;}).join('')}
  </div>`:'';

  return`<div style="display:flex;flex-direction:column;gap:16px">
    ${selector}${infoCard}${kpis}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${defCard}${modTable}</div>
    <div style="font-weight:600;color:var(--text2);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Shift Summary</div>
    ${shiftCards}
    ${dailyTable}
  </div>`;
}

function rptStyleReport(fmt){
  const sel=D.styles.find(s=>s.fbKey===D.styleReportKey);
  if(!sel){toast('Select a style first','error');return;}
  const ins=D.inspections.filter(i=>i.style&&(i.style===sel.name||i.style===sel.styleId||i.style.includes(sel.name)||i.style.includes(sel.styleId)));
  if(!ins.length){toast('No inspection data for this style','error');return;}
  if(fmt==='excel')return styleReportExcel(sel,ins);
  styleReportPDF(sel,ins);
}

function styleReportPDF(sel,ins){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(10,12,16);doc.rect(0,0,297,210,'F');
  doc.setFontSize(14);doc.setTextColor(0,212,168);doc.text('BRANDIX APPAREL INDIA UNIT-3',148,13,{align:'center'});
  doc.setFontSize(11);doc.setTextColor(220,220,220);doc.text('STYLE REPORT — '+sel.styleId+' '+sel.name,148,20,{align:'center'});
  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`Buyer: ${sel.buyer||'—'}  |  Colour: ${sel.color||'—'}  |  Status: ${sel.status}  |  Target DHU: ${sel.targetDhu||'—'}%  |  Generated: ${new Date().toLocaleString()}`,148,26,{align:'center'});
  // Totals
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  doc.setFontSize(9);doc.setTextColor(200,200,200);
  doc.text(`Total Checked: ${totChk}   Total Defects: ${totDef}   DHU: ${dhu}%   AQL: ${parseFloat(dhu)<=2.5?'PASS':'REVIEW'}`,148,32,{align:'center'});
  // Daily table
  const byDate={};
  ins.forEach(i=>{const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;const sh=i.shift||'A';if(!byDate[d])byDate[d]={chk:0,def:0,A:0,B:0,C:0,D:0};byDate[d].chk+=parseInt(i.checkedQty)||0;byDate[d].def+=parseInt(i.defectQty)||0;byDate[d][sh]=(byDate[d][sh]||0)+(parseInt(i.defectQty)||0);});
  const body=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,g])=>[date,g.chk,g.def,g.chk?((g.def/g.chk)*100).toFixed(1)+'%':'—',g.A||'',g.B||'',g.C||'',g.D||'']);
  doc.autoTable({startY:36,head:[['Date','Checked','Defects','DHU%','Shift A def','Shift B def','Shift C def','Shift D def']],body,styles:{fontSize:8,cellPadding:2,textColor:[210,210,210],fillColor:[20,22,36]},headStyles:{fillColor:[0,100,80],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[26,28,44]},theme:'grid'});
  // Defect summary
  const defMap={};ins.forEach(i=>{if(i.defectType&&parseInt(i.defectQty)>0)defMap[i.defectType]=(defMap[i.defectType]||0)+(parseInt(i.defectQty)||0);});
  const defRows=Object.entries(defMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[n,c,totDef?((c/totDef)*100).toFixed(1)+'%':'—']);
  if(defRows.length){let y=doc.lastAutoTable.finalY+6;if(y>170){doc.addPage('a4','landscape');y=14;}doc.setFontSize(10);doc.setTextColor(0,212,168);doc.text('Top Defects',14,y);doc.autoTable({startY:y+2,head:[['Defect Type','Count','% of Total']],body:defRows,styles:{fontSize:8,cellPadding:2,textColor:[210,210,210],fillColor:[20,22,36]},headStyles:{fillColor:[80,30,80],textColor:[255,255,255],fontStyle:'bold'},theme:'grid',margin:{left:14,right:180}});}
  doc.save(`Style_Report_${sel.styleId}_${new Date().toISOString().slice(0,10)}.pdf`);toast('Style Report PDF downloaded');
}

function styleReportExcel(sel,ins){
  const aoa=[];
  aoa.push(['BRANDIX APPAREL INDIA UNIT-3 — STYLE REPORT']);
  aoa.push([`Style: ${sel.styleId} — ${sel.name}`,`Buyer: ${sel.buyer||'—'}`,`Colour: ${sel.color||'—'}`,`Status: ${sel.status}`,`Target DHU: ${sel.targetDhu||'—'}%`]);
  const totChk=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
  const totDef=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const dhu=totChk?((totDef/totChk)*100).toFixed(2):'0.00';
  aoa.push([`Total Checked: ${totChk}`,`Total Defects: ${totDef}`,`DHU: ${dhu}%`,`AQL: ${parseFloat(dhu)<=2.5?'PASS':'REVIEW'}`]);
  aoa.push([]);
  // Daily sheet
  aoa.push(['Date','Checked','Defects','DHU%','Shift A Def','Shift B Def','Shift C Def','Shift D Def']);
  const byDate={};
  ins.forEach(i=>{const d=i.date||(i.createdAt||'').split('T')[0];if(!d)return;const sh=i.shift||'A';if(!byDate[d])byDate[d]={chk:0,def:0,A:0,B:0,C:0,D:0};byDate[d].chk+=parseInt(i.checkedQty)||0;byDate[d].def+=parseInt(i.defectQty)||0;byDate[d][sh]=(byDate[d][sh]||0)+(parseInt(i.defectQty)||0);});
  Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,g])=>aoa.push([date,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0,g.A||0,g.B||0,g.C||0,g.D||0]));
  aoa.push([]);
  // Shift summary
  aoa.push(['SHIFT SUMMARY']);
  aoa.push(['Shift','Checked','Defects','DHU%']);
  const byShift={A:{chk:0,def:0},B:{chk:0,def:0},C:{chk:0,def:0},D:{chk:0,def:0}};
  ins.forEach(i=>{const sh=i.shift||'A';if(!byShift[sh])byShift[sh]={chk:0,def:0};byShift[sh].chk+=parseInt(i.checkedQty)||0;byShift[sh].def+=parseInt(i.defectQty)||0;});
  ['A','B','C','D'].forEach(sh=>{const g=byShift[sh];aoa.push([`Shift ${sh}`,g.chk,g.def,g.chk?parseFloat(((g.def/g.chk)*100).toFixed(2)):0]);});
  aoa.push([]);
  // All inspections raw
  aoa.push(['ALL INSPECTIONS']);
  aoa.push(['Date','Time','Type','Module','Operator','Operation','Shift','Checked','Defects','DHU%','Defect Type','Inspector']);
  ins.forEach(i=>{const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;aoa.push([i.date,i.time||'',i.type||'',i.module||'',i.operatorId||'',i.operation||'',i.shift||'',c,d,c?parseFloat(((d/c)*100).toFixed(2)):0,i.defectType||'',i.inspector||i.submittedBy||'']);});
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:8},{wch:10},{wch:10},{wch:8},{wch:20},{wch:14}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Style Report');
  XLSX.writeFile(wb,`Style_Report_${sel.styleId}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Style Report Excel downloaded');
}

window.completeStyle = async function(key){
  const s=D.styles.find(x=>x.fbKey===key);
  if(!confirm(`Mark "${s?.name||'this style'}" as completed?`))return;
  await window.fbUpd('styles',key,{status:'Completed',completedDate:new Date().toISOString()});
  // Clear style from any linked modules so they're ready for a new style
  const linked=D.modules.filter(m=>m.styleName===s?.name||m.styleId===s?.styleId);
  for(const m of linked){
    await window.fbUpd('modules',m.fbKey,{styleName:'',styleId:'',styleKey:'',buyer:''});
  }
  const msg=linked.length>0
    ?`Style completed. ${linked.length} module(s) cleared — assign a new style to them.`
    :'Style completed! Find it in Reports.';
  toast(msg,'success');
};

// ============ PDF REPORTS ============
function makePDF(title,headers,rows,summary){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.setFontSize(18);doc.setTextColor(0,100,80);doc.text('Brandix QMS',14,20);
  doc.setFontSize(12);doc.setTextColor(60,60,60);doc.text(title,14,28);
  doc.setFontSize(9);doc.setTextColor(120,120,120);doc.text('Generated: '+new Date().toLocaleString('en-GB'),14,34);
  if(summary){doc.setFontSize(10);doc.setTextColor(40,40,40);let y=42;summary.forEach(s=>{doc.text(s,14,y);y+=5;});}
  doc.autoTable({head:[headers],body:rows,startY:summary?42+summary.length*5+4:40,theme:'grid',styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,180,140],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]},margin:{left:14,right:14}});
  doc.save(title.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.pdf');
  toast('PDF downloaded');
}

function makeExcel(title,headers,rows){
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,title.slice(0,31));
  XLSX.writeFile(wb,title.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
  toast('Excel downloaded');
}

window.rptAllInsp=function(fmt){
  const ins=D.inspections;if(!ins.length){toast('No data','error');return;}
  const hdr=['Type','Date','Module','Operator','Operation','Checked','Defects','DHU%','Defect Type','Inspector'];
  const rows=ins.map(i=>{const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;return[i.type,i.date||fd(i.createdAt),i.module,i.operatorId,i.operation,c,d,c?((d/c)*100).toFixed(1):'0',i.defectType,i.inspector||i.submittedBy];});
  const tc=ins.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0),td=ins.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
  const summary=[`Total Inspections: ${ins.length}`,`Total Checked: ${tc}`,`Total Defects: ${td}`,`Overall DHU: ${tc?((td/tc)*100).toFixed(1):0}%`];
  if(fmt==='pdf')makePDF('All Inspections Report',hdr,rows,summary);
  else makeExcel('All Inspections',hdr,rows);
};

window.rptDefects=function(fmt){
  const dm={};D.inspections.forEach(i=>{if(i.defectType)dm[i.defectType]=(dm[i.defectType]||0)+(parseInt(i.defectQty)||1);});
  const sorted=Object.entries(dm).sort((a,b)=>b[1]-a[1]);const total=sorted.reduce((a,[_,c])=>a+c,0);
  const hdr=['Defect Type','Count','Percentage'];
  const rows=sorted.map(([n,c])=>[n,c,((c/total)*100).toFixed(1)+'%']);
  const summary=[`Total Defect Types: ${sorted.length}`,`Total Defects: ${total}`,`Top Defect: ${sorted[0]?sorted[0][0]:'-'}`];
  if(fmt==='pdf')makePDF('Defect Summary Report',hdr,rows,summary);
  else makeExcel('Defect Summary',hdr,rows);
};

window.rptModules=function(fmt){
  const mm={};D.inspections.forEach(i=>{if(i.module){if(!mm[i.module])mm[i.module]={c:0,d:0,n:0};mm[i.module].c+=parseInt(i.checkedQty)||0;mm[i.module].d+=parseInt(i.defectQty)||0;mm[i.module].n++;}});
  const hdr=['Module','Inspections','Checked','Defects','DHU%','Status'];
  const rows=Object.entries(mm).map(([m,d])=>{const v=d.c?((d.d/d.c)*100).toFixed(1):0;return[m,d.n,d.c,d.d,v+'%',v>5?'Critical':v>3?'Warning':'Good'];});
  if(fmt==='pdf')makePDF('Module Performance Report',hdr,rows);
  else makeExcel('Module Performance',hdr,rows);
};

window.rptOperator=function(fmt){
  const om={};D.inspections.forEach(i=>{if(i.operatorId){if(!om[i.operatorId])om[i.operatorId]={c:0,d:0,n:0,ops:new Set()};om[i.operatorId].c+=parseInt(i.checkedQty)||0;om[i.operatorId].d+=parseInt(i.defectQty)||0;om[i.operatorId].n++;if(i.operation)om[i.operatorId].ops.add(i.operation);}});
  const hdr=['Operator','Inspections','Checked','Defects','Avg Defects','DHU%','Operations','Risk'];
  const rows=Object.entries(om).sort((a,b)=>b[1].d-a[1].d).map(([o,d])=>{const avg=(d.d/d.n).toFixed(1);const v=d.c?((d.d/d.c)*100).toFixed(1):0;return[o,d.n,d.c,d.d,avg,v+'%',[...d.ops].join(', '),avg>3?'High':avg>1?'Medium':'Low'];});
  const summary=[`Total Operators: ${rows.length}`,`High Risk: ${rows.filter(r=>r[7]==='High').length}`,`Medium Risk: ${rows.filter(r=>r[7]==='Medium').length}`];
  if(fmt==='pdf')makePDF('Operator Analysis Report',hdr,rows,summary);
  else makeExcel('Operator Analysis',hdr,rows);
};

window.rptCompleted=function(fmt){
  const completed=D.styles.filter(s=>s.status==='Completed');
  if(!completed.length){toast('No completed styles','error');return;}
  const hdr=['Style ID','Name','Buyer','Color','Target DHU','Completed Date','Total Inspections','Total Checked','Total Defects','Final DHU%'];
  const rows=completed.map(s=>{
    const sIns=D.inspections.filter(i=>i.style&&(i.style.includes(s.name)||i.style.includes(s.styleId)));
    const tc=sIns.reduce((a,i)=>a+(parseInt(i.checkedQty)||0),0);
    const td=sIns.reduce((a,i)=>a+(parseInt(i.defectQty)||0),0);
    return[s.styleId,s.name,s.buyer,s.color,s.targetDhu+'%',fd(s.completedDate),sIns.length,tc,td,tc?((td/tc)*100).toFixed(1)+'%':'0%'];
  });
  const summary=[`Completed Styles: ${completed.length}`,`Total Inspections: ${rows.reduce((a,r)=>a+r[6],0)}`];
  if(fmt==='pdf')makePDF('Completed Styles Report',hdr,rows,summary);
  else makeExcel('Completed Styles',hdr,rows);

// ======================== END LINE REPORT (hourly — paper format) ========================
function elHourOf(i){
  const t=(i.time||'').slice(0,2);
  if(/^\d{2}$/.test(t))return parseInt(t,10);
  const ca=i.createdAt?new Date(i.createdAt):null;
  return ca?ca.getHours():0;
}
function elLabel(h){return (h<10?'0'+h:''+h)+':00';}
function buildEndLine(){
  const all=D.inspections.filter(i=>i.type==='endline');
  const dates=[...new Set(all.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort();
  const styleMode=D.elStyle&&D.elStyle!=='__all';
  const date=D.elDate||dates[dates.length-1]||new Date().toISOString().split('T')[0];
  // When a style is selected, show ALL dates for that style — ignore date filter
  let rows=styleMode
    ?all.filter(i=>(i.style||'')===D.elStyle)
    :all.filter(i=>(i.date||(i.createdAt||'').split('T')[0])===date);
  if(D.elModule&&D.elModule!=='__all')rows=rows.filter(i=>i.module===D.elModule);
  if(D.elShift&&D.elShift!=='__all')rows=rows.filter(i=>(i.shift||'')===D.elShift);
  if(D.elSize&&D.elSize!=='__all')rows=rows.filter(i=>(i.size||'')===D.elSize);
  if(D.elColor&&D.elColor!=='__all')rows=rows.filter(i=>(i.color||'')===D.elColor);
  if(D.elInspector&&D.elInspector!=='__all')rows=rows.filter(i=>(i.inspector||i.submittedBy||'')===D.elInspector);
  const hours=[...new Set(rows.map(elHourOf))].sort((a,b)=>a-b);
  // operation rows (one per operator+operation; appears even with zero defects)
  const gm={};
  rows.forEach(i=>{
    const key=(i.operatorId||'?')+'|'+(i.operation||'—');
    if(!gm[key])gm[key]={operatorId:i.operatorId||'',operation:i.operation||'',cells:{},total:0};
    const h=elHourOf(i),dq=parseInt(i.defectQty)||0;
    if(dq>0&&i.defectType){
      const code=elResolveCode(i.defectType)||(i.defectType||'').toString().slice(0,6);
      if(!gm[key].cells[h])gm[key].cells[h]={};
      gm[key].cells[h][code]=(gm[key].cells[h][code]||0)+dq;
      gm[key].total+=dq;
    }
  });
  const groups=Object.values(gm).sort((a,b)=>(a.operation||'').localeCompare(b.operation||''));
  // category × hour matrix
  const cat={};EL_CAT_ORDER.forEach(c=>{cat[c]={total:0};hours.forEach(h=>cat[c][h]=0);});
  rows.forEach(i=>{const dq=parseInt(i.defectQty)||0;if(dq<=0||!i.defectType)return;const code=elResolveCode(i.defectType);const k=elCategory(code,i.defectType);const h=elHourOf(i);if(!cat[k])cat[k]={total:0};cat[k][h]=(cat[k][h]||0)+dq;cat[k].total+=dq;});
  // per-hour calcs
  const perHour={};let totInsp=0,totDef=0;
  rows.forEach(i=>{const h=elHourOf(i),c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;if(!perHour[h])perHour[h]={insp:0,def:0};perHour[h].insp+=c;perHour[h].def+=d;totInsp+=c;totDef+=d;});
  hours.forEach(h=>{const p=perHour[h]||(perHour[h]={insp:0,def:0});p.good=p.insp-p.def;p.pct=p.insp?(p.def/p.insp)*100:0;});
  const overallDhu=totInsp?(totDef/totInsp)*100:0;
  // meta
  const modName=(D.elModule&&D.elModule!=='__all')?D.elModule:(rows[0]?.module||'');
  const mod=D.modules.find(m=>m.name===modName);
  const styleName=styleMode?D.elStyle:(mod?.styleName||rows[0]?.style||'');
  const sObj=D.styles.find(s=>s.name===styleName||s.styleId===styleName);
  const colour=sObj?.color||sObj?.colors?.split(',')[0]?.trim()||'';
  const styleId=sObj?.styleId||mod?.styleId||'';
  const shift=(D.elShift&&D.elShift!=='__all')?D.elShift:(rows[0]?.shift||'');
  const qcNames=[...new Set(rows.map(i=>i.inspector||i.submittedBy).filter(Boolean))].join(', ');
  const size=(D.elSize&&D.elSize!=='__all')?D.elSize:[...new Set(rows.map(i=>i.size||'').filter(Boolean))].join(', ')||'';
  const colorFilter=(D.elColor&&D.elColor!=='__all')?D.elColor:'';
  const inspectorFilter=(D.elInspector&&D.elInspector!=='__all')?D.elInspector:'';
  const dateRange=styleMode?([...new Set(rows.map(i=>i.date||(i.createdAt||'').split('T')[0]).filter(Boolean))].sort().join(' → ')||'All dates'):'';
  return {date,hours,groups,cat,perHour,totInsp,totDef,overallDhu,styleName,styleId,colour,size,colorFilter,inspectorFilter,team:modName||'All',shift,qcNames,count:rows.length,styleMode,dateRange};
}

window.rptEndLine=function(fmt){
  const R=buildEndLine();
  if(R.count===0){toast('No end-line records for the selected date/scope','error');return;}
  if(fmt==='excel')return elExcel(R);
  return elPDF(R);
};

  doc.autoTable({head:head1,body:body1,startY:36,theme:'grid',styles:{fontSize:7,cellPadding:1.4,halign:'center'},columnStyles:{0:{halign:'left'},1:{halign:'left',cellWidth:34}},headStyles:{fillColor:[0,180,140],textColor:255,fontSize:7},margin:{left:14,right:14}});

  doc.autoTable({head:head2,body:body2,startY:y,theme:'grid',styles:{fontSize:7,cellPadding:1.4,halign:'center'},columnStyles:{0:{halign:'left',cellWidth:34}},headStyles:{fillColor:[68,80,100],textColor:255,fontSize:7},margin:{left:14,right:14}});
  y=doc.lastAutoTable.finalY+5;
  doc.setFontSize(9);doc.setTextColor(20,20,20);
  doc.text(`Total Inspected: ${R.totInsp}     Good: ${R.totInsp-R.totDef}     Defects: ${R.totDef}     DHU: ${R.overallDhu.toFixed(2)}%     AQL Result: ${R.overallDhu<=2.5?'PASS':'REVIEW'}`,14,y);
  y+=7;

  doc.autoTable({body:leg,startY:y+1,theme:'plain',styles:{fontSize:6.6,cellPadding:0.7},margin:{left:14,right:14}});

  toast('End Line Report PDF downloaded');
}

window.seedEndlineDefects=async function(){
  if(!confirm('Add the full End-Line defect code list (S/L/M/D/E/F, '+EL_DEFECTS.length+' codes) to Defects? Existing codes are skipped.'))return;
  const existing=new Set((D.defects||[]).map(d=>(d.defectId||'').toUpperCase()));
  let n=0;
  for(const d of EL_DEFECTS){if(existing.has(d.code))continue;await window.fbAdd('defects',{defectId:d.code,name:d.name,type:'Endline'});n++;}
  toast('Added '+n+' end-line defect codes');
};

function pgRoster(){
  const all=D.machineRosters||[];

  // All available dates and modules for filters
  const dates=[...new Set(all.map(r=>r.date||'').filter(Boolean))].sort().reverse();
  const mods=[...new Set(all.map(r=>r.moduleName||r.moduleId||'').filter(Boolean))].sort();
  const fDate=D.rosterDate||'';

  const fStatus=D.rosterStatus||'__all';

  const vis=all.filter(r=>{
    const d=r.date||'';
    const m=r.moduleName||r.moduleId||'';
    const s=r.status||'Active';
    return(!fDate||d===fDate)&&(fMod==='__all'||m===fMod)&&(fStatus==='__all'||s===fStatus);
  }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const pending=all.filter(r=>r.status==='Pending Approval').length;

  const filters=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <select class="form-control" style="width:160px" onchange="D.rosterDate=this.value;render()">

    </select>
    <select class="form-control" style="width:160px" onchange="D.rosterMod=this.value;render()">
      <option value="__all">All Modules</option>
      ${mods.map(m=>`<option value="${m}" ${fMod===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <select class="form-control" style="width:140px" onchange="D.rosterStatus=this.value;render()">
      <option value="__all">All Status</option>
      <option value="Pending Approval" ${fStatus==='Pending Approval'?'selected':''}>Pending</option>
      <option value="Approved" ${fStatus==='Approved'?'selected':''}>Approved</option>
      <option value="Active" ${fStatus==='Active'?'selected':''}>Active</option>
    </select>
    ${pending>0?`<span class="badge badge-yellow" style="font-size:12px">⚠ ${pending} Pending Approval</span>`:''}
    <span style="margin-left:auto;font-size:12px;color:var(--text3)">${vis.length} rosters</span>
  </div>`;

  if(vis.length===0) return`<div style="display:flex;flex-direction:column;gap:20px">
    ${filters}
    <div class="card" style="padding:48px;text-align:center;color:var(--text3)">
      No rosters found.<br><span style="font-size:12px;margin-top:8px;display:block">Line Heads register operators from the worker app at shift start.</span>
    </div></div>`;

  const cards=vis.map(r=>{

    const workerRows=workers.length===0
      ?'<div style="padding:12px;text-align:center;color:var(--text3);font-size:12px">No operators recorded</div>'
      :workers.map(w=>`<tr>
        <td style="font-family:var(--mono);font-size:12px">${w.operatorId||'—'}</td>
        <td style="font-size:12px">${w.machineName||w.machineId||'—'}</td>
        <td style="font-size:12px">${w.operation||'—'}</td>
        <td style="font-size:11px;color:var(--text3)">${w.registeredBy||'—'}</td>
      </tr>`).join('');
    return`<div class="card" style="border-color:${statusColor}20">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:16px;font-weight:700">${r.moduleName||r.moduleId||'—'}</div>

          <div style="font-size:11px;color:var(--text3);margin-top:2px">Registered by: ${r.createdBy||r.registeredBy||Object.values(r.workers||{})[0]?.registeredBy||'—'}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">

  const allMods=[...new Set(allEl.map(i=>i.module).filter(Boolean))].sort();
  const fDate=D.elDate||allDates[0]||'';
  const fMod=D.elModule||'__all';
  const fShift=D.elShift||'__all';

  // Filters bar
  const filters=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <select class="form-control" style="width:160px" onchange="D.elDate=this.value;render()">
      <option value="">All Dates</option>
      ${allDates.map(d=>`<option value="${d}" ${fDate===d?'selected':''}>${d}</option>`).join('')}
    </select>

  </div>`;

  const R=buildEndLine();

  // Build hours from actual data + fill working day 7–17; always include real data hours

  const tdStyle=(active,red)=>`padding:4px 3px;font-size:11px;text-align:center;font-family:var(--mono);border:1px solid rgba(255,255,255,.08);${active?'':'opacity:.3;'}${red?'color:var(--red);font-weight:600;':''}`;
  const tdL='padding:5px 8px;font-size:11px;border:1px solid rgba(255,255,255,.1);white-space:nowrap;';
  const tdLB='padding:5px 8px;font-size:11px;border:1px solid rgba(255,255,255,.1);white-space:nowrap;font-weight:600;color:var(--accent);';

  // Header info bar
  const dhu=R.totInsp?((R.totDef/R.totInsp)*100).toFixed(1):'0.0';
  const aql=R.overallDhu<=2.5?'PASS':'REVIEW';
  const infoBar=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="card" style="padding:12px 14px"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">TEAM / DATE</div><div style="font-weight:600">${R.team||'—'}</div><div style="font-size:11px;color:var(--text2)">${R.date||'—'} • Shift ${R.shift||'—'}</div></div>
    <div class="card" style="padding:12px 14px"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">STYLE / COLOUR / SIZE</div><div style="font-weight:600">${R.styleName||'—'}</div><div style="font-size:11px;color:var(--text2)">${R.styleId?R.styleId+' • ':''} ${R.colorFilter||R.colour||'—'}${R.size?' • Size: '+R.size:''}</div></div>
    <div class="card" style="padding:12px 14px"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">QC INSPECTOR</div><div style="font-weight:600;font-size:12px">${R.qcNames||'—'}</div><div style="font-size:11px;color:var(--text2)">Dept: Quality</div></div>
    <div class="card" style="padding:12px 14px;border-color:${aql==='PASS'?'var(--green)':'var(--red)'}"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">INSPECTED / DHU</div><div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${parseFloat(dhu)>5?'var(--red)':parseFloat(dhu)>3?'var(--yellow)':'var(--green)'}">${dhu}%</div><div style="font-size:11px;color:var(--text2)">${R.totInsp} checked • AQL: <b style="color:${aql==='PASS'?'var(--green)':'var(--red)'}">${aql}</b></div></div>

  // Summary rows
  const summaryRows=[
    {label:'INSPECTED',    vals:HOURS.map(h=>(R.perHour[h]?.insp||'')),   tot:R.totInsp,   color:''},

    {label:'DEFECT QTY',   vals:HOURS.map(h=>(R.perHour[h]?.def||'')),    tot:R.totDef,    color:'var(--red)'},

  // COR. ADJUSTMENTS + signature rows
  const footRows=`<tr style="background:rgba(0,0,0,.3)">

    ${HOURS.map(()=>`<td style="${tdStyle(false,false)}"></td>`).join('')}<td style="${tdStyle(false,false)}"></td>

  // Defect codes legend
  const legend=EL_DEFECTS.map(d=>`<span style="font-size:10px;white-space:nowrap;padding:2px 6px;margin:2px;background:rgba(255,255,255,.04);border-radius:4px;border:1px solid rgba(255,255,255,.08)"><b style="color:var(--accent)">${d.code}</b> ${d.name}</span>`).join('');

  const table=`<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:900px">
      <thead>${colHdrs}</thead>
      <tbody>${opRows}${catRows}${summaryRows}${footRows}</tbody>

  return`<div style="display:flex;flex-direction:column;gap:16px">

}

window.rptRoving=function(fmt){
  const rovIns=D.rovingInspections||[];
  const curDate=D.rovingDate||new Date().toISOString().split('T')[0];
  let rows=rovIns.filter(i=>i.date===curDate);
  if(D.rovingModule&&D.rovingModule!=='__all') rows=rows.filter(i=>i.module===D.rovingModule);
  if(rows.length===0){toast('No roving data for selected filters','error');return;}
  if(fmt==='excel') return rovingExcel(rows,curDate);
  return rovingPDF(rows,curDate);
};

  const operators=Object.values(opMap).sort((a,b)=>a.operation.localeCompare(b.operation));

  const body=operators.map(op=>{
    const row=[op.operatorId,op.operation];
    [1,2,3,4].forEach(v=>{const vi=op.visits[v];row.push(vi?vi.trim==='pass'?'✓':'✗':'');row.push(vi?vi.sp||'':'');row.push(vi?vi.dc||'0':'');row.push(vi?vi.cpa||'':'');row.push(vi?vi.absent?'AB':'':'');});

  totRow.push(totSP,totDC);body.push(totRow);
  const pctRow=['%',''];

  doc.text('Technician: ____________________________      QA.Exe: ____________________________',14,y);
  doc.save(`Roving_Report_${(style||'report').toString().replace(/\s/g,'_')}_${date}.pdf`);

// ======================== SHIFT END SUMMARY PAGE ========================
function pgShiftSummary(){
  const ins=D.inspections||[];
  // Build summary rows grouped by date + module + shift
  const map={};
  ins.forEach(r=>{
    const dateKey=r.date||(r.createdAt?new Date(r.createdAt).toISOString().slice(0,10):'');
    if(!dateKey)return;
    const shift=r.shift||'A';
    const module=r.module||'—';
    const key=`${dateKey}__${module}__${shift}`;
    if(!map[key])map[key]={date:dateKey,module,shift,checkQty:0,defectQty:0,operatorDHU:{},defectTypes:{},rejections:0};
    const g=map[key];
    const chk=parseInt(r.checkedQty)||0;
    const def=parseInt(r.defectQty)||0;
    g.checkQty+=chk;g.defectQty+=def;g.rejections+=def;
    // Track per-operator DHU for red-operator detection
    const opId=r.operatorId||r.machineId||'?';
    if(!g.operatorDHU[opId])g.operatorDHU[opId]={name:r.operatorId||opId,chk:0,def:0,topDef:{}};
    g.operatorDHU[opId].chk+=chk;g.operatorDHU[opId].def+=def;
    if(r.defectType&&def>0){const dt=r.defectType;g.operatorDHU[opId].topDef[dt]=(g.operatorDHU[opId].topDef[dt]||0)+def;}
    // Track overall defect types for top-3
    if(r.defectType&&def>0){const dt=r.defectType;g.defectTypes[dt]=(g.defectTypes[dt]||0)+def;}
  });
  // Aggregate operator repeat-red across dates
  const redByOp={};
  Object.values(map).forEach(g=>{
    Object.entries(g.operatorDHU).forEach(([opId,od])=>{
      const dhu=od.chk?((od.def/od.chk)*100):0;
      if(dhu>5){redByOp[opId]=(redByOp[opId]||0)+1;}
    });
  });
  const rows=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)||a.module.localeCompare(b.module));

  // Filters
  const allDates=[...new Set(rows.map(r=>r.date))].sort().reverse();
  const allMods=[...new Set(rows.map(r=>r.module))].sort();
  const fDate=D.ssDate||'';const fMod=D.ssMod||'__all';
  const vis=rows.filter(r=>(!fDate||r.date===fDate)&&(fMod==='__all'||r.module===fMod));

  const tableRows=vis.map(g=>{
    const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
    const redOps=Object.entries(g.operatorDHU).filter(([,od])=>od.chk&&(od.def/od.chk)*100>5);
    const noRed=redOps.length;
    const repRed=redOps.filter(([opId])=>(redByOp[opId]||0)>1).map(([opId])=>opId).join(', ')||'—';
    const redReasons=redOps.map(([opId,od])=>{
      const top=Object.entries(od.topDef).sort((a,b)=>b[1]-a[1])[0];
      return top?`${opId}:${top[0]}`:'';
    }).filter(Boolean).join('; ')||'—';
    const redOpsList=redOps.map(([opId])=>opId).join(', ')||'—';

function rptShiftSummary(fmt){
  const ins=D.inspections||[];
  const map={};
  ins.forEach(r=>{
    const dateKey=r.date||(r.createdAt?new Date(r.createdAt).toISOString().slice(0,10):'');
    if(!dateKey)return;
    const shift=r.shift||'A';const module=r.module||'—';
    const key=`${dateKey}__${module}__${shift}`;
    if(!map[key])map[key]={date:dateKey,module,shift,checkQty:0,defectQty:0,operatorDHU:{},defectTypes:{},rejections:0};
    const g=map[key];const chk=parseInt(r.checkedQty)||0;const def=parseInt(r.defectQty)||0;
    g.checkQty+=chk;g.defectQty+=def;g.rejections+=def;
    const opId=r.operatorId||r.machineId||'?';
    if(!g.operatorDHU[opId])g.operatorDHU[opId]={name:opId,chk:0,def:0,topDef:{}};
    g.operatorDHU[opId].chk+=chk;g.operatorDHU[opId].def+=def;
    if(r.defectType&&def>0){const dt=r.defectType;g.operatorDHU[opId].topDef[dt]=(g.operatorDHU[opId].topDef[dt]||0)+def;}
    if(r.defectType&&def>0){const dt=r.defectType;g.defectTypes[dt]=(g.defectTypes[dt]||0)+def;}
  });
  const redByOp={};
  Object.values(map).forEach(g=>{Object.entries(g.operatorDHU).forEach(([opId,od])=>{const dhu=od.chk?((od.def/od.chk)*100):0;if(dhu>5)redByOp[opId]=(redByOp[opId]||0)+1;});});
  const fDate=D.ssDate||'';const fMod=D.ssMod||'__all';
  const rows=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)||a.module.localeCompare(b.module))
    .filter(r=>(!fDate||r.date===fDate)&&(fMod==='__all'||r.module===fMod));
  if(fmt==='pdf')shiftSummaryPDF(rows);else shiftSummaryExcel(rows);
}

function shiftSummaryPDF(rows){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(30,30,46);doc.rect(0,0,297,297,'F');
  doc.setFontSize(14);doc.setTextColor(0,212,168);doc.text('BRANDIX APPAREL INDIA UNIT-3',148,14,{align:'center'});
  doc.setFontSize(10);doc.setTextColor(200,200,200);doc.text('Shift End Summary Report',148,21,{align:'center'});
  doc.setFontSize(8);doc.text(`Generated: ${new Date().toLocaleString()}`,148,27,{align:'center'});
  const redByOp2={};
  rows.forEach(g=>{Object.entries(g.operatorDHU||{}).forEach(([opId,od])=>{if(od.chk&&(od.def/od.chk)*100>5)redByOp2[opId]=(redByOp2[opId]||0)+1;});});
  const body=rows.map(g=>{
    const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
    const redOps=Object.entries(g.operatorDHU).filter(([,od])=>od.chk&&(od.def/od.chk)*100>5);
    const repRed=redOps.filter(([opId])=>(redByOp2[opId]||0)>1).map(([opId])=>opId).join(', ')||'—';
    const redReasons=redOps.map(([opId,od])=>{const top=Object.entries(od.topDef).sort((a,b)=>b[1]-a[1])[0];return top?`${opId}:${top[0]}`:''}).filter(Boolean).join('; ')||'—';
    const top3=Object.entries(g.defectTypes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([dt,n])=>`${dt}(${n})`).join(', ')||'—';
    return[g.date,g.module,g.checkQty,g.defectQty,endPer+'%',redOps.map(([opId])=>opId).join(', ')||'—',redOps.length,repRed,redReasons,g.module,g.rejections,top3,g.shift];
  });
  doc.autoTable({startY:32,head:[['Date','Line','Check Qty','Def Qty','End %','Red Operators','#Red','Rep.Red','Reasons','Zone','Rej.','Top 3 Defects','Shift']],body,styles:{fontSize:7,cellPadding:2,textColor:[220,220,220],fillColor:[20,22,36]},headStyles:{fillColor:[180,30,30],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[26,28,44]},theme:'grid'});
  doc.save(`ShiftEndSummary_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('Shift End Summary PDF downloaded');
}

function shiftSummaryExcel(rows){
  const header=['Date','Line/Zone','Check Qty','Defect Qty','End Per %','Red Operators (EQC)','No of Red Operators','Repeated Red Operators','Red Operator Reasons','Zone','No of Rejections','Top 3 Defects','Shift'];
  const redByOp2={};
  rows.forEach(g=>{Object.entries(g.operatorDHU||{}).forEach(([opId,od])=>{if(od.chk&&(od.def/od.chk)*100>5)redByOp2[opId]=(redByOp2[opId]||0)+1;});});
  const body=rows.map(g=>{
    const endPer=g.checkQty?((g.defectQty/g.checkQty)*100).toFixed(1):'0.0';
    const redOps=Object.entries(g.operatorDHU).filter(([,od])=>od.chk&&(od.def/od.chk)*100>5);
    const repRed=redOps.filter(([opId])=>(redByOp2[opId]||0)>1).map(([opId])=>opId).join(', ')||'—';
    const redReasons=redOps.map(([opId,od])=>{const top=Object.entries(od.topDef).sort((a,b)=>b[1]-a[1])[0];return top?`${opId}:${top[0]}`:''}).filter(Boolean).join('; ')||'—';
    const top3=Object.entries(g.defectTypes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([dt,n])=>`${dt}(${n})`).join(', ')||'—';
    return[g.date,g.module,g.checkQty,g.defectQty,endPer+'%',redOps.map(([opId])=>opId).join(', ')||'—',redOps.length,repRed,redReasons,g.module,g.rejections,top3,g.shift];
  });
  const ws=XLSX.utils.aoa_to_sheet([header,...body]);
  ws['!cols']=header.map((_,i)=>({wch:[12,16,10,10,10,28,8,20,28,16,10,28,8][i]||12}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Shift Summary');
  XLSX.writeFile(wb,`ShiftEndSummary_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Shift End Summary Excel downloaded');
}

function pgMachines(){
  const machines = D.machines||[];
  const events   = D.machineEvents||[];
  const qmsMods  = D.modules||[];
  const fmMods   = D.fmModules||[];

  function resolveModuleName(m){
    if(m.moduleName) return m.moduleName;
    if(m.lineName)   return m.lineName;
    const qms = qmsMods.find(x=>x.fbKey===m.moduleId);
    if(qms) return qms.name;
    const fm  = fmMods.find(x=>x.fbKey===m.moduleId);
    if(fm) return fm.name;
    if(m.moduleId==='yard') return 'Machine Yard';
    return m.moduleId||'—';
  }
  function resolveLocation(m){
    const parts=[];
    if(m.buildingName) parts.push(m.buildingName);
    if(m.sectionName)  parts.push(m.sectionName);
    const mod=resolveModuleName(m);
    if(mod&&mod!=='—') parts.push(mod);
    return parts.join(' › ');
  }

  const groups={};
  machines.forEach(m=>{
    const loc=resolveLocation(m)||'Unassigned';
    if(!groups[loc])groups[loc]=[];
    groups[loc].push(m);
  });

  const recentEvents = events.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-primary" onclick="syncMachines()">${ic('refresh',14)} Sync from Factory App</button>
      <span style="font-size:12px;color:var(--text3)">${machines.length} machines</span>
    </div>
    ${machines.length===0
      ?`<div class="card" style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">&#127981;</div><div style="font-weight:600">No machines yet</div><div style="font-size:12px;margin-top:8px">Click Sync from Factory App to import.</div></div>`
      :`<div class="card" style="padding:0;overflow:hidden">
          <div class="card-header" style="padding:16px;display:flex;justify-content:space-between;align-items:center"><span class="card-title">Machine Registry</span><span style="font-size:12px;color:var(--text3)">${Object.keys(groups).length} locations</span></div>
          <div class="table-wrap"><table><thead><tr><th>#</th><th>Machine Name</th><th>Type</th><th>Module</th><th>Location</th><th>Last Event</th><th></th></tr></thead>
          <tbody>${Object.entries(groups).map(([loc,ms])=>`
            <tr style="background:var(--bg,#f8fafc)"><td colspan="7" style="padding:5px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">&#128205; ${loc} <span style="font-weight:400;color:var(--text3)">(${ms.length})</span></td></tr>
            ${ms.map((m,i)=>{
              const lastEv=events.filter(e=>e.machineId===m.fbKey).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
              const modName=resolveModuleName(m);
              return`<tr><td style="font-size:11px;color:var(--text3)">${i+1}</td><td style="font-weight:600">${m.name||'—'}</td><td style="font-size:11px;color:var(--text2)">${m.type||'—'}</td><td><span class="badge badge-blue">${modName}</span></td><td style="font-size:11px;color:var(--text3)">${m.sectionName||''}${m.buildingName?' • '+m.buildingName:''}</td><td style="font-size:11px;color:var(--text3)">${lastEv?lastEv.type+' — '+ta(lastEv.createdAt):'No events'}</td><td><div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="showModal('editMachine',${JSON.stringify(m).replace(/"/g,'&quot;')})">${ic('edit',14)}</button><button class="btn-icon" style="color:var(--red)" onclick="del('machines','${m.fbKey}')">${ic('trash',14)}</button></div></td></tr>`;
            }).join('')}
          `).join('')}
          </tbody></table></div></div>`}
    ${recentEvents.length>0?`<div class="card"><div class="card-header"><span class="card-title">Recent Machine Events</span></div><div class="table-wrap"><table><thead><tr><th>Event</th><th>Machine</th><th>Module</th><th>Details</th><th>By</th><th>Time</th></tr></thead><tbody>${recentEvents.map(e=>{
      const mach=machines.find(m=>m.fbKey===e.machineId);
      const loc=mach?resolveModuleName(mach):(e.moduleName||'—');
      return`<tr><td><span class="badge badge-${e.type==='Breakdown'?'red':e.type==='Swap'?'yellow':e.type==='OperatorChange'?'blue':e.type==='Transfer'?'purple':'green'}">${e.type}</span></td><td style="font-weight:500">${mach?.name||e.machineId||'?'}</td><td style="font-size:11px;color:var(--text2)">${loc}</td><td style="font-size:12px">${e.details||''}</td><td style="font-size:11px;color:var(--text3)">${e.loggedBy||''}</td><td style="font-size:11px;color:var(--text3)">${ta(e.createdAt)}</td></tr>`;
    }).join('')}</tbody></table></div></div>`:''}
  </div>`;
}

window.syncMachines = async function(){
  const btn = document.querySelector('[onclick="syncMachines()"]');
  if(btn){btn.disabled=true;btn.textContent='⟳ Syncing...';}
  try {
    const fmDb = window._fmDb;
    if(!fmDb){toast('Factory app not connected','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}
    const { ref:fmRef, get:fmGet } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');

    // Factory Manager schema: buildings → sections (buildingId) → modules (sectionId) → machines (moduleId)
    const [mSnap, modSnap, secSnap, bSnap] = await Promise.all([
      fmGet(fmRef(fmDb,'machines')),
      fmGet(fmRef(fmDb,'modules')),
      fmGet(fmRef(fmDb,'sections')),
      fmGet(fmRef(fmDb,'buildings'))
    ]);

    if(!mSnap.exists()){toast('No machines in Factory App. Add them in Factory Manager first.','error');if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}return;}

    // Build lookup maps
    const fmModules  = modSnap.exists() ? Object.entries(modSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmSections = secSnap.exists() ? Object.entries(secSnap.val()).map(([k,v])=>({id:k,...v})) : [];
    const fmBuildings= bSnap.exists()   ? Object.entries(bSnap.val()).map(([k,v])=>({id:k,...v})) : [];

    const fmMachines = Object.entries(mSnap.val()).map(([k,v])=>({id:k,...v}));

    // Sync: write each machine into QMS machines collection using the FM machine key as the record key
    // This ensures QR codes (which encode FM machine ID) match perfectly
    let count=0;
    for(const fm of fmMachines){
      const fmMod     = fmModules.find(m=>m.id===fm.moduleId);
      const fmSection = fmSections.find(s=>s.id===fmMod?.sectionId);
      const fmBuilding= fmBuildings.find(b=>b.id===fmSection?.buildingId);

      const machData = {
        name:         fm.name           || 'Unknown Machine',
        type:         fm.type           || '',
        brand:        fm.brand          || '',
        model:        fm.model          || '',
        serial:       fm.serial         || '',
        year:         fm.year           || '',
        price:        fm.price          || '',
        status:       fm.status         || 'Running',
        moduleId:     fm.moduleId       || 'yard',          // FM module key — used for matching worker scans
        moduleName:   fmMod?.name       || '',              // Friendly name
        sectionName:  fmSection?.name   || '',
        buildingName: fmBuilding?.name  || '',
        lineName:     fmMod?.name       || '',              // alias for worker.html compatibility
        pmInterval:   fm.interval       || 30,
        lastPM:       fm.lastMaintenance|| null,
        syncedFrom:   'factory-manager',
        syncedAt:     new Date().toISOString()
      };

      // Use FM machine ID as the key so QR codes match
      await window._set(window._ref(window._db, 'machines/'+fm.id), machData);
      count++;
    }

    // Also sync modules so QMS module screen shows line names matching FM
    for(const mod of fmModules){
      const sec = fmSections.find(s=>s.id===mod.sectionId);
      const bld = fmBuildings.find(b=>b.id===sec?.buildingId);
      await window._set(window._ref(window._db,'fmModules/'+mod.id),{
        fbKey:mod.id, name:mod.name, sectionId:mod.sectionId, sectionName:sec?.name||'',
        buildingId:sec?.buildingId||'', buildingName:bld?.name||'', syncedAt:new Date().toISOString()
      });
    }

    toast(`✓ Synced ${count} machines from Factory App!`);
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }catch(e){
    toast('Sync error: '+e.message,'error');
    if(btn){btn.disabled=false;btn.innerHTML=ic('refresh',14)+' Sync from Factory App';}
  }
};

window.runAIAnalysis = async function(){
  const ins = D.inspections;
  if(ins.length < 3) return;
  const tickets = D.aiTickets||[];
  const existingIds = new Set(tickets.map(t=>t.refId));
  const today = new Date().toISOString().split('T')[0];
  const omMap={};
  ins.filter(i=>i.machineId&&i.operatorId).forEach(i=>{
    const key=`${i.operatorId}_${i.machineId}`;
    if(!omMap[key])omMap[key]=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)omMap[key].push((d/c)*100);
  });
  for(const [key,dhus] of Object.entries(omMap)){
    if(dhus.length>=3 && dhus.slice(-3).every(d=>d>5)){
      const [opId,machId]=key.split('_');
      const refId=`op_risk_${key}_${today}`;
      if(!existingIds.has(refId)){
        const mach = (D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'OperatorRisk',level:'high',status:'Open',operatorId:opId,machineId:machId,machineName:mach?.name||machId,title:`High DHU: Operator ${opId} on ${mach?.name||machId}`,description:`Operator ${opId} has exceeded 5% DHU for 3+ consecutive inspections on machine ${mach?.name||machId}. Consider retraining.`,autoGenerated:true});
      }
    }
  }
  const machMap={};
  ins.filter(i=>i.machineId).forEach(i=>{
    if(!machMap[i.machineId])machMap[i.machineId]={};
    if(!machMap[i.machineId][i.operatorId||'?'])machMap[i.machineId][i.operatorId||'?']=[];
    const c=parseInt(i.checkedQty)||0,d=parseInt(i.defectQty)||0;
    if(c>0)machMap[i.machineId][i.operatorId||'?'].push((d/c)*100);
  });
  for(const [machId,opData] of Object.entries(machMap)){
    const ops=Object.keys(opData);
    if(ops.length>=2&&ops.every(op=>opData[op].length>0&&(opData[op].reduce((a,b)=>a+b,0)/opData[op].length)>5)){
      const refId=`mach_risk_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'MachineRisk',level:'high',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Machine Issue: ${mach?.name||machId} — All Operators Affected`,description:`Multiple operators on machine ${mach?.name||machId} are all showing DHU>5%. The machine itself likely needs servicing.`,autoGenerated:true});
      }
    }
  }
  const swaps=(D.machineEvents||[]).filter(e=>e.type==='Swap'&&(e.createdAt||'').startsWith(today));
  const swapCount={};
  swaps.forEach(s=>{swapCount[s.machineId]=(swapCount[s.machineId]||0)+1;});
  for(const [machId,cnt] of Object.entries(swapCount)){
    if(cnt>=2){
      const refId=`swap_${machId}_${today}`;
      if(!existingIds.has(refId)){
        const mach=(D.machines||[]).find(m=>m.fbKey===machId);
        await window.fbAdd('aiTickets',{refId,type:'FrequentSwap',level:'medium',status:'Open',machineId:machId,machineName:mach?.name||machId,title:`Unstable Machine: ${mach?.name||machId} swapped ${cnt}x today`,description:`Machine ${mach?.name||machId} has been swapped ${cnt} times today. Investigate machine reliability.`,autoGenerated:true});
      }
    }
  }
};

function roleBadge(role){
  if(!role)return'gray';
  if(role==='Admin')return'green';
  if(role==='Line Head')return'yellow';
  if(role.includes('End'))return'purple';
  if(role.includes('Roving'))return'red';
  if(role.includes('QC')||role.includes('Inspector'))return'blue';
  if(role==='Supervisor')return'blue';
  return'gray';
}
